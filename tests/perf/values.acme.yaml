# ACME values for Benchmark CR via run-chart
# Usage: helm install acme-world-to-bank ./run-chart -f values.acme.yaml

script: world_to_bank

metadata:
  name: acme-world-to-bank
  namespace: ledger-v3

ledgerName: ledger0

spec:
  parallelism: 1
  separate: true
  arguments: "-o opentelemetry"

ledgerService:
  defaultsRef: dev
  replicas: 1
  resources:
    requests:
      cpu: "6"
      memory: 12Gi
    limits:
      cpu: "6"
      memory: 12Gi
  config:
##    admissionMetrics: true
#    monitoring:
#      flightRecorder:
#        enabled: false
#      logs:
#        enabled: false
#      traces:
#        enabled: false
#      metrics:
#        enabled: false
#      pyroscope:
#        enabled: true
#        serverAddress: http://pyroscope.ledger-v3:4040
#        tags: version=8334cd10-dirty-20260321-170227

    auth:
      enabled: false
    pebble:
      memTableStopWritesThreshold: 4
      l0StopWritesThreshold: 256
      lBaseMaxBytes: 4294967296
      cacheSize: 4294967296
      bytesPerSync: 4194304
      walBytesPerSync: 4194304
      maxConcurrentCompactions: 2
      snapshotThreshold: 1000
    raft:
      compactionMargin: 5000
      proposeQueueCapacity: 4096
      maxSizePerMsg: 4194304
    cache:
      rotationThreshold: 50000

  networkPolicy:
    enabled: true
    additionalEgress:
      # Join RDS to allow mirror
      - to:
          - ipBlock:
              cidr: 10.70.6.90/32
        ports:
          - port: 5432
            protocol: TCP
  ingressGrpc:
    enabled: true
  persistence:
    retentionPolicy:
      whenDeleted: Delete
    data:
      size: 500Gi
      storageClass: io2
    wal:
      size: 15Gi
      storageClass: io2

runner:
  env:
    LEDGER_NAME: "ledger0"
    HTTP_ADDR: "http://acme-world-to-bank-ledger:9000"
    K6_STAGES: "1m:100,5m:100,1m:0"
    BULK_SIZE: "50"
    K6_OTEL_GRPC_EXPORTER_ENDPOINT: "otel-opentelemetry-collector.ledger-v3.svc.cluster.local:4317"
    K6_OTEL_GRPC_EXPORTER_INSECURE: "true"
    K6_OTEL_METRICS_FLUSH_INTERVAL: "5s"
    K6_OTEL_SERVICE_NAME: "k6-loadtest"
