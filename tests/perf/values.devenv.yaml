# ACME values for Benchmark CR via run-chart
# Usage: helm install acme-world-to-bank ./run-chart -f values.acme.yaml

script: world_to_bank

metadata:
  name: acme-world-to-bank
  namespace: ledger-v3

spec:
  parallelism: 1
  separate: true
  arguments: "-o opentelemetry"

resources:
  - manifest:
      apiVersion: ledger.formance.com/v1alpha1
      kind: LedgerService
      spec:
        defaultsRef: dev
        replicas: 1
        imagePullSecrets:
        - name: zot
        resources:
          requests:
            cpu: "2"
            memory: 6Gi
          limits:
            cpu: "2"
            memory: 6Gi
        config:
          auth:
            enabled: false
          pebble:
            memTableStopWritesThreshold: 4
            l0StopWritesThreshold: 256
            lBaseMaxBytes: 4294967296
            cacheSize: 4294967296
            bytesPerSync: 4194304
            walBytesPerSync: 4194304
            maxConcurrentCompactions: 2
            snapshotThreshold: 1000
          raft:
            compactionMargin: 5000
            proposeQueueCapacity: 4096
            maxSizePerMsg: 4194304
          cache:
            rotationThreshold: 1000
        ingressGrpc:
          enabled: true
        persistence:
          retentionPolicy:
            whenDeleted: Delete
          data:
            size: 500Gi
          wal:
            size: 15Gi
    readyCondition:
      fieldPath: status.phase
      value: Running
  - manifest:
      apiVersion: ledger.formance.com/v1alpha1
      kind: Ledger
      spec:
        name: ledger0
        serviceRef: acme-world-to-bank-res-0
    readyCondition:
      fieldPath: status.phase
      value: Ready

runner:
  env:
    LEDGER_NAME: "ledger0"
    HTTP_ADDR: "http://acme-world-to-bank-res-0:9000"
    K6_STAGES: "1m:100,5m:100,1m:0"
    BULK_SIZE: "50"
    USE_NUMSCRIPT: "true"
    K6_OTEL_GRPC_EXPORTER_ENDPOINT: "otel-opentelemetry-collector.ledger-v3.svc.cluster.local:4317"
    K6_OTEL_GRPC_EXPORTER_INSECURE: "true"
    K6_OTEL_METRICS_FLUSH_INTERVAL: "5s"
    K6_OTEL_SERVICE_NAME: "k6-loadtest"
    GRAFANA_USER: admin
    GRAFANA_PASSWORD: admin
