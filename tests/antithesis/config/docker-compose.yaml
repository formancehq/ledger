x-etcd-common: &etcd-common
  image: quay.io/coreos/etcd:v3.5.9
  init: true
  environment: &etcd-env
    ETCD_INITIAL_CLUSTER: etcd-0=http://etcd-0:2380,etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380
    ETCD_INITIAL_CLUSTER_STATE: new
    ETCD_INITIAL_CLUSTER_TOKEN: etcd-cluster
    ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
    ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379

x-ledger-common: &ledger-common
  image: us-central1-docker.pkg.dev/molten-verve-216720/formance-repository/ledger:__TAG__
  init: true
  environment: &ledger-env
    WAL_DIR: "/data/raft"
    DATA_DIR: "/data/app"
    CLUSTER_ID: "default"
    INSECURE: "true"
    DEBUG: "true"

    # Chaos-tuned: lower thresholds to exercise more code paths under fault injection
    SNAPSHOT_THRESHOLD: "200"
    CACHE_ROTATION_THRESHOLD: "50"

    # Bloom filters: reduce from defaults (100M/10M) to 1M — antithesis is not a large-scale workload
    BLOOM_VOLUMES_EXPECTED_KEYS: "1000000"
    BLOOM_METADATA_EXPECTED_KEYS: "1000000"
    BLOOM_REFERENCES_EXPECTED_KEYS: "1000000"

    # Runtime consistency checks (valuable under chaos)
    SENTINEL_MODE: "true"

    # Cold storage (S3/MinIO)
    COLD_CACHE_DIR: "/data/cold-cache"
    COLD_STORAGE_DRIVER: "s3"
    COLD_STORAGE_S3_BUCKET: "archives"
    COLD_STORAGE_S3_REGION: "us-east-1"
    COLD_STORAGE_S3_ENDPOINT: "http://minio:9000"
    AWS_ACCESS_KEY_ID: "minioadmin"
    AWS_SECRET_ACCESS_KEY: "minioadmin"

services:
  etcd-0:
    <<: *etcd-common
    container_name: etcd-0
    hostname: etcd-0
    environment:
      <<: *etcd-env
      ETCD_NAME: etcd-0
      ETCD_DATA_DIR: /var/run/etcd/default.etcd
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd-0:2380
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd-0:2379
    volumes:
      - etcd-0-data:/var/run/etcd
    annotations:
      com.antithesis.exclude.faults: "all"

  etcd-1:
    <<: *etcd-common
    container_name: etcd-1
    hostname: etcd-1
    annotations:
      com.antithesis.exclude.faults: "all"
    environment:
      <<: *etcd-env
      ETCD_NAME: etcd-1
      ETCD_DATA_DIR: /var/run/etcd/default.etcd
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd-1:2380
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd-1:2379
    volumes:
      - etcd-1-data:/var/run/etcd

  etcd-2:
    <<: *etcd-common
    container_name: etcd-2
    hostname: etcd-2
    annotations:
      com.antithesis.exclude.faults: "all"
    environment:
      <<: *etcd-env
      ETCD_NAME: etcd-2
      ETCD_DATA_DIR: /var/run/etcd/default.etcd
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd-2:2380
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd-2:2379
    volumes:
      - etcd-2-data:/var/run/etcd

  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  nats:
    image: nats:2-alpine
    container_name: nats
    hostname: nats
    command: ["-js"]

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done
        until mc mb --ignore-existing local/archives; do sleep 1; done
        until mc mb --ignore-existing local/backups; do sleep 1; done

  ledger-0:
    <<: *ledger-common
    container_name: ledger-0
    hostname: ledger-0
    depends_on:
      - minio-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -d "/data/app/checkpoints" ] && [ "$(ls -A /data/app/checkpoints 2>/dev/null)" ]; then
          CLUSTER_FLAG=""
        else
          CLUSTER_FLAG="--bootstrap"
        fi
        exec ./ledger run \
          --node-id 1 \
          --advertise-addr "ledger-0:7777" \
          $$CLUSTER_FLAG
    annotations:
      com.antithesis.exclude.faults: ""
    volumes:
      - ledger-0-wal:/data/raft
      - ledger-0-data:/data/app
      - ledger-0-cold-cache:/data/cold-cache

  ledger-1:
    <<: *ledger-common
    container_name: ledger-1
    hostname: ledger-1
    depends_on:
      - ledger-0
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -d "/data/app/checkpoints" ] && [ "$(ls -A /data/app/checkpoints 2>/dev/null)" ]; then
          JOIN_FLAG=""
        else
          JOIN_FLAG="--join ledger-0:8888"
        fi
        exec ./ledger run \
          --node-id 2 \
          --advertise-addr "ledger-1:7777" \
          $$JOIN_FLAG
    annotations:
      com.antithesis.exclude.faults: ""
    volumes:
      - ledger-1-wal:/data/raft
      - ledger-1-data:/data/app
      - ledger-1-cold-cache:/data/cold-cache

  ledger-2:
    <<: *ledger-common
    container_name: ledger-2
    hostname: ledger-2
    depends_on:
      - ledger-0
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -d "/data/app/checkpoints" ] && [ "$(ls -A /data/app/checkpoints 2>/dev/null)" ]; then
          JOIN_FLAG=""
        else
          JOIN_FLAG="--join ledger-0:8888"
        fi
        exec ./ledger run \
          --node-id 3 \
          --advertise-addr "ledger-2:7777" \
          $$JOIN_FLAG
    annotations:
      com.antithesis.exclude.faults: ""
    volumes:
      - ledger-2-wal:/data/raft
      - ledger-2-data:/data/app
      - ledger-2-cold-cache:/data/cold-cache

  workload:
    image: us-central1-docker.pkg.dev/molten-verve-216720/formance-repository/workload-ledger-v3:__TAG__
    container_name: workload
    hostname: workload
    init: true
    environment:
      LEDGER_GRPC_ADDR: "ledger-0:8888"
      EXPECTED_VOTERS: "3"
      ETCD_ENDPOINTS: "http://etcd-0:2379,http://etcd-1:2379,http://etcd-2:2379"
    annotations:
      com.antithesis.exclude.faults: ""
    depends_on:
      - ledger-0
      - ledger-1
      - ledger-2
      - etcd-0
      - etcd-1
      - etcd-2

volumes:
  minio-data:
  etcd-0-data:
  etcd-1-data:
  etcd-2-data:
  ledger-0-wal:
  ledger-0-data:
  ledger-0-cold-cache:
  ledger-1-wal:
  ledger-1-data:
  ledger-1-cold-cache:
  ledger-2-wal:
  ledger-2-data:
  ledger-2-cold-cache:
