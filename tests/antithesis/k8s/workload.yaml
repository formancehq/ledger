---
# RBAC: allow the workload pod to read and update Cluster CRDs.
# This enables test drivers to perform rolling updates, scaling, etc.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workload
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: workload-ledger-updater
rules:
- apiGroups: ["ledger.formance.com"]
  resources: ["clusters"]
  verbs: ["get", "list", "watch", "update", "patch"]
# Operational drivers (rolling_restart, quorum_recovery) delete pods and
# observe the StatefulSet they belong to.
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: workload-ledger-updater
subjects:
- kind: ServiceAccount
  name: workload
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: workload-ledger-updater
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workload
  template:
    metadata:
      labels:
        app: workload
    spec:
      serviceAccountName: workload
      # Init container waits for the Raft cluster to be fully formed
      # (leader elected, all voters present) then signals setup_complete
      # to Antithesis before exiting.
      initContainers:
      - name: wait-cluster
        image: __REGISTRY__/workload-ledger-v3:__TAG__
        command: ["/init"]
        env:
        - name: LEDGER_GRPC_ADDR
          value: "ledger-ledger:8888"
        - name: LEDGER_PER_NODE_GRPC_ADDR
          value: "ledger-ledger-0.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-1.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-2.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-3.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-4.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-5.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-6.ledger-ledger-headless.default.svc.cluster.local:8888"
        - name: EXPECTED_VOTERS
          value: "3"
        - name: EXIT_AFTER_SETUP
          value: "true"
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
      # Main container: Test Composer discovers and runs drivers from the test
      # templates under /opt/antithesis/test/v1/ (main, model).
      containers:
      - name: workload
        image: __REGISTRY__/workload-ledger-v3:__TAG__
        command: ["sleep"]
        args: ["infinity"]
        env:
        - name: LEDGER_GRPC_ADDR
          value: "ledger-ledger:8888"
        - name: LEDGER_PER_NODE_GRPC_ADDR
          value: "ledger-ledger-0.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-1.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-2.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-3.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-4.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-5.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-6.ledger-ledger-headless.default.svc.cluster.local:8888"
        - name: EXPECTED_VOTERS
          value: "3"
        # Readiness probe ensures Antithesis waits for the ledger cluster
        # to be reachable before starting the Test Composer.
        readinessProbe:
          exec:
            command: ["grpc_health_probe", "-addr=ledger-ledger:8888"]
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi
