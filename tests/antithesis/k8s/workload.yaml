---
# RBAC: allow the workload pod to read and update Cluster CRDs.
# This enables test drivers to perform rolling updates, scaling, etc.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workload
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: workload-ledger-updater
rules:
# The restore-orchestrator sidecar deletes and re-creates the Cluster (restore
# mode round-trip), on top of the drivers' rolling updates.
- apiGroups: ["ledger.formance.com"]
  resources: ["clusters"]
  verbs: ["get", "list", "watch", "update", "patch", "create", "delete"]
# Operational drivers (rolling_restart, quorum_recovery) delete pods and
# observe the StatefulSet they belong to.
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "delete"]
# The restore-orchestrator sidecar execs ledgerctl inside ledger pods
# (backup at the quiesce point, restore download/finalize).
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
# The restore teardown deletes the cluster's volume claims so the re-created
# cluster starts from the restored store, not stale disks.
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "list", "delete"]
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: workload-ledger-updater
subjects:
- kind: ServiceAccount
  name: workload
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: workload-ledger-updater
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workload
  template:
    metadata:
      labels:
        app: workload
    spec:
      serviceAccountName: workload
      # Init container waits for the Raft cluster to be fully formed
      # (leader elected, all voters present) then signals setup_complete
      # to Antithesis before exiting.
      initContainers:
      - name: wait-cluster
        image: __REGISTRY__/workload-ledger-v3:__TAG__
        command: ["/init"]
        env:
        - name: LEDGER_GRPC_ADDR
          value: "ledger-ledger:8888"
        - name: LEDGER_PER_NODE_GRPC_ADDR
          value: "ledger-ledger-0.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-1.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-2.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-3.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-4.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-5.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-6.ledger-ledger-headless.default.svc.cluster.local:8888"
        - name: EXPECTED_VOTERS
          value: "3"
        - name: EXIT_AFTER_SETUP
          value: "true"
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
      # Main container: Test Composer discovers and runs drivers from the test
      # templates under /opt/antithesis/test/v1/ (main, model).
      containers:
      - name: workload
        image: __REGISTRY__/workload-ledger-v3:__TAG__
        command: ["sleep"]
        args: ["infinity"]
        env:
        - name: LEDGER_GRPC_ADDR
          value: "ledger-ledger:8888"
        - name: LEDGER_PER_NODE_GRPC_ADDR
          value: "ledger-ledger-0.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-1.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-2.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-3.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-4.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-5.ledger-ledger-headless.default.svc.cluster.local:8888,ledger-ledger-6.ledger-ledger-headless.default.svc.cluster.local:8888"
        - name: EXPECTED_VOTERS
          value: "3"
        # Dumps every committed ApplyRequest (base64) for exact deterministic
        # replay through the oracle (see tests/oracle/cmd/replay). Empty
        # disables; substituted by generate-manifests.sh from the
        # MODEL_DUMP_BATCHES env at config-image build.
        - name: MODEL_DUMP_BATCHES
          value: "__MODEL_DUMP_BATCHES__"
        # Restore-cycle rendezvous with the restore-orchestrator sidecar (only
        # the model driver writes requests; other templates leave it idle).
        # The interval and lease are k8s-sized: one cycle is a full cluster
        # teardown + restore + rejoin, minutes under fault injection.
        - name: MODEL_RESTORE_REQ
          value: /var/run/restore/req
        - name: MODEL_RESTORE_RESP
          value: /var/run/restore/resp
        - name: MODEL_RESTORE_INTERVAL
          value: "180"
        - name: MODEL_RESTORE_TIMEOUT
          value: "900"
        volumeMounts:
        - name: restore-rendezvous
          mountPath: /var/run/restore
        # Readiness probe ensures Antithesis waits for the ledger cluster
        # to be reachable before starting the Test Composer.
        readinessProbe:
          exec:
            command: ["grpc_health_probe", "-addr=ledger-ledger:8888"]
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi
      # Services the model driver's restore requests by driving the operator:
      # quiesce-point backup, cluster teardown, restore-mode round-trip, and
      # the flip back to normal. See restore-orchestrator.sh.
      - name: restore-orchestrator
        image: __REGISTRY__/workload-ledger-v3:__TAG__
        command: ["/opt/antithesis/restore-orchestrator.sh"]
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CLUSTER_NAME
          value: ledger
        - name: CLUSTER_REPLICAS
          value: "3"
        - name: MODEL_RESTORE_REQ
          value: /var/run/restore/req
        - name: MODEL_RESTORE_RESP
          value: /var/run/restore/resp
        volumeMounts:
        - name: restore-rendezvous
          mountPath: /var/run/restore
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
      volumes:
      - name: restore-rendezvous
        emptyDir: {}
