apiVersion: ledger.formance.com/v1alpha1
kind: Cluster
metadata:
  name: ledger
  annotations:
    kapp.k14s.io/owned-for-deletion: ""
spec:
  replicas: 3
  image:
    repository: __REGISTRY__/__IMAGE_NAME__
    tag: "__TAG__"
    pullPolicy: IfNotPresent

  debug: true
  sentinelMode: true

  # Chaos-tuned: lower thresholds to exercise more code paths under fault injection.
  raft:
    compactionMargin: 200
  cache:
    rotationThreshold: 50

  # Pebble: reduce from production defaults to fit the small k3s disk.
  # Default memtable=256MB, cache=1GB — way too large for Antithesis.
  pebble:
    memTableSize: 32Mi
    cacheSize: 64Mi
    targetFileSize: 32Mi
    maxCheckpoints: 2

  # Bloom filters: reduced from defaults (100M) — antithesis is not a large-scale workload.
  bloom:
    volumes:
      expectedKeys: 1000000
    metadata:
      expectedKeys: 1000000
    references:
      expectedKeys: 1000000

  # Cold storage via MinIO.
  coldStorage:
    driver: s3
    s3:
      bucket: archives
      region: us-east-1
      endpoint: http://minio.default.svc:9000

  persistence:
    wal:
      size: 1Gi
    data:
      size: 2Gi
    coldCache:
      size: 1Gi

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi

  # Extra env vars not yet in the CRD spec.
  extraEnv:
  - name: INSECURE
    value: "true"
  # Signed transaction receipts, so the model driver exercises the
  # receipt-carried revert path (admission verifies the receipt and reverses its
  # claimed postings, bypassing the store fetch).
  - name: RECEIPT_SIGNING_KEY
    value: "model-test-receipt-hmac-signing-key"
  # Chaos-tuned: 256 KiB spool segments (default 256 MiB) so rotation seals segments and Prune has work to do.
  - name: SPOOL_SEGMENT_MAX_BYTES
    value: "262144"
  - name: AWS_ACCESS_KEY_ID
    value: minioadmin
  - name: AWS_SECRET_ACCESS_KEY
    value: minioadmin
---
# The ledger image is referenced only by the Cluster CR's spec.image fields,
# which the Antithesis environment builder does not scan — it mirrors images
# from pod templates. This no-op Job carries the image in a pod template so it
# is baked into the hermetic environment for the operator's pods to use.
apiVersion: batch/v1
kind: Job
metadata:
  name: ledger-image-preload
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: preload
        image: __REGISTRY__/__IMAGE_NAME__:__TAG__
        command: ["/bin/true"]
        resources:
          requests:
            cpu: 1m
            memory: 8Mi
