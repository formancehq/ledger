# Shared configuration for all nodes in the Docker Compose cluster
# Node-specific values are set via environment variables in docker-compose.yml:
#   - node-id: Unique identifier for each node (NODE_ID)
#   - advertise-addr: Address advertised to other nodes (ADVERTISE_ADDR)
#   - peers: List of peer addresses (PEERS) - only for node-1
#   - bootstrap: Whether to bootstrap the cluster (BOOTSTRAP) - only for node-1

# Network configuration
network:
  bind-addr: "0.0.0.0:8888"
  data-dir: "/data"

# Logging
logging:
  debug: true

# Server configuration
server:
  grpc-port: 8000
  http-port: 9000

# Storage configuration
storage:
  type: "sqlite"
  sqlite:
    dsn: "file:/data/ledger.db?cache=shared&mode=rwc"
  #file:
  #  path: "/data/logs.jsonl"

# Raft snapshot configuration
raft:
  snapshot:
    threshold: 16384  # Number of logs before triggering a snapshot (0 = use Raft default)
    interval: 30s     # Minimum interval between snapshots (0 = use Raft default)

