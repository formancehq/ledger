---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: k6-run-any-unbounded-to-any
spec:
  parallelism: 1
  script:
    configMap:
      name: k6-scripts
      file: any_unbounded_to_any.js
  separate: false
  runner:
    env:
    - name: LEDGER_URL
      value: http://ledger-v3-poc.default.svc.cluster.local:9000
    - name: VUS
      value: "60"
    - name: DURATION
      value: "10m"
