{{- if and .Values.ingress.enabled .Values.ingress.perPod.enabled .Values.headlessService.enabled }}
{{- range $index := until (int $.Values.replicaCount) }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ledger-v3-poc.fullname" $ }}-pod-{{ $index }}
  labels:
    {{- include "ledger-v3-poc.labels" $ | nindent 4 }}
    app.kubernetes.io/component: pod-service
    app.kubernetes.io/pod-index: "{{ $index | toString }}"
spec:
  type: ClusterIP
  ports:
    - port: {{ $.Values.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ledger-v3-poc.selectorLabels" $ | nindent 4 }}
    statefulset.kubernetes.io/pod-name: {{ printf "%s-%d" (include "ledger-v3-poc.fullname" $) $index }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ledger-v3-poc.fullname" $ }}-pod-{{ $index }}
  labels:
    {{- include "ledger-v3-poc.labels" $ | nindent 4 }}
    app.kubernetes.io/component: pod-ingress
    app.kubernetes.io/pod-index: "{{ $index | toString }}"
  {{- if $.Values.ingress.perPod.annotations }}
  annotations:
    {{- toYaml $.Values.ingress.perPod.annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if $.Values.ingress.className }}
  ingressClassName: {{ $.Values.ingress.className }}
  {{- end }}
  {{- $baseHost := index $.Values.ingress.hosts 0 }}
  {{- if $.Values.ingress.perPod.tls }}
  tls:
    {{- range $.Values.ingress.perPod.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- else if and $baseHost $.Values.ingress.tls }}
  tls:
    {{- range $.Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ printf "pod-%d.%s" $index . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- if $.Values.ingress.perPod.hostPattern }}
    {{- $host := printf $.Values.ingress.perPod.hostPattern $index }}
    - host: {{ $host | quote }}
      http:
        paths:
          - path: "/"
            pathType: "Prefix"
            backend:
              service:
                name: {{ include "ledger-v3-poc.fullname" $ }}-pod-{{ $index }}
                port:
                  number: {{ $.Values.service.httpPort }}
    {{- else if $.Values.ingress.perPod.hosts }}
    {{- $podHost := index $.Values.ingress.perPod.hosts $index }}
    {{- if $podHost }}
    - host: {{ $podHost.host | quote }}
      http:
        paths:
          {{- range $podHost.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "ledger-v3-poc.fullname" $ }}-pod-{{ $index }}
                port:
                  number: {{ $.Values.service.httpPort }}
          {{- end }}
    {{- end }}
    {{- else if $baseHost }}
    {{- $podHost := printf "pod-%d.%s" $index $baseHost.host }}
    - host: {{ $podHost | quote }}
      http:
        paths:
          {{- range $baseHost.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "ledger-v3-poc.fullname" $ }}-pod-{{ $index }}
                port:
                  number: {{ $.Values.service.httpPort }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}

