config:
  namespace: test-upgrades
  install-dev-box: true
  debug: true
  #version: v2.2.19
  version: 5b4e224c714997ecaf07e67a6575088b7f52baf7
  monitoring:
    traces:
      batch: true
      exporter: otlp
      otlp:
        mode: grpc
        insecure: true
        endpoint: opentelemetry-collector.formance-system.svc.cluster.local:4317
        batch: true
  storage:
    connectivity:
      options:
        sslmode: disable
      max-open-conns: 3
      max-idle-conns: 3
    rds:
      create-cluster:
        performance-insights-enabled: true
        use-subnet-group-name: staging-eu-west-1-hosting
        instance-class: db.r7g.4xlarge
        initialization-snapshot-identifier: ledger-multi-buckets-v2-1
