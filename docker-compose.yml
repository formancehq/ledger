

services:
  node-1:
    image: golang:1.25-alpine
    working_dir: /app
    environment:
      - NODE_ID=1
      - ADVERTISE_ADDR=node-1:8888
      - PEERS=2/node-2:8888 3/node-3:8888
      - BOOTSTRAP=true
      - LOGGING_LEVEL=${DEBUG:-false}
    ports:
      - "8888:8888"
      - "8000:8000"
      - "9000:9000"
    volumes:
      - .:/app
      - ./data/node-1:/data
      - ./default-config.yml:/app/default-config.yml:ro
      - go-mod-cache:/go/pkg/mod
    networks:
      - raft-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 5s
      timeout: 2s
      retries: 2
      start_period: 10s
    command: >
      sh -c "
        go mod download &&
        go run ./cmd/server --config /app/default-config.yml
      "

  node-2:
    image: golang:1.25-alpine
    working_dir: /app
    environment:
      - NODE_ID=2
      - ADVERTISE_ADDR=node-2:8888
      - PEERS=1/node-1:8888 3/node-3:8888
      - LOGGING_LEVEL=${DEBUG:-false}
    ports:
      - "8889:8888"
      - "8001:8000"
      - "9001:9000"
    volumes:
      - .:/app
      - ./data/node-2:/data
      - ./default-config.yml:/app/default-config.yml:ro
      - go-mod-cache:/go/pkg/mod
    networks:
      - raft-network
    depends_on:
      - node-1
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 5s
      timeout: 2s
      retries: 2
      start_period: 10s
    command: >
      sh -c "
        go mod download &&
        go run ./cmd/server --config /app/default-config.yml
      "

  node-3:
    image: golang:1.25-alpine
    working_dir: /app
    environment:
      - NODE_ID=3
      - ADVERTISE_ADDR=node-3:8888
      - PEERS=1/node-1:8888 2/node-2:8888
      - LOGGING_LEVEL=${DEBUG:-false}
    ports:
      - "8890:8888"
      - "8002:8000"
      - "9002:9000"
    volumes:
      - .:/app
      - ./data/node-3:/data
      - ./default-config.yml:/app/default-config.yml:ro
      - go-mod-cache:/go/pkg/mod
    networks:
      - raft-network
    depends_on:
      - node-1
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 5s
      timeout: 2s
      retries: 2
      start_period: 10s
    command: >
      sh -c "
        go mod download &&
        go run ./cmd/server --config /app/default-config.yml
      "

networks:
  raft-network:
    driver: bridge

volumes:
  go-mod-cache:

