

services:
  node-1:
    build:
      context: .
      dockerfile: Dockerfile
      target: compiler
    working_dir: /app
    environment:
      - NODE_ID=1
      - ADVERTISE_ADDR=node-1:8888
      - PEERS=2/node-2:8888 3/node-3:8888
      - DEBUG=${DEBUG:-false}
      - CGO_ENABLED=1
      - GOEXPERIMENT=jsonv2
      - OTEL_METRICS_KEEP_IN_MEMORY=true
    ports:
      - "8888:8888"
      - "9000:9000"
    volumes:
      - .:/app
      - ./data/node-1:/data
      - go-mod-cache:/go/pkg/mod
    networks:
      - raft-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 5s
      timeout: 2s
      retries: 2
      start_period: 10s
    command: ["sh", "-c", "go mod download && go run . --bind-addr 0.0.0.0:8888 --data-dir /data/raft --http-port 9000 --snapshot-threshold 100"]

  node-2:
    build:
      context: .
      dockerfile: Dockerfile
      target: compiler
    working_dir: /app
    environment:
      - NODE_ID=2
      - ADVERTISE_ADDR=node-2:8888
      - PEERS=1/node-1:8888 3/node-3:8888
      - DEBUG=${DEBUG:-false}
      - CGO_ENABLED=1
      - GOEXPERIMENT=jsonv2
      - OTEL_METRICS_KEEP_IN_MEMORY=true
    ports:
      - "8889:8888"
      - "9001:9000"
    volumes:
      - .:/app
      - ./data/node-2:/data
      - go-mod-cache:/go/pkg/mod
    networks:
      - raft-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 5s
      timeout: 2s
      retries: 2
      start_period: 10s
    command: ["sh", "-c", "go mod download && go run . --bind-addr 0.0.0.0:8888 --data-dir /data/raft --http-port 9000 --snapshot-threshold 100"]

  node-3:
    build:
      context: .
      dockerfile: Dockerfile
      target: compiler
    working_dir: /app
    environment:
      - NODE_ID=3
      - ADVERTISE_ADDR=node-3:8888
      - PEERS=1/node-1:8888 2/node-2:8888
      - DEBUG=${DEBUG:-false}
      - CGO_ENABLED=1
      - GOEXPERIMENT=jsonv2
      - OTEL_METRICS_KEEP_IN_MEMORY=true
    ports:
      - "8890:8888"
      - "9002:9000"
    volumes:
      - .:/app
      - ./data/node-3:/data
      - go-mod-cache:/go/pkg/mod
    networks:
      - raft-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 5s
      timeout: 2s
      retries: 2
      start_period: 10s
    command: ["sh", "-c", "go mod download && go run . --bind-addr 0.0.0.0:8888 --data-dir /data/raft --http-port 9000 --snapshot-threshold 100"]

networks:
  raft-network:
    driver: bridge

volumes:
  go-mod-cache:

