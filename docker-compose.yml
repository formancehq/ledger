version: '3.8'

services:
  node-1:
    image: golang:1.25-alpine
    working_dir: /app
    environment:
      - NODE_ID=node-1
      - BIND_ADDR=0.0.0.0:8888
      - ADVERTISE_ADDR=node-1:8888
      - DATA_DIR=/data
      - PEERS=node-2:8888 node-3:8888
      - DEBUG=true
      - BOOTSTRAP=true
      - GRPC_PORT=8000
      - HTTP_PORT=9000
      - SQLITE_DSN=file:/data/ledger.db?cache=shared&mode=rwc
    ports:
      - "8888:8888"
      - "8000:8000"
      - "9000:9000"
    volumes:
      - .:/app
      - ./data/node-1:/data
      - go-mod-cache:/go/pkg/mod
    networks:
      - raft-network
    command: >
      sh -c "
        go mod download &&
        go run ./cmd/server
      "

  node-2:
    image: golang:1.25-alpine
    working_dir: /app
    environment:
      - NODE_ID=node-2
      - BIND_ADDR=0.0.0.0:8888
      - ADVERTISE_ADDR=node-2:8888
      - DATA_DIR=/data
      - DEBUG=true
      - GRPC_PORT=8000
      - HTTP_PORT=9000
      - SQLITE_DSN=file:/data/ledger.db?cache=shared&mode=rwc
    ports:
      - "8889:8888"
      - "8001:8000"
      - "9001:9000"
    volumes:
      - .:/app
      - ./data/node-2:/data
      - go-mod-cache:/go/pkg/mod
    networks:
      - raft-network
    depends_on:
      - node-1
    command: >
      sh -c "
        go mod download &&
        go run ./cmd/server
      "

  node-3:
    image: golang:1.25-alpine
    working_dir: /app
    environment:
      - NODE_ID=node-3
      - BIND_ADDR=0.0.0.0:8888
      - ADVERTISE_ADDR=node-3:8888
      - DATA_DIR=/data
      - DEBUG=true
      - GRPC_PORT=8000
      - HTTP_PORT=9000
      - SQLITE_DSN=file:/data/ledger.db?cache=shared&mode=rwc
    ports:
      - "8890:8888"
      - "8002:8000"
      - "9002:9000"
    volumes:
      - .:/app
      - ./data/node-3:/data
      - go-mod-cache:/go/pkg/mod
    networks:
      - raft-network
    depends_on:
      - node-1
    command: >
      sh -c "
        go mod download &&
        go run ./cmd/server
      "

networks:
  raft-network:
    driver: bridge

volumes:
  go-mod-cache:

