
services:
  # OpenTelemetry collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./deployments/docker-compose/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"  # OTLP gRPC receiver
      - "4318:4318"  # OTLP HTTP receiver
    networks:
      - raft-network
    depends_on:
      - victoria-metrics

  # VictoriaMetrics for metrics (victoria-metrics-compatible with remote write support)
  victoria-metrics:
    image: victoriametrics/victoria-metrics:latest
    ports:
      - "8428:8428"
    volumes:
      - victoria-metrics-data:/data
    command:
      - '--storageDataPath=/data'
      - '--httpListenAddr=:8428'
    networks:
      - raft-network

  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deployments/docker-compose/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - raft-network
    depends_on:
      - victoria-metrics

  # Ledger nodes
  node-1:
    build:
      context: .
      dockerfile: Dockerfile
      target: compiler
    working_dir: /app
    environment:
      - NODE_ID=1
      - ADVERTISE_ADDR=node-1:8888
      - PEERS=2/node-2:8888 3/node-3:8888
      - DEBUG=${DEBUG:-false}
      - CGO_ENABLED=1
      - GOEXPERIMENT=jsonv2
      - OTEL_METRICS_KEEP_IN_MEMORY=true
      # OpenTelemetry configuration
      - OTEL_SERVICE_NAME=ledger-v3-poc-node-1
      - OTEL_METRICS_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_METRICS_EXPORTER_OTLP_INSECURE=true
      - OTEL_METRICS_EXPORTER_OTLP_MODE=grpc
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER_PUSH_INTERVAL=1s
      - OTEL_RESOURCE_ATTRIBUTES=service.node_id=1
    ports:
      - "8888:8888"
      - "9000:9000"
    volumes:
      - .:/app
      - node-1-data:/data
      - go-mod-cache:/go/pkg/mod
    networks:
      - raft-network
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 5s
      timeout: 2s
      retries: 2
      start_period: 10s
    command: ["sh", "-c", "go mod download && go run . --bind-addr 0.0.0.0:8888 --data-dir /data/raft --http-port 9000 --snapshot-threshold 100"]

  node-2:
    build:
      context: .
      dockerfile: Dockerfile
      target: compiler
    working_dir: /app
    environment:
      - NODE_ID=2
      - ADVERTISE_ADDR=node-2:8888
      - PEERS=1/node-1:8888 3/node-3:8888
      - DEBUG=${DEBUG:-false}
      - CGO_ENABLED=1
      - GOEXPERIMENT=jsonv2
      - OTEL_METRICS_KEEP_IN_MEMORY=true
      # OpenTelemetry configuration
      - OTEL_SERVICE_NAME=ledger-v3-poc-node-2
      - OTEL_METRICS_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_METRICS_EXPORTER_OTLP_INSECURE=true
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER_OTLP_MODE=grpc
      - OTEL_METRICS_EXPORTER_PUSH_INTERVAL=1s
      - OTEL_RESOURCE_ATTRIBUTES=service.node_id=2
    ports:
      - "8889:8888"
      - "9001:9000"
    volumes:
      - .:/app
      - node-2-data:/data
      - go-mod-cache:/go/pkg/mod
    networks:
      - raft-network
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 5s
      timeout: 2s
      retries: 2
      start_period: 10s
    command: ["sh", "-c", "go mod download && go run . --bind-addr 0.0.0.0:8888 --data-dir /data/raft --http-port 9000 --snapshot-threshold 100"]

  node-3:
    build:
      context: .
      dockerfile: Dockerfile
      target: compiler
    working_dir: /app
    environment:
      - NODE_ID=3
      - ADVERTISE_ADDR=node-3:8888
      - PEERS=1/node-1:8888 2/node-2:8888
      - DEBUG=${DEBUG:-false}
      - CGO_ENABLED=1
      - GOEXPERIMENT=jsonv2
      - OTEL_METRICS_KEEP_IN_MEMORY=true
      # OpenTelemetry configuration
      - OTEL_SERVICE_NAME=ledger-v3-poc-node-3
      - OTEL_METRICS_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_METRICS_EXPORTER_OTLP_INSECURE=true
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER_OTLP_MODE=grpc
      - OTEL_METRICS_EXPORTER_PUSH_INTERVAL=1s
      - OTEL_RESOURCE_ATTRIBUTES=service.node_id=3
    ports:
      - "8890:8888"
      - "9002:9000"
    volumes:
      - .:/app
      - node-3-data:/data
      - go-mod-cache:/go/pkg/mod
    networks:
      - raft-network
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 5s
      timeout: 2s
      retries: 2
      start_period: 10s
    command: ["sh", "-c", "go mod download && go run . --bind-addr 0.0.0.0:8888 --data-dir /data/raft --http-port 9000 --snapshot-threshold 100"]

networks:
  raft-network:
    driver: bridge

volumes:
  node-1-data:
  node-2-data:
  node-3-data:
  go-mod-cache:
  victoria-metrics-data:
  grafana-data:
