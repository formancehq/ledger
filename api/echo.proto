syntax = "proto3";

package echo;

option go_package = "github.com/formancehq/ledger-v3-poc/api";

// EchoService provides a simple echo service
service EchoService {
  // Echo echoes back the message
  rpc Echo(EchoRequest) returns (EchoResponse);
}

message EchoRequest {
  string message = 1;
}

message EchoResponse {
  string message = 1;
}

