# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json
---
version: "2"

formatters:
  enable:
  - gci
  - gofmt
  - goimports
  settings:
    gci:
      sections:
      - standard
      - default
      - prefix(github.com/formancehq/)
      - localmodule
      custom-order: true

linters:
  default: none
  enable:
  - arangolint
  - asasalint
  - asciicheck
  - bidichk
  - bodyclose
  - canonicalheader
  - copyloopvar
  - decorder
  - dupword
  - durationcheck
  - embeddedstructfieldcheck
  - errcheck
  - errchkjson
  - errorlint
  - exptostd
  - fatcontext
  - ginkgolinter
  - gocheckcompilerdirectives
  - gochecksumtype
  - gocritic
  - godot
  - goheader
  - gomoddirectives
  - gomodguard
  - goprintffuncname
  - gosmopolitan
  - govet
  - grouper
  - iface
  - importas
  - ineffassign
  - intrange
  - iotamixing
  - loggercheck
  - mirror
  - misspell
  - modernize
  - nakedret
  - nilnesserr
  - nlreturn
  - nolintlint
  - nosprintfhostport
  - perfsprint
  - predeclared
  - promlinter
  - protogetter
  - reassign
  - revive
  - rowserrcheck
  - sloglint
  - sqlclosecheck
  - staticcheck
  - tagalign
  - testableexamples
  - unconvert
  - unqueryvet
  - unused
  - usestdlibvars
  - usetesting
  - wastedassign
  - whitespace
  - zerologlint
  settings:
    lll:
      line-length: 180
    gomoddirectives:
      replace-local: true
      replace-allow-list:
      - github.com/expr-lang/expr
    revive:
      rules:
      - name: package-comments
        disabled: true
    exhaustruct:
      exclude:
      - '.+/cobra\.Command$'
