# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json
---
version: "2"

formatters:
  enable:
  - gci
  - gofmt
  - goimports
  settings:
    gci:
      sections:
      - standard
      - default
      - prefix(github.com/formancehq/)
      - localmodule
      custom-order: true

linters:
  default: none
  enable:
  - arangolint
  - asasalint
  - asciicheck
  - bidichk
  - bodyclose
  - canonicalheader
  - copyloopvar
  - decorder
  - dupword
  - durationcheck
  - embeddedstructfieldcheck
  - errcheck
  - errchkjson
  - errorlint
  - exhaustive
  - exptostd
  - fatcontext
  - forbidigo
  - ginkgolinter
  - gocheckcompilerdirectives
  - gochecksumtype
  - gocritic
  - godot
  - goheader
  - gomoddirectives
  - gomodguard
  - goprintffuncname
  - gosmopolitan
  - govet
  - grouper
  - iface
  - importas
  - ineffassign
  - intrange
  - iotamixing
  - loggercheck
  - mirror
  - misspell
  - modernize
  - nakedret
  - nilnesserr
  - nlreturn
  - nolintlint
  - nosprintfhostport
  - perfsprint
  - predeclared
  - promlinter
  - protogetter
  - reassign
  - revive
  - rowserrcheck
  - sloglint
  - sqlclosecheck
  - staticcheck
  - tagalign
  - testableexamples
  - unconvert
  - unqueryvet
  - unused
  - usestdlibvars
  - usetesting
  - wastedassign
  - whitespace
  - zerologlint
  settings:
    lll:
      line-length: 180
    gomoddirectives:
      replace-local: true
      replace-allow-list:
      - github.com/expr-lang/expr
    revive:
      rules:
      - name: package-comments
        disabled: true
    exhaustruct:
      exclude:
      - '.+/cobra\.Command$'
    exhaustive:
      # Only flag switches explicitly tagged with //exhaustive:enforce. This
      # is opt-in to avoid disturbing the existing codebase; the structural
      # guarantee for ErrorKind comes from tagging the two transport
      # switches in adapter/grpc/errors.go and adapter/http/error_handler.go.
      explicit-exhaustive-switch: true
      default-signifies-exhaustive: false
    forbidigo:
      analyze-types: true
      forbid:
      # I2 invariant: writes to the main Pebble store outside the hot path are
      # only allowed from declared lifecycle paths (see capabilities.go).
      # New call sites must be added to the exclusions block below with a
      # justification, never silently introduced.
      - pattern: '\.OpenWriteSession\b'
        msg: |
          OpenWriteSession opens a write session on the main Pebble store. Outside the FSM
          hot path (internal/infra/state/machine.go), it is only allowed from declared
          lifecycle paths (bootstrap, backup, attributes/prepare). New call sites must be
          added to the .golangci.yaml exclusions block with a justification.
      # NewWriteSessionFromDB is a back door that takes a raw *pebble.DB. It
      # bypasses *Store and therefore the OpenWriteSession check above. Only
      # the readstore (which owns a separate Pebble instance) may use it.
      - pattern: '\bNewWriteSessionFromDB\b'
        msg: |
          NewWriteSessionFromDB takes a raw *pebble.DB and bypasses the main-store
          OpenWriteSession check. It is reserved for subsystems that manage their own
          Pebble instance (currently: internal/storage/readstore). New call sites must
          be added to the .golangci.yaml exclusions block with a justification.
  exclusions:
    rules:
    # I2 exceptions for OpenWriteSession / NewWriteSessionFromDB.
    # Each path here is part of the declared "may write to a Pebble store" set.
    - path: internal/storage/dal/
      linters: [forbidigo]
    # Hot-path apply opens the write session via the WriteSessionFactory it
    # receives in PrepareEntries. Pin the allow rule to the exact call in the
    # exact file: forbidigo combines path + source with AND, so a stray call
    # outside machine.go (or with a different receiver name) is still flagged.
    - path: internal/infra/state/machine\.go
      linters: [forbidigo]
      source: 'sessions\.OpenWriteSession\(\)'
    - path: internal/infra/attributes/prepare\.go
      linters: [forbidigo]
    - path: internal/infra/backup/
      linters: [forbidigo]
    - path: internal/bootstrap/config_validation\.go
      linters: [forbidigo]
    # peer_store.go persists Raft cluster membership in Pebble. Writes
    # happen at two declared call sites: the ConfChange apply path
    # (finishReady, hot path triggered by Raft) and the bootstrap
    # module's initial-peer registration (before the Raft loop starts).
    # Both go through *Membership methods that wrap *PeerStore — never
    # via a raw OpenWriteSession outside this file. (EN-1413)
    - path: internal/infra/membership/peer_store\.go
      linters: [forbidigo]
    # membership.go owns the ForceRemoveNode atomic batch (peer row
    # delete + RemovedMemberEntry write) via m.store.OpenWriteSession()
    # — cluster-topology lifecycle path, EN-1045. See
    # docs/technical/architecture/subsystems/consensus/removed-member-registry.md.
    - path: internal/infra/membership/membership\.go
      linters: [forbidigo]
    # The readstore manages its own Pebble DB and uses NewWriteSessionFromDB
    # (not OpenWriteSession on the main store).
    - path: internal/storage/readstore/
      linters: [forbidigo]
    # Tests use OpenWriteSession to seed data; the structural guarantee is on
    # production paths.
    - path: _test\.go$
      linters: [forbidigo]
