syntax = "proto3";

package ledger;

import "google/protobuf/struct.proto";
import "ledger.proto";

option go_package = "github.com/formancehq/ledger-v3-poc/internal/service";

// SystemService provides system operations
service SystemService {
  // Snapshot creates a snapshot of the root Raft cluster (alias for CreateClusterSnapshot)
  rpc Snapshot(SnapshotRequest) returns (SnapshotResponse);
  // CreateLedger creates a new ledger
  rpc CreateLedger(CreateLedgerRequest) returns (CreateLedgerResponse);
  // DeleteLedger deletes a ledger
  rpc DeleteLedger(DeleteLedgerRequest) returns (DeleteLedgerResponse);
  // ResolveLedger resolves a ledger name to its ID
  rpc ResolveLedger(ResolveLedgerRequest) returns (ResolveLedgerResponse);
  // GetAllLedgersInfo returns all ledgers info in the cluster
  rpc GetAllLedgersInfo(GetAllLedgersRequest) returns (GetAllLedgersResponse);
  // GetLedgerInfo returns a ledger info by its name
  rpc GetLedgerInfo(GetLedgerByNameRequest) returns (GetLedgerByNameResponse);
  // ResolveLedgerLeader
  rpc ResolveLedgerLeader(ResolveLedgerLeaderRequest) returns (ResolveLedgerLeaderResponse);
}

message ResolveLedgerLeaderRequest {
  string ledger_name = 1;
}

message ResolveLedgerLeaderResponse {
  uint64 leader_id = 1;
}

message SnapshotRequest {
  // Empty - no parameters needed
}

message SnapshotResponse {
  string message = 1;
}

message CreateLedgerRequest {
  string name = 1;
  string driver = 2;
  google.protobuf.Struct config = 3;
  google.protobuf.Struct metadata = 4;
  uint64 snapshot_threshold = 5;  // Number of logs before triggering a snapshot (optional, uses global config if 0)
}

message CreateLedgerResponse {
  uint64 id = 1;
  string name = 2;
  google.protobuf.Struct config = 3;
  string driver = 4;
  google.protobuf.Struct metadata = 5;
  Timestamp created_at = 6;
  uint64 snapshot_threshold = 7;  // Number of logs before triggering a snapshot (0 means use global config)
}

message DeleteLedgerRequest {
  string name = 1;
}

message DeleteLedgerResponse {
  string message = 1;
}

message ResolveLedgerRequest {
  string ledger_name = 1;
}

message ResolveLedgerResponse {
  string ledger_name = 1;
  uint64 ledger_id = 2;
}

message GetAllLedgersRequest {
  // Empty - no parameters needed
}

message GetAllLedgersResponse {
  repeated CreateLedgerResponse ledgers = 1;
}

message GetLedgerByNameRequest {
  string name = 1;
}

message GetLedgerByNameResponse {
  uint64 id = 1;
  string name = 2;
  google.protobuf.Struct config = 3;
  string driver = 4;
  google.protobuf.Struct metadata = 5;
  Timestamp created_at = 6;
  uint64 snapshot_threshold = 7;  // Number of logs before triggering a snapshot (0 means use global config)
}
