syntax = "proto3";

package ledger;

option go_package = "github.com/formancehq/ledger-v3-poc/internal/service";

// SystemService provides system operations
service SystemService {
  // CreateClusterSnapshot creates a snapshot of the root Raft cluster
  rpc CreateClusterSnapshot(CreateClusterSnapshotRequest) returns (CreateClusterSnapshotResponse);
  // CreateBucketSnapshot creates a snapshot of a bucket's Raft cluster
  rpc CreateBucketSnapshot(CreateBucketSnapshotRequest) returns (CreateBucketSnapshotResponse);
}

message CreateClusterSnapshotRequest {
  // Empty - no parameters needed
}

message CreateClusterSnapshotResponse {
  string message = 1;
}

message CreateBucketSnapshotRequest {
  string bucket_name = 1;
}

message CreateBucketSnapshotResponse {
  string message = 1;
}

