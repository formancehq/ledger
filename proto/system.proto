syntax = "proto3";

package ledger;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/formancehq/ledger-v3-poc/internal/service";

// SystemService provides system operations
service SystemService {
  // Snapshot creates a snapshot of the root Raft cluster (alias for CreateClusterSnapshot)
  rpc Snapshot(SnapshotRequest) returns (SnapshotResponse);
  // CreateBucket creates a new bucket
  rpc CreateBucket(CreateBucketRequest) returns (CreateBucketResponse);
  // DeleteBucket deletes a bucket
  rpc DeleteBucket(DeleteBucketRequest) returns (DeleteBucketResponse);
  // ResolveLedger resolves a ledger name to its bucket
  rpc ResolveLedger(ResolveLedgerRequest) returns (ResolveLedgerResponse);
  // GetAllBucketsInfo returns all buckets info in the cluster
  rpc GetAllBucketsInfo(GetAllBucketsRequest) returns (GetAllBucketsResponse);
  // GetBucketInfo returns a bucket info by its name
  rpc GetBucketInfo(GetBucketByNameRequest) returns (GetBucketByNameResponse);
}

message SnapshotRequest {
  // Empty - no parameters needed
}

message SnapshotResponse {
  string message = 1;
}

message CreateBucketRequest {
  string name = 1;
  string driver = 2;
  google.protobuf.Struct config = 3;
  uint64 snapshot_threshold = 4;  // Number of logs before triggering a snapshot (optional, uses global config if 0)
}

message CreateBucketResponse {
  uint64 id = 1;
  string name = 2;
  google.protobuf.Struct config = 3;
  string driver = 4;
  google.protobuf.Timestamp created_at = 5;
  uint64 snapshot_threshold = 6;  // Number of logs before triggering a snapshot (0 means use global config)
}

message DeleteBucketRequest {
  string name = 1;
}

message DeleteBucketResponse {
  string message = 1;
}

message ResolveLedgerRequest {
  string ledger_name = 1;
}

message ResolveLedgerResponse {
  string bucket_name = 1;
  uint64 bucket_id = 2;
}

message GetAllBucketsRequest {
  // Empty - no parameters needed
}

message GetAllBucketsResponse {
  repeated CreateBucketResponse buckets = 1;
}

message GetBucketByNameRequest {
  string name = 1;
}

message GetBucketByNameResponse {
  uint64 id = 1;
  string name = 2;
  google.protobuf.Struct config = 3;
  string driver = 4;
  google.protobuf.Timestamp created_at = 5;
  uint64 snapshot_threshold = 6;  // Number of logs before triggering a snapshot (0 means use global config)
}