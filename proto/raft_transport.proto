syntax = "proto3";

package raft_transport;

option go_package = "github.com/formancehq/ledger-v3-poc/internal/raft";

// RaftTransportService handles Raft message transport between nodes
service RaftTransportService {
  // StreamMessages establishes a client streaming connection for sending Raft messages
  // This avoids frequent reconnections by maintaining a persistent connection
  rpc StreamMessages(stream SendMessageRequest) returns (stream SendMessageResponse);
}

// SendMessageRequest contains a Raft message to send
message SendMessageRequest {
  // Serialized raftpb.Message
  uint64 id = 1;
  bytes message = 2;
}

// SendMessageResponse is the response to SendMessage
message SendMessageResponse {
  uint64 request_id = 1;
  bool success = 2;
  string error = 3;
}

