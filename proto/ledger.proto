syntax = "proto3";

package ledger;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/formancehq/ledger-v3-poc/internal/ledgerpb";

// Posting represents a single posting in a transaction
message Posting {
  string source = 1;
  string destination = 2;
  string amount = 3;                        // big.Int as string
  string asset = 4;
}

// Transaction represents a transaction
message Transaction {
  repeated Posting postings = 1;
  google.protobuf.Struct metadata = 2;
  google.protobuf.Timestamp timestamp = 3;
  string reference = 4;
  uint64 id = 5;
  bool reverted = 6;
  google.protobuf.Timestamp inserted_at = 7;      // Optional
  google.protobuf.Timestamp updated_at = 8;       // Optional
  google.protobuf.Timestamp reverted_at = 9;      // Optional
  PostCommitVolumes post_commit_volumes = 10;     // Optional
  PostCommitVolumes post_commit_effective_volumes = 11; // Optional
}

// TransactionData represents transaction data without ID and timestamps
message TransactionData {
  repeated Posting postings = 1;
  google.protobuf.Struct metadata = 2;
  google.protobuf.Timestamp timestamp = 3;
  string reference = 4;
}

// Transactions represents a collection of transactions
message Transactions {
  repeated TransactionData transactions = 1;
}

// Volumes represents input and output volumes
message Volumes {
  string input = 1;   // big.Int as string
  string output = 2;  // big.Int as string
}

// VolumesWithBalance represents volumes with balance
message VolumesWithBalance {
  string input = 1;    // big.Int as string
  string output = 2;   // big.Int as string
  string balance = 3;  // big.Int as string
}

// VolumesByAssets represents volumes grouped by asset
message VolumesByAssets {
  map<string, Volumes> volumes = 1;
}

// PostCommitVolumes represents volumes after commit, grouped by account and asset
message PostCommitVolumes {
  map<string, VolumesByAssets> volumes_by_account = 1;
}

// VolumesWithBalanceByAssetByAccount represents volumes with balance grouped by asset and account
message VolumesWithBalanceByAssetByAccount {
  string account = 1;
  string asset = 2;
  VolumesWithBalance volumes_with_balance = 3;
}

// AggregatedVolumes represents aggregated volumes
message AggregatedVolumes {
  VolumesByAssets aggregated = 1;
}

// Account represents an account in the ledger
message Account {
  string address = 1;
  google.protobuf.Struct metadata = 2;
  google.protobuf.Timestamp first_usage = 3;
  google.protobuf.Timestamp insertion_date = 4;
  google.protobuf.Timestamp updated_at = 5;
  VolumesByAssets volumes = 6;              // Optional
  VolumesByAssets effective_volumes = 7;    // Optional
}

// AccountsVolumes represents volumes for a specific account and asset
message AccountsVolumes {
  string account = 1;
  string asset = 2;
  string input = 3;   // big.Int as string
  string output = 4;  // big.Int as string
}

// Move represents a move (input or output) for an account
message Move {
  uint64 transaction_id = 1;
  bool is_source = 2;
  string account = 3;
  string amount = 4;                        // big.Int as string
  string asset = 5;
  google.protobuf.Timestamp insertion_date = 6;
  google.protobuf.Timestamp effective_date = 7;
  Volumes post_commit_volumes = 8;          // Optional
  Volumes post_commit_effective_volumes = 9; // Optional
}

// LedgerService provides ledger operations
service LedgerService {
  // Snapshot creates a snapshot of the ledger Raft cluster
  rpc Snapshot(LedgerSnapshotRequest) returns (LedgerSnapshotResponse);
  // CreateTransaction creates a new transaction
  rpc CreateTransaction(CreateTransactionRequest) returns (CreateTransactionResponse);
  // SaveAccountMetadata saves metadata for an account
  rpc SaveAccountMetadata(SaveAccountMetadataRequest) returns (SaveAccountMetadataResponse);
  // StreamLogs streams logs from a ledger, optionally starting from a sequence number
  rpc StreamLogs(StreamLogsRequest) returns (stream StreamLogsResponse);
}

message LedgerSnapshotRequest {
  string ledger = 1;
}

message LedgerSnapshotResponse {
  string message = 1;
}

message Script {
  string plain = 1;
  map<string, string> vars = 2;
}

message CreateTransactionRequest {
  string ledger = 1;
  map<string, google.protobuf.Struct> account_metadata = 2;
  google.protobuf.Timestamp timestamp = 3;
  google.protobuf.Struct metadata = 4;
  string reference = 5;
  repeated Posting postings = 6;
  bool dry_run = 7;
  string idempotency_key = 8;
  Script script = 9;
  string runtime = 10;
}

message CreateTransactionResponse {
  Transaction transaction = 1;
  map<string, google.protobuf.Struct> account_metadata = 2;
}

message SaveAccountMetadataRequest {
  string ledger = 1;
  string address = 2;
  google.protobuf.Struct metadata = 3;
  bool dry_run = 4;
  string idempotency_key = 5;
}

message SaveAccountMetadataResponse {
  Log log = 1;
}

message StreamLogsRequest {
  string ledger = 1;
  uint64 from_sequence = 2; // Optional: start streaming from this sequence number (inclusive). If 0, streams from the beginning
  uint64 to_sequence = 3;   // Optional: stop streaming at this sequence number (inclusive). If 0, streams until the end
}

message StreamLogsResponse {
  Log log = 1;
}

message Log {
  int32 type = 1;                           // LogType enum value
  LogPayload data = 2;
  google.protobuf.Timestamp date = 3;
  string idempotency_key = 4;
  string idempotency_hash = 5;
  uint64 id = 6;                            // Optional log ID
  uint64 sequence = 7;                      // Global sequence number
}

message LogPayload {
  oneof payload {
    CreatedTransaction created_transaction = 1;
    RevertedTransaction reverted_transaction = 2;
    SavedMetadata saved_metadata = 3;
    DeletedMetadata deleted_metadata = 4;
  }
}

message CreatedTransaction {
  Transaction transaction = 1;
  map<string, google.protobuf.Struct> account_metadata = 2;
}

message RevertedTransaction {
  Transaction reverted_transaction = 1;
  Transaction revert_transaction = 2;
}

message SavedMetadata {
  string target_type = 1;                   // "ACCOUNT" or "TRANSACTION"
  oneof target_id {
    string account_id = 2;                  // Account address (for ACCOUNT type)
    uint64 transaction_id = 3;               // Transaction ID (for TRANSACTION type)
  }
  google.protobuf.Struct metadata = 4;
}

message DeletedMetadata {
  string target_type = 1;                   // "ACCOUNT" or "TRANSACTION"
  oneof target_id {
    string account_id = 2;                  // Account address (for ACCOUNT type)
    uint64 transaction_id = 3;               // Transaction ID (for TRANSACTION type)
  }
  string key = 4;                           // Metadata key to delete
}

