syntax = "proto3";

package ledger;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "proto/common.proto";

option go_package = "github.com/formancehq/ledger-v3-poc/internal/service";

// LedgerService provides ledger operations
service LedgerService {
  // CreateTransaction creates a new transaction
  rpc CreateTransaction(CreateTransactionRequest) returns (CreateTransactionResponse);
  // CreateClusterSnapshot creates a snapshot of the root Raft cluster
  rpc CreateClusterSnapshot(CreateClusterSnapshotRequest) returns (CreateClusterSnapshotResponse);
  // CreateBucketSnapshot creates a snapshot of a bucket's Raft cluster
  rpc CreateBucketSnapshot(CreateBucketSnapshotRequest) returns (CreateBucketSnapshotResponse);
}

message CreateTransactionRequest {
  map<string, google.protobuf.Struct> account_metadata = 1;
  google.protobuf.Timestamp timestamp = 2;
  google.protobuf.Struct metadata = 3;
  string reference = 4;
  repeated common.Posting postings = 5;
  bool dry_run = 6;
  string idempotency_key = 7;
  string ledger = 8;
}

message CreateTransactionResponse {
  common.Transaction transaction = 1;
  map<string, google.protobuf.Struct> account_metadata = 2;
}

message CreateClusterSnapshotRequest {
  // Empty - no parameters needed
}

message CreateClusterSnapshotResponse {
  string message = 1;
}

message CreateBucketSnapshotRequest {
  string bucket_name = 1;
}

message CreateBucketSnapshotResponse {
  string message = 1;
}

