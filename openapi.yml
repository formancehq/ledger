          in: query
          schema:
            type: string
      responses:
        '200':
          description: Index status retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: object
                    description: GetIndexStatusResponse (protobuf JSON representation)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v3/{ledgerName}/indexes:
    get:
      summary: List indexes for a ledger
      description: |
        Streams the indexes registered on a specific ledger. Requires
        `ledger:LedgerRead` scope.
      operationId: listLedgerIndexes
      tags:
        - Indexes
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
      responses:
        '200':
          description: Indexes retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      description: Index (protobuf JSON representation)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create an index on a ledger
      description: |
        Registers a new index on the ledger. The FSM begins the backfill on
        the next apply. The request body carries the target `IndexID` in
        canonical form (see `DELETE /v3/{ledgerName}/indexes/{canonicalId}`
        for the format). Requires `ledger:LedgerWrite` scope.
      operationId: createIndex
      tags:
        - Indexes
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: Idempotency-Key
          in: header
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  description: |
                    Canonical form of the target IndexID. One of:
                      `tx_builtin:<TX_BUILTIN_INDEX_*>`
                      `log_builtin:<LOG_BUILTIN_INDEX_*>`
                      `account_builtin:<ACCT_BUILTIN_INDEX_*>`
                      `metadata:<TARGET_TYPE_*>:<key>`
                  example: metadata:TARGET_TYPE_ACCOUNT:color
      responses:
        '201':
          description: |
            Index creation queued. The body carries the canonical id of the
            created index (round-trip normalized), usable directly on the
            follow-up GET/DELETE `/v3/{ledgerName}/indexes/{canonicalId}` routes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateIndexResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v3/{ledgerName}/indexes/{canonicalId}:
    get:
      summary: Get a single index registry entry
      description: |
        Returns the `Index` registry entry (id, buildStatus, ledger,
        createdAt, lastBuiltAt, forwardEncodingVersion) for a single
        index, serialized in protobuf-JSON camelCase. Requires
        `ledger:LedgerRead` scope.
      operationId: getIndex
      tags:
        - Indexes
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: canonicalId
          in: path
          required: true
          schema:
            type: string
          description: Canonical form of the target IndexID.
      responses:
        '200':
          description: Index retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: object
                    description: Index (protobuf JSON representation)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Drop an index from a ledger
      description: |
        Removes an index from a ledger. The path parameter carries the target
        `IndexID` in canonical form (e.g. `metadata:TARGET_TYPE_ACCOUNT:color`,
        `tx_builtin:TX_BUILTIN_INDEX_TIMESTAMP`). Requires `ledger:LedgerWrite` scope.
      operationId: dropIndex
      tags:
        - Indexes
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: canonicalId
          in: path
          required: true
          schema:
            type: string
          description: Canonical form of the target IndexID.
        - name: Idempotency-Key
          in: header
          schema:
            type: string
      responses:
        '204':
          description: Index removed.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v3/{ledgerName}/indexes/{canonicalId}/status:
    get:
      summary: Get the per-replica status of a single index
      description: |
        Returns the `IndexEntry` for a single index — the registry entry
        joined with the backfill cursor and the per-replica
        IndexVersionState (current + pending version). Use this to poll
        for backfill completion after a `POST /v3/{ledgerName}/indexes`.
        Requires `ledger:LedgerRead` scope.
      operationId: getIndexEntryStatus
      tags:
        - Indexes
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: canonicalId
          in: path
          required: true
          schema:
            type: string
          description: Canonical form of the target IndexID.
      responses:
        '200':
          description: Index entry retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: object
                    description: IndexEntry (protobuf JSON representation)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT token issued by a trusted OIDC provider. Required when the server
        is started with `--auth-enabled`. Scopes: `ledger:read` (read operations),
        `ledger:write` (write operations), `ledger:admin` (cluster operations).

  parameters:
    LedgerName:
      name: ledgerName
      in: path
      required: true
      schema:
        type: string
      description: Name of the ledger

    TransactionId:
      name: transactionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Transaction ID

    AccountAddress:
      name: address
      in: path
      required: true
      schema:
        type: string
      description: Account address

    MetadataKey:
      name: key
      in: path
      required: true
      schema:
        type: string
      description: Metadata key

    TargetType:
      name: targetType
      in: path
      required: true
      schema:
        type: string
        enum:
          - account
          - transaction
          - ledger
      description: Target type (account, transaction, or ledger)

    QueryName:
      name: queryName
      in: path
      required: true
      schema:
        type: string
      description: Prepared query name

    TypeName:
      name: typeName
      in: path
      required: true
      schema:
        type: string
      description: Account type name

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 256
      description: Idempotency key for the request

  responses:
    ServiceUnavailable:
      description: Service unavailable (no leader available)
      headers:
        Retry-After:
          description: Number of seconds to wait before retrying the request
          schema:
            type: integer
            format: int32
            minimum: 1
            example: 1
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Authentication required (missing or invalid JWT token)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Insufficient permissions (missing required scope)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Conflict (e.g. idempotency key conflict, ledger deleted)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    MethodNotAllowed:
      description: Method not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ChartViolation:
      type: object
      description: A chart of accounts violation reported in AUDIT enforcement mode
      required:
        - type
        - message
      properties:
        type:
          type: string
          description: The type of violation
        message:
          type: string
          description: Human-readable description of the violation
        account:
          type: string
          description: The account address that caused the violation

    MetadataValue:
      description: A typed metadata value (string, integer, boolean, or null). String values must not contain NUL bytes.
      nullable: true
      oneOf:
        - type: string
          pattern: '^[^\u0000]*$'
          description: Metadata string value without NUL bytes
        - type: integer
          format: int64
        - type: boolean

    CreateLedgerRequest:
      type: object
      properties:
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Optional metadata for the ledger (supports typed values)
        mode:
          type: string
          enum:
            - NORMAL
            - MIRROR
          default: NORMAL
          description: Ledger mode. MIRROR creates a read-only ledger that syncs from an external v2 source.
        mirrorSource:
          $ref: '#/components/schemas/MirrorSourceConfig'

    CreateLedgerResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerInfo'

    CreateIndexResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - id
          properties:
            id:
              type: string
              description: |
                Canonical form of the created IndexID (round-trip normalized),
                e.g. `metadata:TARGET_TYPE_ACCOUNT:color` or
                `tx_builtin:TX_BUILTIN_INDEX_TIMESTAMP`.
              example: metadata:TARGET_TYPE_ACCOUNT:color

    GetLedgerResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerInfo'

    ListAllLedgersResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LedgerInfo'
          description: List of all ledgers in the cluster
          nullable: true

    LedgerInfo:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the ledger
        created_at:
          type: string
          format: date-time
          description: Creation timestamp (ISO 8601 format)
        deleted_at:
          type: string
          format: date-time
          description: Soft delete timestamp (null if not deleted)
          nullable: true
        metadata_schema:
          type: object
          description: Per-key metadata type declarations
          nullable: true
        mode:
          type: string
          enum:
            - NORMAL
            - MIRROR
          description: Ledger mode (NORMAL or MIRROR)
        mirror_source:
          $ref: '#/components/schemas/MirrorSourceConfig'
        mirror_sync_progress:
          $ref: '#/components/schemas/MirrorSyncProgress'
        account_types:
          type: object
          description: Per-type account address validation
          additionalProperties:
            type: object
            properties:
              name:
                type: string
              pattern:
                type: string
              persistence:
                type: string
                enum: [NORMAL, EPHEMERAL, TRANSIENT]
                description: |
                  NORMAL: fully persisted (default).
                  EPHEMERAL: persisted, purged when zero balance.
                  TRANSIENT: never persisted, must be zero at end of batch.
          nullable: true
        default_enforcement_mode:
          type: string
          description: Default enforcement for unmatched accounts

    MirrorSyncProgress:
      type: object
      description: Sync progress for MIRROR ledgers (populated at read time)
      required:
        - state
        - cursor
        - sourceLogCount
        - remainingLogs
      properties:
        state:
          type: string
          enum:
            - SYNCING
            - FOLLOWING
          description: Current sync state (SYNCING = catching up, FOLLOWING = up to date)
        cursor:
          type: integer
          format: uint64
          minimum: 0
          description: Last ingested v2 log ID
        sourceLogCount:
          type: integer
          format: uint64
          minimum: 0
          description: Latest known log ID in the v2 source
        remainingLogs:
          type: integer
          format: uint64
          minimum: 0
          description: Number of remaining logs to sync (sourceLogCount - cursor)
        error:
          $ref: '#/components/schemas/MirrorSyncError'

    MirrorSyncError:
      type: object
      description: Most recent mirror sync error (null if healthy)
      properties:
        message:
          type: string
          description: Error message
        occurredAt:
          type: string
          format: date-time
          description: When the error occurred

    CreateTransactionRequest:
      type: object
      description: |
        A transaction must declare exactly one content source: explicit
        `postings`, an inline `script`, or a `scriptReference`. The
        `postings` array cannot be combined with `script` or
        `scriptReference`. Idempotency is controlled exclusively via the
        `Idempotency-Key` HTTP header — there is no body-level key.
      properties:
        accountMetadata:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              $ref: '#/components/schemas/MetadataValue'
          description: Metadata for accounts involved in the transaction (supports typed values)
        timestamp:
          type: string
          format: date-time
          description: Transaction timestamp (ISO 8601 format). If not provided, current time is used.
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Transaction metadata (supports typed values)
        reference:
          type: string
          description: Transaction reference
        postings:
          type: array
          items:
            $ref: '#/components/schemas/PostingRequest'
          description: List of postings for the transaction. Mutually exclusive with `script` and `scriptReference`.
        script:
          $ref: '#/components/schemas/Script'
          description: Inline Numscript to execute. Mutually exclusive with `postings` and `scriptReference`.
        scriptReference:
          $ref: '#/components/schemas/ScriptReference'
          description: Reference to a numscript saved in the ledger's library. Mutually exclusive with `postings` and `script`.
        expandVolumes:
          type: boolean
          default: false
          description: When true, include post-commit volumes (per account/asset) in the response

    PostingRequest:
      type: object
      required:
        - source
        - destination
        - amount
        - asset
      properties:
        source:
          type: string
          description: Source account address
        destination:
          type: string
          description: Destination account address
        amount:
          type: integer
          format: bigint
          description: Amount as a big integer
        asset:
          type: string
          description: Asset identifier

    Script:
      type: object
      required:
        - plain
      properties:
        plain:
          type: string
          description: The numscript source code
        vars:
          type: object
          additionalProperties:
            type: string
          description: Variables to pass to the script

    ScriptReference:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the numscript in the ledger's library
        version:
          type: string
          description: Optional semver constraint. Empty means latest.
        vars:
          type: object
          additionalProperties:
            type: string
          description: Variables to pass to the referenced script

    BulkElement:
      type: object
      required:
        - action
        - data
      properties:
        action:
          type: string
          enum:
            - CREATE_TRANSACTION
            - ADD_METADATA
            - REVERT_TRANSACTION
            - DELETE_METADATA
          description: The type of operation to perform
        ik:
          type: string
          maxLength: 256
          description: Idempotency key for this operation
        data:
          oneOf:
            - $ref: '#/components/schemas/CreateTransactionRequest'
            - $ref: '#/components/schemas/AddMetadataRequest'
            - $ref: '#/components/schemas/RevertTransactionRequest'
            - $ref: '#/components/schemas/DeleteMetadataRequest'
          description: Operation-specific data

    AddMetadataRequest:
      type: object
      required:
        - targetType
        - targetId
        - metadata
      properties:
        targetType:
          type: string
          enum:
            - ACCOUNT
            - TRANSACTION
          description: Type of target (account or transaction)
        targetId:
          oneOf:
            - type: string
            - type: integer
          description: |
            ID of the target (account address or transaction ID). Required.
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Metadata to add (supports typed values)

    RevertTransactionRequest:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          format: int64
          description: Transaction ID to revert. Required.
        force:
          type: boolean
          default: false
          description: Force revert even if accounts don't have sufficient funds
        atEffectiveDate:
          type: boolean
          default: false
          description: Set the timestamp of the reverted transaction to the original transaction timestamp
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Metadata for the revert transaction (supports typed values)
        expandVolumes:
          type: boolean
          default: false
          description: When true, include post-commit volumes (per account/asset) in the response

    RevertTransactionRequestBody:
      type: object
      properties:
        force:
          type: boolean
          default: false
          description: Force revert even if accounts don't have sufficient funds
        atEffectiveDate:
          type: boolean
          default: false
          description: Set the timestamp of the reverted transaction to the original transaction timestamp
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Metadata for the revert transaction (supports typed values)
        expandVolumes:
          type: boolean
          default: false
          description: When true, include post-commit volumes (per account/asset) in the response

    DeleteMetadataRequest:
      type: object
      required:
        - targetType
        - targetId
        - key
      properties:
        targetType:
          type: string
          enum:
            - ACCOUNT
            - TRANSACTION
          description: Type of target (account or transaction)
        targetId:
          oneOf:
            - type: string
            - type: integer
          description: |
            ID of the target (account address or transaction ID). Required.
        key:
          type: string
          description: Metadata key to delete

    BulkResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BulkResult'
        errorCode:
          type: string
        errorMessage:
          type: string

    BulkResult:
      type: object
      properties:
        responseType:
          type: string
          description: Type of response (action name or ERROR)
        logID:
          type: integer
          format: int64
          description: Log ID of the applied operation (0 on error)
        errorCode:
          type: string
          description: Error code (present only on error)
        errorDescription:
          type: string
          description: Error description (present only on error)
        data:
          description: |
            Operation result data. For `CREATE_TRANSACTION` this is the full
            created transaction object. Omitted for other actions and on error.
          nullable: true
          allOf:
            - $ref: '#/components/schemas/TransactionResponse'

    CreateTransactionResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          properties:
            transaction:
              $ref: '#/components/schemas/TransactionResponse'
            accountMetadata:
              type: object
              additionalProperties:
                type: object
              description: Metadata for accounts involved in the transaction
            postCommitVolumes:
              $ref: '#/components/schemas/PostCommitVolumes'
              description: Post-commit volumes per account/asset (only present when expandVolumes is true)
            chapterId:
              type: integer
              format: uint64
              description: Chapter that was OPEN when this transaction was created
            previousAccountMetadata:
              type: object
              additionalProperties:
                type: object
              description: Previous account metadata values (for index replay)
            warnings:
              type: array
              items:
                $ref: '#/components/schemas/ChartViolation'
              description: Chart of accounts violations (AUDIT mode only, empty in STRICT mode)

    GetTransactionResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/TransactionResponse'

    GetAccountResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/Account'

    GetLedgerStatsResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerStats'

    LedgerStats:
      type: object
      required:
        - accountCount
        - transactionCount
      properties:
        accountCount:
          type: integer
          format: uint64
          minimum: 0
          description: Number of accounts in the ledger
        transactionCount:
          type: integer
          format: uint64
          minimum: 0
          description: Number of transactions in the ledger

    Account:
      type: object
      required:
        - address
      properties:
        address:
          type: string
          description: Account address
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Account metadata (typed values)
        volumes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/VolumesWithBalance'
          description: |
            Per-asset input/output/balance. The field is defined here so
            the schema stays stable across future wire changes, but it is
            not populated on the current v3 wire — `Account.MarshalJSON`
            drops it. For per-account balances, use a prepared query with
            type `AGGREGATE_VOLUMES` and an exact-address filter
            (`address.hardcodedExact`); the aggregated volumes returned by
            `GET /v3/{ledgerName}/volumes?prefix=…` match by raw byte
            prefix (`acc:1` matches `acc:10`) and will produce incorrect
            balances for a single-account lookup.

    VolumesWithBalance:
      type: object
      required:
        - input
        - output
        - balance
      properties:
        input:
          type: string
          description: Total amount received (as big integer string)
        output:
          type: string
          description: Total amount sent (as big integer string)
        balance:
          type: string
          description: Current balance (input - output, as big integer string)

    AggregateVolumesResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/AggregateVolumesData'

    AggregateVolumesData:
      type: object
      required:
        - volumes
      properties:
        volumes:
          type: array
          items:
            $ref: '#/components/schemas/AggregatedVolume'
          description: Flat aggregated volumes per asset
        groups:
          type: array
          items:
            $ref: '#/components/schemas/GroupedAggregateResult'
          description: Per-prefix aggregated volumes (present when groupByPrefixes is set)

    AggregatedVolume:
      type: object
      description: |
        Per-asset aggregated volume as emitted by `GET /v3/{ledgerName}/volumes`.
        Prepared-query `AGGREGATE_VOLUMES` responses use the same shape
        conceptually but currently leak the raw protojson encoding (numeric
        Uint256, no `balance`) — reconciliation tracked in EN-1465 / EN-1469.
      required:
        - asset
        - input
        - output
        - balance
      properties:
        asset:
          type: string
          description: Asset identifier (e.g. "USD/2")
        input:
          type: string
          description: Total amount received (as big integer string)
        output:
          type: string
          description: Total amount sent (as big integer string)
        balance:
          type: string
          description: Net balance (input - output, as big integer string)

    GroupedAggregateResult:
      type: object
      required:
        - prefix
        - volumes
      properties:
        prefix:
          type: string
          description: Account prefix this group matches
        volumes:
