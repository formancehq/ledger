          format: int32
          minimum: 0
          maximum: 23
        count:
          type: integer
          format: int64

    AssetVolumeStats:
      type: object
      properties:
        asset:
          type: string
        totalVolume:
          type: string
        averageVolume:
          type: string
        minVolume:
          type: string
        maxVolume:
          type: string
        transactionCount:
          type: integer
          format: int64

    CreatePreparedQueryRequest:
      type: object
      required:
        - name
        - target
        - filter
      properties:
        name:
          type: string
          description: Unique name for the prepared query
        target:
          type: string
          enum:
            - ACCOUNTS
            - TRANSACTIONS
            - LOGS
          description: >-
            Target entity type. `LOGS` queries return log entries; the log-only
            filter fields (`logId`, `date`, `ledger`) are valid only when the
            target is `LOGS`.
        filter:
          $ref: '#/components/schemas/QueryFilter'

    UpdatePreparedQueryRequest:
      type: object
      required:
        - filter
      properties:
        filter:
          $ref: '#/components/schemas/QueryFilter'

    ExecutePreparedQueryRequest:
      type: object
      properties:
        parameters:
          type: object
          additionalProperties:
            type: string
          description: Parameter values for the query (substituted into filter placeholders)
        pageSize:
          type: integer
          format: int32
          description: Maximum number of results per page
        cursor:
          type: string
          description: Cursor for pagination (from previous response)
        minLogSequence:
          type: integer
          format: uint64
          description: Minimum log sequence the read index must have processed (freshness guarantee)
        mode:
          type: string
          enum:
            - LIST
            - AGGREGATE_VOLUMES
          description: Execution mode (default LIST)

    PreparedQueryResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/PreparedQuery'

    ListPreparedQueriesResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PreparedQuery'

    PreparedQuery:
      type: object
      required:
        - name
        - target
        - filter
      properties:
        name:
          type: string
          description: Query name
        target:
          type: string
          enum:
            - ACCOUNTS
            - TRANSACTIONS
            - LOGS
          description: >-
            Target entity type. `LOGS`, `ACCOUNTS` and `TRANSACTIONS` are all
            usable prepared-query targets (create, list/get and execute).
        filter:
          $ref: '#/components/schemas/QueryFilter'
        allowedModes:
          type: array
          items:
            type: string

    QueryFilter:
      type: object
      description: >-
        Recursive filter expression using the Formance query DSL (aligned with
        the v2 API). Each node is an object with **exactly one** top-level
        `$`-prefixed operator key.


        Combinators:

        - `{"$and": [QueryFilter, ...]}` — all sub-filters must match (non-empty).

        - `{"$or":  [QueryFilter, ...]}` — at least one sub-filter matches (non-empty).

        - `{"$not": QueryFilter}` — negates a single sub-filter.


        Leaf conditions are a single-key operator whose value is a
        `{ "<field>": <value> }` map with exactly one field:

        - `{"$match": {"<field>": <value>}}` — equality; for `address`/`source`/`destination`
          a trailing `:` means prefix match, otherwise exact.

        - `{"$gt"|"$gte"|"$lt"|"$lte": {"<field>": <value>}}` — range bound. A closed
          range is expressed as an `$and` of a lower and an upper bound on the same field.

        - `{"$exists": {"metadata": "<key>"}}` — the metadata key is present.

        - `{"$exists": {"asset": "<assetRef>"}}` — the account has ever held the asset
          (`assetRef` is `BASE` or `BASE/PRECISION`, e.g. `USD/2`). Requires a READY
          `account-asset` index.


        Supported fields: `metadata[<key>]`, `address`, `source`, `destination`,
        `reference`, `reverted` (bool), `ledger`, `id`, `timestamp`, `insertedAt`,
        `revertedAt`, `logId`, `date`. Not every field applies to every query target;
        a field that does not apply is rejected. The numeric built-ins
        (`id`, `timestamp`, `insertedAt`, `revertedAt`, `logId`, `date`) are
        **range-only** — use `$gt`/`$gte`/`$lt`/`$lte`; `$match` on them is rejected.
        The log-only fields (`logId`, `date`, `ledger`) are valid only when the
        prepared query targets `LOGS`; they are rejected on `ACCOUNTS` and
        `TRANSACTIONS` targets.


        A value is either a JSON literal or a parameter reference
        `{"$param": "<name>"}`, resolved at prepared-query execution time. A JSON
        `null` in value position is rejected. uint64 fields
        (`id`, `timestamp`, `insertedAt`, `revertedAt`, `logId`, `date`) are carried
        as decimal strings to stay lossless above 2^53.
      minProperties: 1
      maxProperties: 1
      additionalProperties: true
      properties:
        $and:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/QueryFilter'
        $or:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/QueryFilter'
        $not:
          $ref: '#/components/schemas/QueryFilter'
        $match:
          type: object
          description: '`{ "<field>": <value> }` — exact/prefix/bool match.'
          minProperties: 1
          maxProperties: 1
          additionalProperties: true
        $gt:
          type: object
          description: '`{ "<field>": <value> }` — strictly greater than.'
          minProperties: 1
          maxProperties: 1
          additionalProperties: true
        $gte:
          type: object
          description: '`{ "<field>": <value> }` — greater than or equal.'
          minProperties: 1
          maxProperties: 1
          additionalProperties: true
        $lt:
          type: object
          description: '`{ "<field>": <value> }` — strictly less than.'
          minProperties: 1
          maxProperties: 1
          additionalProperties: true
        $lte:
          type: object
          description: '`{ "<field>": <value> }` — less than or equal.'
          minProperties: 1
          maxProperties: 1
          additionalProperties: true
        $exists:
          type: object
          description: >-
            `{ "metadata": "<key>" }` (metadata key present) or
            `{ "asset": "<assetRef>" }` (account has held the asset).
          minProperties: 1
          maxProperties: 1
          additionalProperties: true
        $in:
          type: object
          description: >-
            `{ "<field>": [<value>, ...] }` — value is one of a set. Reserved for
            the list endpoints; not accepted on prepared queries yet.
          minProperties: 1
          maxProperties: 1
          additionalProperties: true


    ExecutePreparedQueryResponse:
      type: object
      description: |
        Response wraps either a paged cursor (list-style targets like
        `LIST_ACCOUNTS`, `LIST_TRANSACTIONS`) or an aggregate result
        (`AGGREGATE_VOLUMES`). The current wire encoding leaks the raw
        protobuf oneof shape (Go-cased `Result.Cursor` / `Result.Aggregate`
        with nested proto field names). Reconciling the wire with a clean
        top-level `cursor` / `aggregateResult` envelope is tracked in
        EN-1465; this schema will be finalised together with that fix.
      additionalProperties: true

    HealthResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - status
          properties:
            status:
              type: string
              description: Health status (e.g. "ok")

    ServerInfo:
      type: object
      required:
        - version
        - commit
        - buildDate
        - goVersion
      properties:
        version:
          type: string
          description: Server release version
        commit:
          type: string
          description: Git commit the binary was built from
        buildDate:
          type: string
          description: Build timestamp (RFC3339, "unknown" if unset)
        goVersion:
          type: string
          description: Go runtime version the binary was built with

    AddAccountTypeRequest:
      type: object
      required:
        - name
        - pattern
      properties:
        name:
          type: string
          description: Unique name for the account type
        pattern:
          type: string
          description: Account address pattern for validation (e.g. "users:*")

    AccountTypeInfo:
      type: object
      required:
        - name
        - pattern
      properties:
        name:
          type: string
          description: Account type name
        pattern:
          type: string
          description: Account address pattern

    ListAccountTypesResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - types
          properties:
            types:
              type: array
              items:
                $ref: '#/components/schemas/AccountTypeInfo'
              description: List of account types sorted by name

    GetAccountTypeResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/AccountTypeInfo'

    SetDefaultEnforcementModeRequest:
      type: object
      required:
        - enforcementMode
      properties:
        enforcementMode:
          type: string
          enum:
            - STRICT
            - AUDIT
          description: Default enforcement mode for accounts not matching any account type

    ErrorResponse:
      type: object
      required:
        - errorCode
        - errorMessage
      properties:
        errorCode:
          type: string
          description: Error code identifier
        errorMessage:
          type: string
          description: Human-readable error message

    AuditEntry:
      type: object
      description: |
        A single audit trail entry for a proposal (success or failure). Exactly
        one of `success` / `failure` is set. `items` is populated only by the
        single-entry lookup, not by the list endpoint.
      properties:
        sequence:
          type: integer
          format: uint64
          description: Global audit sequence number
        timestamp:
          type: string
          format: date-time
          description: Apply timestamp (RFC3339)
        proposalId:
          type: integer
          format: uint64
          description: Identifier of the proposal that produced this entry
        success:
          $ref: '#/components/schemas/AuditSuccess'
        failure:
          $ref: '#/components/schemas/AuditFailure'
        orderCount:
          type: integer
          format: uint32
          description: Number of orders in the proposal
        items:
          type: array
          description: Per-order detail lines. Populated by the single-entry lookup; empty on list.
          items:
            $ref: '#/components/schemas/AuditItem'
        ledgers:
          type: array
          description: Distinct ledger names targeted by the proposal's orders
          items:
            type: string
        hash:
          type: string
          description: Hex-encoded batch integrity hash chaining audit entries
        hashVersion:
          type: integer
          format: uint32
          description: Hash algorithm version
        callerSnapshot:
          type: object
          description: Admission-time auth snapshot (protobuf JSON); absent when auth is disabled or for system proposals
        idempotency:
          type: object
          description: Batch identity / idempotency information (protobuf JSON)
        signature:
          type: object
          description: Client signature over the ApplyBatch (protobuf JSON); absent for unsigned batches

    AuditItem:
      type: object
      description: One order within a proposal.
      properties:
        orderIndex:
          type: integer
          format: uint32
          description: Zero-based position of this order within the proposal
        serializedOrder:
          type: string
          description: Hex-encoded deterministic serialized bytes of the order at apply time
        logSequence:
          type: integer
          format: uint64
          description: Sequence of the log produced by this order (0 for idempotent replay or failed proposals)

    AuditSuccess:
      type: object
      description: The inclusive log sequence range created by a successful proposal.
      properties:
        minLogSequence:
          type: integer
          format: uint64
        maxLogSequence:
          type: integer
          format: uint64

    AuditFailure:
      type: object
      description: The reason and context for a failed proposal.
      properties:
        reason:
          type: string
          description: Typed error reason identifier (e.g. ERROR_REASON_INSUFFICIENT_FUNDS)
        message:
          type: string
          description: Human-readable failure message
        context:
          type: object
          additionalProperties:
            type: string
          description: Additional structured context for the failure
