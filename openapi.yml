  /v3/{ledgerName}/indexes/{canonicalId}/inspect:
    get:
      summary: Inspect a metadata index
      description: |
        Scans a metadata index and returns distinct values, facets (value + count),
        or a summary (cardinality, min/max, existence counts). The index must be
        in READY state. Only metadata indexes are inspectable (builtin indexes
        return 400). Requires `ledger:read` scope.
      operationId: inspectIndex
      tags:
        - Indexes
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: canonicalId
          in: path
          required: true
          description: |
            Canonical form of the target IndexID, e.g.
            `metadata:TARGET_TYPE_ACCOUNT:color`. Must resolve to a metadata
            index; builtin indexes (`tx_builtin:...`, etc.) are rejected.
          schema:
            type: string
        - name: mode
          in: query
          description: Inspection mode
          schema:
            type: string
            enum: [summary, distinctValues, facets]
            default: summary
        - name: pageSize
          in: query
          description: Page size for distinctValues/facets modes
          schema:
            type: integer
            minimum: 1
            maximum: 10000
        - name: cursor
          in: query
          description: Pagination cursor from previous response
          schema:
            type: string
      responses:
        '200':
          description: Index inspection result
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    oneOf:
                      - $ref: '#/components/schemas/InspectSummaryResponse'
                      - $ref: '#/components/schemas/InspectDistinctValuesResponse'
                      - $ref: '#/components/schemas/InspectFacetsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

