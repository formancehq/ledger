openapi: 3.0.3
info:
  title: Ledger V3 POC API
  description: API for the Ledger V3 Proof of Concept with Raft consensus
  version: 1.0.0
  contact:
    name: Formance
    url: https://formance.com

servers:
  - url: http://localhost:9000
    description: Local development server

security:
  - BearerAuth: []
  - {}

paths:
  /:
    get:
      summary: List all ledgers
      description: Returns a list of all ledgers in the cluster. Requires `ledger:read` scope.
      operationId: listAllLedgers
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      responses:
        '200':
          description: List of ledgers retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAllLedgersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}:
    get:
      summary: Get a ledger
      description: Retrieves a ledger by its name. Requires `ledger:read` scope.
      operationId: getLedger
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
      responses:
        '200':
          description: Ledger retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLedgerResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create a new ledger
      description: |
        Creates a new ledger with the specified name. Storage is configured at the server level.
        Each ledger has its own Raft group for data consistency. Requires `ledger:write` scope.
      operationId: createLedger
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLedgerRequest'
      responses:
        '201':
          description: Ledger created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLedgerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Ledger already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Delete a ledger
      description: Deletes a ledger by its name. This operation removes the ledger and its associated Raft group from the cluster. Requires `ledger:write` scope.
      operationId: deleteLedger
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '2XX':
          description: Ledger deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}/stats:
    get:
      summary: Get ledger statistics
      description: Returns aggregate statistics (account count, transaction count) for a ledger. Requires `ledger:read` scope.
      operationId: getLedgerStats
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
      responses:
        '200':
          description: Ledger statistics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLedgerStatsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}/promote:
    post:
      summary: Promote a mirror ledger
      description: |
        Promotes a mirror-mode ledger to normal mode. After promotion, the mirror sync
        worker is stopped and the ledger accepts direct write operations. Requires `ledger:write` scope.
      operationId: promoteLedger
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
      responses:
        '201':
          description: Ledger promoted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoteLedgerResponse'
        '400':
          description: Ledger is not in mirror mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}/transactions:
    post:
      summary: Create a new transaction
      description: Creates a new transaction in the specified ledger with the specified postings. Requires `ledger:write` scope.
      operationId: createTransaction
      tags:
        - Transactions
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Transaction created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTransactionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}/transactions/{transactionId}:
    get:
      summary: Get a transaction
      description: Retrieves a transaction by its ID from the specified ledger. Requires `ledger:read` scope.
      operationId: getTransaction
      tags:
        - Transactions
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/TransactionId'
      responses:
        '200':
          description: Transaction retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTransactionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}/accounts:
    get:
      summary: List accounts
      description: Lists accounts in a ledger in alphabetical order with optional prefix filtering and cursor pagination. Requires `ledger:read` scope.
      operationId: listAccounts
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: pageSize
          in: query
          description: Maximum number of accounts to return (0 = no limit)
          schema:
            type: integer
            format: int32
        - name: after
          in: query
          description: Account address to start after (for cursor pagination, exclusive)
          schema:
            type: string
        - name: prefix
          in: query
          description: Filter accounts by address prefix (e.g. "users:")
          schema:
            type: string
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /{ledgerName}/accounts/{address}:
    get:
      summary: Get an account
      description: Retrieves account information including metadata for a specific account address. Requires `ledger:read` scope.
      operationId: getAccount
      tags:
        - Accounts
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/AccountAddress'
      responses:
        '200':
          description: Account retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAccountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}/accounts/{address}/metadata:
    post:
      summary: Save account metadata
      description: Saves metadata for a specific account in the ledger. Requires `ledger:write` scope.
      operationId: saveAccountMetadata
      tags:
        - Accounts
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/AccountAddress'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataValue'
              description: Metadata key-value pairs (supports typed values)
              example:
                account_type: asset
                label: Bank Account
                active: true
                balance_threshold: 1000
      responses:
        '204':
          description: Account metadata saved successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}/transactions/{transactionId}/metadata:
    post:
      summary: Save transaction metadata
      description: Saves metadata for a specific transaction in the ledger. Requires `ledger:write` scope.
      operationId: saveTransactionMetadata
      tags:
        - Transactions
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/TransactionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataValue'
              description: Metadata key-value pairs (supports typed values)
              example:
                reason: correction
                source: support
                priority: 1
      responses:
        '204':
          description: Transaction metadata saved successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}/accounts/{address}/metadata/{key}:
    delete:
      summary: Delete account metadata
      description: Deletes a metadata key for a specific account in the ledger. Requires `ledger:write` scope.
      operationId: deleteAccountMetadata
      tags:
        - Accounts
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/AccountAddress'
        - $ref: '#/components/parameters/MetadataKey'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Account metadata deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}/transactions/{transactionId}/metadata/{key}:
    delete:
      summary: Delete transaction metadata
      description: Deletes a metadata key for a specific transaction in the ledger. Requires `ledger:write` scope.
      operationId: deleteTransactionMetadata
      tags:
        - Transactions
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/TransactionId'
        - $ref: '#/components/parameters/MetadataKey'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Transaction metadata deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}/transactions/{transactionId}/revert:
    post:
      summary: Revert a transaction
      description: Reverts a transaction by creating a reverse transaction that undoes its effects. Requires `ledger:write` scope.
      operationId: revertTransaction
      tags:
        - Transactions
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/TransactionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevertTransactionRequestBody'
      responses:
        '201':
          description: Transaction reverted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevertedTransactionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}/metadata-schema:
    get:
      summary: Get metadata schema status
      description: Returns the metadata schema for a ledger, including per-field type declarations and conversion status. Requires `ledger:read` scope.
      operationId: getMetadataSchemaStatus
      tags:
        - Metadata Schema
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
      responses:
        '200':
          description: Metadata schema status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataSchemaStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}/analyze-accounts:
    get:
      summary: Analyze accounts and suggest a Chart of Accounts
      description: |
        Scans all accounts in a ledger, discovers address patterns, and returns a
        suggested Chart of Accounts. Useful after a mirror import to understand
        account structure. Requires `ledger:read` scope.
      operationId: analyzeAccounts
      tags:
        - Accounts
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: variableThreshold
          in: query
          description: Max distinct children before classifying as variable (0 = default 10)
          required: false
          schema:
            type: integer
            format: int32
            default: 0
      responses:
        '200':
          description: Analysis completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeAccountsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}/analyze-transactions:
    get:
      summary: Analyze transaction flow patterns
      description: |
        Scans all transactions in a ledger, discovers flow patterns by normalizing
        account addresses, and returns statistics per flow type including temporal
        distribution and volume metrics. Requires `ledger:read` scope.
      operationId: analyzeTransactions
      tags:
        - Transactions
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: variableThreshold
          in: query
          description: Max distinct children before classifying as variable (0 = default 10)
          required: false
          schema:
            type: integer
            format: int32
            default: 0
      responses:
        '200':
          description: Analysis completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeTransactionsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}/metadata-schema/{targetType}/{key}:
    put:
      summary: Set metadata field type
      description: |
        Declares or changes the expected type for a metadata key on a ledger.
        Once set, all new metadata values for this key are converted to the declared type.
        Existing values are converted in the background. Requires `ledger:write` scope.
      operationId: setMetadataFieldType
      tags:
        - Metadata Schema
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/TargetType'
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Metadata key name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetMetadataTypeRequest'
      responses:
        '204':
          description: Metadata field type set successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Remove metadata field type
      description: |
        Removes the type declaration for a metadata key on a ledger.
        Existing typed values are converted back to strings. Requires `ledger:write` scope.
      operationId: removeMetadataFieldType
      tags:
        - Metadata Schema
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/TargetType'
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Metadata key name
      responses:
        '204':
          description: Metadata field type removed successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}/chart-of-accounts:
    get:
      summary: Get chart of accounts
      description: Returns the chart of accounts and enforcement mode for a ledger.
      operationId: getChartOfAccounts
      tags:
        - Chart of Accounts
      parameters:
        - $ref: '#/components/parameters/LedgerName'
      responses:
        '200':
          description: Chart of accounts retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetChartOfAccountsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      summary: Set chart of accounts
      description: |
        Sets the chart of accounts for a ledger. The chart defines a declarative tree structure
        that validates account addresses against fixed and variable segments.
      operationId: setChartOfAccounts
      tags:
        - Chart of Accounts
      parameters:
        - $ref: '#/components/parameters/LedgerName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChartOfAccounts'
      responses:
        '204':
          description: Chart of accounts set successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{ledgerName}/chart-of-accounts/enforcement-mode:
    put:
      summary: Set chart enforcement mode
      description: |
        Sets the enforcement mode for chart of accounts validation.
        STRICT mode rejects transactions with invalid account addresses.
        AUDIT mode logs warnings but allows transactions through.
      operationId: setChartEnforcementMode
      tags:
        - Chart of Accounts
      parameters:
        - $ref: '#/components/parameters/LedgerName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetChartEnforcementModeRequest'
      responses:
        '204':
          description: Enforcement mode set successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /numscripts:
    get:
      summary: List all numscripts
      description: Returns a list of all saved numscripts with their latest version info.
      operationId: listNumscripts
      tags:
        - Numscript Library
      responses:
        '200':
          description: List of numscripts retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListNumscriptsResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /numscripts/{name}:
    get:
      summary: Get a numscript
      description: |
        Retrieves a numscript by name. Use the `version` query parameter to get a specific
        semver version. If omitted or empty, the latest version is returned.
      operationId: getNumscript
      tags:
        - Numscript Library
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Name of the numscript
        - name: version
          in: query
          required: false
          schema:
            type: string
          description: |
            Semver version to retrieve (e.g. "1.0.0"). If omitted or empty, the latest version is returned.
      responses:
        '200':
          description: Numscript retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetNumscriptResponse'
        '404':
          description: Numscript not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Save a numscript
      description: |
        Saves a numscript with the given name. The `version` field in the request body controls
        versioning behavior:
        - A semver string (e.g. "2.0.0") creates a new version. Fails if the version already exists.
        - The special value "latest" overwrites the content of the current latest version.
        - If omitted or empty, defaults to "latest".
      operationId: saveNumscript
      tags:
        - Numscript Library
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Name of the numscript
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveNumscriptRequest'
      responses:
        '201':
          description: Numscript saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetNumscriptResponse'
        '204':
          description: Numscript saved (no content returned)
        '400':
          description: Bad request (invalid version format, parse error, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Version already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a numscript
      description: Deletes a numscript by name. Removes the latest version entry.
      operationId: deleteNumscript
      tags:
        - Numscript Library
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Name of the numscript
      responses:
        '204':
          description: Numscript deleted successfully
        '404':
          description: Numscript not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}/_bulk:
    post:
      summary: Bulk operations
      description: Execute multiple operations (create transactions, add metadata, revert transactions, delete metadata) in a single request. Requires `ledger:write` scope.
      operationId: bulkOperations
      tags:
        - Transactions
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: continueOnFailure
          in: query
          schema:
            type: boolean
            default: false
          description: Continue processing remaining operations even if one fails
        - name: atomic
          in: query
          schema:
            type: boolean
            default: false
          description: Execute all operations atomically (not yet supported)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/BulkElement'
      responses:
        '200':
          description: Bulk operations completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          description: Request entity too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT token issued by a trusted OIDC provider. Required when the server
        is started with `--auth-enabled`. Scopes: `ledger:read` (read operations),
        `ledger:write` (write operations), `ledger:admin` (cluster operations).

  parameters:
    LedgerName:
      name: ledgerName
      in: path
      required: true
      schema:
        type: string
      description: Name of the ledger

    TransactionId:
      name: transactionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Transaction ID

    AccountAddress:
      name: address
      in: path
      required: true
      schema:
        type: string
      description: Account address

    MetadataKey:
      name: key
      in: path
      required: true
      schema:
        type: string
      description: Metadata key

    TargetType:
      name: targetType
      in: path
      required: true
      schema:
        type: string
        enum:
          - account
          - transaction
      description: Target type (account or transaction)

    QueryName:
      name: queryName
      in: path
      required: true
      schema:
        type: string
      description: Prepared query name

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 256
      description: Idempotency key for the request

  responses:
    ServiceUnavailable:
      description: Service unavailable (no leader available)
      headers:
        Retry-After:
          description: Number of seconds to wait before retrying the request
          schema:
            type: integer
            format: int32
            minimum: 1
            example: 1
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Authentication required (missing or invalid JWT token)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Insufficient permissions (missing required scope)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    MetadataValue:
      description: A typed metadata value (string, integer, boolean, or null)
      nullable: true
      oneOf:
        - type: string
        - type: integer
          format: int64
        - type: boolean

    CreateLedgerRequest:
      type: object
      properties:
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Optional metadata for the ledger (supports typed values)
        mode:
          type: string
          enum:
            - NORMAL
            - MIRROR
          default: NORMAL
          description: Ledger mode. MIRROR creates a read-only ledger that syncs from an external v2 source.
        mirrorSource:
          $ref: '#/components/schemas/MirrorSourceConfig'
        chartOfAccounts:
          $ref: '#/components/schemas/ChartOfAccounts'
          description: Optional chart of accounts to set at creation time
        enforcementMode:
          $ref: '#/components/schemas/ChartEnforcementMode'
          description: Optional enforcement mode (defaults to STRICT)

    CreateLedgerResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerInfo'

    GetLedgerResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerInfo'

    ListAllLedgersResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LedgerInfo'
          description: List of all ledgers in the cluster

    LedgerInfo:
      type: object
      required:
        - name
        - createdAt
        - mode
      properties:
        name:
          type: string
          description: Name of the ledger
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Metadata for the ledger (supports typed values)
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp (ISO 8601 format)
        mode:
          type: string
          enum:
            - NORMAL
            - MIRROR
          description: Ledger mode (NORMAL or MIRROR)
        mirrorSource:
          $ref: '#/components/schemas/MirrorSourceConfig'
        mirrorSyncProgress:
          $ref: '#/components/schemas/MirrorSyncProgress'

    MirrorSyncProgress:
      type: object
      description: Sync progress for MIRROR ledgers (populated at read time)
      required:
        - state
        - cursor
        - sourceLogCount
        - remainingLogs
      properties:
        state:
          type: string
          enum:
            - SYNCING
            - FOLLOWING
          description: Current sync state (SYNCING = catching up, FOLLOWING = up to date)
        cursor:
          type: integer
          format: uint64
          minimum: 0
          description: Last ingested v2 log ID
        sourceLogCount:
          type: integer
          format: uint64
          minimum: 0
          description: Latest known log ID in the v2 source
        remainingLogs:
          type: integer
          format: uint64
          minimum: 0
          description: Number of remaining logs to sync (sourceLogCount - cursor)
        error:
          $ref: '#/components/schemas/MirrorSyncError'

    MirrorSyncError:
      type: object
      description: Most recent mirror sync error (null if healthy)
      properties:
        message:
          type: string
          description: Error message
        occurredAt:
          type: string
          format: date-time
          description: When the error occurred

    CreateTransactionRequest:
      type: object
      properties:
        accountMetadata:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              $ref: '#/components/schemas/MetadataValue'
          description: Metadata for accounts involved in the transaction (supports typed values)
        timestamp:
          type: string
          format: date-time
          description: Transaction timestamp (ISO 8601 format). If not provided, current time is used.
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Transaction metadata (supports typed values)
        reference:
          type: string
          description: Transaction reference
        postings:
          type: array
          items:
            $ref: '#/components/schemas/PostingRequest'
          description: List of postings for the transaction (required if script is not provided)
        script:
          $ref: '#/components/schemas/Script'
          description: Numscript script to execute (required if postings is not provided). Cannot be used together with postings.
        idempotencyKey:
          type: string
          description: Idempotency key to prevent duplicate transactions
        expandVolumes:
          type: boolean
          default: false
          description: When true, include post-commit volumes (per account/asset) in the response

    PostingRequest:
      type: object
      required:
        - source
        - destination
        - amount
        - asset
      properties:
        source:
          type: string
          description: Source account address
        destination:
          type: string
          description: Destination account address
        amount:
          type: integer
          format: bigint
          description: Amount as a big integer
        asset:
          type: string
          description: Asset identifier

    Script:
      type: object
      required:
        - plain
      properties:
        plain:
          type: string
          description: The numscript source code
        vars:
          type: object
          additionalProperties:
            type: string
          description: Variables to pass to the script

    BulkElement:
      type: object
      required:
        - action
        - data
      properties:
        action:
          type: string
          enum:
            - CREATE_TRANSACTION
            - ADD_METADATA
            - REVERT_TRANSACTION
            - DELETE_METADATA
          description: The type of operation to perform
        ik:
          type: string
          maxLength: 256
          description: Idempotency key for this operation
        data:
          oneOf:
            - $ref: '#/components/schemas/CreateTransactionRequest'
            - $ref: '#/components/schemas/AddMetadataRequest'
            - $ref: '#/components/schemas/RevertTransactionRequest'
            - $ref: '#/components/schemas/DeleteMetadataRequest'
          description: Operation-specific data

    AddMetadataRequest:
      type: object
      required:
        - targetType
        - targetId
        - metadata
      properties:
        targetType:
          type: string
          enum:
            - ACCOUNT
            - TRANSACTION
          description: Type of target (account or transaction)
        targetId:
          oneOf:
            - type: string
            - type: integer
          description: ID of the target (account address or transaction ID)
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Metadata to add (supports typed values)

    RevertTransactionRequest:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          format: int64
          description: Transaction ID to revert
        force:
          type: boolean
          default: false
          description: Force revert even if accounts don't have sufficient funds
        atEffectiveDate:
          type: boolean
          default: false
          description: Set the timestamp of the reverted transaction to the original transaction timestamp
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Metadata for the revert transaction (supports typed values)
        expandVolumes:
          type: boolean
          default: false
          description: When true, include post-commit volumes (per account/asset) in the response

    RevertTransactionRequestBody:
      type: object
      properties:
        force:
          type: boolean
          default: false
          description: Force revert even if accounts don't have sufficient funds
        atEffectiveDate:
          type: boolean
          default: false
          description: Set the timestamp of the reverted transaction to the original transaction timestamp
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Metadata for the revert transaction (supports typed values)
        expandVolumes:
          type: boolean
          default: false
          description: When true, include post-commit volumes (per account/asset) in the response

    DeleteMetadataRequest:
      type: object
      required:
        - targetType
        - targetId
        - key
      properties:
        targetType:
          type: string
          enum:
            - ACCOUNT
            - TRANSACTION
          description: Type of target (account or transaction)
        targetId:
          oneOf:
            - type: string
            - type: integer
          description: ID of the target (account address or transaction ID)
        key:
          type: string
          description: Metadata key to delete

    BulkResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BulkResult'
        errorCode:
          type: string
        errorMessage:
          type: string

    BulkResult:
      type: object
      required:
        - responseType
        - logID
      properties:
        errorCode:
          type: string
        errorDescription:
          type: string
        data:
          type: object
          description: Operation result data (transaction for CREATE_TRANSACTION, null for others)
        responseType:
          type: string
          description: Type of response (action name or ERROR)
        logID:
          type: integer
          format: int64
          description: Log ID of the operation

    CreateTransactionResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - transaction
          properties:
            transaction:
              $ref: '#/components/schemas/TransactionResponse'
            accountMetadata:
              type: object
              additionalProperties:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/MetadataValue'
              description: Metadata for accounts involved in the transaction (typed values)
            postCommitVolumes:
              $ref: '#/components/schemas/PostCommitVolumes'
              description: Post-commit volumes per account/asset (only present when expandVolumes is true)
            warnings:
              type: array
              items:
                $ref: '#/components/schemas/ChartViolation'
              description: Chart of accounts violations (AUDIT mode only, empty in STRICT mode)

    GetTransactionResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/TransactionResponse'

    GetAccountResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/Account'

    GetLedgerStatsResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerStats'

    LedgerStats:
      type: object
      required:
        - accountCount
        - transactionCount
      properties:
        accountCount:
          type: integer
          format: uint64
          minimum: 0
          description: Number of accounts in the ledger
        transactionCount:
          type: integer
          format: uint64
          minimum: 0
          description: Number of transactions in the ledger

    Account:
      type: object
      required:
        - address
      properties:
        address:
          type: string
          description: Account address
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Account metadata (typed values)
        volumes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/VolumesWithBalance'
          description: Account volumes per asset (input, output, balance)

    VolumesWithBalance:
      type: object
      required:
        - input
        - output
        - balance
      properties:
        input:
          type: string
          description: Total amount received (as big integer string)
        output:
          type: string
          description: Total amount sent (as big integer string)
        balance:
          type: string
          description: Current balance (input - output, as big integer string)

    TransactionResponse:
      type: object
      required:
        - id
        - postings
        - timestamp
      properties:
        postings:
          type: array
          items:
            $ref: '#/components/schemas/PostingResponse'
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
        timestamp:
          type: string
          format: date-time
          description: Transaction timestamp (ISO 8601 format)
        reference:
          type: string
        id:
          type: integer
          format: int64
          description: Transaction ID (assigned by the system)

    RevertedTransaction:
      type: object
      required:
        - revertedTransactionId
        - revertTransaction
      properties:
        revertedTransactionId:
          type: integer
          format: uint64
          description: ID of the original transaction that was reverted
        revertTransaction:
          $ref: '#/components/schemas/TransactionResponse'
          description: The new transaction that reverses the original transaction
        postCommitVolumes:
          $ref: '#/components/schemas/PostCommitVolumes'
          description: Post-commit volumes per account/asset (only present when expandVolumes is true)
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ChartViolation'
          description: Chart of accounts violations (AUDIT mode only, empty in STRICT mode)

    RevertedTransactionResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/RevertedTransaction'

    PostingResponse:
      type: object
      required:
        - source
        - destination
        - amount
        - asset
      properties:
        source:
          type: string
        destination:
          type: string
        amount:
          type: integer
          format: bigint
          description: Amount as a big integer
        asset:
          type: string

    LedgerClusterStateResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - state
            - localNode
            - innerState
          properties:
            state:
              type: string
              enum: [Leader, Follower, Candidate, PreCandidate, Unknown]
              description: Current state of the local node
            leader:
              type: integer
              format: int64
              minimum: 0
              description: ID of the current leader (0 if no leader)
            localNode:
              type: integer
              format: int64
              minimum: 0
              description: ID of the local node
            nodes:
              type: array
              items:
                $ref: '#/components/schemas/NodeInfo'
              description: List of all nodes in the cluster
            raftStatus:
              $ref: '#/components/schemas/RaftStatus'
              description: Complete Raft status information
            innerState:
              $ref: '#/components/schemas/LedgerState'
              description: State contained in the FSM

    SystemState:
      type: object
      required:
        - ledgers
      properties:
        ledgers:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/LedgerState'
          description: Map of ledger name to ledger state

    LedgerState:
      type: object
      required:
        - ledgerInfo
        - nextLogId
        - nextTransactionId
      properties:
        ledgerInfo:
          $ref: '#/components/schemas/LedgerInfo'
        nextLogId:
          type: integer
          format: uint64
          minimum: 0
          description: Next log ID to be assigned
        nextTransactionId:
          type: integer
          format: uint64
          minimum: 0
          description: Next transaction ID to be assigned

    NodeInfo:
      type: object
      required:
        - id
        - address
        - suffrage
      properties:
        id:
          type: integer
          format: int64
          minimum: 0
          description: Node ID
        address:
          type: string
          description: Node address
        suffrage:
          type: string
          enum: [Voter, Nonvoter, Learner]
          description: Node suffrage (Voter, Nonvoter, or Learner)

    ClusterState:
      type: object
      required:
        - state
        - localNode
      properties:
        state:
          type: string
          description: Current state of the Raft node (Leader, Follower, Candidate, PreCandidate, Unknown)
        leader:
          type: integer
          format: int64
          minimum: 0
          description: ID of the current leader (0 if no leader)
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/NodeInfo'
          description: List of all nodes in the cluster
        localNode:
          type: integer
          format: int64
          minimum: 0
          description: ID of the local node
        raftStatus:
          $ref: '#/components/schemas/RaftStatus'
          description: Complete Raft status information

    RaftStatus:
      type: object
      required:
        - state
        - term
        - leader
        - applied
        - commit
        - lastIndex
        - vote
      properties:
        state:
          type: string
          enum: [Leader, Follower, Candidate, PreCandidate, Unknown]
          description: Current Raft state
        term:
          type: integer
          format: int64
          minimum: 0
          description: Current term
        leader:
          type: integer
          format: int64
          minimum: 0
          description: ID of the current leader (0 if no leader)
        applied:
          type: integer
          format: int64
          minimum: 0
          description: Index of the last applied entry
        commit:
          type: integer
          format: int64
          minimum: 0
          description: Index of the last committed entry
        lastIndex:
          type: integer
          format: int64
          minimum: 0
          description: Index of the last entry in the log
        vote:
          type: integer
          format: int64
          minimum: 0
          description: ID of the node that received the vote (0 if no vote)
        progress:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ProgressInfo'
          description: Progress information for each node in the cluster

    ProgressInfo:
      type: object
      required:
        - match
        - next
        - state
        - pendingSnapshot
        - recentActive
        - probeSent
        - isPaused
      properties:
        match:
          type: integer
          format: int64
          minimum: 0
          description: Match index - highest log entry known to be replicated to this node
        next:
          type: integer
          format: int64
          minimum: 0
          description: Next index - index of the next log entry to send to this node
        state:
          type: string
          enum: [Probe, Replicate, Snapshot, Unknown]
          description: State of the replication (Probe, Replicate, or Snapshot)
        pendingSnapshot:
          type: integer
          format: int64
          minimum: 0
          description: Index of pending snapshot (0 if none)
        recentActive:
          type: boolean
          description: Whether this node is recently active
        probeSent:
          type: boolean
          description: Whether probe message was sent (paused)
        isPaused:
          type: boolean
          description: Whether this node is paused

    MetadataSchemaStatusResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - accountFields
            - transactionFields
          properties:
            accountFields:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataFieldStatus'
              description: Account metadata field statuses
            transactionFields:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataFieldStatus'
              description: Transaction metadata field statuses

    MetadataFieldStatus:
      type: object
      required:
        - declaredType
        - status
        - totalKeys
        - convertedKeys
      properties:
        declaredType:
          type: string
          enum:
            - string
            - int64
            - bool
            - uint64
            - int8
            - int16
            - int32
            - uint8
            - uint16
            - uint32
          description: Declared type for this metadata field
        status:
          type: string
          enum:
            - COMPLETE
            - CONVERTING
          description: Conversion status for this field
        totalKeys:
          type: integer
          format: uint64
          minimum: 0
          description: Total number of instances of this key
        convertedKeys:
          type: integer
          format: uint64
          minimum: 0
          description: Number of already-converted instances

    SetMetadataTypeRequest:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - string
            - int64
            - bool
            - uint64
            - int8
            - int16
            - int32
            - uint8
            - uint16
            - uint32
          description: Metadata type to set for the field

    PostCommitVolumes:
      type: object
      additionalProperties:
        type: object
        additionalProperties:
          $ref: '#/components/schemas/Volumes'
      description: Post-commit volumes grouped by account address, then by asset

    Volumes:
      type: object
      required:
        - input
        - output
      properties:
        input:
          type: string
          description: Total amount received (as big integer string)
        output:
          type: string
          description: Total amount sent (as big integer string)

    MirrorSourceConfig:
      type: object
      description: Configuration for the mirror source (required when mode is MIRROR)
      required:
        - ledgerName
      properties:
        ledgerName:
          type: string
          description: Name of the source ledger in the v2 system
        type:
          type: string
          enum:
            - http
            - postgres
          default: http
          description: Source type (defaults to "http" if omitted)
        baseUrl:
          type: string
          description: Base URL of the v2 API (required for HTTP source)
        oauth2ClientId:
          type: string
          description: OAuth2 client ID for the v2 API (HTTP source only)
        oauth2ClientSecret:
          type: string
          description: OAuth2 client secret for the v2 API (HTTP source only)
        oauth2TokenEndpoint:
          type: string
          description: OAuth2 token endpoint URL (HTTP source only)
        oauth2Scopes:
          type: array
          items:
            type: string
          description: OAuth2 scopes (HTTP source only)
        dsn:
          type: string
          description: PostgreSQL connection string (required for PostgreSQL source)
        batchSize:
          type: integer
          minimum: 0
          default: 0
          description: Max logs per batch (0 = server default 100, capped by server's --mirror-max-batch-size)

    SaveNumscriptRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: The numscript source code
        version:
          type: string
          description: |
            Semver version string (e.g. "1.0.0") or the special value "latest".
            - A semver string creates a new version. Fails if the version already exists.
            - "latest" overwrites the content of the current latest version.
            - If omitted or empty, defaults to "latest".
          example: "1.0.0"

    NumscriptInfo:
      type: object
      required:
        - name
        - content
        - version
        - createdAt
      properties:
        name:
          type: string
          description: Name of the numscript
        content:
          type: string
          description: The numscript source code
        version:
          type: string
          description: Semver version string (e.g. "1.0.0")
          example: "1.0.0"
        createdAt:
          type: string
          format: date-time
          description: Creation/update timestamp (ISO 8601 format)

    PromoteLedgerResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerInfo'

    GetNumscriptResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/NumscriptInfo'

    ListNumscriptsResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/NumscriptInfo'
          description: List of all numscripts

    AnalyzeAccountsResponse:
      type: object
      properties:
        suggestedChart:
          $ref: '#/components/schemas/ChartOfAccounts'
        patterns:
          type: array
          items:
            $ref: '#/components/schemas/AccountPattern'
        totalAccounts:
          type: integer
          format: int64

    ChartOfAccounts:
      type: object
      properties:
        roots:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ChartSegment'
          description: Root segments of the chart (keyed by segment name)

    ChartSegment:
      type: object
      properties:
        account:
          type: boolean
          description: Whether this node represents a valid terminal account
        children:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ChartSegment'
          description: Fixed child segments (keyed by segment name)
        variable:
          $ref: '#/components/schemas/ChartVariable'
          description: Variable child segment (matches dynamic segments)

    ChartVariable:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Variable name (for documentation purposes)
        pattern:
          type: string
          description: Optional regex pattern to constrain variable values
        account:
          type: boolean
          description: Whether this variable node represents a valid terminal account
        children:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ChartSegment'
          description: Fixed child segments after the variable
        variable:
          $ref: '#/components/schemas/ChartVariable'
          description: Nested variable child

    AccountPattern:
      type: object
      properties:
        pattern:
          type: string
        accountCount:
          type: integer
          format: int64
        assets:
          type: array
          items:
            type: string
        metadataKeys:
          type: array
          items:
            type: string
        segments:
          type: array
          items:
            $ref: '#/components/schemas/PatternSegment'

    PatternSegment:
      type: object
      properties:
        position:
          type: integer
          format: int32
        type:
          type: string
          enum: [fixed, variable]
        fixedValue:
          type: string
        variableName:
          type: string
        inferredPattern:
          type: string
        uniqueValues:
          type: integer
          format: int64
        examples:
          type: array
          items:
            type: string

    AnalyzeTransactionsResponse:
      type: object
      properties:
        flowPatterns:
          type: array
          items:
            $ref: '#/components/schemas/FlowPattern'
        totalTransactions:
          type: integer
          format: int64
        totalReverted:
          type: integer
          format: int64

    FlowPattern:
      type: object
      properties:
        signature:
          type: string
          description: Canonical flow signature (e.g. "users:{id}:main->bank:fees[USD]")
        structure:
          type: string
          enum: [simple, multiSource, multiDestination, complex]
        transactionCount:
          type: integer
          format: int64
        postings:
          type: array
          items:
            $ref: '#/components/schemas/NormalizedPosting'
        temporal:
          $ref: '#/components/schemas/TemporalStats'
        volumeStats:
          type: array
          items:
            $ref: '#/components/schemas/AssetVolumeStats'
        metadataKeys:
          type: array
          items:
            type: string

    NormalizedPosting:
      type: object
      properties:
        sourcePattern:
          type: string
        destinationPattern:
          type: string
        asset:
          type: string

    TemporalStats:
      type: object
      properties:
        firstSeen:
          type: string
          format: date-time
        lastSeen:
          type: string
          format: date-time
        transactionsPerDay:
          type: number
          format: double
        peakHours:
          type: array
          items:
            $ref: '#/components/schemas/HourBucket'

    HourBucket:
      type: object
      properties:
        hour:
          type: integer
          format: int32
          minimum: 0
          maximum: 23
        count:
          type: integer
          format: int64

    AssetVolumeStats:
      type: object
      properties:
        asset:
          type: string
        totalVolume:
          type: string
        averageVolume:
          type: string
        minVolume:
          type: string
        maxVolume:
          type: string
        transactionCount:
          type: integer
          format: int64

    ChartEnforcementMode:
      type: string
      enum:
        - STRICT
        - AUDIT
      description: |
        Enforcement mode for chart of accounts validation.
        STRICT rejects transactions with invalid account addresses.
        AUDIT returns warnings but allows transactions through.

    ChartViolation:
      type: object
      required:
        - address
      properties:
        address:
          type: string
          description: Account address that does not match the chart of accounts

    GetChartOfAccountsResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - enforcementMode
          properties:
            chartOfAccounts:
              $ref: '#/components/schemas/ChartOfAccounts'
              description: The chart of accounts (null if not set)
            enforcementMode:
              $ref: '#/components/schemas/ChartEnforcementMode'
              description: Current enforcement mode

    SetChartEnforcementModeRequest:
      type: object
      required:
        - mode
      properties:
        mode:
          $ref: '#/components/schemas/ChartEnforcementMode'
          description: Enforcement mode to set

    CreatePreparedQueryRequest:
      type: object
      required:
        - name
        - target
        - filter
      properties:
        name:
          type: string
          description: Unique name for the prepared query
        target:
          type: string
          enum:
            - ACCOUNTS
            - TRANSACTIONS
          description: Target entity type
        filter:
          $ref: '#/components/schemas/QueryFilter'
        allowedModes:
          type: array
          items:
            type: string
            enum:
              - LIST
              - AGGREGATE_VOLUMES
          description: Allowed execution modes (default LIST only)

    UpdatePreparedQueryRequest:
      type: object
      required:
        - target
        - filter
      properties:
        target:
          type: string
          enum:
            - ACCOUNTS
            - TRANSACTIONS
          description: Target entity type
        filter:
          $ref: '#/components/schemas/QueryFilter'
        allowedModes:
          type: array
          items:
            type: string
            enum:
              - LIST
              - AGGREGATE_VOLUMES
          description: Allowed execution modes

    ExecutePreparedQueryRequest:
      type: object
      properties:
        parameters:
          type: object
          additionalProperties:
            type: string
          description: Parameter values for the query (substituted into filter placeholders)
        pageSize:
          type: integer
          format: int32
          description: Maximum number of results per page
        cursor:
          type: string
          description: Cursor for pagination (from previous response)
        minLogSequence:
          type: integer
          format: uint64
          description: Minimum log sequence the read index must have processed (freshness guarantee)
        mode:
          type: string
          enum:
            - LIST
            - AGGREGATE_VOLUMES
          description: Execution mode (default LIST)

    PreparedQueryResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/PreparedQuery'

    ListPreparedQueriesResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PreparedQuery'

    PreparedQuery:
      type: object
      required:
        - name
        - target
        - filter
      properties:
        name:
          type: string
          description: Query name
        target:
          type: string
          enum:
            - ACCOUNTS
            - TRANSACTIONS
          description: Target entity type
        filter:
          $ref: '#/components/schemas/QueryFilter'
        allowedModes:
          type: array
          items:
            type: string

    QueryFilter:
      type: object
      description: Recursive filter tree (AND/OR/NOT of field conditions and address matches)
      properties:
        and:
          type: array
          items:
            $ref: '#/components/schemas/QueryFilter'
        or:
          type: array
          items:
            $ref: '#/components/schemas/QueryFilter'
        not:
          $ref: '#/components/schemas/QueryFilter'
        match:
          type: object
          description: Field condition or address match

    ExecutePreparedQueryResponse:
      type: object
      properties:
        cursor:
          type: object
          properties:
            hasMore:
              type: boolean
            next:
              type: string
              description: Cursor to pass for the next page
            data:
              type: array
              items:
                type: string
              description: Entity IDs (account addresses or transaction IDs)
        aggregateResult:
          type: object
          properties:
            volumes:
              type: array
              items:
                type: object
                properties:
                  asset:
                    type: string
                  input:
                    type: string
                    description: Total input as big integer string
                  output:
                    type: string
                    description: Total output as big integer string

    ErrorResponse:
      type: object
      required:
        - errorCode
        - errorMessage
      properties:
        errorCode:
          type: string
          description: Error code identifier
        errorMessage:
          type: string
          description: Human-readable error message
