        nextTransactionId:
          type: integer
          format: uint64
          minimum: 0
          description: Next transaction ID to be assigned

    NodeInfo:
      type: object
      required:
        - id
        - address
        - suffrage
      properties:
        id:
          type: integer
          format: int64
          minimum: 0
          description: Node ID
        address:
          type: string
          description: Node address
        suffrage:
          type: string
          enum: [Voter, Nonvoter, Learner]
          description: Node suffrage (Voter, Nonvoter, or Learner)

    ClusterState:
      type: object
      required:
        - state
        - localNode
      properties:
        state:
          type: string
          description: Current state of the Raft node (Leader, Follower, Candidate, PreCandidate, Unknown)
        leader:
          type: integer
          format: int64
          minimum: 0
          description: ID of the current leader (0 if no leader)
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/NodeInfo'
          description: List of all nodes in the cluster
        localNode:
          type: integer
          format: int64
          minimum: 0
          description: ID of the local node
        raftStatus:
          $ref: '#/components/schemas/RaftStatus'
          description: Complete Raft status information

    RaftStatus:
      type: object
      required:
        - state
        - term
        - leader
        - applied
        - commit
        - lastIndex
        - vote
      properties:
        state:
          type: string
          enum: [Leader, Follower, Candidate, PreCandidate, Unknown]
          description: Current Raft state
        term:
          type: integer
          format: int64
          minimum: 0
          description: Current term
        leader:
          type: integer
          format: int64
          minimum: 0
          description: ID of the current leader (0 if no leader)
        applied:
          type: integer
          format: int64
          minimum: 0
          description: Index of the last applied entry
        commit:
          type: integer
          format: int64
          minimum: 0
          description: Index of the last committed entry
        lastIndex:
          type: integer
          format: int64
          minimum: 0
          description: Index of the last entry in the log
        vote:
          type: integer
          format: int64
          minimum: 0
          description: ID of the node that received the vote (0 if no vote)
        progress:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ProgressInfo'
          description: Progress information for each node in the cluster

    ProgressInfo:
      type: object
      required:
        - match
        - next
        - state
        - pendingSnapshot
        - recentActive
        - probeSent
        - isPaused
      properties:
        match:
          type: integer
          format: int64
          minimum: 0
          description: Match index - highest log entry known to be replicated to this node
        next:
          type: integer
          format: int64
          minimum: 0
          description: Next index - index of the next log entry to send to this node
        state:
          type: string
          enum: [Probe, Replicate, Snapshot, Unknown]
          description: State of the replication (Probe, Replicate, or Snapshot)
        pendingSnapshot:
          type: integer
          format: int64
          minimum: 0
          description: Index of pending snapshot (0 if none)
        recentActive:
          type: boolean
          description: Whether this node is recently active
        probeSent:
          type: boolean
          description: Whether probe message was sent (paused)
        isPaused:
          type: boolean
          description: Whether this node is paused

    InspectSummaryResponse:
      type: object
      required:
        - cardinality
        - entitiesWithKey
        - entitiesWithNull
      properties:
        cardinality:
          type: integer
          format: uint64
          description: Number of distinct values
        min:
          description: Minimum value (null if index is empty)
        max:
          description: Maximum value (null if index is empty)
        entitiesWithKey:
          type: integer
          format: uint64
          description: Number of entities that have this metadata key set (non-null)
        entitiesWithNull:
          type: integer
          format: uint64
          description: Number of entities with a null value for this key

    InspectDistinctValuesResponse:
      type: object
      required:
        - values
        - hasMore
      properties:
        values:
          type: array
          items: {}
          description: Distinct values in sorted order
        hasMore:
          type: boolean
          description: Whether more values are available
        nextCursor:
          type: string
          description: Pagination cursor for the next page

    InspectFacetsResponse:
      type: object
      required:
        - facets
        - hasMore
      properties:
        facets:
          type: array
          items:
            $ref: '#/components/schemas/InspectFacet'
          description: Facets sorted by value
        hasMore:
          type: boolean
          description: Whether more facets are available
        nextCursor:
          type: string
          description: Pagination cursor for the next page

    InspectFacet:
      type: object
      required:
        - value
        - count
      properties:
        value:
          description: The metadata value
        count:
          type: integer
          format: uint64
          description: Number of entities with this value

    MetadataSchemaStatusResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - accountFields
            - transactionFields
            - ledgerFields
          properties:
            accountFields:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataFieldStatus'
              description: Account metadata field statuses
            transactionFields:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataFieldStatus'
              description: Transaction metadata field statuses
            ledgerFields:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataFieldStatus'
              description: Ledger metadata field statuses

    MetadataFieldStatus:
      type: object
      required:
        - declaredType
        - status
      properties:
        declaredType:
          type: string
          enum:
            - string
            - int64
            - bool
            - uint64
            - int8
            - int16
            - int32
            - uint8
            - uint16
            - uint32
            - datetime
          description: Declared type for this metadata field
        status:
          type: string
          enum:
            - COMPLETE
            - CONVERTING
          description: Conversion status for this field

    SetMetadataTypeRequest:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - string
            - int64
            - bool
            - uint64
            - int8
            - int16
            - int32
            - uint8
            - uint16
            - uint32
            - datetime
          description: Metadata type to set for the field

    PostCommitVolumes:
      type: object
      additionalProperties:
        type: object
        additionalProperties:
          $ref: '#/components/schemas/Volumes'
      description: Post-commit volumes grouped by account address, then by asset

    Volumes:
      type: object
      required:
        - input
        - output
      properties:
        input:
          type: string
          description: Total amount received (as big integer string)
        output:
          type: string
          description: Total amount sent (as big integer string)

    MirrorSourceConfig:
      type: object
      description: Configuration for the mirror source (required when mode is MIRROR)
      required:
        - ledgerName
      properties:
        ledgerName:
          type: string
          description: Name of the source ledger in the v2 system
        type:
          type: string
          enum:
            - http
            - postgres
          default: http
          description: Source type (defaults to "http" if omitted)
        baseUrl:
          type: string
          description: Base URL of the v2 API (required for HTTP source)
        oauth2ClientId:
          type: string
          description: OAuth2 client ID for the v2 API (HTTP source only)
        oauth2ClientSecret:
          type: string
          description: OAuth2 client secret for the v2 API (HTTP source only)
        oauth2TokenEndpoint:
          type: string
          description: OAuth2 token endpoint URL (HTTP source only)
        oauth2Scopes:
          type: array
          items:
            type: string
          description: OAuth2 scopes (HTTP source only)
        dsn:
          type: string
          description: PostgreSQL connection string (required for PostgreSQL source)
        batchSize:
          type: integer
          minimum: 0
          default: 0
          description: Max logs per batch (0 = server default 100, capped by server's --mirror-max-batch-size)
        rewriteRules:
          type: array
          items:
            $ref: '#/components/schemas/MirrorRewriteRule'
          description: >
            Mirror rewrite rules applied, in order, to every mirror log entry as
            v2 logs are translated into v3 orders. Each rule is scoped to exactly
            one variant of the log's `data` oneof, with a CEL `match` predicate
            and a list of typed actions.

    MirrorRewriteRule:
      type: object
      description: >
        Transforms a mirror log entry during v2→v3 translation. Exactly one
        scope field (createdTransaction, revertedTransaction, savedMetadata,
        deletedMetadata, or anyVariant) must be set. That scope determines both
        the CEL type of `log` in the rule's `match` and the set of actions the
        rule may carry. When `stop` is true and the rule matches (scope +
        predicate), no further rules are evaluated. Rewriting is a
        deterministic, translation-time projection; the source v2 ledger is
        never modified.
      properties:
        createdTransaction:
          $ref: '#/components/schemas/CreatedTransactionRule'
        revertedTransaction:
          $ref: '#/components/schemas/RevertedTransactionRule'
        savedMetadata:
          $ref: '#/components/schemas/SavedMetadataRule'
        deletedMetadata:
          $ref: '#/components/schemas/DeletedMetadataRule'
        anyVariant:
          $ref: '#/components/schemas/AnyVariantRule'
        stop:
          type: boolean

    CreatedTransactionRule:
      type: object
      description: >
        Rule scoped to MirrorCreatedTransaction. Inside `match`, `log` is the
        created-transaction proto directly (e.g. `log.metadata["k"]`).
      properties:
        match:
          type: string
        actions:
          type: array
          items:
            $ref: '#/components/schemas/CreatedTransactionAction'

    RevertedTransactionRule:
      type: object
      properties:
        match:
          type: string
        actions:
          type: array
          items:
            $ref: '#/components/schemas/RevertedTransactionAction'

    SavedMetadataRule:
      type: object
      properties:
        match:
          type: string
        actions:
          type: array
          items:
            $ref: '#/components/schemas/SavedMetadataAction'

    DeletedMetadataRule:
      type: object
      properties:
        match:
          type: string
        actions:
          type: array
          items:
            $ref: '#/components/schemas/DeletedMetadataAction'

    AnyVariantRule:
      type: object
      description: >
        Rule scoped to every variant. `log` is the full MirrorLogEntry — use
        `has(log.<variant>)` guards to read variant-specific fields.
      properties:
        match:
          type: string
        actions:
          type: array
          items:
            $ref: '#/components/schemas/AnyVariantAction'

    CreatedTransactionAction:
      type: object
      description: Exactly one field must be set.
      properties:
        rewriteAddress:
          $ref: '#/components/schemas/RewriteAddressAction'
        setMetadata:
          $ref: '#/components/schemas/SetMetadataAction'
        deleteMetadata:
          $ref: '#/components/schemas/DeleteMetadataAction'
        setAccountMetadata:
          $ref: '#/components/schemas/SetAccountMetadataAction'
        deleteAccountMetadata:
          $ref: '#/components/schemas/DeleteAccountMetadataAction'
        setAccountMetadataFromAddress:
          $ref: '#/components/schemas/SetAccountMetadataFromAddressAction'
        drop:
          $ref: '#/components/schemas/DropAction'

    RevertedTransactionAction:
      type: object
      properties:
        rewriteAddress:
          $ref: '#/components/schemas/RewriteAddressAction'
        setMetadata:
          $ref: '#/components/schemas/SetMetadataAction'
        deleteMetadata:
          $ref: '#/components/schemas/DeleteMetadataAction'
        drop:
          $ref: '#/components/schemas/DropAction'

    SavedMetadataAction:
      type: object
      properties:
        rewriteAddress:
          $ref: '#/components/schemas/RewriteAddressAction'
        setMetadata:
          $ref: '#/components/schemas/SetMetadataAction'
        deleteMetadata:
          $ref: '#/components/schemas/DeleteMetadataAction'
        drop:
          $ref: '#/components/schemas/DropAction'

    DeletedMetadataAction:
      type: object
      properties:
        rewriteAddress:
          $ref: '#/components/schemas/RewriteAddressAction'
        drop:
          $ref: '#/components/schemas/DropAction'

    AnyVariantAction:
      type: object
      properties:
        rewriteAddress:
          $ref: '#/components/schemas/RewriteAddressAction'
        drop:
          $ref: '#/components/schemas/DropAction'

    RewriteAddressAction:
      type: object
      required: [pattern, replacement]
      properties:
        pattern:
          type: string
          description: RE2 pattern (validated at admission).
        replacement:
          type: string

    SetMetadataAction:
      type: object
      description: >
        `value` is a literal metadata string; `value_expr` is a CEL expression
        typed against the current variant and evaluated at commit time (e.g.
        `log.reference`). Exactly one of the two should be set; if neither is
        set the value defaults to the empty string. Optional `type` coerces
        the produced string into a typed MetadataValue via the platform
        conversion matrix — one of "string" (default), "int64", "bool",
        "uint64", "int8"/"int16"/"int32", "uint8"/"uint16"/"uint32",
        "datetime".
      required: [key]
      properties:
        key:
          type: string
        value:
          type: string
        value_expr:
          type: string
        type:
          type: string

    DeleteMetadataAction:
      type: object
      required: [key]
      properties:
        key:
          type: string

    SetAccountMetadataAction:
      type: object
      description: >
        See SetMetadataAction for the literal-vs-CEL and `type` semantics.
      required: [account, key]
      properties:
        account:
          type: string
        key:
          type: string
        value:
          type: string
        value_expr:
          type: string
        type:
          type: string

    DeleteAccountMetadataAction:
      type: object
      required: [account, key]
      properties:
        account:
          type: string
        key:
          type: string

    SetAccountMetadataFromAddressAction:
      type: object
      description: >
        For every posting address matching `pattern`, iterate every entry in
        `replacements` and set accountMetadata[address][key] to the RE2
        replacement of the address. Each replacement carries an optional
        metadata `type` token (same tokens as SetMetadataAction.type).
      required: [pattern, replacements]
      properties:
        pattern:
          type: string
        replacements:
          type: array
          items:
            $ref: '#/components/schemas/SetAccountMetadataFromAddressReplacement'

    SetAccountMetadataFromAddressReplacement:
      type: object
      required: [key, replacement]
      properties:
        key:
          type: string
        replacement:
          type: string
        type:
          type: string

    DropAction:
      type: object
      description: Turns the entry into a fill-gap that preserves log-ID and tx-ID continuity.

    SaveNumscriptRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: The numscript source code
        version:
          type: string
          description: |
            Semver version string (e.g. "1.0.0") or the special value "latest".
            - A semver string creates a new version. Fails if the version already exists.
            - "latest" overwrites the content of the current latest version.
            - If omitted or empty, defaults to "latest".
          example: "1.0.0"

    NumscriptInfo:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the numscript
        content:
          type: string
          description: The numscript source code
        version:
          type: string
          description: Semver version string (e.g. "1.0.0")
          example: "1.0.0"
        createdAt:
          type: string
          format: date-time
          description: Creation/update timestamp (ISO 8601 format)
        ledger:
          type: string
          description: Ledger name this numscript belongs to

    PromoteLedgerResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerInfo'

    GetNumscriptResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/NumscriptInfo'

    ListNumscriptsResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/NumscriptInfo'
          description: List of all numscripts
          nullable: true

    TemplateUsage:
      type: object
      required:
        - count
      properties:
        count:
          type: integer
          format: int64
          minimum: 0
          description: |
            Number of times the template has been invoked. `0` means never invoked (or the
            usagebuilder has not yet caught up to any invocation on this replica).
        lastUsed:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp of the most recent invocation (ISO 8601). Absent when `count` is 0.

    GetTemplateUsageResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/TemplateUsage'

    ChartOfAccounts:
      type: object
      description: A suggested chart of accounts based on account analysis
      properties:
        accounts:
          type: array
          items:
            type: object
            properties:
              pattern:
                type: string
                description: Account name pattern
              description:
