        '201':
          description: Account type added successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
    get:
      summary: List account types
      description: |
        Returns all account types defined on a ledger, sorted by name.
        Requires `accounts:read` scope.
      operationId: listAccountTypes
      tags:
        - Account Types
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
      responses:
        '200':
          description: Account types retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAccountTypesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /{ledgerName}/account-types/default-enforcement-mode:
    put:
      summary: Set default enforcement mode
      description: |
        Sets the default enforcement mode for accounts that do not match any defined
        account type. Must be STRICT or AUDIT. Requires `metadata:write` scope.
      operationId: setDefaultEnforcementMode
      tags:
        - Account Types
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetDefaultEnforcementModeRequest'
      responses:
        '204':
          description: Default enforcement mode set successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /{ledgerName}/account-types/{typeName}:
    get:
      summary: Get an account type
      description: Retrieves a specific account type by name from a ledger. Requires `accounts:read` scope.
      operationId: getAccountType
      tags:
        - Account Types
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/TypeName'
      responses:
        '200':
          description: Account type retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAccountTypeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
    delete:
      summary: Remove an account type
      description: Removes an account type from a ledger's chart of accounts. Requires `metadata:write` scope.
      operationId: removeAccountType
      tags:
        - Account Types
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/TypeName'
      responses:
        '204':
          description: Account type removed successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT token issued by a trusted OIDC provider. Required when the server
        is started with `--auth-enabled`. Scopes: `ledger:read` (read operations),
        `ledger:write` (write operations), `ledger:admin` (cluster operations).

  parameters:
    LedgerName:
      name: ledgerName
      in: path
      required: true
      schema:
        type: string
      description: Name of the ledger

    TransactionId:
      name: transactionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Transaction ID

    AccountAddress:
      name: address
      in: path
      required: true
      schema:
        type: string
      description: Account address

    MetadataKey:
      name: key
      in: path
      required: true
      schema:
        type: string
      description: Metadata key

    TargetType:
      name: targetType
      in: path
      required: true
      schema:
        type: string
        enum:
          - account
          - transaction
          - ledger
      description: Target type (account, transaction, or ledger)

    QueryName:
      name: queryName
      in: path
      required: true
      schema:
        type: string
      description: Prepared query name

    TypeName:
      name: typeName
      in: path
      required: true
      schema:
        type: string
      description: Account type name

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 256
      description: Idempotency key for the request

  responses:
    ServiceUnavailable:
      description: Service unavailable (no leader available)
      headers:
        Retry-After:
          description: Number of seconds to wait before retrying the request
          schema:
            type: integer
            format: int32
            minimum: 1
            example: 1
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Authentication required (missing or invalid JWT token)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Insufficient permissions (missing required scope)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Conflict (e.g. idempotency key conflict, ledger deleted)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    MethodNotAllowed:
      description: Method not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ChartViolation:
      type: object
      description: A chart of accounts violation reported in AUDIT enforcement mode
      required:
        - type
        - message
      properties:
        type:
          type: string
          description: The type of violation
        message:
          type: string
          description: Human-readable description of the violation
        account:
          type: string
          description: The account address that caused the violation

    MetadataValue:
      description: A typed metadata value (string, integer, boolean, or null). String values must not contain NUL bytes.
      nullable: true
      oneOf:
        - type: string
          pattern: '^[^\u0000]*$'
          description: Metadata string value without NUL bytes
        - type: integer
          format: int64
        - type: boolean

    CreateLedgerRequest:
      type: object
      properties:
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Optional metadata for the ledger (supports typed values)
        mode:
          type: string
          enum:
            - NORMAL
            - MIRROR
          default: NORMAL
          description: Ledger mode. MIRROR creates a read-only ledger that syncs from an external v2 source.
        mirrorSource:
          $ref: '#/components/schemas/MirrorSourceConfig'

    CreateLedgerResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerInfo'

    GetLedgerResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerInfo'

    ListAllLedgersResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LedgerInfo'
          description: List of all ledgers in the cluster
          nullable: true

    LedgerInfo:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the ledger
        created_at:
          type: string
          format: date-time
          description: Creation timestamp (ISO 8601 format)
        deleted_at:
          type: string
          format: date-time
          description: Soft delete timestamp (null if not deleted)
          nullable: true
        metadata_schema:
          type: object
          description: Per-key metadata type declarations
          nullable: true
        mode:
          type: string
          enum:
            - NORMAL
            - MIRROR
          description: Ledger mode (NORMAL or MIRROR)
        mirror_source:
          $ref: '#/components/schemas/MirrorSourceConfig'
        mirror_sync_progress:
          $ref: '#/components/schemas/MirrorSyncProgress'
        builtin_indexes:
          type: object
          description: Built-in transaction field index config
          nullable: true
        log_builtin_indexes:
          type: object
          description: Built-in log field index config
          nullable: true
        account_types:
          type: object
          description: Per-type account address validation
          additionalProperties:
            type: object
            properties:
              name:
                type: string
              pattern:
                type: string
              persistence:
                type: string
                enum: [NORMAL, EPHEMERAL, TRANSIENT]
                description: |
                  NORMAL: fully persisted (default).
                  EPHEMERAL: persisted, purged when zero balance.
                  TRANSIENT: never persisted, must be zero at end of batch.
          nullable: true
        default_enforcement_mode:
          type: string
          description: Default enforcement for unmatched accounts

    MirrorSyncProgress:
      type: object
      description: Sync progress for MIRROR ledgers (populated at read time)
      required:
        - state
        - cursor
        - sourceLogCount
        - remainingLogs
      properties:
        state:
          type: string
          enum:
            - SYNCING
            - FOLLOWING
          description: Current sync state (SYNCING = catching up, FOLLOWING = up to date)
        cursor:
          type: integer
          format: uint64
          minimum: 0
          description: Last ingested v2 log ID
        sourceLogCount:
          type: integer
          format: uint64
          minimum: 0
          description: Latest known log ID in the v2 source
        remainingLogs:
          type: integer
          format: uint64
          minimum: 0
          description: Number of remaining logs to sync (sourceLogCount - cursor)
        error:
          $ref: '#/components/schemas/MirrorSyncError'

    MirrorSyncError:
      type: object
      description: Most recent mirror sync error (null if healthy)
      properties:
        message:
          type: string
          description: Error message
        occurredAt:
          type: string
          format: date-time
          description: When the error occurred

    CreateTransactionRequest:
      type: object
      description: |
        A transaction must declare exactly one content source: explicit
        `postings`, an inline `script`, or a `scriptReference`. The
        `postings` array cannot be combined with `script` or
        `scriptReference`. Idempotency is controlled exclusively via the
        `Idempotency-Key` HTTP header — there is no body-level key.
      properties:
        accountMetadata:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              $ref: '#/components/schemas/MetadataValue'
          description: Metadata for accounts involved in the transaction (supports typed values)
        timestamp:
          type: string
          format: date-time
          description: Transaction timestamp (ISO 8601 format). If not provided, current time is used.
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Transaction metadata (supports typed values)
        reference:
          type: string
          description: Transaction reference
        postings:
          type: array
          items:
            $ref: '#/components/schemas/PostingRequest'
          description: List of postings for the transaction. Mutually exclusive with `script` and `scriptReference`.
        script:
          $ref: '#/components/schemas/Script'
          description: Inline Numscript to execute. Mutually exclusive with `postings` and `scriptReference`.
        scriptReference:
          $ref: '#/components/schemas/ScriptReference'
          description: Reference to a numscript saved in the ledger's library. Mutually exclusive with `postings` and `script`.
        expandVolumes:
          type: boolean
          default: false
          description: When true, include post-commit volumes (per account/asset) in the response

    PostingRequest:
      type: object
      required:
        - source
        - destination
        - amount
        - asset
      properties:
        source:
          type: string
          description: Source account address
        destination:
          type: string
          description: Destination account address
        amount:
          type: integer
          format: bigint
          description: Amount as a big integer
        asset:
          type: string
          description: Asset identifier

    Script:
      type: object
      required:
        - plain
      properties:
        plain:
          type: string
          description: The numscript source code
        vars:
          type: object
          additionalProperties:
            type: string
          description: Variables to pass to the script

    ScriptReference:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the numscript in the ledger's library
        version:
          type: string
          description: Optional semver constraint. Empty means latest.
        vars:
          type: object
          additionalProperties:
            type: string
          description: Variables to pass to the referenced script

    BulkElement:
      type: object
      required:
        - action
        - data
      properties:
        action:
          type: string
          enum:
            - CREATE_TRANSACTION
            - ADD_METADATA
            - REVERT_TRANSACTION
            - DELETE_METADATA
          description: The type of operation to perform
        ik:
          type: string
          maxLength: 256
          description: Idempotency key for this operation
        data:
          oneOf:
            - $ref: '#/components/schemas/CreateTransactionRequest'
            - $ref: '#/components/schemas/AddMetadataRequest'
            - $ref: '#/components/schemas/RevertTransactionRequest'
            - $ref: '#/components/schemas/DeleteMetadataRequest'
          description: Operation-specific data

    AddMetadataRequest:
      type: object
      required:
        - targetType
        - metadata
      properties:
        targetType:
          type: string
          enum:
            - ACCOUNT
            - TRANSACTION
          description: Type of target (account or transaction)
        targetId:
          oneOf:
            - type: string
            - type: integer
          description: |
            ID of the target (account address or transaction ID).
            For TRANSACTION targets, this is mutually exclusive with `targetReference`.
            Required for ACCOUNT targets.
        targetReference:
          type: string
          description: |
            Business reference of the transaction to target. Only valid when
            `targetType` is TRANSACTION. Mutually exclusive with `targetId`.
            Resolved by the server against the transaction reference index
            (visible across the current batch).
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Metadata to add (supports typed values)

    RevertTransactionRequest:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: |
            Transaction ID to revert. Mutually exclusive with `reference`.
            Exactly one of `id` or `reference` must be set.
        reference:
          type: string
          description: |
            Business reference of the transaction to revert. Resolved by the
            server against the transaction reference index of a previously
            committed batch. Mutually exclusive with `id`. Exactly one of
            `id` or `reference` must be set.
        force:
          type: boolean
          default: false
          description: Force revert even if accounts don't have sufficient funds
        atEffectiveDate:
          type: boolean
          default: false
          description: Set the timestamp of the reverted transaction to the original transaction timestamp
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Metadata for the revert transaction (supports typed values)
        expandVolumes:
          type: boolean
          default: false
          description: When true, include post-commit volumes (per account/asset) in the response

    RevertTransactionRequestBody:
      type: object
      properties:
        force:
          type: boolean
          default: false
          description: Force revert even if accounts don't have sufficient funds
        atEffectiveDate:
          type: boolean
          default: false
          description: Set the timestamp of the reverted transaction to the original transaction timestamp
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Metadata for the revert transaction (supports typed values)
        expandVolumes:
          type: boolean
          default: false
          description: When true, include post-commit volumes (per account/asset) in the response

    DeleteMetadataRequest:
      type: object
      required:
        - targetType
        - key
      properties:
        targetType:
          type: string
          enum:
            - ACCOUNT
            - TRANSACTION
          description: Type of target (account or transaction)
        targetId:
          oneOf:
            - type: string
            - type: integer
          description: |
            ID of the target (account address or transaction ID).
            For TRANSACTION targets, this is mutually exclusive with `targetReference`.
            Required for ACCOUNT targets.
        targetReference:
          type: string
          description: |
            Business reference of the transaction to target. Only valid when
            `targetType` is TRANSACTION. Mutually exclusive with `targetId`.
        key:
          type: string
          description: Metadata key to delete

    BulkResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BulkResult'
        errorCode:
          type: string
        errorMessage:
          type: string

    BulkResult:
      type: object
      properties:
        responseType:
          type: string
          description: Type of response (action name or ERROR)
        logID:
          type: integer
          format: int64
          description: Log ID of the applied operation (0 on error)
        errorCode:
          type: string
          description: Error code (present only on error)
        errorDescription:
          type: string
          description: Error description (present only on error)
        data:
          description: Operation result data (transaction object for CREATE_TRANSACTION, null for others)
          nullable: true
          description: Log ID of the operation

    CreateTransactionResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          properties:
            transaction:
              $ref: '#/components/schemas/TransactionResponse'
            accountMetadata:
              type: object
              additionalProperties:
                type: object
              description: Metadata for accounts involved in the transaction
            postCommitVolumes:
              $ref: '#/components/schemas/PostCommitVolumes'
              description: Post-commit volumes per account/asset (only present when expandVolumes is true)
            periodId:
              type: integer
              format: uint64
              description: Period that was OPEN when this transaction was created
            previousAccountMetadata:
              type: object
              additionalProperties:
                type: object
              description: Previous account metadata values (for index replay)
            warnings:
              type: array
              items:
                $ref: '#/components/schemas/ChartViolation'
              description: Chart of accounts violations (AUDIT mode only, empty in STRICT mode)

    GetTransactionResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/TransactionResponse'

    GetAccountResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/Account'

    GetLedgerStatsResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerStats'

    LedgerStats:
      type: object
      required:
        - accountCount
        - transactionCount
      properties:
        accountCount:
          type: integer
          format: uint64
          minimum: 0
          description: Number of accounts in the ledger
        transactionCount:
          type: integer
          format: uint64
          minimum: 0
          description: Number of transactions in the ledger

    Account:
      type: object
      required:
        - address
      properties:
        address:
          type: string
          description: Account address
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Account metadata (typed values)
        volumes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/VolumesWithBalance'
          description: Account volumes per asset (input, output, balance)

    VolumesWithBalance:
      type: object
      required:
        - input
        - output
        - balance
      properties:
        input:
          type: string
          description: Total amount received (as big integer string)
        output:
          type: string
          description: Total amount sent (as big integer string)
        balance:
          type: string
          description: Current balance (input - output, as big integer string)

    AggregateVolumesResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/AggregateVolumesData'

    AggregateVolumesData:
      type: object
      required:
        - volumes
      properties:
        volumes:
          type: array
          items:
            $ref: '#/components/schemas/AggregatedVolume'
          description: Flat aggregated volumes per asset
        groups:
          type: array
          items:
            $ref: '#/components/schemas/GroupedAggregateResult'
          description: Per-prefix aggregated volumes (present when groupByPrefixes is set)

    AggregatedVolume:
      type: object
      required:
        - asset
        - input
        - output
        - balance
      properties:
        asset:
          type: string
          description: Asset identifier (e.g. "USD/2")
        input:
          type: string
          description: Total amount received (as big integer string)
        output:
          type: string
          description: Total amount sent (as big integer string)
        balance:
          type: string
          description: Net balance (input - output, as big integer string)

    GroupedAggregateResult:
      type: object
      required:
        - prefix
        - volumes
      properties:
        prefix:
          type: string
          description: Account prefix this group matches
        volumes:
          type: array
          items:
            $ref: '#/components/schemas/AggregatedVolume'
          description: Aggregated volumes for accounts matching this prefix

    TransactionResponse:
      type: object
      required:
        - id
      properties:
        postings:
          type: array
          items:
            $ref: '#/components/schemas/PostingResponse'
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
        timestamp:
          type: string
          format: date-time
          description: Transaction timestamp (ISO 8601 format)
        reference:
          type: string
        id:
          type: integer
          format: int64
          description: Transaction ID (assigned by the system)
        reverted:
          type: boolean
          description: Whether this transaction has been reverted
        inserted_at:
          type: string
          format: date-time
          description: When the transaction was inserted into the ledger
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        reverted_at:
          type: string
          format: date-time
          description: When the transaction was reverted (null if not reverted)
          nullable: true

    RevertedTransaction:
      type: object
      properties:
        revertedTransactionId:
          type: integer
          format: uint64
          description: ID of the original transaction that was reverted
        revertTransaction:
          $ref: '#/components/schemas/TransactionResponse'
          description: The new transaction that reverses the original transaction
        postCommitVolumes:
          $ref: '#/components/schemas/PostCommitVolumes'
          description: Post-commit volumes per account/asset (only present when expandVolumes is true)
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ChartViolation'
          description: Chart of accounts violations (AUDIT mode only, empty in STRICT mode)

    RevertedTransactionResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/RevertedTransaction'

    PostingResponse:
      type: object
      required:
        - source
        - destination
        - amount
        - asset
      properties:
        source:
          type: string
        destination:
          type: string
        amount:
          type: integer
          format: bigint
          description: Amount as a big integer
        asset:
          type: string

    LedgerClusterStateResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - state
            - localNode
            - innerState
          properties:
            state:
              type: string
              enum: [Leader, Follower, Candidate, PreCandidate, Unknown]
              description: Current state of the local node
            leader:
              type: integer
              format: int64
              minimum: 0
              description: ID of the current leader (0 if no leader)
            localNode:
              type: integer
              format: int64
              minimum: 0
              description: ID of the local node
            nodes:
              type: array
              items:
                $ref: '#/components/schemas/NodeInfo'
              description: List of all nodes in the cluster
            raftStatus:
              $ref: '#/components/schemas/RaftStatus'
              description: Complete Raft status information
            innerState:
              $ref: '#/components/schemas/LedgerState'
              description: State contained in the FSM

    SystemState:
      type: object
      required:
        - ledgers
      properties:
        ledgers:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/LedgerState'
          description: Map of ledger name to ledger state

    LedgerState:
      type: object
      required:
        - ledgerInfo
        - nextLogId
        - nextTransactionId
      properties:
        ledgerInfo:
          $ref: '#/components/schemas/LedgerInfo'
        nextLogId:
          type: integer
          format: uint64
          minimum: 0
          description: Next log ID to be assigned
        nextTransactionId:
          type: integer
          format: uint64
          minimum: 0
          description: Next transaction ID to be assigned

    NodeInfo:
      type: object
      required:
        - id
        - address
        - suffrage
      properties:
        id:
          type: integer
          format: int64
          minimum: 0
          description: Node ID
        address:
          type: string
          description: Node address
        suffrage:
          type: string
          enum: [Voter, Nonvoter, Learner]
          description: Node suffrage (Voter, Nonvoter, or Learner)

    ClusterState:
      type: object
      required:
        - state
        - localNode
      properties:
        state:
          type: string
          description: Current state of the Raft node (Leader, Follower, Candidate, PreCandidate, Unknown)
        leader:
          type: integer
          format: int64
          minimum: 0
          description: ID of the current leader (0 if no leader)
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/NodeInfo'
          description: List of all nodes in the cluster
        localNode:
          type: integer
          format: int64
          minimum: 0
          description: ID of the local node
        raftStatus:
          $ref: '#/components/schemas/RaftStatus'
          description: Complete Raft status information

    RaftStatus:
      type: object
      required:
        - state
        - term
        - leader
        - applied
        - commit
        - lastIndex
        - vote
      properties:
        state:
          type: string
          enum: [Leader, Follower, Candidate, PreCandidate, Unknown]
          description: Current Raft state
        term:
          type: integer
          format: int64
          minimum: 0
          description: Current term
        leader:
          type: integer
          format: int64
          minimum: 0
          description: ID of the current leader (0 if no leader)
        applied:
          type: integer
          format: int64
          minimum: 0
          description: Index of the last applied entry
        commit:
          type: integer
          format: int64
          minimum: 0
          description: Index of the last committed entry
        lastIndex:
          type: integer
          format: int64
          minimum: 0
          description: Index of the last entry in the log
        vote:
          type: integer
          format: int64
          minimum: 0
          description: ID of the node that received the vote (0 if no vote)
        progress:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ProgressInfo'
          description: Progress information for each node in the cluster

    ProgressInfo:
      type: object
      required:
        - match
        - next
        - state
        - pendingSnapshot
        - recentActive
        - probeSent
        - isPaused
      properties:
        match:
          type: integer
          format: int64
          minimum: 0
          description: Match index - highest log entry known to be replicated to this node
        next:
          type: integer
          format: int64
          minimum: 0
          description: Next index - index of the next log entry to send to this node
        state:
          type: string
          enum: [Probe, Replicate, Snapshot, Unknown]
          description: State of the replication (Probe, Replicate, or Snapshot)
        pendingSnapshot:
          type: integer
          format: int64
          minimum: 0
          description: Index of pending snapshot (0 if none)
        recentActive:
          type: boolean
          description: Whether this node is recently active
        probeSent:
          type: boolean
          description: Whether probe message was sent (paused)
        isPaused:
          type: boolean
          description: Whether this node is paused

    InspectSummaryResponse:
      type: object
      required:
        - cardinality
        - entitiesWithKey
        - entitiesWithNull
      properties:
        cardinality:
          type: integer
          format: uint64
          description: Number of distinct values
        min:
          description: Minimum value (null if index is empty)
        max:
          description: Maximum value (null if index is empty)
        entitiesWithKey:
          type: integer
          format: uint64
          description: Number of entities that have this metadata key set (non-null)
        entitiesWithNull:
          type: integer
          format: uint64
          description: Number of entities with a null value for this key

    InspectDistinctValuesResponse:
      type: object
      required:
        - values
        - hasMore
      properties:
        values:
          type: array
          items: {}
          description: Distinct values in sorted order
        hasMore:
          type: boolean
          description: Whether more values are available
        nextCursor:
          type: string
          description: Pagination cursor for the next page

    InspectFacetsResponse:
      type: object
      required:
        - facets
        - hasMore
      properties:
        facets:
          type: array
          items:
            $ref: '#/components/schemas/InspectFacet'
          description: Facets sorted by value
        hasMore:
          type: boolean
          description: Whether more facets are available
        nextCursor:
          type: string
          description: Pagination cursor for the next page

    InspectFacet:
      type: object
      required:
        - value
        - count
      properties:
        value:
          description: The metadata value
        count:
          type: integer
          format: uint64
          description: Number of entities with this value

    MetadataSchemaStatusResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - accountFields
            - transactionFields
            - ledgerFields
          properties:
            accountFields:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataFieldStatus'
              description: Account metadata field statuses
            transactionFields:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataFieldStatus'
              description: Transaction metadata field statuses
            ledgerFields:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataFieldStatus'
              description: Ledger metadata field statuses

    MetadataFieldStatus:
      type: object
      required:
        - declaredType
        - status
      properties:
        declaredType:
          type: string
          enum:
            - string
            - int64
            - bool
            - uint64
            - int8
            - int16
            - int32
            - uint8
            - uint16
            - uint32
          description: Declared type for this metadata field
        status:
          type: string
          enum:
            - COMPLETE
            - CONVERTING
          description: Conversion status for this field

    SetMetadataTypeRequest:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - string
            - int64
            - bool
            - uint64
            - int8
            - int16
            - int32
            - uint8
            - uint16
            - uint32
          description: Metadata type to set for the field

    PostCommitVolumes:
      type: object
      additionalProperties:
        type: object
        additionalProperties:
          $ref: '#/components/schemas/Volumes'
      description: Post-commit volumes grouped by account address, then by asset

    Volumes:
      type: object
      required:
        - input
        - output
      properties:
        input:
          type: string
          description: Total amount received (as big integer string)
        output:
          type: string
          description: Total amount sent (as big integer string)

    MirrorSourceConfig:
      type: object
      description: Configuration for the mirror source (required when mode is MIRROR)
      required:
        - ledgerName
      properties:
        ledgerName:
          type: string
          description: Name of the source ledger in the v2 system
        type:
          type: string
          enum:
            - http
            - postgres
          default: http
          description: Source type (defaults to "http" if omitted)
        baseUrl:
          type: string
          description: Base URL of the v2 API (required for HTTP source)
        oauth2ClientId:
          type: string
          description: OAuth2 client ID for the v2 API (HTTP source only)
        oauth2ClientSecret:
          type: string
          description: OAuth2 client secret for the v2 API (HTTP source only)
        oauth2TokenEndpoint:
          type: string
          description: OAuth2 token endpoint URL (HTTP source only)
        oauth2Scopes:
          type: array
          items:
            type: string
          description: OAuth2 scopes (HTTP source only)
        dsn:
          type: string
          description: PostgreSQL connection string (required for PostgreSQL source)
        batchSize:
          type: integer
          minimum: 0
          default: 0
          description: Max logs per batch (0 = server default 100, capped by server's --mirror-max-batch-size)

    SaveNumscriptRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: The numscript source code
        version:
          type: string
          description: |
            Semver version string (e.g. "1.0.0") or the special value "latest".
            - A semver string creates a new version. Fails if the version already exists.
            - "latest" overwrites the content of the current latest version.
            - If omitted or empty, defaults to "latest".
          example: "1.0.0"

    NumscriptInfo:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the numscript
        content:
          type: string
          description: The numscript source code
        version:
          type: string
          description: Semver version string (e.g. "1.0.0")
          example: "1.0.0"
        created_at:
          type: string
          format: date-time
          description: Creation/update timestamp (ISO 8601 format)
        ledger:
          type: string
          description: Ledger name this numscript belongs to

    PromoteLedgerResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerInfo'

    GetNumscriptResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/NumscriptInfo'

    ListNumscriptsResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/NumscriptInfo'
          description: List of all numscripts
          nullable: true

    ChartOfAccounts:
      type: object
      description: A suggested chart of accounts based on account analysis
      properties:
        accounts:
          type: array
          items:
            type: object
            properties:
              pattern:
                type: string
                description: Account name pattern
              description:
                type: string
                description: Suggested description for this account group

    AnalyzeAccountsResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          properties:
            patterns:
              type: array
              items:
                $ref: '#/components/schemas/AccountPattern'
            totalAccounts:
              type: integer
              format: int64

    AccountPattern:
      type: object
      properties:
        pattern:
          type: string
        accountCount:
          type: integer
          format: int64
        assets:
          type: array
          items:
            type: string
        metadataKeys:
          type: array
          items:
            type: string
        segments:
          type: array
          items:
            $ref: '#/components/schemas/PatternSegment'

    PatternSegment:
      type: object
      properties:
        position:
          type: integer
          format: int32
        type:
          type: string
          enum: [fixed, variable]
        fixedValue:
          type: string
        variableName:
          type: string
        inferredPattern:
          type: string
        uniqueValues:
          type: integer
          format: int64
        examples:
          type: array
          items:
            type: string

    AnalyzeTransactionsResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          properties:
            flowPatterns:
              type: array
              items:
                $ref: '#/components/schemas/FlowPattern'
            totalTransactions:
              type: integer
              format: int64
            totalReverted:
              type: integer
              format: int64

    FlowPattern:
      type: object
      properties:
        signature:
          type: string
          description: Canonical flow signature (e.g. "users:{id}:main->bank:fees[USD]")
        structure:
          type: string
          enum: [simple, multiSource, multiDestination, complex]
        transactionCount:
          type: integer
          format: int64
        postings:
          type: array
          items:
            $ref: '#/components/schemas/NormalizedPosting'
        temporal:
          $ref: '#/components/schemas/TemporalStats'
        volumeStats:
          type: array
          items:
            $ref: '#/components/schemas/AssetVolumeStats'
        metadataKeys:
          type: array
          items:
            type: string

    NormalizedPosting:
      type: object
      properties:
        sourcePattern:
          type: string
        destinationPattern:
          type: string
        asset:
          type: string

    TemporalStats:
      type: object
      properties:
        firstSeen:
          type: string
          format: date-time
        lastSeen:
          type: string
          format: date-time
        transactionsPerDay:
          type: number
          format: double
        peakHours:
          type: array
          items:
            $ref: '#/components/schemas/HourBucket'

    HourBucket:
      type: object
      properties:
        hour:
          type: integer
          format: int32
          minimum: 0
          maximum: 23
        count:
          type: integer
          format: int64

    AssetVolumeStats:
      type: object
      properties:
        asset:
          type: string
        totalVolume:
          type: string
        averageVolume:
          type: string
        minVolume:
          type: string
        maxVolume:
          type: string
        transactionCount:
          type: integer
          format: int64

    CreatePreparedQueryRequest:
      type: object
      required:
        - name
        - target
        - filter
      properties:
        name:
          type: string
          description: Unique name for the prepared query
        target:
          type: string
          enum:
            - ACCOUNTS
            - TRANSACTIONS
          description: Target entity type
        filter:
          $ref: '#/components/schemas/QueryFilter'

    UpdatePreparedQueryRequest:
      type: object
      required:
        - filter
      properties:
        filter:
          $ref: '#/components/schemas/QueryFilter'

    ExecutePreparedQueryRequest:
      type: object
      properties:
        parameters:
          type: object
          additionalProperties:
            type: string
          description: Parameter values for the query (substituted into filter placeholders)
        pageSize:
          type: integer
          format: int32
          description: Maximum number of results per page
        cursor:
          type: string
          description: Cursor for pagination (from previous response)
        minLogSequence:
          type: integer
          format: uint64
          description: Minimum log sequence the read index must have processed (freshness guarantee)
        mode:
          type: string
          enum:
            - LIST
            - AGGREGATE_VOLUMES
          description: Execution mode (default LIST)

    PreparedQueryResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/PreparedQuery'

    ListPreparedQueriesResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PreparedQuery'

    PreparedQuery:
      type: object
      required:
        - name
        - target
        - filter
      properties:
        name:
          type: string
          description: Query name
        target:
          type: string
          enum:
            - ACCOUNTS
            - TRANSACTIONS
          description: Target entity type
        filter:
          $ref: '#/components/schemas/QueryFilter'
        allowedModes:
          type: array
          items:
            type: string

    QueryFilter:
      type: object
      description: Recursive filter tree (AND/OR/NOT of field conditions and address matches)
      properties:
        and:
          type: array
          items:
            $ref: '#/components/schemas/QueryFilter'
        or:
          type: array
          items:
            $ref: '#/components/schemas/QueryFilter'
        not:
          $ref: '#/components/schemas/QueryFilter'
        match:
          type: object
          description: Field condition or address match

    ExecutePreparedQueryResponse:
      type: object
      properties:
        cursor:
          type: object
          properties:
            hasMore:
              type: boolean
            next:
              type: string
              description: Cursor to pass for the next page
            data:
              type: array
              items:
                type: string
              description: Entity IDs (account addresses or transaction IDs)
        aggregateResult:
          type: object
          properties:
            volumes:
              type: array
              items:
                type: object
                properties:
                  asset:
                    type: string
                  input:
                    type: string
                    description: Total input as big integer string
                  output:
                    type: string
                    description: Total output as big integer string

    HealthResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - status
          properties:
            status:
              type: string
              description: Health status (e.g. "ok")

    AddAccountTypeRequest:
      type: object
      required:
        - name
        - pattern
      properties:
        name:
          type: string
          description: Unique name for the account type
        pattern:
          type: string
          description: Account address pattern for validation (e.g. "users:*")

    AccountTypeInfo:
      type: object
      required:
        - name
        - pattern
      properties:
        name:
          type: string
          description: Account type name
        pattern:
          type: string
          description: Account address pattern

    ListAccountTypesResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - types
          properties:
            types:
              type: array
              items:
                $ref: '#/components/schemas/AccountTypeInfo'
              description: List of account types sorted by name

    GetAccountTypeResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/AccountTypeInfo'

    SetDefaultEnforcementModeRequest:
      type: object
      required:
        - enforcementMode
      properties:
        enforcementMode:
          type: string
          enum:
            - STRICT
            - AUDIT
          description: Default enforcement mode for accounts not matching any account type

    ErrorResponse:
      type: object
      required:
        - errorCode
        - errorMessage
      properties:
        errorCode:
          type: string
          description: Error code identifier
        errorMessage:
          type: string
          description: Human-readable error message
