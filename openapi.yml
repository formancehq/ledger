openapi: 3.0.3
info:
  title: Ledger v3 API
  description: API for the Ledger v3, a distributed accounting ledger with Raft consensus
  version: 1.0.0
  contact:
    name: Formance
    url: https://formance.com

servers:
  - url: http://localhost:9000
    description: Local development server

security:
  - BearerAuth: []
  - {}

paths:
  /v3/:
    get:
      summary: List all ledgers
      description: Returns a list of all ledgers in the cluster. Requires `ledger:read` scope.
      operationId: listAllLedgers
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      responses:
        '200':
          description: List of ledgers retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAllLedgersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /health:
    get:
      summary: Health check
      description: Returns the health status of the node. Returns 503 if the node is not connected to the cluster.
      operationId: health
      tags:
        - Health
      responses:
        '200':
          description: Node is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /livez:
    get:
      summary: Liveness probe
      description: Returns 200 as long as the process is alive. Suitable for Kubernetes liveness probes.
      operationId: livez
      tags:
        - Health
      responses:
        '200':
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /readyz:
    get:
      summary: Readiness probe
      description: |
        Returns 200 once the local Raft loop has started, regardless of whether
        a leader has been elected. Suitable for Kubernetes readiness probes and
        StatefulSet `OrderedReady` ordering: it is intentionally permissive so
        peer pods can be brought up during a cold start where quorum cannot
        form until they exist. Use `/clusterz` for the stricter
        cluster-availability signal.
      operationId: readyz
      tags:
        - Health
      responses:
        '200':
          description: Local Raft loop has started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /clusterz:
    get:
      summary: Cluster-availability probe
      description: |
        Returns 200 only when the node is part of a healthy cluster (Raft state
        healthy and a leader elected). Disk and clock skew gate writes (see
        admission), not cluster readiness. Returns 503 otherwise. Use this
        for external monitoring or any client that needs to wait until the node
        can actually serve cluster-dependent traffic. Kubernetes readiness
        probes should target `/readyz` instead — this endpoint MUST NOT gate
        StatefulSet ordering, otherwise the cluster cannot recover from a
        full-kill cold start.
      operationId: clusterz
      tags:
        - Health
      responses:
        '200':
          description: Node is part of a healthy cluster
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /_info:
    get:
      summary: Get server build information
      description: Returns the server build metadata (version, commit, build date, Go runtime version). Unauthenticated.
      operationId: info
      tags:
        - Health
      responses:
        '200':
          description: Server build information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerInfo'

  /v3/{ledgerName}:
    get:
      summary: Get a ledger
      description: Retrieves a ledger by its name. Requires `ledger:read` scope.
      operationId: getLedger
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
      responses:
        '200':
          description: Ledger retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLedgerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
    post:
      summary: Create a new ledger
      description: |
        Creates a new ledger with the specified name. Storage is configured at the server level.
        Each ledger has its own Raft group for data consistency. Requires `ledger:write` scope.

        The ledger name `_` is reserved: all system / non-ledger routes live
        under the `/v3/_/…` segment (e.g. `/v3/_/audit-entries`), so a ledger
        named `_` would be unreachable over REST. Creating it is rejected with a
        validation error.
      operationId: createLedger
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLedgerRequest'
      responses:
        '201':
          description: Ledger created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLedgerResponse'
          links:
            GetCreatedLedger:
              operationId: getLedger
              parameters:
                ledgerName: '$response.body#/data/name'
            DeleteCreatedLedger:
              operationId: deleteLedger
              parameters:
                ledgerName: '$response.body#/data/name'
            GetLedgerStats:
              operationId: getLedgerStats
              parameters:
                ledgerName: '$response.body#/data/name'
            CreateTransactionInLedger:
              operationId: createTransaction
              parameters:
                ledgerName: '$response.body#/data/name'
            ListLedgerAccounts:
              operationId: listAccounts
              parameters:
                ledgerName: '$response.body#/data/name'
            ListLedgerLogs:
              operationId: listLedgerLogs
              parameters:
                ledgerName: '$response.body#/data/name'
            SaveNumscriptInLedger:
              operationId: saveNumscript
              parameters:
                ledgerName: '$response.body#/data/name'
            BulkInLedger:
              operationId: bulkOperations
              parameters:
                ledgerName: '$response.body#/data/name'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
    delete:
      summary: Delete a ledger
      description: Deletes a ledger by its name. This operation removes the ledger and its associated Raft group from the cluster. Requires `ledger:write` scope.
      operationId: deleteLedger
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Ledger deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /v3/{ledgerName}/stats:
    get:
      summary: Get ledger statistics
      description: Returns aggregate statistics (account count, transaction count) for a ledger. Requires `ledger:read` scope.
      operationId: getLedgerStats
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
      responses:
        '200':
          description: Ledger statistics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLedgerStatsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /v3/{ledgerName}/logs:
    get:
      summary: List logs for a ledger
      description: |
        Lists log entries for a specific ledger, ordered by ledger-local log ID ascending.
        Requires the builtin `LOG` index to be enabled on the ledger via `CreateIndex`.
        Supports cursor pagination via the `after` query parameter. Requires `ledger:OpsRead` scope.
      operationId: listLedgerLogs
      tags:
        - Logs
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: pageSize
          in: query
          schema:
            type: integer
            format: uint32
            minimum: 0
            default: 0
          description: Maximum number of log entries to return (0 = no limit)
        - name: after
          in: query
          schema:
            type: integer
            format: uint64
            minimum: 0
          description: Ledger-local log ID to start after (exclusive, for cursor pagination)
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
          description: |
            Filter logs with date >= startDate (inclusive, RFC3339 format).
            Requires the builtin `LOG_DATE` index to be enabled on the ledger.
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
          description: |
            Filter logs with date < endDate (exclusive, RFC3339 format).
            Requires the builtin `LOG_DATE` index to be enabled on the ledger.
      responses:
        '200':
          description: Logs retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: System log entry (protobuf JSON representation)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /v3/_/audit-entries:
    get:
      summary: List audit entries
      description: |
        Lists audit trail entries (one per proposal, success or failure) across
        the whole bucket, ordered by audit sequence ascending. Audit reads are
        not ledger-scoped in the path — a single proposal can touch several
        ledgers — so ledger scope, outcome and other dimensions are expressed
        through the `filter` query parameter.

        This endpoint always performs a live, best-effort read. Unlike the gRPC
        `ListAuditEntries` surface, it does not expose the read-consistency
        options (pinned checkpoint reads, or a consistency-bound wait on the
        audit index): filtered reads are served by an asynchronous secondary
        index and may transiently omit very recent entries that are not yet
        indexed. A client that needs a pinned or consistency-bounded audit read
        must use the gRPC surface.

        Requires `ledger:AuditRead` scope.
      operationId: listAuditEntries
      tags:
        - Audit
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: pageSize
          in: query
          schema:
            type: integer
            format: uint32
            minimum: 0
            default: 0
          description: Maximum number of audit entries to return (0 = server default, capped at 1000)
        - name: after
          in: query
          schema:
            type: integer
            format: uint64
            minimum: 0
          description: Audit sequence to start after (exclusive, opaque cursor for pagination)
        - name: reverse
          in: query
          schema:
            type: boolean
            default: false
          description: Iterate newest-first (descending sequence) when true
        - name: filter
          in: query
          schema:
            type: string
          description: |
            Filter expression restricted to `audit[...]` conditions, using the
            shared filter grammar (the same one accepted by `ledgerctl audit
            list --filter`). Examples:
              - `audit[outcome] == failure`
              - `audit[ledger] == main`
              - `audit[order_type] in (create_transaction, revert_transaction)`
              - `audit[seq] between 1000 and 2000`
              - `audit[timestamp] >= "2023-11-14T22:13:20Z"`
            Supported fields: `seq`, `proposal_id`, `log_seq` (numeric);
            `timestamp` (RFC3339 or unix microseconds); `outcome`
            (success|failure), `ledger`, `caller_subject`, `order_type`
            (string). This is deliberately NOT the JSON QueryFilter DSL used by
            prepared queries, which cannot represent audit conditions.
      responses:
        '200':
          description: List of audit entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /v3/_/audit-entries/{sequence}:
    get:
      summary: Get an audit entry
      description: |
        Returns a single audit entry by its global sequence, with per-order
        `items` populated (the list endpoint omits `items` for compactness).
        Requires `ledger:AuditRead` scope.
      operationId: getAuditEntry
      tags:
        - Audit
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: sequence
          in: path
          required: true
          schema:
            type: integer
            format: uint64
            minimum: 0
          description: Audit entry sequence
      responses:
        '200':
          description: The audit entry
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuditEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /v3/{ledgerName}/promote:
    post:
      summary: Promote a mirror ledger
      description: |
        Promotes a mirror-mode ledger to normal mode. After promotion, the mirror sync
        worker is stopped and the ledger accepts direct write operations. Requires `ledger:write` scope.
      operationId: promoteLedger
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
      responses:
        '201':
          description: Ledger promoted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoteLedgerResponse'
        '400':
          description: Ledger is not in mirror mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /v3/{ledgerName}/transactions:
    post:
      summary: Create a new transaction
      description: Creates a new transaction in the specified ledger with the specified postings. Requires `ledger:write` scope.
      operationId: createTransaction
      tags:
        - Transactions
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Transaction created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTransactionResponse'
          links:
            GetCreatedTransaction:
              operationId: getTransaction
              parameters:
                ledgerName: '$request.path.ledgerName'
                transactionId: '$response.body#/data/transaction/id'
            RevertCreatedTransaction:
              operationId: revertTransaction
              parameters:
                ledgerName: '$request.path.ledgerName'
                transactionId: '$response.body#/data/transaction/id'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict (e.g. concurrent modification)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
    get:
      summary: List transactions for a ledger
      description: |
        Lists transactions for a specific ledger. The default order is
        newest-first (descending transaction id); pass `reverse=true` to
        get oldest-first (ascending). Supports cursor pagination via the
        `after` query parameter and optional date-range and reference
        filters. Requires `ledger:TransactionRead` scope.

        This is a live, best-effort read of the current committed state.
        Unlike the gRPC API, it does not accept read-consistency options
        (`checkpointId` / `minLogSequence`) to pin the read to a specific
        applied index — use gRPC for consistency-bounded / checkpoint-pinned
        reads. (Tracked follow-up, same carve-out as the audit reads.)
      operationId: listLedgerTransactions
      tags:
        - Transactions
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: pageSize
          in: query
          schema:
            type: integer
            format: uint32
            minimum: 0
            default: 0
        - name: after
          in: query
          schema:
            type: integer
            format: uint64
            minimum: 0
          description: Transaction id to start after (exclusive, for cursor pagination).
        - name: reverse
          in: query
          schema:
            type: boolean
            default: false
          description: |
            Reverse the default order. Default (`false`) returns
            newest-first (descending); `true` returns oldest-first
            (ascending). Mirrors the gRPC `ListTransactions` reverse
            flag semantic.
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
          description: |
            Filter transactions with timestamp >= startDate (inclusive, RFC3339 format).
            Requires the builtin `TX_BUILTIN_INDEX_TIMESTAMP` index to be enabled on the ledger.
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
          description: |
            Filter transactions with timestamp < endDate (exclusive, RFC3339 format).
            Requires the builtin `TX_BUILTIN_INDEX_TIMESTAMP` index to be enabled on the ledger.
        - name: reference
          in: query
          schema:
            type: string
          description: Filter by exact-match transaction reference.
      responses:
        '200':
          description: Transactions retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      description: Transaction (protobuf JSON representation)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /v3/{ledgerName}/transactions/{transactionId}:
    get:
      summary: Get a transaction
      description: Retrieves a transaction by its ID from the specified ledger. Requires `ledger:read` scope.
      operationId: getTransaction
      tags:
        - Transactions
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/TransactionId'
      responses:
        '200':
          description: Transaction retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTransactionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /v3/{ledgerName}/accounts:
    get:
      summary: List accounts
      description: Lists accounts in a ledger in alphabetical order with optional prefix filtering and cursor pagination. Requires `ledger:read` scope.
      operationId: listAccounts
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: pageSize
          in: query
          description: Maximum number of accounts to return (0 = no limit)
          schema:
            type: integer
            format: int32
        - name: after
          in: query
          description: Account address to start after (for cursor pagination, exclusive)
          schema:
            type: string
        - name: prefix
          in: query
          description: |
            Filter accounts whose address starts with this raw byte-level
            prefix (e.g. `users:` matches `users:alice`, `users:bob`, ...).
            Matching is not path-segment aware: `acc:1` also matches
            `acc:10`, `acc:11`, etc. Do not use for exact-address lookups.
          schema:
            type: string
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /v3/{ledgerName}/accounts/{address}:
    get:
      summary: Get an account
      description: Retrieves account information including metadata for a specific account address. Requires `ledger:read` scope.
      operationId: getAccount
      tags:
        - Accounts
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/AccountAddress'
      responses:
        '200':
          description: Account retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAccountResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
