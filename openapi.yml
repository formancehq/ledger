openapi: 3.0.3
info:
  title: Ledger V3 POC API
  description: API for the Ledger V3 Proof of Concept with Raft consensus
  version: 1.0.0
  contact:
    name: Formance
    url: https://formance.com

servers:
  - url: http://localhost:9000
    description: Local development server

paths:
  /:
    get:
      summary: List all ledgers
      description: Returns a list of all ledgers in the cluster.
      operationId: listAllLedgers
      tags:
        - Ledgers
      responses:
        '200':
          description: List of ledgers retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAllLedgersResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}:
    get:
      summary: Get a ledger
      description: Retrieves a ledger by its name.
      operationId: getLedger
      tags:
        - Ledgers
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger to retrieve
      responses:
        '200':
          description: Ledger retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLedgerResponse'
        '404':
          description: Ledger not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a new ledger
      description: |
        Creates a new ledger with the specified name. Storage is configured at the server level.
        Each ledger has its own Raft group for data consistency.
      operationId: createLedger
      tags:
        - Ledgers
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger to create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLedgerRequest'
      responses:
        '201':
          description: Ledger created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLedgerResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Ledger already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a ledger
      description: Deletes a ledger by its name. This operation removes the ledger and its associated Raft group from the cluster.
      operationId: deleteLedger
      tags:
        - Ledgers
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger to delete
      responses:
        '2XX':
          description: Ledger deleted successfully
        '404':
          description: Ledger not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}/transactions:
    post:
      summary: Create a new transaction
      description: Creates a new transaction in the specified ledger with the specified postings
      operationId: createTransaction
      tags:
        - Transactions
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Transaction created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTransactionResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}/transactions/{transactionId}:
    get:
      summary: Get a transaction
      description: Retrieves a transaction by its ID from the specified ledger
      operationId: getTransaction
      tags:
        - Transactions
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger
        - name: transactionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Transaction ID
      responses:
        '200':
          description: Transaction retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTransactionResponse'
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}/accounts:
    get:
      summary: List accounts
      description: Lists accounts in a ledger in alphabetical order with optional prefix filtering and cursor pagination
      operationId: listAccounts
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
        - name: pageSize
          in: query
          description: Maximum number of accounts to return (0 = no limit)
          schema:
            type: integer
            format: int32
        - name: after
          in: query
          description: Account address to start after (for cursor pagination, exclusive)
          schema:
            type: string
        - name: prefix
          in: query
          description: Filter accounts by address prefix (e.g. "users:")
          schema:
            type: string
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
        '404':
          description: Ledger not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}/accounts/{address}:
    get:
      summary: Get an account
      description: Retrieves account information including metadata for a specific account address
      operationId: getAccount
      tags:
        - Accounts
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger
        - name: address
          in: path
          required: true
          schema:
            type: string
          description: Account address
      responses:
        '200':
          description: Account retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAccountResponse'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}/accounts/{address}/metadata:
    post:
      summary: Save account metadata
      description: Saves metadata for a specific account in the ledger
      operationId: saveAccountMetadata
      tags:
        - Accounts
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger
        - name: address
          in: path
          required: true
          schema:
            type: string
          description: Account address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataValue'
              description: Metadata key-value pairs (supports typed values)
              example:
                account_type: asset
                label: Bank Account
                active: true
                balance_threshold: 1000
      responses:
        '204':
          description: Account metadata saved successfully
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}/transactions/{transactionId}/metadata:
    post:
      summary: Save transaction metadata
      description: Saves metadata for a specific transaction in the ledger
      operationId: saveTransactionMetadata
      tags:
        - Transactions
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger
        - name: transactionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Transaction ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataValue'
              description: Metadata key-value pairs (supports typed values)
              example:
                reason: correction
                source: support
                priority: 1
      responses:
        '204':
          description: Transaction metadata saved successfully
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}/accounts/{address}/metadata/{key}:
    delete:
      summary: Delete account metadata
      description: Deletes a metadata key for a specific account in the ledger
      operationId: deleteAccountMetadata
      tags:
        - Accounts
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger
        - name: address
          in: path
          required: true
          schema:
            type: string
          description: Account address
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Metadata key to delete
      responses:
        '204':
          description: Account metadata deleted successfully
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}/transactions/{transactionId}/metadata/{key}:
    delete:
      summary: Delete transaction metadata
      description: Deletes a metadata key for a specific transaction in the ledger
      operationId: deleteTransactionMetadata
      tags:
        - Transactions
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger
        - name: transactionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Transaction ID
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Metadata key to delete
      responses:
        '204':
          description: Transaction metadata deleted successfully
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}/transactions/{transactionId}/revert:
    post:
      summary: Revert a transaction
      description: Reverts a transaction by creating a reverse transaction that undoes its effects
      operationId: revertTransaction
      tags:
        - Transactions
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger
        - name: transactionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Transaction ID to revert
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Idempotency key for the request
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevertTransactionRequestBody'
      responses:
        '201':
          description: Transaction reverted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevertedTransactionResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}/metadata-schema:
    get:
      summary: Get metadata schema status
      description: Returns the metadata schema for a ledger, including per-field type declarations and conversion status.
      operationId: getMetadataSchemaStatus
      tags:
        - Metadata Schema
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger
      responses:
        '200':
          description: Metadata schema status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataSchemaStatusResponse'
        '404':
          description: Ledger not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}/metadata-schema/{targetType}/{key}:
    put:
      summary: Set metadata field type
      description: |
        Declares or changes the expected type for a metadata key on a ledger.
        Once set, all new metadata values for this key are converted to the declared type.
        Existing values are converted in the background.
      operationId: setMetadataFieldType
      tags:
        - Metadata Schema
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger
        - name: targetType
          in: path
          required: true
          schema:
            type: string
            enum:
              - account
              - transaction
          description: Target type (account or transaction)
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Metadata key name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetMetadataTypeRequest'
      responses:
        '204':
          description: Metadata field type set successfully
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Ledger not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Remove metadata field type
      description: |
        Removes the type declaration for a metadata key on a ledger.
        Existing typed values are converted back to strings.
      operationId: removeMetadataFieldType
      tags:
        - Metadata Schema
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger
        - name: targetType
          in: path
          required: true
          schema:
            type: string
            enum:
              - account
              - transaction
          description: Target type (account or transaction)
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Metadata key name
      responses:
        '204':
          description: Metadata field type removed successfully
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Ledger not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}/_bulk:
    post:
      summary: Bulk operations
      description: Execute multiple operations (create transactions, add metadata, revert transactions, delete metadata) in a single request
      operationId: bulkOperations
      tags:
        - Transactions
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger
        - name: continueOnFailure
          in: query
          schema:
            type: boolean
            default: false
          description: Continue processing remaining operations even if one fails
        - name: atomic
          in: query
          schema:
            type: boolean
            default: false
          description: Execute all operations atomically (not yet supported)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/BulkElement'
      responses:
        '200':
          description: Bulk operations completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request entity too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  responses:
    ServiceUnavailable:
      description: Service unavailable (no leader available)
      headers:
        Retry-After:
          description: Number of seconds to wait before retrying the request
          schema:
            type: integer
            format: int32
            minimum: 1
            example: 1
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    MetadataValue:
      description: A typed metadata value (string, integer, boolean, or null)
      nullable: true
      oneOf:
        - type: string
        - type: integer
          format: int64
        - type: boolean

    CreateLedgerRequest:
      type: object
      properties:
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Optional metadata for the ledger (supports typed values)

    CreateLedgerResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerInfo'

    GetLedgerResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerInfo'

    ListAllLedgersResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LedgerInfo'
          description: List of all ledgers in the cluster

    LedgerInfo:
      type: object
      required:
        - name
        - createdAt
      properties:
        name:
          type: string
          description: Name of the ledger
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Metadata for the ledger (supports typed values)
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp (ISO 8601 format)

    CreateTransactionRequest:
      type: object
      properties:
        accountMetadata:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              $ref: '#/components/schemas/MetadataValue'
          description: Metadata for accounts involved in the transaction (supports typed values)
        timestamp:
          type: string
          format: date-time
          description: Transaction timestamp (ISO 8601 format). If not provided, current time is used.
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Transaction metadata (supports typed values)
        reference:
          type: string
          description: Transaction reference
        postings:
          type: array
          items:
            $ref: '#/components/schemas/PostingRequest'
          description: List of postings for the transaction (required if script is not provided)
        script:
          $ref: '#/components/schemas/Script'
          description: Numscript script to execute (required if postings is not provided). Cannot be used together with postings.
        idempotencyKey:
          type: string
          description: Idempotency key to prevent duplicate transactions

    PostingRequest:
      type: object
      required:
        - source
        - destination
        - amount
        - asset
      properties:
        source:
          type: string
          description: Source account address
        destination:
          type: string
          description: Destination account address
        amount:
          type: integer
          format: bigint
          description: Amount as a big integer
        asset:
          type: string
          description: Asset identifier

    Script:
      type: object
      required:
        - plain
      properties:
        plain:
          type: string
          description: The numscript source code
        vars:
          type: object
          additionalProperties:
            type: string
          description: Variables to pass to the script

    BulkElement:
      type: object
      required:
        - action
        - data
      properties:
        action:
          type: string
          enum:
            - CREATE_TRANSACTION
            - ADD_METADATA
            - REVERT_TRANSACTION
            - DELETE_METADATA
          description: The type of operation to perform
        ik:
          type: string
          description: Idempotency key for this operation
        data:
          oneOf:
            - $ref: '#/components/schemas/CreateTransactionRequest'
            - $ref: '#/components/schemas/AddMetadataRequest'
            - $ref: '#/components/schemas/RevertTransactionRequest'
            - $ref: '#/components/schemas/DeleteMetadataRequest'
          description: Operation-specific data

    AddMetadataRequest:
      type: object
      required:
        - targetType
        - targetId
        - metadata
      properties:
        targetType:
          type: string
          enum:
            - ACCOUNT
            - TRANSACTION
          description: Type of target (account or transaction)
        targetId:
          oneOf:
            - type: string
            - type: integer
          description: ID of the target (account address or transaction ID)
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Metadata to add (supports typed values)

    RevertTransactionRequest:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          format: int64
          description: Transaction ID to revert
        force:
          type: boolean
          default: false
          description: Force revert even if accounts don't have sufficient funds
        atEffectiveDate:
          type: boolean
          default: false
          description: Set the timestamp of the reverted transaction to the original transaction timestamp
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Metadata for the revert transaction (supports typed values)

    RevertTransactionRequestBody:
      type: object
      properties:
        force:
          type: boolean
          default: false
          description: Force revert even if accounts don't have sufficient funds
        atEffectiveDate:
          type: boolean
          default: false
          description: Set the timestamp of the reverted transaction to the original transaction timestamp
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Metadata for the revert transaction (supports typed values)

    DeleteMetadataRequest:
      type: object
      required:
        - targetType
        - targetId
        - key
      properties:
        targetType:
          type: string
          enum:
            - ACCOUNT
            - TRANSACTION
          description: Type of target (account or transaction)
        targetId:
          oneOf:
            - type: string
            - type: integer
          description: ID of the target (account address or transaction ID)
        key:
          type: string
          description: Metadata key to delete

    BulkResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BulkResult'
        errorCode:
          type: string
        errorMessage:
          type: string

    BulkResult:
      type: object
      required:
        - responseType
        - logID
      properties:
        errorCode:
          type: string
        errorDescription:
          type: string
        data:
          type: object
          description: Operation result data (transaction for CREATE_TRANSACTION, null for others)
        responseType:
          type: string
          description: Type of response (action name or ERROR)
        logID:
          type: integer
          format: int64
          description: Log ID of the operation

    CreateTransactionResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - transaction
          properties:
            transaction:
              $ref: '#/components/schemas/TransactionResponse'
            accountMetadata:
              type: object
              additionalProperties:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/MetadataValue'
              description: Metadata for accounts involved in the transaction (typed values)

    GetTransactionResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/TransactionResponse'

    GetAccountResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/Account'

    Account:
      type: object
      required:
        - address
      properties:
        address:
          type: string
          description: Account address
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
          description: Account metadata (typed values)
        volumes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/VolumesWithBalance'
          description: Account volumes per asset (input, output, balance)

    VolumesWithBalance:
      type: object
      required:
        - input
        - output
        - balance
      properties:
        input:
          type: string
          description: Total amount received (as big integer string)
        output:
          type: string
          description: Total amount sent (as big integer string)
        balance:
          type: string
          description: Current balance (input - output, as big integer string)

    TransactionResponse:
      type: object
      required:
        - id
        - postings
        - timestamp
      properties:
        postings:
          type: array
          items:
            $ref: '#/components/schemas/PostingResponse'
        metadata:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataValue'
        timestamp:
          type: string
          format: date-time
          description: Transaction timestamp (ISO 8601 format)
        reference:
          type: string
        id:
          type: integer
          format: int64
          description: Transaction ID (assigned by the system)

    RevertedTransaction:
      type: object
      required:
        - revertedTransaction
        - revertTransaction
      properties:
        revertedTransaction:
          $ref: '#/components/schemas/TransactionResponse'
          description: The original transaction that was reverted
        revertTransaction:
          $ref: '#/components/schemas/TransactionResponse'
          description: The new transaction that reverses the original transaction

    RevertedTransactionResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/RevertedTransaction'

    PostingResponse:
      type: object
      required:
        - source
        - destination
        - amount
        - asset
      properties:
        source:
          type: string
        destination:
          type: string
        amount:
          type: integer
          format: bigint
          description: Amount as a big integer
        asset:
          type: string

    LedgerClusterStateResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - state
            - localNode
            - innerState
          properties:
            state:
              type: string
              enum: [Leader, Follower, Candidate, PreCandidate, Unknown]
              description: Current state of the local node
            leader:
              type: integer
              format: int64
              minimum: 0
              description: ID of the current leader (0 if no leader)
            localNode:
              type: integer
              format: int64
              minimum: 0
              description: ID of the local node
            nodes:
              type: array
              items:
                $ref: '#/components/schemas/NodeInfo'
              description: List of all nodes in the cluster
            raftStatus:
              $ref: '#/components/schemas/RaftStatus'
              description: Complete Raft status information
            innerState:
              $ref: '#/components/schemas/LedgerState'
              description: State contained in the FSM

    SystemState:
      type: object
      required:
        - ledgers
      properties:
        ledgers:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/LedgerState'
          description: Map of ledger name to ledger state

    LedgerState:
      type: object
      required:
        - ledgerInfo
        - nextLogId
        - nextTransactionId
      properties:
        ledgerInfo:
          $ref: '#/components/schemas/LedgerInfo'
        nextLogId:
          type: integer
          format: uint64
          minimum: 0
          description: Next log ID to be assigned
        nextTransactionId:
          type: integer
          format: uint64
          minimum: 0
          description: Next transaction ID to be assigned

    NodeInfo:
      type: object
      required:
        - id
        - address
        - suffrage
      properties:
        id:
          type: integer
          format: int64
          minimum: 0
          description: Node ID
        address:
          type: string
          description: Node address
        suffrage:
          type: string
          enum: [Voter, Nonvoter, Learner]
          description: Node suffrage (Voter, Nonvoter, or Learner)

    ClusterState:
      type: object
      required:
        - state
        - localNode
      properties:
        state:
          type: string
          description: Current state of the Raft node (Leader, Follower, Candidate, PreCandidate, Unknown)
        leader:
          type: integer
          format: int64
          minimum: 0
          description: ID of the current leader (0 if no leader)
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/NodeInfo'
          description: List of all nodes in the cluster
        localNode:
          type: integer
          format: int64
          minimum: 0
          description: ID of the local node
        raftStatus:
          $ref: '#/components/schemas/RaftStatus'
          description: Complete Raft status information

    RaftStatus:
      type: object
      required:
        - state
        - term
        - leader
        - applied
        - commit
        - lastIndex
        - vote
      properties:
        state:
          type: string
          enum: [Leader, Follower, Candidate, PreCandidate, Unknown]
          description: Current Raft state
        term:
          type: integer
          format: int64
          minimum: 0
          description: Current term
        leader:
          type: integer
          format: int64
          minimum: 0
          description: ID of the current leader (0 if no leader)
        applied:
          type: integer
          format: int64
          minimum: 0
          description: Index of the last applied entry
        commit:
          type: integer
          format: int64
          minimum: 0
          description: Index of the last committed entry
        lastIndex:
          type: integer
          format: int64
          minimum: 0
          description: Index of the last entry in the log
        vote:
          type: integer
          format: int64
          minimum: 0
          description: ID of the node that received the vote (0 if no vote)
        progress:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ProgressInfo'
          description: Progress information for each node in the cluster

    ProgressInfo:
      type: object
      required:
        - match
        - next
        - state
        - pendingSnapshot
        - recentActive
        - probeSent
        - isPaused
      properties:
        match:
          type: integer
          format: int64
          minimum: 0
          description: Match index - highest log entry known to be replicated to this node
        next:
          type: integer
          format: int64
          minimum: 0
          description: Next index - index of the next log entry to send to this node
        state:
          type: string
          enum: [Probe, Replicate, Snapshot, Unknown]
          description: State of the replication (Probe, Replicate, or Snapshot)
        pendingSnapshot:
          type: integer
          format: int64
          minimum: 0
          description: Index of pending snapshot (0 if none)
        recentActive:
          type: boolean
          description: Whether this node is recently active
        probeSent:
          type: boolean
          description: Whether probe message was sent (paused)
        isPaused:
          type: boolean
          description: Whether this node is paused

    MetadataSchemaStatusResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - accountFields
            - transactionFields
          properties:
            accountFields:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataFieldStatus'
              description: Account metadata field statuses
            transactionFields:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataFieldStatus'
              description: Transaction metadata field statuses

    MetadataFieldStatus:
      type: object
      required:
        - declaredType
        - status
        - totalKeys
        - convertedKeys
      properties:
        declaredType:
          type: string
          enum:
            - string
            - int64
            - bool
            - uint64
            - int8
            - int16
            - int32
            - uint8
            - uint16
            - uint32
          description: Declared type for this metadata field
        status:
          type: string
          enum:
            - COMPLETE
            - CONVERTING
          description: Conversion status for this field
        totalKeys:
          type: integer
          format: uint64
          minimum: 0
          description: Total number of instances of this key
        convertedKeys:
          type: integer
          format: uint64
          minimum: 0
          description: Number of already-converted instances

    SetMetadataTypeRequest:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - string
            - int64
            - bool
            - uint64
            - int8
            - int16
            - int32
            - uint8
            - uint16
            - uint32
          description: Metadata type to set for the field

    ErrorResponse:
      type: object
      required:
        - errorCode
        - errorMessage
      properties:
        errorCode:
          type: string
          description: Error code identifier
        errorMessage:
          type: string
          description: Human-readable error message

