  /v3/{ledgerName}/numscripts/{name}:
    get:
      summary: Get a numscript
      description: |
        Retrieves a numscript by name from a ledger. Use the `version` query parameter to get a specific
        semver version. If omitted or empty, the latest version is returned.
      operationId: getNumscript
      tags:
        - Numscript Library
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Name of the numscript
        - name: version
          in: query
          required: false
          schema:
            type: string
          description: |
            Semver version to retrieve (e.g. "1.0.0"). If omitted or empty, the latest version is returned.
      responses:
        '200':
          description: Numscript retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetNumscriptResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Numscript not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
    put:
      summary: Save a numscript
      description: |
        Saves a numscript to a ledger's library. The `version` field in the request body controls
        versioning behavior:
        - A semver string (e.g. "2.0.0") creates a new version. Fails if the version already exists.
        - The special value "latest" overwrites the content of the current latest version.
        - If omitted or empty, defaults to "latest".
      operationId: saveNumscript
      tags:
        - Numscript Library
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Name of the numscript
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveNumscriptRequest'
      responses:
        '201':
          description: Numscript saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetNumscriptResponse'
          links:
            GetSavedNumscript:
              operationId: getNumscript
              parameters:
                ledgerName: '$request.path.ledgerName'
                name: '$response.body#/data/name'
            DeleteSavedNumscript:
              operationId: deleteNumscript
              parameters:
                ledgerName: '$request.path.ledgerName'
                name: '$response.body#/data/name'
        '204':
          description: Numscript saved (no content returned)
        '400':
          description: Bad request (invalid version format, parse error, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Version already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
    delete:
      summary: Delete a numscript
      description: Deletes a numscript from a ledger's library. Removes the latest version entry.
      operationId: deleteNumscript
      tags:
        - Numscript Library
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Name of the numscript
      responses:
        '204':
          description: Numscript deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Numscript not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /v3/{ledgerName}/numscripts/{name}/usage:
    get:
      summary: Get template usage
      description: |
        Returns the invocation counter and last-used timestamp for a Numscript template. Values are
        materialised asynchronously by the `usagebuilder` subsystem from the FSM audit chain — expect
        up to one usagebuilder tick interval (~100 ms) of lag behind the live FSM. A never-invoked
        template returns a zero-valued response (not 404), so clients handle "never used" uniformly.

        On existing ledgers whose audit chain has been partially archived to cold storage, only
        invocations still reachable in Pebble are counted.
      operationId: getNumscriptUsage
      tags:
        - Numscript Library
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Name of the numscript template
      responses:
        '200':
