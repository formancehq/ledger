openapi: 3.0.3
info:
  title: Ledger V3 POC API
  description: API for the Ledger V3 Proof of Concept with Raft consensus
  version: 1.0.0
  contact:
    name: Formance
    url: https://formance.com

servers:
  - url: http://localhost:9000
    description: Local development server
  - url: http://node-1:9000
    description: Docker Compose node-1

paths:
  /{ledgerName}:
    post:
      summary: Create a new ledger
      description: Creates a new ledger with the specified name
      operationId: createLedger
      tags:
        - Ledgers
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger to create
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLedgerRequest'
      responses:
        '201':
          description: Ledger created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLedgerResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Ledger already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}/transactions:
    post:
      summary: Create a new transaction
      description: Creates a new transaction in the specified ledger with the specified postings
      operationId: createTransaction
      tags:
        - Transactions
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Transaction created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTransactionResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /snapshot:
    post:
      summary: Create a Raft snapshot
      description: Forces the creation of a Raft cluster snapshot (leader only)
      operationId: createSnapshot
      tags:
        - Cluster
      responses:
        '200':
          description: Snapshot created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cluster/state:
    get:
      summary: Get cluster state
      description: Returns the current state of the Raft cluster, including the list of nodes and the current leader
      operationId: getClusterState
      tags:
        - Cluster
      responses:
        '200':
          description: Cluster state retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterStateResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /buckets:
    get:
      summary: List all buckets
      description: Returns a list of all buckets in the cluster
      operationId: listBuckets
      tags:
        - Buckets
      responses:
        '200':
          description: List of buckets retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBucketsResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /buckets/{bucketName}:
    get:
      summary: Get a bucket
      description: Retrieves a bucket with its Raft cluster state
      operationId: getBucket
      tags:
        - Buckets
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
          description: Name of the bucket to retrieve
      responses:
        '200':
          description: Bucket retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBucketResponse'
        '404':
          description: Bucket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a new bucket
      description: Creates a new bucket with the specified name, driver, and configuration
      operationId: createBucket
      tags:
        - Buckets
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
          description: Name of the bucket to create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBucketRequest'
      responses:
        '201':
          description: Bucket created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBucketResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Bucket already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a bucket
      description: Deletes a bucket with the specified name
      operationId: deleteBucket
      tags:
        - Buckets
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
          description: Name of the bucket to delete
      responses:
        '200':
          description: Bucket deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteBucketResponse'
        '404':
          description: Bucket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /buckets/{bucketName}/ledgers:
    get:
      summary: List all ledgers in a bucket
      description: Returns a list of all ledgers in the specified bucket
      operationId: listLedgersInBucket
      tags:
        - Ledgers
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
          description: Name of the bucket
      responses:
        '200':
          description: List of ledgers retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListLedgersInBucketResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /buckets/{bucketName}/ledgers/{ledgerName}:
    get:
      summary: Get a ledger from a bucket
      description: Retrieves a ledger from the specified bucket
      operationId: getLedgerFromBucket
      tags:
        - Ledgers
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
          description: Name of the bucket
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger to retrieve
      responses:
        '200':
          description: Ledger retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLedgerFromBucketResponse'
        '404':
          description: Ledger not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a new ledger in a bucket
      description: Creates a new ledger in the specified bucket
      operationId: createLedgerInBucket
      tags:
        - Ledgers
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
          description: Name of the bucket
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger to create
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLedgerRequest'
      responses:
        '201':
          description: Ledger created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLedgerInBucketResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Ledger already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    CreateLedgerRequest:
      type: object
      properties:
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Optional metadata for the ledger

    CreateLedgerResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            name:
              type: string
              description: Name of the created ledger
            metadata:
              type: object
              additionalProperties:
                type: string
              description: Metadata for the ledger

    CreateLedgerInBucketResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/LedgerInfo'

    ListLedgersInBucketResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LedgerInfo'
          description: List of ledgers in the bucket

    GetLedgerFromBucketResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/LedgerInfo'

    LedgerInfo:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Sequential ID for the ledger
        name:
          type: string
          description: Name of the ledger
        bucket:
          type: string
          description: Name of the bucket containing the ledger
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Metadata for the ledger
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp (ISO 8601 format)
        lastLogId:
          type: integer
          format: int64
          description: ID of the last log for this ledger
          nullable: true

    CreateTransactionRequest:
      type: object
      required:
        - postings
      properties:
        accountMetadata:
          type: object
          additionalProperties:
            type: object
            additionalProperties: true
          description: Metadata for accounts involved in the transaction
        timestamp:
          type: string
          format: date-time
          description: Transaction timestamp (ISO 8601 format). If not provided, current time is used.
        metadata:
          type: object
          additionalProperties: true
          description: Transaction metadata
        reference:
          type: string
          description: Transaction reference
        postings:
          type: array
          items:
            $ref: '#/components/schemas/PostingRequest'
          description: List of postings for the transaction
        dryRun:
          type: boolean
          default: false
          description: If true, validate the transaction without applying it
        idempotencyKey:
          type: string
          description: Idempotency key to prevent duplicate transactions

    PostingRequest:
      type: object
      required:
        - source
        - destination
        - amount
        - asset
      properties:
        source:
          type: string
          description: Source account address
        destination:
          type: string
          description: Destination account address
        amount:
          type: string
          format: bigint
          description: Amount as a big integer
        asset:
          type: string
          description: Asset identifier

    CreateTransactionResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            transaction:
              $ref: '#/components/schemas/TransactionResponse'
            accountMetadata:
              type: object
              additionalProperties:
                type: object
                additionalProperties: true
              description: Metadata for accounts involved in the transaction

    TransactionResponse:
      type: object
      properties:
        postings:
          type: array
          items:
            $ref: '#/components/schemas/PostingResponse'
        metadata:
          type: object
          additionalProperties: true
        timestamp:
          type: string
          format: date-time
          description: Transaction timestamp (ISO 8601 format)
        reference:
          type: string
        id:
          type: integer
          format: int64
          description: Transaction ID (assigned by the system)

    PostingResponse:
      type: object
      properties:
        source:
          type: string
        destination:
          type: string
        amount:
          type: string
          format: bigint
          description: Amount as a big integer
        asset:
          type: string

    SnapshotResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            message:
              type: string
              description: Success message

    ClusterStateResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            state:
              type: string
              enum: [Leader, Follower, Candidate, Shutdown, Unknown]
              description: Current state of the local node
            leader:
              type: string
              description: ID of the current leader (empty if no leader)
            localNode:
              type: string
              description: ID of the local node
            nodes:
              type: array
              items:
                $ref: '#/components/schemas/NodeInfo'
              description: List of all nodes in the cluster

    NodeInfo:
      type: object
      properties:
        id:
          type: string
          description: Node ID
        address:
          type: string
          description: Node address
        suffrage:
          type: string
          enum: [Voter, Nonvoter]
          description: Node suffrage (Voter or Nonvoter)

    CreateBucketRequest:
      type: object
      required:
        - driver
        - config
      properties:
        driver:
          type: string
          description: Driver name (e.g., "postgres", "s3", etc.)
        config:
          type: object
          additionalProperties: true
          description: Driver-specific configuration

    CreateBucketResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/BucketInfo'

    ListBucketsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BucketInfo'
          description: List of buckets

    GetBucketResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/BucketWithRaftState'

    BucketWithRaftState:
      allOf:
        - $ref: '#/components/schemas/BucketInfo'
        - type: object
          properties:
            raftState:
              $ref: '#/components/schemas/ClusterState'
              nullable: true
              description: Raft cluster state for this bucket (null if Raft group not started)

    ClusterState:
      type: object
      properties:
        state:
          type: string
          description: Current state of the Raft node (Leader, Follower, Candidate, PreCandidate, Unknown)
        leader:
          type: string
          description: ID of the current leader (empty if no leader)
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/NodeInfo'
          description: List of all nodes in the cluster
        localNode:
          type: string
          description: ID of the local node

    NodeInfo:
      type: object
      properties:
        id:
          type: string
          description: Node ID in the bucket Raft group
        address:
          type: string
          description: Node address (global node ID)
        suffrage:
          type: string
          description: Node suffrage (Voter or Learner)

    BucketInfo:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Sequential bucket ID
        name:
          type: string
          description: Bucket name
        driver:
          type: string
          description: Driver name
        config:
          type: object
          additionalProperties: true
          description: Driver-specific configuration
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp (ISO 8601 format)

    DeleteBucketResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            message:
              type: string
              description: Success message

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            errorCode:
              type: string
              description: Error code identifier
            errorMessage:
              type: string
              description: Human-readable error message
            details:
              type: string
              description: Additional error details (optional)

