openapi: 3.0.3
info:
  title: Ledger V3 POC API
  description: API for the Ledger V3 Proof of Concept with Raft consensus
  version: 1.0.0
  contact:
    name: Formance
    url: https://formance.com

servers:
  - url: http://localhost:9000
    description: Local development server
  - url: http://node-1:9000
    description: Docker Compose node-1

x-speakeasy-retries:
  strategy: backoff
  backoff:
    initialInterval: 500 # 500 milliseconds
    maxInterval: 60000 # 60 seconds
    maxElapsedTime: 3600000 # 1 hour
    exponent: 1.5
  statusCodes:
    - 503 # Service Unavailable (no leader)
  retryConnectionErrors: true

paths:
  /:
    get:
      summary: List all ledgers across all buckets
      description: Returns a list of all ledgers from all buckets
      operationId: listAllLedgers
      tags:
        - Ledgers
      responses:
        '200':
          description: List of ledgers retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAllLedgersResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}:
    get:
      summary: Get a ledger
      description: Retrieves a ledger by its name (bucket is found automatically)
      operationId: getLedger
      tags:
        - Ledgers
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger to retrieve
      responses:
        '200':
          description: Ledger retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLedgerResponse'
        '404':
          description: Ledger not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a new ledger
      description: Creates a new ledger in the specified bucket
      operationId: createLedger
      tags:
        - Ledgers
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger to create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLedgerRequest'
      responses:
        '201':
          description: Ledger created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLedgerResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Ledger already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}/transactions:
    post:
      summary: Create a new transaction
      description: Creates a new transaction in the specified ledger with the specified postings
      operationId: createTransaction
      tags:
        - Transactions
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Transaction created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTransactionResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{ledgerName}/_bulk:
    post:
      summary: Bulk operations
      description: Execute multiple operations (create transactions, add metadata, revert transactions, delete metadata) in a single request
      operationId: bulkOperations
      tags:
        - Transactions
      parameters:
        - name: ledgerName
          in: path
          required: true
          schema:
            type: string
          description: Name of the ledger
        - name: continueOnFailure
          in: query
          schema:
            type: boolean
            default: false
          description: Continue processing remaining operations even if one fails
        - name: atomic
          in: query
          schema:
            type: boolean
            default: false
          description: Execute all operations atomically (not yet supported)
        - name: parallel
          in: query
          schema:
            type: boolean
            default: false
          description: Execute operations in parallel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/BulkElement'
      responses:
        '200':
          description: Bulk operations completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request entity too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /snapshot:
    post:
      summary: Create a Raft snapshot
      description: Forces the creation of a Raft cluster snapshot (leader only)
      operationId: createSnapshot
      tags:
        - Cluster
      responses:
        '200':
          description: Snapshot created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cluster/state:
    get:
      summary: Get cluster state
      description: Returns the current state of the Raft cluster, including the list of nodes and the current leader
      operationId: getClusterState
      tags:
        - Cluster
      responses:
        '200':
          description: Cluster state retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterStateResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /buckets:
    get:
      summary: List all buckets
      description: Returns a list of all buckets in the cluster
      operationId: listBuckets
      tags:
        - Buckets
      responses:
        '200':
          description: List of buckets retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBucketsResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /buckets/{bucketName}:
    get:
      summary: Get a bucket
      description: Retrieves a bucket with its Raft cluster state
      operationId: getBucket
      tags:
        - Buckets
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
          description: Name of the bucket to retrieve
      responses:
        '200':
          description: Bucket retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBucketResponse'
        '404':
          description: Bucket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a new bucket
      description: Creates a new bucket with the specified name, driver, and configuration
      operationId: createBucket
      tags:
        - Buckets
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
          description: Name of the bucket to create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBucketRequest'
      responses:
        '201':
          description: Bucket created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBucketResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Bucket already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a bucket
      description: Deletes a bucket with the specified name
      operationId: deleteBucket
      tags:
        - Buckets
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
          description: Name of the bucket to delete
      responses:
        '200':
          description: Bucket deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteBucketResponse'
        '404':
          description: Bucket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /buckets/{bucketName}/snapshot:
    post:
      summary: Create a snapshot for a bucket
      description: Creates a snapshot of the bucket's Raft cluster state
      operationId: createBucketSnapshot
      tags:
        - Buckets
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
          description: Name of the bucket to create a snapshot for
      responses:
        '200':
          description: Snapshot created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBucketSnapshotResponse'
        '400':
          description: Bad request (e.g., not leader)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Bucket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  responses:
    ServiceUnavailable:
      description: Service unavailable (no leader available)
      headers:
        Retry-After:
          description: Number of seconds to wait before retrying the request
          schema:
            type: integer
            format: int32
            minimum: 1
            example: 1
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    CreateLedgerRequest:
      type: object
      required:
        - bucket
      properties:
        bucket:
          type: string
          description: Name of the bucket where the ledger will be created
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Optional metadata for the ledger

    CreateLedgerResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerInfo'

    GetLedgerResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerInfo'

    ListAllLedgersResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LedgerInfo'
          description: List of all ledgers across all buckets

    GetLedgerFromBucketResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LedgerInfo'

    LedgerInfo:
      type: object
      required:
        - id
        - name
        - bucket
        - createdAt
      properties:
        id:
          type: integer
          format: int64
          description: Sequential ID for the ledger
        name:
          type: string
          description: Name of the ledger
        bucket:
          type: string
          description: Name of the bucket containing the ledger
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Metadata for the ledger
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp (ISO 8601 format)
        lastLogId:
          type: integer
          format: int64
          description: ID of the last log for this ledger
          nullable: true

    CreateTransactionRequest:
      type: object
      properties:
        accountMetadata:
          type: object
          additionalProperties: true
          description: Metadata for accounts involved in the transaction
        timestamp:
          type: string
          format: date-time
          description: Transaction timestamp (ISO 8601 format). If not provided, current time is used.
        metadata:
          type: object
          additionalProperties: true
          description: Transaction metadata
        reference:
          type: string
          description: Transaction reference
        postings:
          type: array
          items:
            $ref: '#/components/schemas/PostingRequest'
          description: List of postings for the transaction (required if script is not provided)
        script:
          $ref: '#/components/schemas/Script'
          description: Numscript script to execute (required if postings is not provided). Cannot be used together with postings.
        runtime:
          type: string
          description: Runtime to use for script execution (e.g., "experimental-interpreter")
        dryRun:
          type: boolean
          default: false
          description: If true, validate the transaction without applying it
        idempotencyKey:
          type: string
          description: Idempotency key to prevent duplicate transactions

    PostingRequest:
      type: object
      required:
        - source
        - destination
        - amount
        - asset
      properties:
        source:
          type: string
          description: Source account address
        destination:
          type: string
          description: Destination account address
        amount:
          type: integer
          format: bigint
          description: Amount as a big integer
        asset:
          type: string
          description: Asset identifier

    Script:
      type: object
      required:
        - plain
      properties:
        plain:
          type: string
          description: The numscript source code
        vars:
          type: object
          additionalProperties:
            type: string
          description: Variables to pass to the script

    BulkElement:
      type: object
      required:
        - action
        - data
      properties:
        action:
          type: string
          enum:
            - CREATE_TRANSACTION
            - ADD_METADATA
            - REVERT_TRANSACTION
            - DELETE_METADATA
          description: The type of operation to perform
        ik:
          type: string
          description: Idempotency key for this operation
        data:
          oneOf:
            - $ref: '#/components/schemas/CreateTransactionRequest'
            - $ref: '#/components/schemas/AddMetadataRequest'
            - $ref: '#/components/schemas/RevertTransactionRequest'
            - $ref: '#/components/schemas/DeleteMetadataRequest'
          description: Operation-specific data

    AddMetadataRequest:
      type: object
      required:
        - targetType
        - targetId
        - metadata
      properties:
        targetType:
          type: string
          enum:
            - ACCOUNT
            - TRANSACTION
          description: Type of target (account or transaction)
        targetId:
          oneOf:
            - type: string
            - type: integer
          description: ID of the target (account address or transaction ID)
        metadata:
          type: object
          additionalProperties: true
          description: Metadata to add

    RevertTransactionRequest:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          format: int64
          description: Transaction ID to revert
        force:
          type: boolean
          default: false
          description: Force revert even if accounts don't have sufficient funds
        atEffectiveDate:
          type: boolean
          default: false
          description: Set the timestamp of the reverted transaction to the original transaction timestamp
        metadata:
          type: object
          additionalProperties: true
          description: Metadata for the revert transaction

    DeleteMetadataRequest:
      type: object
      required:
        - targetType
        - targetId
        - key
      properties:
        targetType:
          type: string
          enum:
            - ACCOUNT
            - TRANSACTION
          description: Type of target (account or transaction)
        targetId:
          oneOf:
            - type: string
            - type: integer
          description: ID of the target (account address or transaction ID)
        key:
          type: string
          description: Metadata key to delete

    BulkResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BulkResult'
        errorCode:
          type: string
        errorMessage:
          type: string

    BulkResult:
      type: object
      required:
        - responseType
        - logID
      properties:
        errorCode:
          type: string
        errorDescription:
          type: string
        data:
          type: object
          description: Operation result data (transaction for CREATE_TRANSACTION, null for others)
        responseType:
          type: string
          description: Type of response (action name or ERROR)
        logID:
          type: integer
          format: int64
          description: Log ID of the operation

    CreateTransactionResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - transaction
          properties:
            transaction:
              $ref: '#/components/schemas/TransactionResponse'
            accountMetadata:
              type: object
              additionalProperties: true
              description: Metadata for accounts involved in the transaction

    TransactionResponse:
      type: object
      required:
        - id
        - postings
        - timestamp
      properties:
        postings:
          type: array
          items:
            $ref: '#/components/schemas/PostingResponse'
        metadata:
          type: object
          additionalProperties: true
        timestamp:
          type: string
          format: date-time
          description: Transaction timestamp (ISO 8601 format)
        reference:
          type: string
        id:
          type: integer
          format: int64
          description: Transaction ID (assigned by the system)

    PostingResponse:
      type: object
      required:
        - source
        - destination
        - amount
        - asset
      properties:
        source:
          type: string
        destination:
          type: string
        amount:
          type: integer
          format: bigint
          description: Amount as a big integer
        asset:
          type: string

    SnapshotResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - message
          properties:
            message:
              type: string
              description: Success message

    ClusterStateResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - state
            - localNode
          properties:
            state:
              type: string
              enum: [Leader, Follower, Candidate, Shutdown, Unknown]
              description: Current state of the local node
            leader:
              type: integer
              format: int64
              minimum: 0
              description: ID of the current leader (0 if no leader)
            localNode:
              type: integer
              format: int64
              minimum: 0
              description: ID of the local node
            nodes:
              type: array
              items:
                $ref: '#/components/schemas/NodeInfo'
              description: List of all nodes in the cluster

    NodeInfo:
      type: object
      required:
        - id
        - address
        - suffrage
      properties:
        id:
          type: integer
          format: int64
          minimum: 0
          description: Node ID
        address:
          type: string
          description: Node address
        suffrage:
          type: string
          enum: [Voter, Nonvoter, Learner]
          description: Node suffrage (Voter, Nonvoter, or Learner)

    CreateBucketRequest:
      type: object
      required:
        - driver
      properties:
        driver:
          type: string
          enum: [sqlite]
          description: Driver name (e.g., "sqlite")
        config:
          $ref: '#/components/schemas/SQLiteConfig'
          description: Driver-specific configuration (optional for SQLite - DSN is auto-generated)
        snapshotThreshold:
          type: integer
          format: int64
          description: Number of logs before triggering a snapshot (optional, uses global config if not set)

    CreateBucketResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/BucketInfo'

    ListBucketsResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BucketInfo'
          description: List of buckets

    GetBucketResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/BucketWithRaftState'

    BucketWithRaftState:
      allOf:
        - $ref: '#/components/schemas/BucketInfo'
        - type: object
          properties:
            raftState:
              $ref: '#/components/schemas/ClusterState'
              nullable: true
              description: Raft cluster state for this bucket (null if Raft group not started)

    ClusterState:
      type: object
      required:
        - state
        - localNode
      properties:
        state:
          type: string
          description: Current state of the Raft node (Leader, Follower, Candidate, PreCandidate, Unknown)
        leader:
          type: integer
          format: int64
          minimum: 0
          description: ID of the current leader (0 if no leader)
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/NodeInfo'
          description: List of all nodes in the cluster
        localNode:
          type: integer
          format: int64
          minimum: 0
          description: ID of the local node

    BucketInfo:
      type: object
      required:
        - id
        - name
        - driver
        - config
        - createdAt
      properties:
        id:
          type: integer
          format: int64
          description: Sequential bucket ID
        name:
          type: string
          description: Bucket name
        driver:
          type: string
          enum: [sqlite]
          description: Driver name
        config:
          $ref: '#/components/schemas/SQLiteConfig'
          description: Driver-specific configuration
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp (ISO 8601 format)
        snapshotThreshold:
          type: integer
          format: int64
          description: Number of logs before triggering a snapshot (0 means use global config)

    CreateBucketSnapshotResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Success message

    DeleteBucketResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - message
          properties:
            message:
              type: string
              description: Success message

    SQLiteConfig:
      type: object
      description: SQLite driver configuration (empty object - DSN is automatically generated)
      properties: {}
      example: {}

    ClickHouseConfig:
      type: object
      required:
        - dsn
      properties:
        dsn:
          type: string
          description: Data Source Name (connection string) for ClickHouse database
      example:
        dsn: "clickhouse://localhost:9000?database=ledger&username=default&password="

    ErrorResponse:
      type: object
      required:
        - errorCode
        - errorMessage
      properties:
        errorCode:
          type: string
          description: Error code identifier
        errorMessage:
          type: string
          description: Human-readable error message

