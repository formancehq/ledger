openapi: 3.0.3
info:
  title: Ledger V3 POC API
  description: API for the Ledger V3 Proof of Concept with Raft consensus
  version: 1.0.0
  contact:
    name: Formance
    url: https://formance.com

servers:
  - url: http://localhost:9000
    description: Local development server

security:
  - BearerAuth: []
  - {}

paths:
  /:
    get:
      summary: List all ledgers
      description: Returns a list of all ledgers in the cluster. Requires `ledger:read` scope.
      operationId: listAllLedgers
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      responses:
        '200':
          description: List of ledgers retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAllLedgersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /health:
    get:
      summary: Health check
      description: Returns the health status of the node. Returns 503 if the node is not connected to the cluster.
      operationId: health
      tags:
        - Health
      responses:
        '200':
          description: Node is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /livez:
    get:
      summary: Liveness probe
      description: Returns 200 as long as the process is alive. Suitable for Kubernetes liveness probes.
      operationId: livez
      tags:
        - Health
      responses:
        '200':
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /readyz:
    get:
      summary: Readiness probe
      description: |
        Returns 200 only when the node is part of a healthy cluster (Raft state healthy,
        leader elected, disk/clock OK). Returns 503 if the node is not ready. Suitable for
        Kubernetes readiness probes.
      operationId: readyz
      tags:
        - Health
      responses:
        '200':
          description: Node is ready to serve traffic
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /{ledgerName}:
    get:
      summary: Get a ledger
      description: Retrieves a ledger by its name. Requires `ledger:read` scope.
      operationId: getLedger
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
      responses:
        '200':
          description: Ledger retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLedgerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
    post:
      summary: Create a new ledger
      description: |
        Creates a new ledger with the specified name. Storage is configured at the server level.
        Each ledger has its own Raft group for data consistency. Requires `ledger:write` scope.
      operationId: createLedger
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLedgerRequest'
      responses:
        '201':
          description: Ledger created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLedgerResponse'
          links:
            GetCreatedLedger:
              operationId: getLedger
              parameters:
                ledgerName: '$response.body#/data/name'
            DeleteCreatedLedger:
              operationId: deleteLedger
              parameters:
                ledgerName: '$response.body#/data/name'
            GetLedgerStats:
              operationId: getLedgerStats
              parameters:
                ledgerName: '$response.body#/data/name'
            CreateTransactionInLedger:
              operationId: createTransaction
              parameters:
                ledgerName: '$response.body#/data/name'
            ListLedgerAccounts:
              operationId: listAccounts
              parameters:
                ledgerName: '$response.body#/data/name'
            ListLedgerLogs:
              operationId: listLedgerLogs
              parameters:
                ledgerName: '$response.body#/data/name'
            SaveNumscriptInLedger:
              operationId: saveNumscript
              parameters:
                ledgerName: '$response.body#/data/name'
            BulkInLedger:
              operationId: bulkOperations
              parameters:
                ledgerName: '$response.body#/data/name'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
    delete:
      summary: Delete a ledger
      description: Deletes a ledger by its name. This operation removes the ledger and its associated Raft group from the cluster. Requires `ledger:write` scope.
      operationId: deleteLedger
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Ledger deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /{ledgerName}/stats:
    get:
      summary: Get ledger statistics
      description: Returns aggregate statistics (account count, transaction count) for a ledger. Requires `ledger:read` scope.
      operationId: getLedgerStats
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
      responses:
        '200':
          description: Ledger statistics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLedgerStatsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /{ledgerName}/logs:
    get:
      summary: List logs for a ledger
      description: |
        Lists log entries for a specific ledger, ordered by ledger-local log ID ascending.
        Requires the builtin `LOG` index to be enabled on the ledger via `CreateIndex`.
        Supports cursor pagination via the `after` query parameter. Requires `ops:read` scope.
      operationId: listLedgerLogs
      tags:
        - Logs
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: pageSize
          in: query
          schema:
            type: integer
            format: uint32
            minimum: 0
            default: 0
          description: Maximum number of log entries to return (0 = no limit)
        - name: after
          in: query
          schema:
            type: integer
            format: uint64
            minimum: 0
          description: Ledger-local log ID to start after (exclusive, for cursor pagination)
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
          description: |
            Filter logs with date >= startDate (inclusive, RFC3339 format).
            Requires the builtin `LOG_DATE` index to be enabled on the ledger.
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
          description: |
            Filter logs with date < endDate (exclusive, RFC3339 format).
            Requires the builtin `LOG_DATE` index to be enabled on the ledger.
      responses:
        '200':
          description: Logs retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: System log entry (protobuf JSON representation)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /{ledgerName}/promote:
    post:
      summary: Promote a mirror ledger
      description: |
        Promotes a mirror-mode ledger to normal mode. After promotion, the mirror sync
        worker is stopped and the ledger accepts direct write operations. Requires `ledger:write` scope.
      operationId: promoteLedger
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
      responses:
        '201':
          description: Ledger promoted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoteLedgerResponse'
        '400':
          description: Ledger is not in mirror mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /{ledgerName}/transactions:
    post:
      summary: Create a new transaction
      description: Creates a new transaction in the specified ledger with the specified postings. Requires `ledger:write` scope.
      operationId: createTransaction
      tags:
        - Transactions
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Transaction created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTransactionResponse'
          links:
            GetCreatedTransaction:
              operationId: getTransaction
              parameters:
                ledgerName: '$request.path.ledgerName'
                transactionId: '$response.body#/data/transaction/id'
            RevertCreatedTransaction:
              operationId: revertTransaction
              parameters:
                ledgerName: '$request.path.ledgerName'
                transactionId: '$response.body#/data/transaction/id'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict (e.g. concurrent modification)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /{ledgerName}/transactions/{transactionId}:
    get:
      summary: Get a transaction
      description: Retrieves a transaction by its ID from the specified ledger. Requires `ledger:read` scope.
      operationId: getTransaction
      tags:
        - Transactions
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/TransactionId'
      responses:
        '200':
          description: Transaction retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTransactionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /{ledgerName}/accounts:
    get:
      summary: List accounts
      description: Lists accounts in a ledger in alphabetical order with optional prefix filtering and cursor pagination. Requires `ledger:read` scope.
      operationId: listAccounts
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: pageSize
          in: query
          description: Maximum number of accounts to return (0 = no limit)
          schema:
            type: integer
            format: int32
        - name: after
          in: query
          description: Account address to start after (for cursor pagination, exclusive)
          schema:
            type: string
        - name: prefix
          in: query
          description: Filter accounts by address prefix (e.g. "users:")
          schema:
            type: string
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /{ledgerName}/accounts/{address}:
    get:
      summary: Get an account
      description: Retrieves account information including metadata for a specific account address. Requires `ledger:read` scope.
      operationId: getAccount
      tags:
        - Accounts
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/AccountAddress'
      responses:
        '200':
          description: Account retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAccountResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /{ledgerName}/volumes:
    get:
      summary: Aggregate volumes
      description: |
        Returns aggregated volumes (input/output/balance per asset) across all accounts in the ledger.
        Supports filtering by account address prefix, grouping by account prefixes, and max-precision merging.
        Requires `accounts:read` scope.
      operationId: aggregateVolumes
      tags:
        - Volumes
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - name: prefix
          in: query
          description: Filter accounts by address prefix
          schema:
            type: string
        - name: useMaxPrecision
          in: query
          description: Merge assets with the same base at the highest observed precision
          schema:
            type: boolean
            default: false
        - name: groupByPrefixes
          in: query
          description: Comma-separated list of account prefixes to group volumes by
          schema:
            type: string
      responses:
        '200':
          description: Aggregated volumes retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AggregateVolumesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /{ledgerName}/metadata:
    post:
      summary: Save ledger metadata
      description: Saves metadata key-value pairs on the ledger itself. Requires `ledger:write` scope.
      operationId: saveLedgerMetadata
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataValue'
              description: Metadata key-value pairs (supports typed values)
              example:
                environment: production
                team: payments
                region: eu-west-1
      responses:
        '204':
          description: Ledger metadata saved successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /{ledgerName}/metadata/{key}:
    delete:
      summary: Delete ledger metadata
      description: Deletes a metadata key from the ledger. Requires `ledger:write` scope.
      operationId: deleteLedgerMetadata
      tags:
        - Ledgers
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/MetadataKey'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Ledger metadata deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /{ledgerName}/accounts/{address}/metadata:
    post:
      summary: Save account metadata
      description: Saves metadata for a specific account in the ledger. Requires `ledger:write` scope.
      operationId: saveAccountMetadata
      tags:
        - Accounts
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/AccountAddress'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataValue'
              description: Metadata key-value pairs (supports typed values)
              example:
                account_type: asset
                label: Bank Account
                active: true
                balance_threshold: 1000
      responses:
        '204':
          description: Account metadata saved successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /{ledgerName}/transactions/{transactionId}/metadata:
    post:
      summary: Save transaction metadata
      description: Saves metadata for a specific transaction in the ledger. Requires `ledger:write` scope.
      operationId: saveTransactionMetadata
      tags:
        - Transactions
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/TransactionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/MetadataValue'
              description: Metadata key-value pairs (supports typed values)
              example:
                reason: correction
                source: support
                priority: 1
      responses:
        '204':
          description: Transaction metadata saved successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /{ledgerName}/accounts/{address}/metadata/{key}:
    delete:
      summary: Delete account metadata
      description: Deletes a metadata key for a specific account in the ledger. Requires `ledger:write` scope.
      operationId: deleteAccountMetadata
      tags:
        - Accounts
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/AccountAddress'
        - $ref: '#/components/parameters/MetadataKey'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Account metadata deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'

  /{ledgerName}/transactions/{transactionId}/metadata/{key}:
    delete:
      summary: Delete transaction metadata
      description: Deletes a metadata key for a specific transaction in the ledger. Requires `ledger:write` scope.
      operationId: deleteTransactionMetadata
      tags:
        - Transactions
      security:
        - BearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LedgerName'
        - $ref: '#/components/parameters/TransactionId'
        - $ref: '#/components/parameters/MetadataKey'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Transaction metadata deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
