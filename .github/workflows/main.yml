name: Default
on:
  merge_group:
  push:
    branches:
      - main
      - master
      - release/*
  pull_request:
    types: [assigned, opened, synchronize, reopened, labeled]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Disabled: amannn/action-semantic-pull-request requires repo access that
  # the GitHub App doesn't have on this private repo.
  # PR:
  #   if: github.event_name == 'pull_request'
  #   name: Check PR Title
  #   runs-on: ubuntu-latest
  #   permissions:
  #     statuses: write
  #   steps:
  #     - uses: amannn/action-semantic-pull-request@v5
  #       env:
  #         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Dirty:
    runs-on: namespace-profile-linux-amd64-4vcpu
    env:
      GOPATH: /tmp/go
      GOLANGCI_LINT_CACHE: /tmp/golangci-lint
    steps:
      - uses: namespacelabs/nscloud-checkout-action@445c25d7009680597d73eb03c4e1cd5be522ed73 # v9
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - run: >
          nix develop --command just pre-commit
      - name: Get changed files
        id: changed-files
        shell: bash
        run: |
          hasChanged=$(git status --porcelain)
          if (( $(echo ${#hasChanged}) != 0 )); then
            git status
            echo "There are changes in the repository"
            git diff
            exit 1
          fi

  Tests:
    runs-on: namespace-profile-linux-amd64-4vcpu
    env:
      GOPATH: /tmp/go
    steps:
      - uses: namespacelabs/nscloud-checkout-action@445c25d7009680597d73eb03c4e1cd5be522ed73 # v9
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - name: Run unit tests with coverage
        run: >
          nix develop --command just test-coverage
      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-unit
          path: build/coverage/unit.out
          retention-days: 7
          if-no-files-found: ignore

  Tests-E2E:
    runs-on: namespace-profile-linux-amd64-4vcpu
    env:
      GOPATH: /tmp/go
    steps:
      - uses: namespacelabs/nscloud-checkout-action@445c25d7009680597d73eb03c4e1cd5be522ed73 # v9
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - name: Run E2E tests with coverage
        run: >
          nix develop --command just test-e2e-coverage
      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-e2e
          path: build/coverage/e2e.out
          retention-days: 7
          if-no-files-found: ignore

  Tests-Scenarios:
    runs-on: namespace-profile-linux-amd64-4vcpu
    env:
      GOPATH: /tmp/go
    steps:
      - uses: namespacelabs/nscloud-checkout-action@445c25d7009680597d73eb03c4e1cd5be522ed73 # v9
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - name: Run scenario tests with coverage
        run: >
          nix develop --command just test-scenarios-coverage
      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-scenario
          path: build/coverage/scenario.out
          retention-days: 7
          if-no-files-found: ignore

  Tests-Model:
    runs-on: namespace-profile-linux-amd64-4vcpu
    env:
      GOPATH: /tmp/go
    steps:
      - uses: namespacelabs/nscloud-checkout-action@445c25d7009680597d73eb03c4e1cd5be522ed73 # v9
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - name: Run in-memory model checker (3-node cluster, rolling restarts)
        run: >
          nix develop --command just test-model-cluster 180

  Coverage:
    if: always()
    needs: [Tests, Tests-E2E, Tests-Scenarios]
    runs-on: namespace-profile-linux-amd64-4vcpu
    env:
      GOPATH: /tmp/go
    steps:
      - uses: namespacelabs/nscloud-checkout-action@445c25d7009680597d73eb03c4e1cd5be522ed73 # v9
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - name: Download all coverage profiles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-*
          merge-multiple: true
          path: build/coverage
      - name: Merge coverage profiles
        run: |
          nix develop --command bash -c '
            cd build/coverage
            profiles=()
            for f in *.out; do
              [ -f "$f" ] && profiles+=("$f")
            done
            if [ ${#profiles[@]} -eq 0 ]; then
              echo "No coverage profiles found"
              exit 0
            fi
            echo "Merging ${#profiles[@]} profiles: ${profiles[*]}"
            head -1 "${profiles[0]}" > merged.out
            for f in "${profiles[@]}"; do
              tail -n +2 "$f" >> merged.out
            done
            go tool cover -func=merged.out | tail -1
          '
      - name: Upload to Codecov
        if: hashFiles('build/coverage/merged.out') != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: build/coverage/merged.out
          flags: unit,e2e,scenario
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  Build:
    runs-on: namespace-profile-linux-amd64-4vcpu
    env:
      GOPATH: /tmp/go
    steps:
      - uses: namespacelabs/nscloud-checkout-action@445c25d7009680597d73eb03c4e1cd5be522ed73 # v9
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - run: >
          nix develop --command go build ./...
      - name: Build operator
        run: >
          nix develop --command bash -c "cd misc/operator && go build ./..."

  Tests-Schemathesis:
    runs-on: namespace-profile-linux-amd64-4vcpu
    env:
      GOPATH: /tmp/go
    steps:
      - uses: namespacelabs/nscloud-checkout-action@445c25d7009680597d73eb03c4e1cd5be522ed73 # v9
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - name: Run Schemathesis API conformity tests
        run: >
          nix develop --command bash -c "MAX_EXAMPLES=10 just test-schemathesis"
      - name: Upload Schemathesis results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: schemathesis-report
          path: /tmp/schemathesis-*.txt
          retention-days: 14
          if-no-files-found: ignore

  Release-Latest:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs:
      [
        Dirty,
        Tests,
        Tests-E2E,
        Tests-Scenarios,
        Tests-Model,
        Tests-Schemathesis,
        Build,
      ]
    runs-on: namespace-profile-linux-amd64-4vcpu
    permissions:
      contents: write
      packages: write
    env:
      GOPATH: /tmp/go
      # See Build-PR-Image for the override semantics.
      IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY || 'ghcr.io/formancehq/ledger' }}
    steps:
      - uses: namespacelabs/nscloud-checkout-action@445c25d7009680597d73eb03c4e1cd5be522ed73 # v9
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - name: Set up Docker Buildx
        uses: namespacelabs/nscloud-setup-buildx-action@d059ed7184f0bc7c8b27e8810cea153d02bcc6dd # v0.0.23
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: NumaryBot
          password: ${{ secrets.NUMARY_GITHUB_TOKEN }}
      - name: Release nightly
        run: >
          nix develop --command just release-ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      - name: Build and push operator image
        run: >
          nix develop --command just operator-docker-build
      - name: Publish operator Helm charts
        run: >
          nix develop --command just operator-helm-publish '' nightly
        env:
          GITHUB_TOKEN: ${{ secrets.NUMARY_GITHUB_TOKEN }}

  Build-PR-Image:
    # Builds and pushes a docker image tagged `pr-<num>-<sha7>` so a
    # reviewer can deploy the PR build for smoke tests before merge.
    # The label is opt-in (apply manually on the PR) — every push to a
    # labeled PR republishes the image under a SHA-pinned tag, so no two
    # PRs ever fight for the same tag.
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'build-images')
    needs:
      [
        Dirty,
        Tests,
        Tests-E2E,
        Tests-Scenarios,
        Tests-Model,
        Tests-Schemathesis,
        Build,
      ]
    runs-on: namespace-profile-linux-amd64-4vcpu
    permissions:
      # Job-level `permissions:` REPLACES the workflow-level set (it does
      # not merge), so we must restate `contents: read` here — otherwise
      # the checkout action cannot clone this private repo and fails with
      # "repository not found".
      contents: read
      packages: write
    env:
      GOPATH: /tmp/go
      # IMAGE_REPOSITORY can be overridden via a repo-level GitHub Variable
      # (`vars.IMAGE_REPOSITORY`) to publish PR images to a different GHCR
      # location while the repo rename is in flight. Default targets the
      # canonical `formancehq/ledger` published image.
      IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY || 'ghcr.io/formancehq/ledger' }}
    steps:
      - uses: namespacelabs/nscloud-checkout-action@445c25d7009680597d73eb03c4e1cd5be522ed73 # v9
        with:
          fetch-depth: 0
          dissociate: true
          # Default checkout on `pull_request` produces a synthetic merge
          # commit. Pin to the PR HEAD so the image tag matches the
          # commit the contributor actually pushed.
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Setup Env
        uses: ./.github/actions/default
      - name: Set up Docker Buildx
        uses: namespacelabs/nscloud-setup-buildx-action@d059ed7184f0bc7c8b27e8810cea153d02bcc6dd # v0.0.23
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: NumaryBot
          password: ${{ secrets.NUMARY_GITHUB_TOKEN }}
      - name: Compute image tag
        id: tag
        run: |
          short=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          tag="pr-${{ github.event.pull_request.number }}-${short}"
          image="${IMAGE_REPOSITORY}:${tag}"
          echo "tag=${tag}"     >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
      - name: Build and push PR image
        run: >
          nix develop --command just docker-build-pr '${{ steps.tag.outputs.image }}'
      - name: Summarize image digest
        if: always()
        run: |
          image='${{ steps.tag.outputs.image }}'
          digest=$(docker buildx imagetools inspect "$image" --format '{{ .Manifest.Digest }}' 2>/dev/null || echo "(inspect failed)")
          {
            echo "## PR docker image"
            echo ""
            echo "| Image | Digest |"
            echo "|---|---|"
            echo "| \`${image}\` | \`${digest}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
