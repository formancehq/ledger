name: Default
on:
  merge_group:
  push:
    branches:
      - master
      - release/*
  pull_request:
    types: [assigned, opened, synchronize, reopened, labeled]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Disabled: amannn/action-semantic-pull-request requires repo access that
  # the GitHub App doesn't have on this private repo.
  # PR:
  #   if: github.event_name == 'pull_request'
  #   name: Check PR Title
  #   runs-on: ubuntu-latest
  #   permissions:
  #     statuses: write
  #   steps:
  #     - uses: amannn/action-semantic-pull-request@v5
  #       env:
  #         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Dirty:
    runs-on: namespace-profile-linux-amd64-4vcpu
    env:
      GOPATH: /tmp/go
      GOLANGCI_LINT_CACHE: /tmp/golangci-lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - run: >
          nix develop --command just pre-commit
      - name: Get changed files
        id: changed-files
        shell: bash
        run: |
          hasChanged=$(git status --porcelain)
          if (( $(echo ${#hasChanged}) != 0 )); then
            git status
            echo "There are changes in the repository"
            git diff
            exit 1
          fi

  Tests:
    runs-on: namespace-profile-linux-amd64-4vcpu
    env:
      GOPATH: /tmp/go
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - name: Run unit tests with coverage
        run: >
          nix develop --command just test-coverage
      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: build/coverage/unit.out
          retention-days: 7
          if-no-files-found: ignore

  Tests-E2E:
    runs-on: namespace-profile-linux-amd64-4vcpu
    env:
      GOPATH: /tmp/go
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - name: Run E2E tests with coverage
        run: >
          nix develop --command just test-e2e-coverage
      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e
          path: build/coverage/e2e.out
          retention-days: 7
          if-no-files-found: ignore

  Tests-Scenarios:
    runs-on: namespace-profile-linux-amd64-4vcpu
    env:
      GOPATH: /tmp/go
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - name: Run scenario tests with coverage
        run: >
          nix develop --command just test-scenarios-coverage
      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-scenario
          path: build/coverage/scenario.out
          retention-days: 7
          if-no-files-found: ignore

  Coverage:
    if: always()
    needs: [Tests, Tests-E2E, Tests-Scenarios]
    runs-on: namespace-profile-linux-amd64-4vcpu
    env:
      GOPATH: /tmp/go
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - name: Download all coverage profiles
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true
          path: build/coverage
      - name: Merge coverage profiles
        run: |
          nix develop --command bash -c '
            cd build/coverage
            profiles=()
            for f in *.out; do
              [ -f "$f" ] && profiles+=("$f")
            done
            if [ ${#profiles[@]} -eq 0 ]; then
              echo "No coverage profiles found"
              exit 0
            fi
            echo "Merging ${#profiles[@]} profiles: ${profiles[*]}"
            head -1 "${profiles[0]}" > merged.out
            for f in "${profiles[@]}"; do
              tail -n +2 "$f" >> merged.out
            done
            go tool cover -func=merged.out | tail -1
          '
      - name: Upload to Codecov
        if: hashFiles('build/coverage/merged.out') != ''
        uses: codecov/codecov-action@v5
        with:
          files: build/coverage/merged.out
          flags: unit,e2e,scenario
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  Build:
    runs-on: namespace-profile-linux-amd64-4vcpu
    env:
      GOPATH: /tmp/go
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - run: >
          nix develop --command go build ./...
      - name: Build operator
        run: >
          nix develop --command bash -c "cd misc/operator && go build ./..."

  Tests-Schemathesis:
    runs-on: namespace-profile-linux-amd64-4vcpu
    env:
      GOPATH: /tmp/go
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - name: Run Schemathesis API conformity tests
        continue-on-error: true
        run: >
          nix develop --command bash -c "MAX_EXAMPLES=10 just test-schemathesis"
      - name: Upload Schemathesis results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schemathesis-report
          path: /tmp/schemathesis-*.txt
          retention-days: 14
          if-no-files-found: ignore

  Release-Latest:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs:
      [
        Dirty,
        Tests,
        Tests-E2E,
        Tests-Scenarios,
        Tests-Schemathesis,
        Build,
      ]
    runs-on: namespace-profile-linux-amd64-4vcpu
    permissions:
      contents: write
      packages: write
    env:
      GOPATH: /tmp/go
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          dissociate: true
      - name: Setup Env
        uses: ./.github/actions/default
      - name: Set up Docker Buildx
        uses: namespacelabs/nscloud-setup-buildx-action@v0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: NumaryBot
          password: ${{ secrets.NUMARY_GITHUB_TOKEN }}
      - name: Release nightly
        run: >
          nix develop --command just release-ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      - name: Build and push operator image
        run: >
          nix develop --command just operator-docker-build
      - name: Publish operator Helm charts
        run: >
          nix develop --command just operator-helm-publish suffix='nightly'
        env:
          GITHUB_TOKEN: ${{ secrets.NUMARY_GITHUB_TOKEN }}
