# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
---
version: 2
project_name: ledger-v3

builds:
- binary: ledger-server
  id: ledger-server
  tags:
  - kafka
  - nats
  - clickhouse
  - databricks
  - s3
  - pyroscope
  ldflags:
  - -X main.Version={{ .Version }}
  - -X main.Commit={{ .ShortCommit }}
  - -X main.BuildDate={{ .Date }}
  - -extldflags=-static
  env:
  - CGO_ENABLED=0
  goos:
  - linux
  - darwin
  goarch:
  - amd64
  - arm64

- binary: ledgerctl
  id: ledgerctl
  main: ./cmd/ledgerctl
  ldflags:
  - -X main.Version={{ .Version }}
  - -X main.Commit={{ .ShortCommit }}
  - -X main.BuildDate={{ .Date }}
  - -extldflags=-static
  env:
  - CGO_ENABLED=0
  goos:
  - linux
  - darwin
  goarch:
  - amd64
  - arm64

nightly:
  tag_name: nightly
  publish_release: true
  version_template: nightly-{{ .ShortCommit }}

release:
  prerelease: auto
  extra_files:
  - glob: openapi.yml

archives:
- id: "{{ .ProjectName }}"
  ids:
  - ledger-server
  - ledgerctl
  formats:
  - tar.gz
  name_template: "{{ .ProjectName }}_{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
    - "^docs:"
    - "^chore:"
    - "^ci:"

dockers:
- image_templates: ["ghcr.io/formancehq/ledger-v3-poc:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-amd64"]
  goarch: amd64
  ids:
  - ledger-server
  - ledgerctl
  dockerfile: build.Dockerfile
  use: buildx
  build_flag_templates:
  - --provenance=false
  - --platform=linux/amd64
  - --label=org.opencontainers.image.title=ledger-v3-poc
  - --label=org.opencontainers.image.description=ledger-v3-poc
  - --label=org.opencontainers.image.url=https://github.com/formancehq/ledger-v3-poc
  - --label=org.opencontainers.image.source=https://github.com/formancehq/ledger-v3-poc
  - --label=org.opencontainers.image.version={{ .Version }}
  - --label=org.opencontainers.image.created={{ time "2006-01-02T15:04:05Z07:00" }}
  - --label=org.opencontainers.image.revision={{ .FullCommit }}
  - --label=org.opencontainers.image.licenses=MIT
- image_templates: ["ghcr.io/formancehq/ledger-v3-poc:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-arm64"]
  goarch: arm64
  ids:
  - ledger-server
  - ledgerctl
  dockerfile: build.Dockerfile
  use: buildx
  build_flag_templates:
  - --provenance=false
  - --platform=linux/arm64/v8
  - --label=org.opencontainers.image.title=ledger-v3-poc
  - --label=org.opencontainers.image.description=ledger-v3-poc
  - --label=org.opencontainers.image.url=https://github.com/formancehq/ledger-v3-poc
  - --label=org.opencontainers.image.source=https://github.com/formancehq/ledger-v3-poc
  - --label=org.opencontainers.image.version={{ .Version }}
  - --label=org.opencontainers.image.created={{ time "2006-01-02T15:04:05Z07:00" }}
  - --label=org.opencontainers.image.revision={{ .FullCommit }}
  - --label=org.opencontainers.image.licenses=MIT

docker_manifests:
- name_template: 'ghcr.io/formancehq/ledger-v3-poc:{{ if not .IsNightly }}v{{ end }}{{ .Version }}'
  image_templates:
  - 'ghcr.io/formancehq/ledger-v3-poc:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-amd64'
  - 'ghcr.io/formancehq/ledger-v3-poc:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-arm64'
- name_template: '{{ if not .IsNightly }}{{ if not .Prerelease }}ghcr.io/formancehq/ledger-v3-poc:latest{{ end }}{{ end }}'
  image_templates:
  - 'ghcr.io/formancehq/ledger-v3-poc:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-amd64'
  - 'ghcr.io/formancehq/ledger-v3-poc:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-arm64'
