---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: k6-run-any-unbounded-to-any
  namespace: bench
spec:
  parallelism: 10
  #separate: true
  #cleanup: 'post'
  script:
    configMap:
      name: k6-archive-any-unbounded-to-any
      file: any_unbounded_to_any.tar
  runner:
    env:
    - name: LEDGER_URL
      value: http://ledger-exp.ledger.svc.cluster.local:9000
#    - name: VUS
#      value: "512"
#    - name: DURATION
#      value: "10m"
    - name: K6_STAGES
      value: "30s:512,10m:512,30s:0"
