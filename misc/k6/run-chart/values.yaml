# Default values for k6-run chart
script: ""
spec:
  parallelism: 1
metadata:
  namespace: ""
runner:
  env:
    ledgerName: "ledger0"
    stages: ""
  otlp:
    endpoint: "otel-opentelemetry-collector.ledger-exp.svc.cluster.local:4317"
  # nodeSelector applied to k6 runner pods
  # Example:
  #   nodeSelector:
  #     kubernetes.io/os: linux
  #     nodepool: k6-runners
  nodeSelector: {}
  # tolerations applied to k6 runner pods
  # Example:
  #   tolerations:
  #     - effect: NoSchedule
  #       key: dedicated
  #       operator: Equal
  #       value: k6-runners
  tolerations: []
archiveData: ""

ledgerJob:
  enabled: true
  image:
    repository: curlimages/curl
    tag: "8.7.1"
  backoffLimit: 2

ledgerCleanup:
  enabled: true
  image:
    repository: alpine/kubectl
    tag: "1.35.0"
  pollInterval: 5
  ttlSecondsAfterFinished: 300
