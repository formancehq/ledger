{{- if .Values.ledgerJob.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "k6-run.fullname" . }}-ledger-create
  {{- if .Values.metadata.namespace }}
  namespace: {{ .Values.metadata.namespace }}
  {{- end }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.ledgerJob.backoffLimit }}
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-ledger
          image: "{{ .Values.ledgerJob.image.repository }}:{{ .Values.ledgerJob.image.tag }}"
          env:
            - name: GRPC_ADDR
              value: {{ .Values.runner.env.GRPC_ADDR }}
            - name: LEDGER_NAME
              value: {{ .Values.runner.env.LEDGER_NAME }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -euo pipefail
              wget -qO- "https://github.com/fullstorydev/grpcurl/releases/download/v{{ .Values.grpcurl.version }}/grpcurl_{{ .Values.grpcurl.version }}_linux_{{ .Values.grpcurl.arch }}.tar.gz" | tar xz -C /usr/local/bin grpcurl
              # Try to create the ledger via gRPC; AlreadyExists is acceptable
              output=$(grpcurl -plaintext \
                -d "{\"requests\":[{\"create_ledger\":{\"name\":\"$LEDGER_NAME\"}}]}" \
                "$GRPC_ADDR" ledger.BucketService/Apply 2>&1) && exit 0
              # If AlreadyExists (code 6), treat as success
              if echo "$output" | grep -q "AlreadyExists"; then
                exit 0
              fi
              echo "failed to create ledger:" >&2
              echo "$output" >&2
              exit 1
{{- end }}
