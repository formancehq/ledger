---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: {{ include "k6-run.fullname" . }}
  {{- if .Values.metadata.namespace }}
  namespace: {{ .Values.metadata.namespace }}
  {{- end }}
spec:
  parallelism: {{ .Values.spec.parallelism }}
  {{- if .Values.spec.separate }}
  separate: {{ .Values.spec.separate }}
  {{- end }}
  {{- if .Values.spec.cleanup }}
  cleanup: '{{ .Values.spec.cleanup }}'
  {{- end }}
  script:
    configMap:
      name: {{ include "k6-run.configmapName" . }}
      file: {{ .Values.script }}.tar
  runner:
    env:
    - name: LEDGER_URL
      value: {{ .Values.runner.env.ledgerUrl }}
    {{- if .Values.runner.env.stages }}
    - name: K6_STAGES
      value: "{{ .Values.runner.env.stages }}"
    {{- end }}
