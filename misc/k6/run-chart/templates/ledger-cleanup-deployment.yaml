{{- if .Values.ledgerCleanup.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "k6-run.fullname" . }}-cleanup
  {{- if .Values.metadata.namespace }}
  namespace: {{ .Values.metadata.namespace }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "k6-run.fullname" . }}-cleanup
  {{- if .Values.metadata.namespace }}
  namespace: {{ .Values.metadata.namespace }}
  {{- end }}
rules:
  - apiGroups: ["k6.io"]
    resources: ["testruns"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "k6-run.fullname" . }}-cleanup
  {{- if .Values.metadata.namespace }}
  namespace: {{ .Values.metadata.namespace }}
  {{- end }}
subjects:
  - kind: ServiceAccount
    name: {{ include "k6-run.fullname" . }}-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "k6-run.fullname" . }}-cleanup
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "k6-run.fullname" . }}-cleanup
  {{- if .Values.metadata.namespace }}
  namespace: {{ .Values.metadata.namespace }}
  {{- end }}
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: {{ .Values.ledgerCleanup.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "k6-run.name" . }}-cleanup
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "k6-run.fullname" . }}-cleanup
      restartPolicy: OnFailure
      initContainers:
        - name: watch-testrun
          image: "{{ .Values.ledgerCleanup.watchImage.repository }}:{{ .Values.ledgerCleanup.watchImage.tag }}"
          env:
            - name: NAMESPACE
              value: {{ .Values.metadata.namespace | default .Release.Namespace }}
            - name: TESTRUN_NAME
              value: {{ include "k6-run.fullname" . }}
            - name: POLL_INTERVAL
              value: {{ .Values.ledgerCleanup.pollInterval | quote }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -euo pipefail
              echo "waiting for TestRun ${TESTRUN_NAME} in ${NAMESPACE}"
              while true; do
                stage=$(kubectl -n "$NAMESPACE" get testrun "$TESTRUN_NAME" -o jsonpath='{.status.stage}' 2>/dev/null || true)
                if [ "$stage" = "finished" ] || [ "$stage" = "error" ] || [ "$stage" = "stopped" ]; then
                  echo "TestRun reached stage: $stage"
                  break
                fi
                sleep "$POLL_INTERVAL"
              done
      containers:
        - name: delete-ledger
          image: "{{ .Values.ledgerCleanup.grpcImage.repository }}:{{ .Values.ledgerCleanup.grpcImage.tag }}"
          env:
            - name: GRPC_ADDR
              value: {{ .Values.runner.env.GRPC_ADDR }}
            - name: LEDGER_NAME
              value: {{ .Values.runner.env.LEDGER_NAME }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -euo pipefail
              wget -qO- "https://github.com/fullstorydev/grpcurl/releases/download/v{{ .Values.grpcurl.version }}/grpcurl_{{ .Values.grpcurl.version }}_linux_{{ .Values.grpcurl.arch }}.tar.gz" | tar xz -C /usr/local/bin grpcurl
              output=$(grpcurl -plaintext \
                -d "{\"requests\":[{\"delete_ledger\":{\"name\":\"$LEDGER_NAME\"}}]}" \
                "$GRPC_ADDR" ledger.BucketService/Apply 2>&1) && { echo "ledger deleted"; exit 0; }
              # If NotFound (code 5), treat as success
              if echo "$output" | grep -q "NotFound"; then
                echo "ledger already deleted or not found"
                exit 0
              fi
              echo "failed to delete ledger:" >&2
              echo "$output" >&2
{{- end }}
