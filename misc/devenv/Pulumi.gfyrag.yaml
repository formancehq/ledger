config:
  ledger-exp-devenv:formance-dev-registry-password:
    secure: AAABAPaMVBEAgJxOclkhhDaUtOnTyy1V0aErxzRr4T2q7at0nL+7h3u5xV8xNNj3nlq+CTo5PRDu9D+cgPvXFA==
  ledger-exp-devenv:grafana:
    adminPassword: admin
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - access: proxy
            editable: true
            isDefault: true
            name: VictoriaMetrics
            type: prometheus
            url: http://vm-victoria-metrics-single-server.monitoring.svc.cluster.local:8428
          - access: proxy
            editable: true
            name: Tempo
            type: tempo
            url: http://tempo.monitoring.svc.cluster.local:3200
          - access: proxy
            editable: true
            name: Loki
            type: loki
            url: http://loki.monitoring.svc.cluster.local:3100
          - access: proxy
            editable: true
            isDefault: false
            jsonData:
              allowedHosts:
                - http://ledger-v3-poc.default.svc.cluster.local:9000
            name: HTTP Infinity
            type: yesoreyeram-infinity-datasource
            uid: http-infinity
          - access: proxy
            editable: true
            isDefault: false
            jsonData:
              timeout: 10
            name: HTTP JSON API
            type: marcusolsson-json-datasource
            uid: http-json-api
            url: http://ledger-v3-poc.default.svc.cluster.local:9000
    deploymentStrategy:
      type: Recreate
    grafana.ini:
      server:
        root_url: https://grafana.ledger-exp.v2.formance.dev
        serve_from_sub_path: false
      snapshots:
        external_enabled: false
    ingress:
      annotations:
        cert-manager.io/cluster-issuer: zerossl
        nginx.ingress.kubernetes.io/proxy-body-size: 10m
        nginx.ingress.kubernetes.io/proxy-buffer-size: 4m
        nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
        nginx.ingress.kubernetes.io/proxy-busy-buffers-size: 4m
      enabled: true
      hosts:
        - grafana.ledger-exp.v2.formance.dev
      path: /
      pathType: Prefix
      tls:
        - hosts:
            - grafana.ledger-exp.v2.formance.dev
          secretName: grafana-tls
    persistence:
      accessModes:
        - ReadWriteOnce
      enabled: true
      finalizers:
        - kubernetes.io/pvc-protection
      size: 5Gi
      type: pvc
    plugins:
      - marcusolsson-json-datasource
      - yesoreyeram-infinity-datasource
      - pgillich-tree-panel
    resources:
      limits:
        cpu: 300m
        memory: 512Mi
      requests:
        cpu: 50m
        memory: 128Mi
    service:
      type: ClusterIP
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: monitoring
      datasources:
        enabled: true
  ledger-exp-devenv:k6operator:
    namespace:
      create: false
  ledger-exp-devenv:ledger:
    config:
      bindAddr: 0.0.0.0:8888
      dataDir: /data/raft
      debug: false
      httpPort: 9000
      monitoring:
        logs:
          enabled: true
          endpoint: otel-opentelemetry-collector.monitoring.svc.cluster.local
          exporter: otlp
          insecure: "true"
          mode: grpc
          port: "4317"
        metrics:
          batch: "true"
          enabled: true
          endpoint: otel-opentelemetry-collector.monitoring.svc.cluster.local
          exporter: otlp
          exporterPushInterval: 5s
          insecure: "true"
          mode: grpc
          port: "4317"
          runtimeMinimumReadMemStatsInterval: 5s
        serviceName: ledger-v3-poc
        traces:
          batch: "true"
          enabled: true
          endpoint: otel-opentelemetry-collector.monitoring.svc.cluster.local
          exporter: otlp
          insecure: "true"
          mode: grpc
          port: "4317"
      raft:
        electionTick: 10
        heartbeatTick: 1
        maxInflightMsgs: 512
        maxSizePerMsg: 2097152
        multiplexedTransport:
          receptionQueues:
            - 10
            - 2048
            - 2048
          sendQueues:
            - 10
            - 1024
            - 1024
        proposeQueueCapacity: 512
        snapshotInterval: 30s
        snapshotThreshold: 15000
        tickInterval: 100ms
        transport:
          receptionQueues:
            - 10
            - 2048
            - 2048
          sendQueues:
            - 10
            - 1024
            - 1024
    headlessService:
      enabled: true
    imagePullSecrets:
      - name: zot
    ingress:
      enabled: true
      hosts:
        - host: ledger-exp.v2.formance.dev
          paths:
            - path: /
              pathType: Prefix
      perPod:
        enabled: true
    persistence:
      persistentVolumeClaimRetentionPolicy:
        whenDeleted: Delete
    replicaCount: 3
    resources:
      limits:
        cpu: 4000m
        memory: 2048Mi
      requests:
        cpu: 4000m
        memory: 2048Mi
    service:
      grpcPort: 8888
      httpPort: 9000
      type: ClusterIP
  ledger-exp-devenv:ledger-exp-formance-dev-registry-password:
    secure: AAABAK2awxYQ7ganrO/Ejx+duAcsREY4Mzv2UxayK1TiqKJoE5c5C4L4O6Ykjvnmd3Ub9/zEPeR88CKz/Y1Igw==
  ledger-exp-devenv:ledger-exp-formance-dev-registry-username:
    secure: AAABAFbSv4doXf469x49kIH2r5yGJt5xZr6DaBDlJtAIVI4VR750gg==
  ledger-exp-devenv:loki:
    backend:
      replicas: 0
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      config: |
        auth_enabled: false

        server:
          http_listen_port: 3100

        common:
          path_prefix: /var/loki
          replication_factor: 1
          ring:
            kvstore:
              store: inmemory
          storage:
            filesystem:
              chunks_directory: /var/loki/chunks
              rules_directory: /var/loki/rules

        schema_config:
          configs:
            - from: 2024-04-01
              store: tsdb
              object_store: filesystem
              schema: v13
              index:
                prefix: loki_index_
                period: 24h

        storage_config:
          filesystem:
            directory: /var/loki/chunks

        limits_config:
          allow_structured_metadata: true

          otlp_config:
            resource_attributes:
              attributes_config:
                - action: index_label
                  attributes:
                    - service.name
                    - service.node_id

        ruler:
          enable_api: false
      schemaConfig:
        configs:
          - from: "2024-04-01"
            index:
              period: 24h
              prefix: loki_index_
            object_store: filesystem
            schema: v13
            store: tsdb
      storage:
        bucketNames:
          admin: loki-admin
          chunks: loki-chunks
          ruler: loki-ruler
    persistence:
      enabled: true
      size: 10Gi
    read:
      replicas: 0
    singleBinary:
      replicas: 1
    write:
      replicas: 0
  ledger-exp-devenv:otlp:
    config:
      exporters:
        debug:
          verbosity: detailed
        otlp/tempo:
          endpoint: tempo.monitoring.svc.cluster.local:4317
          tls:
            insecure: true
        otlphttp/logs:
          endpoint: http://loki.monitoring.svc.cluster.local:3100/otlp
          tls:
            insecure: true
        otlphttp/victoriametrics:
          compression: gzip
          encoding: proto
          metrics_endpoint: http://vm-victoria-metrics-single-server.monitoring.svc.cluster.local:8428/opentelemetry/v1/metrics
          tls:
            insecure: true
      processors:
        batch: {}
      receivers:
        otlp:
          protocols:
            grpc: {}
      service:
        pipelines:
          logs:
            exporters:
              - otlphttp/logs
              - debug
            processors:
              - batch
            receivers:
              - otlp
          metrics:
            exporters:
              - otlphttp/victoriametrics
            processors:
              - batch
            receivers:
              - otlp
          traces:
            exporters:
              - otlp/tempo
            processors:
              - batch
            receivers:
              - otlp
    image:
      repository: otel/opentelemetry-collector-contrib
    mode: deployment
    ports:
      otlp:
        enabled: true
      otlp-http:
        enabled: false
  ledger-exp-devenv:registry: fo.registry.ovh-gra.kers.sh
  ledger-exp-devenv:tempo:
    persistence:
      enabled: true
      size: 10Gi
    service:
      type: ClusterIP
    tempo:
      storage:
        trace:
          backend: local
          local:
            path: /var/tempo/traces
    traces:
      otlp:
        grpc:
          enabled: true
        http:
          enabled: false
  ledger-exp-devenv:victoriametrics:
    promscrape:
      enabled: true
    server:
      persistentVolume:
        enabled: true
        size: 10Gi
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 256Mi
    service:
      type: ClusterIP
  ledger-exp-devenv:formance-dev-registry-username:
    secure: AAABAMLoXL1YUSXws+8z8cBmheRQ8I7I/FdiHNHAioYdIhkXiz1n0Q==
