config:
  bindAddr: 0.0.0.0:7777  # Raft transport port (internal inter-node communication)
  grpcPort: 8888          # Service gRPC port (external client-facing API)
  dataDir: /data/data
  walDir: /data/wal
  debug: false
  httpPort: 9000
  audit:
    enabled: true
  cache:
    rotationThreshold: 2000  # Raft entries before rotating cache generations
  # Pebble storage configuration
  pebble:
    memTableSize: 67108864           # 64MB
    memTableStopWritesThreshold: 4
    l0CompactionThreshold: 64
    l0StopWritesThreshold: 256
    lBaseMaxBytes: 2147483648       # 2GB
    cacheSize: 536870912            # 512MB
    targetFileSize: 268435456       # 256MB
    bytesPerSync: 1048576           # 1MB
    walBytesPerSync: 1048576        # 1MB
    maxConcurrentCompactions: 2
    walMinSyncInterval: "0"
    disableWAL: false
  monitoring:
    logs:
      enabled: true
      endpoint: otel-opentelemetry-collector.ledger-v3
      exporter: otlp
      insecure: "true"
      mode: grpc
      port: "4317"
    metrics:
      enabled: true
      runtime: true
      endpoint: otel-opentelemetry-collector.ledger-v3
      exporter: otlp
      exporterPushInterval: 15s
      insecure: "true"
      mode: grpc
      port: "4317"
      runtimeMinimumReadMemStatsInterval: 5s
    serviceName: ledger-v3
    traces:
      batch: "true"
      enabled: true
      endpoint: otel-opentelemetry-collector.ledger-v3
      exporter: otlp
      insecure: "true"
      mode: grpc
      port: "4317"
      sampling:
        enabled: true
        successRatio: "0.1"  # Sampling ratio for successful traces (0.0-1.0)
    pyroscope:
      enabled: true
      serverAddress: http://pyroscope.ledger-v3:4040
      applicationName: ledger-v3
  auth:
    scopeMapping:
      "ledger:read":
        - "ledgers:read"
        - "transactions:read"
        - "accounts:read"
        - "audit:read"
        - "ops:read"
        - "queries:read"
      "ledger:write":
        - "ledgers:write"
        - "transactions:write"
        - "metadata:write"
        - "audit:write"
        - "ops:write"
        - "queries:write"
  raft:
    electionTick: 10
    heartbeatTick: 1
    maxInflightMsgs: 1024
    maxSizePerMsg: 2097152
    compactionMargin: 50000
    proposeQueueCapacity: 1024
    snapshotThreshold: 1000
    tickInterval: 100ms
    transport:
      receptionQueues:
        - 10
        - 4096
        - 2048
      sendQueues:
        - 10
        - 1024
        - 1024
headlessService:
  enabled: true

persistence:
  retentionPolicy:
    whenDeleted: Delete
  # WAL persistence (Raft logs)
  wal:
    size: 15Gi
  # Data persistence (application storage)
  data:
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 50Gi

autoNetworking:
  tld: dev.acme.frmnc.net
  suffix: "-ledger-v3"
  ingress:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: https-private
      traefik.ingress.kubernetes.io/router.observability.tracing: "true"
      traefik.ingress.kubernetes.io/router.tls: "true"
    labels:
      formance.com/ingress: traefik
  ingressGrpc:
    enabled: true
    suffix: "-grpc"
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: https-private
      traefik.ingress.kubernetes.io/router.observability.tracing: "true"
      traefik.ingress.kubernetes.io/router.tls: "true"
    labels:
      formance.com/ingress: traefik
    serviceAnnotations:
      traefik.ingress.kubernetes.io/service.serversscheme: h2c
  dnsEndpoint:
    enabled: true
    recordType: CNAME
    recordTTL: 300
    targets:
      - rp-01-eks-euw1-01.dev.acme.frmnc.net
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    providerSpecific:
      - name: alias
        value: "true"
      - name: aws/target-hosted-zone
        value: same-zone

networkPolicy:
  enabled: true

replicas: 3
resources:
  limits:
    cpu: 2000m
    memory: 2048Mi
  requests:
    cpu: 2000m
    memory: 2048Mi
service:
  grpcPort: 8888
  httpPort: 9000
  type: ClusterIP
