config:
  bindAddr: 0.0.0.0:8888
  dataDir: /data/data
  walDir: /data/wal
  debug: false
  httpPort: 9000
  storageType: pebble
  monitoring:
    logs:
      enabled: true
      endpoint: otel-opentelemetry-collector
      exporter: otlp
      insecure: "true"
      mode: grpc
      port: "4317"
    metrics:
      batch: "true"
      enabled: true
      endpoint: otel-opentelemetry-collector
      exporter: otlp
      exporterPushInterval: 5s
      insecure: "true"
      mode: grpc
      port: "4317"
      runtimeMinimumReadMemStatsInterval: 5s
    serviceName: ledger-v3-poc
    traces:
      batch: "true"
      enabled: true
      endpoint: otel-opentelemetry-collector
      exporter: otlp
      insecure: "true"
      mode: grpc
      port: "4317"
    pyroscope:
      enabled: true
      serverAddress: "http://pyroscope:4040"
      profileTypes: "cpu,alloc_objects,alloc_space,inuse_objects,inuse_space"
      uploadRate: "15s"
      mutexProfileFraction: 5
      blockProfileRate: 5
  raft:
    electionTick: 10
    heartbeatTick: 1
    maxInflightMsgs: 1024
    maxSizePerMsg: 2097152
    compactionMargin: 50000
    proposeQueueCapacity: 1024
    snapshotInterval: 30s
    snapshotThreshold: "999999"
    tickInterval: 100ms
    transport:
      receptionQueues:
        - 10
        - 4096
        - 2048
      sendQueues:
        - 10
        - 1024
        - 1024
headlessService:
  enabled: true
ingress:
  enabled: true
  hosts:
    - host: ledger-exp.staging.formance.cloud
      paths:
        - path: /
          pathType: Prefix
  perPod:
    enabled: true
persistence:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
replicaCount: 1
resources:
  limits:
    cpu: 4000m
    memory: 2048Mi
  requests:
    cpu: 4000m
    memory: 2048Mi
service:
  grpcPort: 8888
  httpPort: 9000
  type: ClusterIP

# Run nodes on dedicated nodes
nodeSelector:
  formance.com/dedicated: ledger
tolerations:
  - effect: NoSchedule
    key: formance.com/dedicated
    operator: Equal
    value: ledger