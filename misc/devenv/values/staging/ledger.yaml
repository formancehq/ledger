config:
  bindAddr: 0.0.0.0:8888
  dataDir: /data/data
  walDir: /data/wal
  debug: false
  httpPort: 9000
  # Pebble storage configuration
  pebble:
    memTableSize: 268435456         # 256MB
    memTableStopWritesThreshold: 6
    l0CompactionThreshold: 64
    l0StopWritesThreshold: 256
    lBaseMaxBytes: 2147483648       # 2GB
    cacheSize: 1073741824           # 1GB
    targetFileSize: 268435456       # 256MB
    bytesPerSync: 1048576           # 1MB
    walBytesPerSync: 1048576        # 1MB
    maxConcurrentCompactions: 2
    walMinSyncInterval: "0"
    disableWAL: false
  monitoring:
    logs:
      enabled: true
      endpoint: otel-opentelemetry-collector
      exporter: otlp
      insecure: "true"
      mode: grpc
      port: "4317"
    metrics:
      batch: "true"
      enabled: true
      endpoint: otel-opentelemetry-collector
      exporter: otlp
      exporterPushInterval: 5s
      insecure: "true"
      mode: grpc
      port: "4317"
      runtimeMinimumReadMemStatsInterval: 5s
    serviceName: ledger-v3-poc
    traces:
      batch: "true"
      enabled: true
      endpoint: otel-opentelemetry-collector
      exporter: otlp
      insecure: "true"
      mode: grpc
      port: "4317"
      sampling:
        enabled: true
        successRatio: 0.1    # Sampling ratio for successful traces (0.0-1.0)
    pyroscope:
      enabled: true
      serverAddress: "http://pyroscope:4040"
      profileTypes: "cpu,alloc_objects,alloc_space,inuse_objects,inuse_space,goroutines,mutex_count,mutex_duration,block_count,block_duration"
      uploadRate: "15s"
      mutexProfileFraction: 5
      blockProfileRate: 5
  raft:
    electionTick: 10
    heartbeatTick: 1
    maxInflightMsgs: 1024
    maxSizePerMsg: 2097152
    compactionMargin: 50000
    proposeQueueCapacity: 1024
    snapshotInterval: 30s
    snapshotThreshold: "10000"
    tickInterval: 100ms
    transport:
      receptionQueues:
        - 10
        - 4096
        - 2048
      sendQueues:
        - 10
        - 1024
        - 1024
headlessService:
  enabled: true
ingress:
  enabled: true
  hosts:
    - host: ledger-exp.staging.formance.cloud
      paths:
        - path: /
          pathType: Prefix
  perPod:
    enabled: true
ingressGrpc:
  enabled: true
  className: traefik
  hosts:
    - host: grpc-ledger-exp.staging.formance.cloud
      paths:
        - path: /
          pathType: Prefix
  targetGroupBinding:
    enabled: true
    targetGroupARN: "arn:aws:elasticloadbalancing:eu-west-1:955332203423:targetgroup/geoffrey-ledger-v3-grpc/e549d74021a8e711"
    targetType: ip
persistence:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
  # WAL persistence (Raft logs)
  wal:
    size: 15Gi
  # Data persistence (application storage)
  data:
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 50Gi

replicaCount: 1
resources:
  limits:
    cpu: 8000m
    memory: 6144Mi
  requests:
    cpu: 8000m
    memory: 6144Mi
service:
  grpcPort: 8888
  httpPort: 9000
  type: ClusterIP

# Run nodes on dedicated nodes
nodeSelector:
  formance.com/dedicated: ledger
tolerations:
  - effect: NoSchedule
    key: formance.com/dedicated
    operator: Equal
    value: ledger