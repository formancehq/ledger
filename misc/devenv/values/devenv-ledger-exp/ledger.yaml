config:
  bindAddr: 0.0.0.0:7777  # Raft transport port (internal inter-node communication)
  grpcPort: 8888          # Service gRPC port (external client-facing API)
  dataDir: /data/data
  walDir: /data/wal
  debug: false
  httpPort: 9000
  # Pebble storage configuration
  pebble:
    memTableSize: 67108864           # 64MB
    memTableStopWritesThreshold: 4
    l0CompactionThreshold: 64
    l0StopWritesThreshold: 256
    lBaseMaxBytes: 2147483648       # 2GB
    cacheSize: 536870912            # 512MB
    targetFileSize: 268435456       # 256MB
    bytesPerSync: 1048576           # 1MB
    walBytesPerSync: 1048576        # 1MB
    maxConcurrentCompactions: 2
    walMinSyncInterval: "0"
    disableWAL: false
  monitoring:
    logs:
      enabled: true
      endpoint: otel-opentelemetry-collector
      exporter: otlp
      insecure: "true"
      mode: grpc
      port: "4317"
    metrics:
      enabled: true
      endpoint: otel-opentelemetry-collector
      exporter: otlp
      exporterPushInterval: 5s
      insecure: "true"
      mode: grpc
      port: "4317"
      runtimeMinimumReadMemStatsInterval: 5s
    serviceName: ledger-v3-poc
    traces:
      batch: "true"
      enabled: true
      endpoint: otel-opentelemetry-collector
      exporter: otlp
      insecure: "true"
      mode: grpc
      port: "4317"
      sampling:
        enabled: true
        successRatio: "0.1"
    pyroscope:
      enabled: true
      serverAddress: "http://pyroscope:4040"
      profileTypes: "cpu,alloc_objects,alloc_space,inuse_objects,inuse_space,goroutines,mutex_count,mutex_duration,block_count,block_duration"
      uploadRate: "15s"
      mutexProfileFraction: 5
      blockProfileRate: 5
  raft:
    electionTick: 10
    heartbeatTick: 1
    maxInflightMsgs: 512
    maxSizePerMsg: 2097152
    compactionMargin: 15000
    proposeQueueCapacity: 512
    snapshotInterval: 30s
    snapshotThreshold: 100000
    tickInterval: 100ms
    transport:
      receptionQueues:
        - 10
        - 2048
        - 2048
      sendQueues:
        - 10
        - 1024
        - 1024
headlessService:
  enabled: true
imagePullSecrets:
  - name: zot
ingress:
  enabled: true
  hosts:
    - host: ledger-exp.v2.formance.dev
      paths:
        - path: /
          pathType: Prefix
ingressGrpc:
  enabled: true
  className: nginx
  hosts:
    - host: grpc.ledger-exp.v2.formance.dev
      paths:
        - path: /
          pathType: Prefix
persistence:
  retentionPolicy:
    whenDeleted: Delete
replicas: 3
resources:
  limits:
    cpu: 2000m
    memory: 2048Mi
  requests:
    cpu: 2000m
    memory: 2048Mi
service:
  grpcPort: 8888
  httpPort: 9000
  type: ClusterIP
