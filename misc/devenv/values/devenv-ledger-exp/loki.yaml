backend:
  replicas: 0
deploymentMode: SingleBinary
loki:
  auth_enabled: false
  config: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /var/loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
      storage:
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory: /var/loki/rules

    schema_config:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    storage_config:
      filesystem:
        directory: /var/loki/chunks

    limits_config:
      allow_structured_metadata: true

      otlp_config:
        resource_attributes:
          attributes_config:
            - action: index_label
              attributes:
                - service.name
                - service.node_id

    ruler:
      enable_api: false
  schemaConfig:
    configs:
      - from: "2024-04-01"
        index:
          period: 24h
          prefix: loki_index_
        object_store: filesystem
        schema: v13
        store: tsdb
  storage:
    bucketNames:
      admin: loki-admin
      chunks: loki-chunks
      ruler: loki-ruler
persistence:
  enabled: true
  size: 10Gi
read:
  replicas: 0
singleBinary:
  replicas: 1
write:
  replicas: 0
