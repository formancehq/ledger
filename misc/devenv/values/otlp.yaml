config:
  exporters:
#    debug:
#      verbosity: detailed
    otlp/tempo:
      endpoint: tempo.monitoring.svc.cluster.local:4317
      tls:
        insecure: true
    otlphttp/logs:
      endpoint: http://loki.monitoring.svc.cluster.local:3100/otlp
      tls:
        insecure: true
    otlphttp/victoriametrics:
      compression: gzip
      encoding: proto
      metrics_endpoint: http://vm-victoria-metrics-single-server.monitoring.svc.cluster.local:8428/opentelemetry/v1/metrics
      tls:
        insecure: true
  processors:
    batch: {}
  receivers:
    otlp:
      protocols:
        grpc: {}
        http: {}
  service:
    pipelines:
      logs:
        exporters:
          - otlphttp/logs
          - debug
        processors:
          - batch
        receivers:
          - otlp
      metrics:
        exporters:
          - otlphttp/victoriametrics
        processors:
          - batch
        receivers:
          - otlp
      traces:
        exporters:
          - otlp/tempo
        processors:
          - batch
        receivers:
          - otlp
image:
  repository: otel/opentelemetry-collector-contrib
mode: deployment
ports:
  otlp:
    enabled: true
  otlp-http:
    enabled: true
