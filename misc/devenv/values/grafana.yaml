adminPassword: admin
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - access: proxy
        editable: true
        isDefault: true
        name: VictoriaMetrics
        type: prometheus
        url: http://vm-victoria-metrics-single-server.monitoring.svc.cluster.local:8428
      - access: proxy
        editable: true
        name: Tempo
        type: tempo
        url: http://tempo.monitoring.svc.cluster.local:3200
      - access: proxy
        editable: true
        name: Loki
        type: loki
        url: http://loki.monitoring.svc.cluster.local:3100
      - access: proxy
        editable: true
        isDefault: false
        jsonData:
          allowedHosts:
            - http://ledger-v3-poc.default.svc.cluster.local:9000
        name: HTTP Infinity
        type: yesoreyeram-infinity-datasource
        uid: http-infinity
      - access: proxy
        editable: true
        isDefault: false
        jsonData:
          timeout: 10
        name: HTTP JSON API
        type: marcusolsson-json-datasource
        uid: http-json-api
        url: http://ledger-v3-poc.default.svc.cluster.local:9000
deploymentStrategy:
  type: Recreate
grafana.ini:
  server:
    root_url: https://grafana.ledger-exp.v2.formance.dev
    serve_from_sub_path: false
  snapshots:
    external_enabled: false
ingress:
  annotations:
    cert-manager.io/cluster-issuer: zerossl
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/proxy-buffer-size: 4m
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: 4m
  enabled: true
  hosts:
    - grafana.ledger-exp.v2.formance.dev
  path: /
  pathType: Prefix
  tls:
    - hosts:
        - grafana.ledger-exp.v2.formance.dev
      secretName: grafana-tls
persistence:
  accessModes:
    - ReadWriteOnce
  enabled: true
  finalizers:
    - kubernetes.io/pvc-protection
  size: 5Gi
  type: pvc
plugins:
  - marcusolsson-json-datasource
  - yesoreyeram-infinity-datasource
  - pgillich-tree-panel
resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 128Mi
service:
  type: ClusterIP
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: monitoring
  datasources:
    enabled: true
