adminPassword: admin
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - access: proxy
        editable: true
        isDefault: true
        name: VictoriaMetrics
        type: prometheus
        url: http://vm-victoria-metrics-single-server:8428
      - access: proxy
        editable: true
        name: Tempo
        type: tempo
        url: http://tempo:3200
      - access: proxy
        editable: true
        name: Loki
        type: loki
        url: http://loki:3100
      - access: proxy
        editable: true
        isDefault: false
        name: Pyroscope
        type: grafana-pyroscope-datasource
        uid: pyroscope
        url: http://pyroscope:4040
deploymentStrategy:
  type: Recreate
grafana.ini:
  server:
    root_url: https://grafana-ledger-v3.dev.acme.frmnc.net
    serve_from_sub_path: false
  snapshots:
    external_enabled: false
ingress:
  enabled: true
  hosts:
    - grafana-ledger-v3.dev.acme.frmnc.net
  path: /
  pathType: Prefix
#  tls:
#    - hosts:
#        - grafana-ledger-v3.dev.acme.frmnc.net
#      secretName: grafana-tls
persistence:
  accessModes:
    - ReadWriteOnce
  enabled: true
  finalizers:
    - kubernetes.io/pvc-protection
  size: 5Gi
  type: pvc
plugins:
  - marcusolsson-json-datasource
  - yesoreyeram-infinity-datasource
  - pgillich-tree-panel
  - grafana-pyroscope-app
resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 1000m
    memory: 1024Mi
service:
  type: ClusterIP
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
  datasources:
    enabled: true
