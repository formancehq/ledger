config:
  victoriametrics:
    server:
      persistentVolume:
        enabled: true
        size: 10Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    service:
      type: ClusterIP
    promscrape:
      enabled: true
  grafana:
    adminPassword: "admin"
    service:
      type: ClusterIP
    plugins:
      - marcusolsson-json-datasource
      - yesoreyeram-infinity-datasource
      - pgillich-tree-panel
    grafana.ini:
      snapshots:
        external_enabled: false
      server:
        root_url: https://grafana.ledger-exp.v2.formance.dev
        serve_from_sub_path: false
    deploymentStrategy:
      type: Recreate
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: VictoriaMetrics
            type: prometheus
            access: proxy
            url: http://vm-victoria-metrics-single-server.monitoring.svc.cluster.local:8428
            isDefault: true
            editable: true
          - name: Tempo
            type: tempo
            access: proxy
            url: http://tempo.monitoring.svc.cluster.local:3200
            editable: true
          - name: Loki
            type: loki
            access: proxy
            url: http://loki.monitoring.svc.cluster.local:3100
            editable: true
          - name: HTTP Infinity
            uid: http-infinity
            type: yesoreyeram-infinity-datasource
            access: proxy
            editable: true
            isDefault: false
            jsonData:
              allowedHosts:
                - http://ledger-v3-poc.default.svc.cluster.local:9000
          - name: HTTP JSON API
            uid: http-json-api
            type: marcusolsson-json-datasource
            access: proxy
            isDefault: false
            editable: true
            url: http://ledger-v3-poc.default.svc.cluster.local:9000
            jsonData:
              timeout: 10
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 512Mi
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: zerossl
        nginx.ingress.kubernetes.io/proxy-buffer-size: "4m"
        nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
        nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "4m"
        nginx.ingress.kubernetes.io/proxy-body-size: "10m"
      hosts:
        - grafana.ledger-exp.v2.formance.dev
      path: /
      pathType: Prefix
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.ledger-exp.v2.formance.dev
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: monitoring
      datasources:
        enabled: true
    persistence:
      enabled: true
      type: pvc
      size: 5Gi
      accessModes:
        - ReadWriteOnce
      finalizers:
        - kubernetes.io/pvc-protection
  loki:
    deploymentMode: SingleBinary
    singleBinary:
      replicas: 1
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0
    persistence:
      enabled: true
      size: 10Gi
    loki:
      auth_enabled: false
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      storage:
        bucketNames:
          chunks: loki-chunks
          ruler: loki-ruler
          admin: loki-admin
      config: |
        auth_enabled: false

        server:
          http_listen_port: 3100

        common:
          path_prefix: /var/loki
          replication_factor: 1
          ring:
            kvstore:
              store: inmemory
          storage:
            filesystem:
              chunks_directory: /var/loki/chunks
              rules_directory: /var/loki/rules

        schema_config:
          configs:
            - from: 2024-04-01
              store: tsdb
              object_store: filesystem
              schema: v13
              index:
                prefix: loki_index_
                period: 24h

        storage_config:
          filesystem:
            directory: /var/loki/chunks

        limits_config:
          allow_structured_metadata: true

          otlp_config:
            resource_attributes:
              attributes_config:
                - action: index_label
                  attributes:
                    - service.name
                    - service.node_id
        
        ruler:
          enable_api: false
  otlp:
    mode: deployment
    image:
      repository: "otel/opentelemetry-collector-contrib"
    config:
      receivers:
        otlp:
          protocols:
            grpc: {}
      processors:
        batch: {}
      exporters:
        otlphttp/victoriametrics:
          compression: gzip
          encoding: proto
          metrics_endpoint: http://vm-victoria-metrics-single-server.monitoring.svc.cluster.local:8428/opentelemetry/v1/metrics
          tls:
            insecure: true
        otlp/tempo:
          endpoint: tempo.monitoring.svc.cluster.local:4317
          tls:
            insecure: true
        otlphttp/logs:
          endpoint: "http://loki.monitoring.svc.cluster.local:3100/otlp"
          tls:
            insecure: true
        debug:
          verbosity: detailed
      service:
        pipelines:
          metrics:
            receivers: [otlp]
            processors: [batch]
            exporters: [otlphttp/victoriametrics]
          traces:
            receivers: [otlp]
            processors: [batch]
            exporters: [otlp/tempo]
          logs:
            receivers: [otlp]
            processors: [batch]
            exporters:
              - otlphttp/logs
              - debug
    ports:
      otlp:
        enabled: true
      otlp-http:
        enabled: false
  tempo:
    tempo:
      storage:
        trace:
          backend: local
          local:
            path: /var/tempo/traces
    persistence:
      enabled: true
      size: 10Gi
    service:
      type: ClusterIP
    traces:
      otlp:
        grpc:
          enabled: true
        http:
          enabled: false
  ledger:
    replicaCount: 3
    image:
      repository: fo.registry.ovh-gra.kers.sh/formancehq/ledger-v3-poc
    imagePullSecrets:
      - name: zot

    config:
      bindAddr: "0.0.0.0:8888"
      httpPort: 9000
      dataDir: "/data/raft"
      debug: false
      raft:
        snapshotThreshold: 15000
        snapshotInterval: "30s"
        electionTick: 10
        heartbeatTick: 1
        maxSizePerMsg: 2097152
        maxInflightMsgs: 512
        tickInterval: "100ms"
        proposeQueueCapacity: 512
        transport:
          receptionQueues: [10, 2048, 2048]
          sendQueues: [10, 1024, 1024]
        multiplexedTransport:
          receptionQueues: [10, 2048, 2048]
          sendQueues: [10, 1024, 1024]

      monitoring:
        # Service name for monitoring
        serviceName: "ledger-v3-poc"
        # Traces configuration
        traces:
          enabled: true
          exporter: "otlp"
          endpoint: "otel-opentelemetry-collector.monitoring.svc.cluster.local"
          port: "4317"
          insecure: "true"
          mode: "grpc"
          batch: "true"
        metrics:
          enabled: true
          exporter: "otlp"
          endpoint: "otel-opentelemetry-collector.monitoring.svc.cluster.local"
          port: "4317"
          insecure: "true"
          mode: "grpc"
          batch: "true"
          exporterPushInterval: "5s"
          runtimeMinimumReadMemStatsInterval: "5s"
        logs:
          enabled: true
          exporter: "otlp"
          endpoint: "otel-opentelemetry-collector.monitoring.svc.cluster.local"
          port: "4317"
          insecure: "true"
          mode: "grpc"

    ingress:
      enabled: true
      #className: ""  # Ingress class name (e.g., "nginx", "traefik")
      #annotations: {}
        # kubernetes.io/ingress.class: nginx
        # kubernetes.io/tls-acme: "true"
        # cert-manager.io/cluster-issuer: "letsencrypt-prod"
      hosts:
        - host: ledger-exp.v2.formance.dev
          paths:
            - path: /
              pathType: Prefix
      #tls: []
      # Uncomment to enable per-pod ingress (for accessing individual pods from outside)
      perPod:
        enabled: true
      #   annotations:
      #     traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
      #     traefik.ingress.kubernetes.io/router.tls: "true"

    persistence:
      persistentVolumeClaimRetentionPolicy:
        whenDeleted: Delete
    service:
      type: ClusterIP
      httpPort: 9000
      grpcPort: 8888
    headlessService:
      enabled: true
    resources:
      limits:
        cpu: 4000m
        memory: 2048Mi
      requests:
        cpu: 4000m
        memory: 2048Mi
  k6operator:
    namespace:
      create: false