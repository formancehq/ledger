syntax = "proto3";

package ledger;

import "google/protobuf/struct.proto";
import "ledger.proto";

option go_package = "github.com/formancehq/ledger-v3-poc/internal/systempb";

// SystemService provides system operations
service SystemService {
  // CreateLedger creates a new ledger
  rpc CreateLedger(CreateLedgerRequest) returns (LedgerInfo);
  // DeleteLedger deletes a ledger
  rpc DeleteLedger(DeleteLedgerRequest) returns (DeleteLedgerResponse);
  // ResolveLedger resolves a ledger name to its ID
  rpc ResolveLedger(ResolveLedgerRequest) returns (ResolveLedgerResponse);
  // GetAllLedgersInfo returns all ledgers info in the cluster
  rpc GetAllLedgersInfo(GetAllLedgersRequest) returns (GetAllLedgersResponse);
  // GetLedgerInfo returns a ledger info by its name
  rpc GetLedgerInfo(GetLedgerByNameRequest) returns (LedgerInfo);
  // ResolveLedgerLeader
  rpc ResolveLedgerLeader(ResolveLedgerLeaderRequest) returns (ResolveLedgerLeaderResponse);
}

message ResolveLedgerLeaderRequest {
  string ledger_name = 1;
}

message ResolveLedgerLeaderResponse {
  uint64 leader_id = 1;
}

message CreateLedgerRequest {
  string name = 1;
  string log_store_driver = 2;              // Log store driver name (e.g., "sqlite-mattn", "sqlite-modern", "pebble", etc.)
  string runtime_store_driver = 3;         // Runtime store driver name (e.g., "sqlite-mattn", "sqlite-modern", "pebble", etc.)
  google.protobuf.Struct log_store_config = 4;     // Log store driver-specific configuration
  google.protobuf.Struct runtime_store_config = 5; // Runtime store driver-specific configuration
  map<string, string> metadata = 6;
  uint64 snapshot_threshold = 7;  // Number of logs before triggering a snapshot (optional, uses global config if 0)
}

message DeleteLedgerRequest {
  string name = 1;
}

message DeleteLedgerResponse {}

message ResolveLedgerRequest {
  string ledger_name = 1;
}

message ResolveLedgerResponse {
  string ledger_name = 1;
  uint64 ledger_id = 2;
}

message GetAllLedgersRequest {
  // Empty - no parameters needed
}

message GetAllLedgersResponse {
  map<string, LedgerInfo> ledgers = 1;
}

message GetLedgerByNameRequest {
  string name = 1;
}

message State {
  uint64 next_ledger_id = 1;
  map<string, LedgerInfo> ledgers = 2;
}

message SystemFSMSnapshot {
  map<string, ledger.LedgerInfo> ledgers = 1;      // Map of ledger name to ledger info
  uint64 next_ledger_id = 2;               // Next sequential ledger ID
}
