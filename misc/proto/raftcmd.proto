syntax = "proto3";

package raft;

option go_package = "github.com/formancehq/ledger-v3-poc/internal/ledgerpb";

import "common.proto";

// ============================================================================
// Raft FSM State
// ============================================================================

message LedgerState {
  common.LedgerInfo ledger_info = 1;
  uint64 next_log_id = 2;
  uint64 next_transaction_id = 3;
}

message State {
  map<uint32, LedgerState> ledgers = 1;
  uint32 next_ledger_id = 2;                // Next available ledger ID (max 65535)
}

// ============================================================================
// Raft FSM Commands
// ============================================================================

message AppendTransactionCommand {
  repeated common.Posting postings = 1;
  map<string, string> metadata = 2;
  common.Timestamp timestamp = 3;
  string reference = 4;
  map<string, common.Metadata> account_metadata = 5;
}

message RevertTransactionCommand {
  uint64 transaction_id = 1;
  common.Transaction revert_transaction = 2;
}

message CommandInput {
  oneof command {
    AppendTransactionCommand append_transaction = 1;
    common.SaveMetadataCommand save_metadata = 2;
    common.DeleteMetadataCommand delete_metadata = 3;
    RevertTransactionCommand revert_transaction = 4;
  }
}

message CreateLogCommand {
  common.Idempotency idempotency = 1;
  CommandInput input = 2;
  uint32 ledger_id = 3;
}

message CreateLedgerCommand {
  string name = 1;
  map<string, string> metadata = 2;
}

message DeleteLedgerCommand {
  uint32 id = 1;
}

// ============================================================================
// Raft Command Wrapper
// ============================================================================

enum ActionType {
  CreateLedger = 0;
  DeleteLedger = 1;
  CreateLog = 2;
}

message Action {
  ActionType action_type = 1;
  bytes data = 2;
}

// Command represents a command to be executed in the FSM (protobuf serialization format)
// A command can contain multiple actions that will be executed atomically
message Command {
  uint64 id = 1;                    // Random command ID
  repeated Action actions = 2;      // List of actions to execute atomically
  common.Timestamp date = 3;        // Creation date in UTC
}

// ============================================================================
// Mementos (for snapshots)
// ============================================================================

// TransactionResume represents a simplified transaction for memento purposes
// Excludes postCommitVolumes and postCommitEffectiveVolumes fields
message TransactionResume {
  repeated common.Posting postings = 1;
  map<string, string> metadata = 2;
  common.Timestamp timestamp = 3;
  string reference = 4;
  uint64 id = 5;                            // Optional, 0 means nil
  bool reverted = 6;
}

// CreatedTransactionMemento represents the memento structure for CreatedTransaction
message CreatedTransactionMemento {
  TransactionResume transaction = 1;
  map<string, common.Metadata> account_metadata = 2;
}

// RevertedTransactionMemento represents the memento structure for RevertedTransaction
message RevertedTransactionMemento {
  uint64 reverted_transaction_id = 1;      // Optional, 0 means nil
  TransactionResume revert_transaction = 2;
}
