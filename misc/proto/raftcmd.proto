syntax = "proto3";

package raft;

option go_package = "github.com/formancehq/ledger-v3-poc/internal/proto/raftcmdpb";

import "common.proto";

// ============================================================================
// Raft FSM State
// ============================================================================

message LedgerState {
  common.LedgerInfo ledger_info = 1;
  uint64 next_log_id = 2;
  uint64 next_transaction_id = 3;
}

message State {
  map<uint32, LedgerState> ledgers = 1;
  uint32 next_ledger_id = 2;                // Next available ledger ID (max ~4.3 billion)
  uint64 next_sequence = 3;                 // Next global sequence number for SystemLog
  uint64 checkpoint_id = 4;                 // ID of the last checkpoint (for snapshot recovery)
}

// Order represents a request to be processed by the FSM
// The FSM is responsible for interpreting the request and applying the changes
message Order {
  common.Idempotency idempotency = 1;
  oneof type {
    LedgerApplyOrder apply = 2;
    CreateLedgerOrder create_ledger = 3;
    DeleteLedgerOrder delete_ledger = 4;
  }
}

message CreateLedgerOrder {
  string name = 1;
  common.MetadataSet metadata = 2;
}

message DeleteLedgerOrder {
  string name = 1;
}

message LedgerApplyOrder {
  string ledger = 1;
  oneof data {
    CreateTransactionOrder create_transaction = 2;
    SaveMetadataOrder add_metadata = 3;
    RevertTransactionOrder revert_transaction = 4;
    DeleteMetadataOrder delete_metadata = 5;
  }
}

message CreateTransactionOrder {
  repeated common.Posting postings = 1;
  common.Script script = 2;
  common.Timestamp timestamp = 3;
  string reference = 4;
  common.MetadataSet metadata = 5;
  map<string, common.MetadataSet> account_metadata = 6;
  bool force = 7;  // Skip balance checks when true
}

message SaveMetadataOrder {
  common.Target target = 1;
  common.MetadataSet metadata = 2;
}

message RevertTransactionOrder {
  uint64 transaction_id = 1;
  bool force = 2;
  bool at_effective_date = 3;
  common.MetadataSet metadata = 4;
  repeated common.Posting original_postings = 5;
}

message DeleteMetadataOrder {
  common.Target target = 1;
  string key = 2;
}

// ============================================================================
// Raft Command Wrapper
// ============================================================================

// Proposal represents a batch of orders to be executed in the FSM (protobuf serialization format)
// A proposal can contain multiple orders that will be executed atomically
message Proposal {
  uint64 id = 1;                    // Random proposal ID
  repeated Order orders = 2;        // List of orders to execute atomically
  common.Timestamp date = 3;        // Creation date in UTC
  PreloadSet preload = 4;
}

// ProposalResponse is the result of processing a proposal
message ProposalResponse {
  repeated CreatedLogOrReference logs = 1;     // Logs generated by the proposal
}

message CreatedLogOrReference {
  oneof type {
    common.Log created_log = 1;
    uint64 reference_sequence = 2;
  }
}

// ============================================================================
// Mementos (for snapshots)
// ============================================================================

// TransactionResume represents a simplified transaction for memento purposes
// Excludes postCommitVolumes and postCommitEffectiveVolumes fields
message TransactionResume {
  repeated common.Posting postings = 1;
  map<string, string> metadata = 2;
  common.Timestamp timestamp = 3;
  string reference = 4;
  uint64 id = 5;                            // Optional, 0 means nil
  bool reverted = 6;
}

// CreatedTransactionMemento represents the memento structure for CreatedTransaction
message CreatedTransactionMemento {
  TransactionResume transaction = 1;
  map<string, common.MetadataSet> account_metadata = 2;
}

// RevertedTransactionMemento represents the memento structure for RevertedTransaction
message RevertedTransactionMemento {
  uint64 reverted_transaction_id = 1;      // Optional, 0 means nil
  TransactionResume revert_transaction = 2;
}

message LedgerBoundaries {
  uint64 next_transaction_id = 1;
  uint64 next_log_id = 2;
}

message VolumeHolder {
  common.BigInt known = 1;
  common.BigInt diff_since_base_index = 2;
}

message PreloadSet {
  uint64 lastPersistedIndex = 1;
  repeated Preload preloads = 2;
}

message Preload {
  oneof type {
     PreloadInput input = 1;
     PreloadOutput output = 2;
     PreloadReverted reverted = 3;
     PreloadIdempotencyKey idempotency_key = 4;
     PreloadLedger ledger = 5;
  }
}

message PreloadInput {
  AttributeID id = 1;
  common.BigInt value = 2;
}

message PreloadOutput {
  AttributeID id = 1;
  common.BigInt value = 2;
}

message PreloadReverted {
  AttributeID id = 1;
  bool reverted = 2;
}

message PreloadIdempotencyKey {
  AttributeID id = 1;
  uint64 log_sequence = 2;  // 0 means not found
  bytes hash = 3;           // Hash of the original request (for conflict detection)
}

message PreloadLedger {
  AttributeID id = 1;
  common.LedgerInfo info = 2;
}

// ============================================================================
// Memory Snapshot (for Raft snapshots)
// ============================================================================

message MemorySnapshot {
  uint32 next_ledger_id = 1;
  uint64 next_sequence_id = 2;
  map<string, BoundarySnapshot> boundaries = 3;
  GenerationSnapshot gen0 = 4;
  GenerationSnapshot gen1 = 5;  // May be nil
  uint64 checkpoint_id = 6;
  uint64 current_generation = 7;
}

message BoundarySnapshot {
  uint64 next_transaction_id = 1;
  uint64 next_log_id = 2;
}

message GenerationSnapshot {
  uint64 base_index = 1;
  repeated VolumeAttributeEntry input = 2;
  repeated VolumeAttributeEntry output = 3;
  repeated MetadataAttributeEntry metadata = 4;  // Account metadata
  repeated MetadataAttributeEntry ledger_metadata = 5;  // Ledger metadata
  repeated LedgerAttributeEntry ledgers = 6;
}

// KeyStoreEntry stores a single entry from KeyStore[*VolumeHolder]
// Uses U128 hash + Tag64 for direct reconstruction without recomputing hashes
message VolumeAttributeEntry {
  AttributeID id = 1;
  common.BigInt known = 2;
  common.BigInt diff_since_base_index = 3;
}

// MetadataKeyStoreEntry stores a single entry from KeyStore[*MetadataValue]
message MetadataAttributeEntry {
  AttributeID id = 1;
  common.MetadataValue value = 2;
}

// LedgerAttributeEntry stores a single entry from KeyStore[*LedgerInfo]
message LedgerAttributeEntry {
  AttributeID id = 1;
  common.LedgerInfo info = 2;
}

message LedgerSnapshot {
  common.LedgerInfo info = 1;
  uint64 next_transaction_id = 2;
  uint64 next_log_id = 3;
}

message AttributeID {
  bytes id = 1;           // 16-byte U128 identifier
  fixed64 tag = 2;
}