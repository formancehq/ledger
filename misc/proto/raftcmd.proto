syntax = "proto3";

package raft;

option go_package = "github.com/formancehq/ledger-v3-poc/internal/proto/raftcmdpb";

import "common.proto";

// ============================================================================
// Raft FSM State
// ============================================================================

message LedgerState {
  common.LedgerInfo ledger_info = 1;
  uint64 next_log_id = 2;
  uint64 next_transaction_id = 3;
}

message State {
  map<uint32, LedgerState> ledgers = 1;
  uint32 next_ledger_id = 2;                // Next available ledger ID (max ~4.3 billion)
  uint64 next_sequence = 3;                 // Next global sequence number for SystemLog
}

// ============================================================================
// Raft FSM Commands
// ============================================================================

message AppendTransactionCommand {
  repeated common.Posting postings = 1;
  map<string, string> metadata = 2;
  common.Timestamp timestamp = 3;
  string reference = 4;
  map<string, common.Metadata> account_metadata = 5;
}

message RevertTransactionCommand {
  uint64 transaction_id = 1;
  AppendTransactionCommand revert_transaction = 2;
}

message CreateLedgerLogCommand {
  uint32 ledger_id = 1;
  oneof command {
    AppendTransactionCommand append_transaction = 2;
    common.SaveMetadataCommand save_metadata = 3;
    common.DeleteMetadataCommand delete_metadata = 4;
    RevertTransactionCommand revert_transaction = 5;
  }
}

message CreateLedgerCommand {
  string name = 1;
  map<string, string> metadata = 2;
}

message DeleteLedgerCommand {
  uint32 id = 1;
}

message AnyCommand {
  oneof command {
    CreateLedgerCommand create_ledger = 1;
    DeleteLedgerCommand delete_ledger = 2;
    CreateLedgerLogCommand create_ledger_log = 3;
  }
}

message Action {
  common.Idempotency idempotency = 1;
  AnyCommand command = 2;
}

// ============================================================================
// Raft Command Wrapper
// ============================================================================

// CommandBatch represents a batch of commands to be executed in the FSM (protobuf serialization format)
// A batch can contain multiple actions that will be executed atomically
message CommandBatch {
  uint64 id = 1;                    // Random batch ID
  repeated Action actions = 2;      // List of actions to execute atomically
  common.Timestamp date = 3;        // Creation date in UTC
}

// ============================================================================
// Mementos (for snapshots)
// ============================================================================

// TransactionResume represents a simplified transaction for memento purposes
// Excludes postCommitVolumes and postCommitEffectiveVolumes fields
message TransactionResume {
  repeated common.Posting postings = 1;
  map<string, string> metadata = 2;
  common.Timestamp timestamp = 3;
  string reference = 4;
  uint64 id = 5;                            // Optional, 0 means nil
  bool reverted = 6;
}

// CreatedTransactionMemento represents the memento structure for CreatedTransaction
message CreatedTransactionMemento {
  TransactionResume transaction = 1;
  map<string, common.Metadata> account_metadata = 2;
}

// RevertedTransactionMemento represents the memento structure for RevertedTransaction
message RevertedTransactionMemento {
  uint64 reverted_transaction_id = 1;      // Optional, 0 means nil
  TransactionResume revert_transaction = 2;
}

// ============================================================================
// Cluster State (for GetClusterState RPC)
// ============================================================================

// NodeInfo represents information about a node in the cluster
message NodeInfo {
  uint32 id = 1;
  string address = 2;
  string suffrage = 3;  // Voter or Nonvoter
}

// ProgressInfo represents the progress information for a node
message ProgressInfo {
  uint64 match = 1;             // Match index: highest log entry known to be replicated to this node
  uint64 next = 2;              // Next index: index of the next log entry to send to this node
  string state = 3;             // State: Probe, Replicate, or Snapshot
  uint64 pending_snapshot = 4;  // Index of pending snapshot (0 if none)
  bool recent_active = 5;       // Whether this node is recently active
  bool probe_sent = 6;          // Whether probe message was sent (paused)
  bool is_paused = 7;           // Whether this node is paused
}

// RaftStatus represents the complete Raft status information
message RaftStatus {
  string state = 1;             // Current Raft state (Leader, Follower, Candidate, PreCandidate)
  uint64 term = 2;              // Current term
  uint64 leader = 3;            // ID of the current leader (0 if no leader)
  uint64 applied = 4;           // Index of the last applied entry
  uint64 commit = 5;            // Index of the last committed entry
  uint64 last_index = 6;        // Index of the last entry in the log
  uint64 vote = 7;              // ID of the node that received the vote (0 if no vote)
  map<uint64, ProgressInfo> progress = 8;  // Progress information for each node
}

// ClusterState represents the state of the Raft cluster
message ClusterState {
  string state = 1;             // Leader, Follower, Candidate, Shutdown
  uint32 leader = 2;            // ID of the current leader (0 if no leader)
  repeated NodeInfo nodes = 3;  // List of all nodes in the cluster
  uint32 local_node = 4;        // ID of the local node
  RaftStatus raft_status = 5;   // Complete Raft status information
  State inner_state = 6;        // FSM state (all ledgers)
}
