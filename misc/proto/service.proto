syntax = "proto3";

package ledger;

option go_package = "github.com/formancehq/ledger-v3-poc/internal/proto/servicepb";

import "common.proto";
import "audit.proto";
import "signature.proto";

// ============================================================================
// gRPC Service
// ============================================================================

// BucketService provides ledger operations
service BucketService {
  // GetAllLedgersInfo streams all ledgers info in the cluster
  rpc GetAllLedgersInfo(GetAllLedgersRequest) returns (stream common.LedgerInfo);
  // GetLedger returns a ledger info by its name or ID
  rpc GetLedger(GetLedgerRequest) returns (common.LedgerInfo);
  // GetAccount retrieves an account by address
  rpc GetAccount(GetAccountRequest) returns (common.Account);
  // GetTransaction retrieves a transaction by ID
  rpc GetTransaction(GetTransactionRequest) returns (common.Transaction);
  // ListTransactions streams all transactions for a ledger (newest first)
  rpc ListTransactions(ListTransactionsRequest) returns (stream common.Transaction);
  // ListAccounts streams all accounts for a ledger (alphabetical order)
  rpc ListAccounts(ListAccountsRequest) returns (stream common.Account);
  // Apply applies actions (create/delete ledger, create transaction, revert, save/delete metadata)
  rpc Apply(ApplyRequest) returns (ApplyResponse);
  // GetStoreMetrics returns metrics from the local store (Pebble only)
  rpc GetStoreMetrics(GetStoreMetricsRequest) returns (GetStoreMetricsResponse);
  // CheckStore verifies store integrity (hash chain and derived data consistency)
  rpc CheckStore(CheckStoreRequest) returns (stream CheckStoreEvent);
  // ListAuditEntries streams audit trail entries (success and failure)
  rpc ListAuditEntries(ListAuditEntriesRequest) returns (stream audit.AuditEntry);
}

// ============================================================================
// gRPC Request/Response Messages
// ============================================================================

message GetAccountRequest {
  string ledger = 1;
  string address = 2;
}

message GetTransactionRequest {
  string ledger = 1;
  uint64 transaction_id = 2;
}

message ListTransactionsRequest {
  string ledger = 1;
  // page_size is the maximum number of transactions to return (0 = default)
  uint32 page_size = 2;
  // after_tx_id is the transaction ID to start after (for pagination, exclusive)
  // Use 0 or omit to start from the latest transaction
  uint64 after_tx_id = 3;
}

message ListAccountsRequest {
  string ledger = 1;
  // page_size is the maximum number of accounts to return (0 = no limit)
  uint32 page_size = 2;
  // after_address is the account address to start after (for pagination, exclusive)
  string after_address = 3;
  // prefix filters accounts by address prefix (e.g. "users:")
  string prefix = 4;
}

message CreateLedgerRequest {
  string name = 1;
  common.MetadataSet metadata = 2;
}

message DeleteLedgerRequest {
  string name = 1;
}

message DeleteLedgerResponse {}

message GetAllLedgersRequest {}

message GetLedgerRequest {
  string ledger = 1;
}

message ApplyRequest {
  repeated Request requests = 1;
}

message ApplyResponse {
  repeated common.Log logs = 1;
}

message Request {
  string idempotency_key = 1;
  oneof type {
    LedgerApplyRequest apply = 2;
    CreateLedgerRequest create_ledger = 3;
    DeleteLedgerRequest delete_ledger = 4;
    RegisterSigningKeyRequest register_signing_key = 6;
    RevokeSigningKeyRequest revoke_signing_key = 7;
    SetSigningConfigRequest set_signing_config = 8;
  }
  signature.RequestSignature signature = 5;
}

// ============================================================================
// Signing Key Management Messages
// ============================================================================

// RegisterSigningKeyRequest registers an Ed25519 public key for signature verification.
// Bootstrap: when no keys are registered yet, this request can be unsigned.
// Once at least one key is registered, this request must be signed by an existing key.
message RegisterSigningKeyRequest {
  string key_id = 1;       // Unique identifier for this key
  bytes public_key = 2;    // Ed25519 public key (32 bytes)
}

// RevokeSigningKeyRequest removes a registered signing key.
// Must be signed by an existing key (cannot revoke all keys if require_signatures is enabled).
message RevokeSigningKeyRequest {
  string key_id = 1;       // Key ID to revoke
}

// SetSigningConfigRequest updates the signing configuration.
// Must be signed by an existing key when keys are registered.
message SetSigningConfigRequest {
  bool require_signatures = 1;   // Whether to reject unsigned requests
}

// ============================================================================
// Ledger Actions (used by Apply RPC)
// ============================================================================

// CreateTransactionPayload contains the data for creating a transaction
message CreateTransactionPayload {
  repeated common.Posting postings = 1;
  common.Script script = 2;
  common.Timestamp timestamp = 3;
  string reference = 4;
  common.MetadataSet metadata = 5;
  map<string, common.MetadataSet> account_metadata = 6;
  bool force = 7;
}

// RevertTransactionPayload contains the data for reverting a transaction
message RevertTransactionPayload {
  uint64 transaction_id = 1;
  bool force = 2;
  bool at_effective_date = 3;
  common.MetadataSet metadata = 4;
}

// LedgerAction represents a single ledger action
message LedgerApplyRequest {
  string ledger = 1;
  oneof data {
    CreateTransactionPayload create_transaction = 2;
    common.SaveMetadataCommand add_metadata = 3;
    RevertTransactionPayload revert_transaction = 4;
    common.DeleteMetadataCommand delete_metadata = 5;
  }
}

// ============================================================================
// Store Metrics Messages
// ============================================================================

message GetStoreMetricsRequest {}

message GetStoreMetricsResponse {
  // available indicates if metrics are available (false for non-Pebble stores)
  bool available = 1;
  // metrics contains the Pebble metrics (only set if available is true)
  PebbleMetrics metrics = 2;
}

// PebbleMetrics contains metrics from the Pebble storage engine
message PebbleMetrics {
  BlockCacheMetrics block_cache = 1;
  CompactMetrics compact = 2;
  FlushMetrics flush = 3;
  MemTableMetrics mem_table = 4;
  SnapshotsMetrics snapshots = 5;
  TableMetrics table = 6;
  TableCacheMetrics table_cache = 7;
  WALMetrics wal = 8;
  KeysMetrics keys = 9;
  repeated LevelMetrics levels = 10;
  uint64 disk_space_usage = 11;
}

message BlockCacheMetrics {
  int64 size = 1;
  int64 count = 2;
  int64 hits = 3;
  int64 misses = 4;
}

message CompactMetrics {
  int64 count = 1;
  int64 default_count = 2;
  int64 delete_only_count = 3;
  int64 elision_only_count = 4;
  int64 move_count = 5;
  int64 read_count = 6;
  int64 rewrite_count = 7;
  int64 multi_level_count = 8;
  uint64 estimated_debt = 9;
  int64 in_progress_bytes = 10;
  int64 num_in_progress = 11;
  int32 marked_files = 12;
}

message FlushMetrics {
  int64 count = 1;
  int64 num_in_progress = 2;
  uint64 as_ingest_count = 3;
  uint64 as_ingest_table_count = 4;
  uint64 as_ingest_bytes = 5;
}

message MemTableMetrics {
  uint64 size = 1;
  int64 count = 2;
  uint64 zombie_size = 3;
  int64 zombie_count = 4;
}

message SnapshotsMetrics {
  int32 count = 1;
  uint64 earliest_seq_num = 2;
  uint64 pinned_keys = 3;
  uint64 pinned_size = 4;
}

message TableMetrics {
  uint64 zombie_size = 1;
  int64 zombie_count = 2;
  uint64 backing_table_count = 3;
  uint64 backing_table_size = 4;
}

message TableCacheMetrics {
  int64 size = 1;
  int64 count = 2;
  int64 hits = 3;
  int64 misses = 4;
}

message WALMetrics {
  int64 files = 1;
  int64 obsolete_files = 2;
  uint64 size = 3;
  uint64 bytes_in = 4;
  uint64 bytes_written = 5;
}

message KeysMetrics {
  uint64 range_key_sets_count = 1;
  uint64 tombstone_count = 2;
}

message LevelMetrics {
  int32 level = 1;
  int64 num_files = 2;
  int64 size = 3;
  double score = 4;
  uint64 bytes_in = 5;
  uint64 bytes_ingested = 6;
  uint64 bytes_moved = 7;
  uint64 bytes_read = 8;
  uint64 bytes_compacted = 9;
  uint64 bytes_flushed = 10;
  uint64 tables_compacted = 11;
  uint64 tables_flushed = 12;
  uint64 tables_ingested = 13;
  uint64 tables_moved = 14;
}

// ============================================================================
// Store Check Messages
// ============================================================================

message CheckStoreRequest {}

message CheckStoreEvent {
  oneof type {
    CheckStoreError error = 1;
    CheckStoreProgress progress = 2;
  }
}

enum CheckStoreErrorType {
  CHECK_STORE_ERROR_TYPE_UNSPECIFIED = 0;
  CHECK_STORE_ERROR_TYPE_HASH_MISMATCH = 1;
  CHECK_STORE_ERROR_TYPE_SEQUENCE_GAP = 2;
  CHECK_STORE_ERROR_TYPE_VOLUME_MISMATCH = 3;
  CHECK_STORE_ERROR_TYPE_METADATA_MISMATCH = 4;
  CHECK_STORE_ERROR_TYPE_UNKNOWN_LEDGER = 5;
}

message CheckStoreError {
  CheckStoreErrorType error_type = 1;
  string message = 2;
  uint64 log_sequence = 3;
  string ledger = 4;
  string account = 5;
  string asset = 6;
}

message CheckStoreProgress {
  uint64 logs_checked = 1;
  uint64 total_logs = 2;
}

// ============================================================================
// Audit Log Messages
// ============================================================================

message ListAuditEntriesRequest {
  optional uint64 after_sequence = 1;
  string ledger = 2;
  bool failures_only = 3;
}
