syntax = "proto3";

package ledger;

option go_package = "github.com/formancehq/ledger-v3-poc/internal/proto/servicepb";

import "common.proto";

// ============================================================================
// gRPC Service
// ============================================================================

// LedgerService provides ledger operations
service LedgerService {
  // GetAllLedgersInfo returns all ledgers info in the cluster
  rpc GetAllLedgersInfo(GetAllLedgersRequest) returns (GetAllLedgersResponse);
  // GetLedgerInfo returns a ledger info by its name
  rpc GetLedgerByName(GetLedgerByNameRequest) returns (common.LedgerInfo);
  // GetTransaction retrieves a transaction by ID
  rpc GetTransaction(GetTransactionRequest) returns (common.Transaction);
  // StreamLedgerLogs streams logs from a ledger, optionally starting from a log ID
  rpc StreamLedgerLogs(StreamLedgerLogsRequest) returns (stream StreamLedgerLogsResponse);
  // StreamLogs streams logs, optionally starting from a sequence
  rpc StreamLogs(StreamLogsRequest) returns (stream StreamLogsResponse);
  // Apply applies actions (create/delete ledger, create transaction, revert, save/delete metadata)
  rpc Apply(ApplyRequest) returns (ApplyResponse);
}

// ============================================================================
// gRPC Request/Response Messages
// ============================================================================

message GetTransactionRequest {
  uint32 ledger_id = 1;
  uint64 transaction_id = 2;
}

message StreamLedgerLogsRequest {
  uint32 ledger_id = 1;
  uint64 from_id = 2; // Optional: start streaming from this log ID (inclusive). If 0, streams from the beginning
  uint64 to_id = 3;   // Optional: stop streaming at this log ID (inclusive). If 0, streams until the end
}

message StreamLedgerLogsResponse {
  common.LedgerLog log = 1;
}

message StreamLogsRequest {
  uint64 from_sequence = 1; // Optional: start streaming from this sequence (inclusive). If 0, streams from the beginning
  uint64 to_sequence = 2;   // Optional: stop streaming at this sequence (inclusive). If 0, streams until the end
}

message StreamLogsResponse {
  common.Log log = 1;
}

message CreateLedgerRequest {
  string name = 1;
  map<string, string> metadata = 2;
}

message DeleteLedgerRequest {
  uint32 id = 1;
}

message DeleteLedgerResponse {}

message GetAllLedgersRequest {}

message GetAllLedgersResponse {
  map<string, common.LedgerInfo> ledgers = 1;
}

message GetLedgerByNameRequest {
  string name = 1;
}

message ApplyRequest {
  repeated Action actions = 1;
}

message ApplyResponse {
  repeated common.Log logs = 1;
}

message Action {
  oneof type {
    LedgerApplyAction apply = 1;
    CreateLedgerRequest create_ledger = 2;
    DeleteLedgerRequest delete_ledger = 3;
  }
}

// ============================================================================
// Ledger Actions (used by Apply RPC)
// ============================================================================

// CreateTransactionPayload contains the data for creating a transaction
message CreateTransactionPayload {
  repeated common.Posting postings = 1;
  common.Script script = 2;
  common.Timestamp timestamp = 3;
  string reference = 4;
  map<string, string> metadata = 5;
  map<string, common.Metadata> account_metadata = 6;
}

// RevertTransactionPayload contains the data for reverting a transaction
message RevertTransactionPayload {
  uint64 transaction_id = 1;
  bool force = 2;
  bool at_effective_date = 3;
  map<string, string> metadata = 4;
}

// LedgerAction represents a single ledger action
message LedgerApplyAction {
  uint32 ledger_id = 1;
  string idempotency_key = 2;
  oneof data {
    CreateTransactionPayload create_transaction = 3;
    common.SaveMetadataCommand add_metadata = 4;
    RevertTransactionPayload revert_transaction = 5;
    common.DeleteMetadataCommand delete_metadata = 6;
  }
}
