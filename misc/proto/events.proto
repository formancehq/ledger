syntax = "proto3";

package events;

option go_package = "github.com/formancehq/ledger/v3/internal/proto/eventspb";

import "ledger_options.proto";
import "common.proto";

// ============================================================================
// Event
// ============================================================================

// Event represents a domain event derived from a committed global log entry.
message Event {
  common.EventType type = 1;
  string ledger = 2;
  fixed64 date = 3 [(ledger.value_type) = "commonpb.Timestamp"];
  fixed64 log_sequence = 4;
  common.Log log = 5;
}
