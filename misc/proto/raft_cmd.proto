syntax = "proto3";

package raft;

option go_package = "github.com/formancehq/ledger/v3/internal/proto/raftcmdpb";

import "common.proto";
import "signature.proto";

// Order represents a request to be processed by the FSM.
// The FSM is responsible for interpreting the request and applying the changes.
//
// Every Order is either ledger-scoped (acts on a single ledger; the ledger
// name lives once on the LedgerScopedOrder wrapper) or system-scoped (cluster
// or global state). This split is the structural invariant that the audit
// log relies on to attribute entries to a ledger — extracting the targeted
// ledger is a single accessor on the wrapper instead of a per-payload switch.
message Order {
  common.Idempotency idempotency = 1;
  oneof type {
    LedgerScopedOrder ledger_scoped = 2;
    SystemScopedOrder system_scoped = 3;
  }
  signature.SignedRequest signature = 4;
  // coverage_bits is a packed bitset over ExecutionPlan.attributes restricting
  // which entries this single order may read. Bit i (byteIdx = i/8,
  // bit-within-byte = i%8, LSB-first) is set iff attributes[i] covers a key
  // this order may read. The FSM constructs the per-order scope from this
  // bitset so a key declared by another order in the same batch is not
  // transparently readable (closes the batch-level vs order-level coverage gap).
  //
  // Length = ceil(len(attributes)/8). Empty bytes admit NO plan — every read
  // surfaces as *ErrCoverageMiss. Proposal-wide scopes (used by the FSM's
  // ValidateTransientVolumes) go through state.ScopeFactory.NewProposalScope
  // instead, not through an "empty bits means admit all" convention.
  bytes coverage_bits = 5;
}

// LedgerScopedOrder is the wrapper for every Order variant that targets a
// single ledger. The `ledger` field is the single source of truth for audit
// attribution and admission scope checks; payload sub-messages must not carry
// their own ledger field.
message LedgerScopedOrder {
  string ledger = 1;
  oneof payload {
    LedgerApplyOrder apply = 2;
    CreateLedgerOrder create_ledger = 3;
    DeleteLedgerOrder delete_ledger = 4;
    MirrorIngestOrder mirror_ingest = 5;
    PromoteLedgerOrder promote_ledger = 6;
    SaveLedgerMetadataOrder save_ledger_metadata = 7;
    DeleteLedgerMetadataOrder delete_ledger_metadata = 8;
    SaveNumscriptOrder save_numscript = 9;
    DeleteNumscriptOrder delete_numscript = 10;
    CreatePreparedQueryOrder create_prepared_query = 11;
    UpdatePreparedQueryOrder update_prepared_query = 12;
    DeletePreparedQueryOrder delete_prepared_query = 13;
  }
}

// SystemScopedOrder is the wrapper for cluster- or global-scoped commands.
// These commands do not target a specific ledger and never contribute a
// ledger name to the audit entry.
message SystemScopedOrder {
  oneof payload {
    RegisterSigningKeyOrder register_signing_key = 1;
    RevokeSigningKeyOrder revoke_signing_key = 2;
    SetSigningConfigOrder set_signing_config = 3;
    AddEventsSinkOrder add_events_sink = 4;
    RemoveEventsSinkOrder remove_events_sink = 5;
    CloseChapterOrder close_chapter = 6;
    SealChapterOrder seal_chapter = 7;
    ArchiveChapterOrder archive_chapter = 8;
    ConfirmArchiveChapterOrder confirm_archive_chapter = 9;
    SetMaintenanceModeOrder set_maintenance_mode = 10;
    SetChapterScheduleOrder set_chapter_schedule = 11;
    DeleteChapterScheduleOrder delete_chapter_schedule = 12;
    CreateQueryCheckpointOrder create_query_checkpoint = 13;
    DeleteQueryCheckpointOrder delete_query_checkpoint = 14;
    SetQueryCheckpointScheduleOrder set_query_checkpoint_schedule = 15;
    DeleteQueryCheckpointScheduleOrder delete_query_checkpoint_schedule = 16;
  }
}

message CreatePreparedQueryOrder {
  common.PreparedQuery query = 1;
}

message UpdatePreparedQueryOrder {
  string name = 1;
  common.QueryFilter filter = 2;
}

message DeletePreparedQueryOrder {
  string name = 1;
}

message AddEventsSinkOrder {
  common.SinkConfig config = 1;
}

message RemoveEventsSinkOrder {
  string name = 1;
}

// Signing key management orders
message RegisterSigningKeyOrder {
  string key_id = 1;
  bytes public_key = 2;
  string parent_key_id = 3;
}

message RevokeSigningKeyOrder {
  string key_id = 1;
  bool cascade = 2;
}

message SetSigningConfigOrder {
  bool require_signatures = 1;
}

message CloseChapterOrder {}

message SealChapterOrder {
  fixed64 chapter_id = 1;
  bytes sealing_hash = 2;
  bytes state_hash = 3;
}

message ArchiveChapterOrder {
  fixed64 chapter_id = 1;
}

message ConfirmArchiveChapterOrder {
  fixed64 chapter_id = 1;
}

message SetMaintenanceModeOrder {
  bool enabled = 1;
}

message SetChapterScheduleOrder {
  string cron = 1;
}

message DeleteChapterScheduleOrder {}

message SaveNumscriptOrder {
  string name = 1;
  string content = 2;
  string version = 3;
}

message DeleteNumscriptOrder {
  string name = 1;
}

// CreateQueryCheckpointOrder triggers a physical Pebble checkpoint via Raft.
// The FSM commits the current batch and the Applier creates snapshots of both
// the main store and read index, enabling point-in-time queries.
// The checkpoint ID is assigned sequentially by the FSM, not the caller.
message CreateQueryCheckpointOrder {}

// DeleteQueryCheckpointOrder removes a previously created query checkpoint.
// Physical checkpoint files are cleaned up after the batch is committed.
message DeleteQueryCheckpointOrder {
  fixed64 checkpoint_id = 1;
}

// QueryCheckpointState stores metadata for a query checkpoint in Pebble.
// The actual data lives in physical Pebble checkpoint directories.
message QueryCheckpointState {
  fixed64 checkpoint_id = 1;
  fixed64 max_sequence = 2;            // next_sequence - 1 at creation
  common.Timestamp created_at = 3;    // Creation timestamp (from proposal date)
}

message SetQueryCheckpointScheduleOrder {
  string cron = 1;
}

message DeleteQueryCheckpointScheduleOrder {}

message CreateLedgerOrder {
  repeated common.SetMetadataFieldTypeCommand initial_schema = 1;
  common.LedgerMode mode = 2;
  common.MirrorSourceConfig mirror_source = 3;
  map<string, common.AccountType> account_types = 4;  // Initial account types
  common.ChartEnforcementMode default_enforcement_mode = 5;  // Default enforcement for unmatched accounts
}

message MirrorIngestOrder {
  MirrorLogEntry entry = 1;
}

message MirrorLogEntry {
  fixed64 v2_log_id = 1;
  oneof data {
    MirrorCreatedTransaction created_transaction = 2;
    MirrorSavedMetadata saved_metadata = 3;
    MirrorRevertedTransaction reverted_transaction = 4;
    MirrorDeletedMetadata deleted_metadata = 5;
    MirrorFillGap fill_gap = 6;
  }
}

message MirrorFillGap {
  repeated fixed64 skipped_transaction_ids = 1;
}

message MirrorCreatedTransaction {
  fixed64 transaction_id = 1;
  repeated common.Posting postings = 2;
  map<string, common.MetadataValue> metadata = 3;
  common.Timestamp timestamp = 4;
  string reference = 5;
  map<string, common.MetadataMap> account_metadata = 6;
}

message MirrorSavedMetadata {
  common.Target target = 1;
  map<string, common.MetadataValue> metadata = 2;
}

message MirrorRevertedTransaction {
  fixed64 reverted_transaction_id = 1;
  fixed64 new_transaction_id = 2;
  repeated common.Posting reverse_postings = 3;
  map<string, common.MetadataValue> metadata = 4;
  common.Timestamp timestamp = 5;
}

message MirrorDeletedMetadata {
  common.Target target = 1;
  string key = 2;
}

message PromoteLedgerOrder {}

message DeleteLedgerOrder {}

message LedgerApplyOrder {
  oneof data {
    CreateTransactionOrder create_transaction = 1;
    SaveMetadataOrder add_metadata = 2;
    RevertTransactionOrder revert_transaction = 3;
    DeleteMetadataOrder delete_metadata = 4;
    SetMetadataFieldTypeOrder set_metadata_field_type = 5;
    RemoveMetadataFieldTypeOrder remove_metadata_field_type = 6;
    CreateIndexOrder create_index = 7;
    DropIndexOrder drop_index = 8;
    AddAccountTypeOrder add_account_type = 9;
    RemoveAccountTypeOrder remove_account_type = 10;
    UpdateDefaultEnforcementModeOrder update_default_enforcement_mode = 11;
  }
}

// CreateIndexOrder requests the creation of a new index.
message CreateIndexOrder {
  reserved 1, 2, 3;
  reserved "log_builtin", "transaction", "account";
  common.IndexID id = 4;
}

// DropIndexOrder requests the removal of an index.
message DropIndexOrder {
  reserved 1, 2, 3;
  reserved "log_builtin", "transaction", "account";
  common.IndexID id = 4;
}

// IndexReadyUpdate signals that an index has finished building.
// Applied directly as a Proposal field (no log entry produced).
message IndexReadyUpdate {
  reserved 2, 3, 4;
  reserved "log_builtin", "transaction", "account";
  string ledger = 1;
  common.IndexID id = 5;
}

// AddAccountTypeOrder adds a new account type to the ledger.
message AddAccountTypeOrder {
  common.AccountType account_type = 1;
}

// RemoveAccountTypeOrder removes an account type from the ledger.
message RemoveAccountTypeOrder {
  string name = 1;
}

// UpdateDefaultEnforcementModeOrder updates the ledger's default enforcement mode for unmatched accounts.
message UpdateDefaultEnforcementModeOrder {
  common.ChartEnforcementMode enforcement_mode = 1;
}

// MetadataConversionBatch carries a batch of metadata value conversions.
// Applied directly as a Proposal field (no log entry produced).
// Convergence is driven by the converter: it keeps proposing batches as
// long as a Pebble scan turns up entries with a mismatched type, and
// proposes MetadataConversionCompletion once a full pass finds zero such
// entries. The FSM no longer tracks progress counters or auto-completes.
message MetadataConversionBatch {
  reserved 6, 7;
  reserved "total_keys", "converted_keys_so_far";
  string ledger = 1;
  common.TargetType target_type = 2;
  string key = 3;
  common.MetadataType expected_type = 4;
  repeated ConvertMetadataEntry entries = 5;
}

message ConvertMetadataEntry {
  bytes canonical_key = 1;
  common.MetadataValue converted_value = 2;
  // Snapshot of the original value the converter scanned. The FSM apply path
  // compares this to the current cache value; mismatch means a normal
  // metadata command mutated or deleted the key between scan and apply, and
  // the conversion is silently skipped to avoid resurrecting a deleted value
  // or clobbering a newer write (see #313/#359). Stored as raw VT bytes so
  // the comparison is purely byte-equality on a canonical encoding.
  bytes expected_value = 3;
}

// MetadataConversionCompletion signals that a metadata conversion is done.
// Applied directly as a Proposal field (no log entry produced).
// Freshness is delegated to the standard preload path: the proposer adds
// the ledger key to `needs.Ledgers` and the FSM reads the preloaded value
// from the cache at apply time.
message MetadataConversionCompletion {
  reserved 5;
  reserved "ledger_info_snapshot";
  string ledger = 1;
  common.TargetType target_type = 2;
  string key = 3;
  common.MetadataType expected_type = 4;
}

message SetMetadataFieldTypeOrder {
  common.TargetType target_type = 1;
  string key = 2;
  common.MetadataType type = 3;
}

message RemoveMetadataFieldTypeOrder {
  common.TargetType target_type = 1;
  string key = 2;
}

message CreateTransactionOrder {
  repeated common.Posting postings = 1;
  common.Script script = 2;
  common.Timestamp timestamp = 3;
  string reference = 4;
  map<string, common.MetadataValue> metadata = 5;
  map<string, common.MetadataMap> account_metadata = 6;
  bool force = 7;  // Skip balance checks when true
  bool expand_volumes = 8;  // Include post-commit volumes in response
  NumscriptReference numscript_reference = 9;
}

// NumscriptReference identifies a numscript from the library to use for a transaction.
// The version is resolved by admission (fuzzy → exact) before entering the Raft log.
message NumscriptReference {
  string name = 1;
  string version = 2;
  map<string, string> vars = 3;
}

message SaveMetadataOrder {
  common.Target target = 1;
  map<string, common.MetadataValue> metadata = 2;
}

message RevertTransactionOrder {
  fixed64 transaction_id = 1;
  bool force = 2;
  bool at_effective_date = 3;
  map<string, common.MetadataValue> metadata = 4;
  repeated common.Posting original_postings = 5;
  bool expand_volumes = 6;  // Include post-commit volumes in response
}

message DeleteMetadataOrder {
  common.Target target = 1;
  string key = 2;
}

// SaveLedgerMetadataOrder sets metadata key-value pairs on a ledger.
message SaveLedgerMetadataOrder {
  map<string, common.MetadataValue> metadata = 1;
}

// DeleteLedgerMetadataOrder removes a single metadata key from a ledger.
message DeleteLedgerMetadataOrder {
  string key = 1;
}

// ============================================================================
// Raft Command Wrapper
// ============================================================================

// Proposal represents a batch of orders to be executed in the FSM (protobuf serialization format)
// A proposal can contain multiple orders that will be executed atomically
message Proposal {
  fixed64 id = 1;                    // Random proposal ID
  repeated Order orders = 2;        // List of orders to execute atomically
  common.Timestamp date = 3;        // Creation date in UTC
  ExecutionPlan execution_plan = 4;
  // predicted_index is the Raft log index predicted by the IndexTracker at
  // admission time. The FSM compares it with the actual entry.Index: a mismatch
  // means the tracker was stale (e.g. after a leadership transition) and the
  // executionPlan is invalid. The entry is rejected without audit and the caller
  // receives Unavailable so it can retry with fresh preloads.
  // A value of 0 means no prediction (e.g. barrier, mirror sync).
  fixed64 predicted_index = 7;
  // Field 13 previously held `common.CallerIdentity caller` (subject + scopes + god + source).
  // The type was split into `CallerIdentity` (identification only) and
  // `CallerSnapshot` (admission-time identity + scopes + god). Reusing the
  // same field number with a different shape would silently mis-decode
  // every persisted Proposal that carried the old caller — wire types are
  // identical (length-delimited) but the inner field layout differs.
  // Keep 13 reserved forever and write the new snapshot at 14.
  reserved 13;
  reserved "caller";
  common.CallerSnapshot caller_snapshot = 14;  // Admission-time auth snapshot (nil for system proposals); persisted into AuditEntry by the FSM.
  // technical_updates carries every FSM-level update that bypasses the
  // Order/Log channel. Each entry wraps a single payload (sink update,
  // mirror sync, metadata conversion, …) with its own coverage_bits so
  // the FSM applies per-update isolation, exactly like Order.coverage_bits.
  repeated TechnicalUpdate technical_updates = 15;
  // Fields 5, 6, 8, 9, 10, 11, 12 previously held the seven dedicated
  // technical-update channels (events_sink_updates, mirror_sync_updates,
  // idempotency_eviction, cluster_config, metadata_conversion_batches,
  // metadata_conversions_complete, index_ready_updates). They were folded
  // into the TechnicalUpdate wrapper at field 15. Keep reserved so old
  // wire payloads don't silently mis-decode.
  reserved 5, 6, 8, 9, 10, 11, 12;
  reserved "events_sink_updates", "mirror_sync_updates", "idempotency_eviction",
           "cluster_config", "metadata_conversion_batches",
           "metadata_conversions_complete", "index_ready_updates";
}

// TechnicalUpdate is the per-update envelope that carries the coverage
// gate alongside one of the supported tech-update payloads. Mirrors the
// Order shape: a bytes coverage_bits bitset over ExecutionPlan.attributes
// + the actual payload. Empty bits mean "no read coverage admitted" —
// payloads that don't read cache state (EventsSinkUpdate,
// IdempotencyEviction, ClusterConfig) ship with empty bits.
message TechnicalUpdate {
  bytes coverage_bits = 1;
  oneof kind {
    MirrorSyncUpdate mirror_sync = 2;
    EventsSinkUpdate events_sink = 3;
    IdempotencyEviction idempotency_eviction = 4;
    common.ClusterConfig cluster_config = 5;
    MetadataConversionBatch metadata_batch = 6;
    MetadataConversionCompletion metadata_completion = 7;
    IndexReadyUpdate index_ready = 8;
  }
}

// IdempotencyEviction is a deterministic cleanup command proposed by the leader.
// All nodes apply it identically: entries with created_at <= cutoff_micros are removed.
// The leader pre-scans the Pebble time index and includes the key hashes so
// that the FSM apply path is write-only (no Pebble reads).
message IdempotencyEviction {
  fixed64 cutoff_micros = 1;
  repeated bytes pebble_key_hashes = 2;  // 16-byte key hashes pre-scanned by leader

  // last_scanned_time_index_key is the full 26-byte time-index Pebble key of
  // the last entry the leader scanned: [zone(1)][sub(1)][created_at(8)][hash(16)].
  // The FSM uses it as the DeleteRange upper bound bumped by 0x00 (lex-next),
  // so the range delete includes exactly the scanned entries — never an
  // unscanned sibling that happens to share the same created_at timestamp.
  // Empty when no entries were scanned; in that case no DeleteRange is issued.
  bytes last_scanned_time_index_key = 3;
}

message MirrorSyncUpdate {
  string ledger_name = 1;
  fixed64 cursor = 2;
  common.MirrorSyncError error = 3;
  bool clear_error = 4;
  fixed64 source_log_count = 5;  // Latest known log ID in v2 source
}

// EventsSinkUpdate carries a per-sink cursor advance or error status change.
message EventsSinkUpdate {
  string sink_name = 1;
  fixed64 cursor = 2;              // New cursor position (0 = no change)
  common.SinkError error = 3;     // Set error (nil = no change unless clear_error)
  bool clear_error = 4;           // If true, clear any existing error
}

message CreatedLogOrReference {
  oneof type {
    common.Log created_log = 1;
    fixed64 reference_sequence = 2;
  }
}

message LedgerBoundaries {
  fixed64 next_transaction_id = 1;
  fixed64 next_log_id = 2;
  fixed64 volume_count = 3;
  fixed64 metadata_count = 4;
  fixed64 reference_count = 5;
  fixed64 posting_count = 6;
  fixed64 ephemeral_evicted_count = 7;
  fixed64 transient_used_count = 8;
  fixed64 revert_count = 9;
  fixed64 numscript_execution_count = 10;
}

message VolumePair {
  common.Uint256 input = 1;
  common.Uint256 output = 2;
}

// ExecutionPlan is the apply-time recipe admission attaches to a proposal:
// the keys the FSM is allowed to read, the values to seed in the cache, the
// idempotency entries to restore, and the intra-batch producer→consumer
// dependencies. It is the single source of truth the FSM consults during
// apply — every cache read is checked against it, and any mutation that
// would expand the readable surface beyond what was declared is a
// proposer bug.
message ExecutionPlan {
  fixed64 lastPersistedIndex = 1;
  // Cache epoch at admission time; FSM rejects on mismatch (cache was reset)
  fixed64 cache_epoch = 4;
  // Per-attribute plans produced by admission. Each entry is either a
  // value preload, a Gen1→Gen0 promotion, or a pure coverage declaration —
  // every plan also feeds the FSM-side state.Plan coverage set, so the
  // admission layer is the single source of truth for what the FSM may
  // read during apply.
  repeated AttributePlan attributes = 6;

  // Idempotency keys preloaded for this proposal. They live outside the
  // AttributePlan list because they are NOT a cache attribute: the FSM
  // applies them to the dedicated IdempotencyStore and the state.Plan
  // does not track their coverage. Kept as a top-level field instead of
  // an AttributePlan variant to make that distinction visible at the
  // wire level.
  repeated ReloadIdempotencyKey idempotency_keys = 7;

  reserved 2, 3, 5, 8;
  reserved "preloads", "touches", "declared", "productions";
}

// AttributePlan describes what the FSM must do with a single attribute key
// on apply. attr_code (dal.SubAttrXxx) lives on the plan itself, not on
// the intent, so the kind/code can be read uniformly without inspecting
// the oneof — keeps coverage indexing, dispatch, and unmarshal routing
// all on the same field. Exactly one of declare/touch/value is set; that
// choice tells the cache-mutation path (Touch promotes, AttributeValue
// writes, Declare is a no-op) what to do.
message AttributePlan {
  AttributeID id = 1;
  uint32 attr_code = 2;
  oneof intent {
    // Declare: the key was already CacheGuaranteed (Gen0) at admission time.
    // No FSM-side cache mutation; pure coverage declaration so state.Plan
    // admits reads on hot keys without a false-positive miss.
    Declare declare = 3;
    // Touch: the key is in Gen1 and would not survive the next rotation.
    // The FSM mirrors the promotion via MirrorTouch.
    Touch touch = 4;
    // AttributeValue: load the value into Gen0 cache. Carries the typed value.
    AttributeValue value = 5;
  }
}

// Declare is the sentinel intent for AttributePlan. Empty by design — the
// presence of the field is the entire signal.
message Declare {}

// Touch is the sentinel intent for AttributePlan. Empty by design — the
// presence of the field plus AttributePlan.attr_code drive the Gen1→Gen0
// promotion on the FSM side.
message Touch {}

// AttributeValue carries the typed value to write into the FSM-side cache
// for one AttributePlan. The value is type-erased on the wire (a vtproto-
// marshaled blob) and the FSM dispatches the typed unmarshal via the
// parent AttributePlan.attr_code (dal.SubAttrXxx) — kept off this message
// to avoid carrying the kind in two places.
message AttributeValue {
  bytes raw_value = 1;
}

// ReloadIdempotencyKey rides on ExecutionPlan.idempotency_keys, not on the
// AttributePlan list. Idempotency keys are not cache attributes: the FSM
// restores them into the dedicated IdempotencyStore on apply, hence
// "Reload" rather than the cache-attribute pre-loading the AttributePlan
// variants feed.
message ReloadIdempotencyKey {
  string key = 1;
  common.IdempotencyKeyValue value = 2;
}

// ============================================================================
// Snapshot
// ============================================================================

// NodeSnapshot carries cluster-level metadata (peer addresses) for WAL snapshots.
message NodeSnapshot {
  repeated PeerAddress peer_addresses = 1;
}

// CacheGenerationMeta stores per-generation metadata in Pebble.
message CacheGenerationMeta {
  fixed64 base_index = 1;
}

// CacheSnapshotMeta stores cache-level metadata in Pebble.
message CacheSnapshotMeta {
  fixed64 current_generation = 1;
}

// PeerAddress stores a peer's raft and service addresses in snapshots.
message PeerAddress {
  uint64 node_id = 1;
  string raft_address = 2;
  string service_address = 3;
}

message GenerationSnapshot {
  fixed64 base_index = 1;
  repeated VolumeAttributeSnapshotEntry volumes = 2;
  repeated MetadataAttributeEntry metadata = 3;  // Account metadata
  repeated MetadataAttributeEntry ledger_metadata = 4;  // Ledger metadata
  repeated LedgerAttributeEntry ledgers = 5;
  repeated BoundaryAttributeEntry boundaries = 6;
  repeated TransactionReferenceAttributeEntry references = 7;
  repeated TransactionStateAttributeEntry transactions = 8;
  reserved 9; // was: idempotency_keys (moved to dedicated prefix 0x03)
}

// VolumeAttributeSnapshotEntry stores a merged Input+Output volume pair in cache snapshots.
message VolumeAttributeSnapshotEntry {
  AttributeID id = 1;
  common.Uint256 input = 2;
  common.Uint256 output = 3;
}

// MetadataKeyStoreEntry stores a single entry from KeyStore[*MetadataValue]
message MetadataAttributeEntry {
  AttributeID id = 1;
  common.MetadataValue value = 2;
}

// LedgerAttributeEntry stores a single entry from KeyStore[*LedgerInfo]
message LedgerAttributeEntry {
  AttributeID id = 1;
  common.LedgerInfo info = 2;
}

// BoundaryAttributeEntry stores a single entry from KeyStore[*LedgerBoundaries]
message BoundaryAttributeEntry {
  AttributeID id = 1;
  LedgerBoundaries boundaries = 2;
}

// TransactionReferenceAttributeEntry stores a single entry from KeyStore[*TransactionReferenceValue]
message TransactionReferenceAttributeEntry {
  AttributeID id = 1;
  common.TransactionReferenceValue value = 2;
}

// TransactionStateAttributeEntry stores a single entry from KeyStore[*TransactionState]
message TransactionStateAttributeEntry {
  AttributeID id = 1;
  common.TransactionState state = 2;
}

// Deprecated: IdempotencyKeyAttributeEntry is no longer used in snapshots.
// Kept for wire compatibility with older nodes that may still send this message.
message IdempotencyKeyAttributeEntry {
  AttributeID id = 1;
  common.IdempotencyKeyValue value = 2;
}

message AttributeID {
  bytes id = 1;           // 16-byte U128 identifier
  fixed64 tag = 2;
}

