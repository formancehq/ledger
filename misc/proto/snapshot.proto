syntax = "proto3";

package snapshot.v1;

option go_package = "github.com/formancehq/ledger-v3-poc/internal/proto/snapshotpb";

// Service exposed by the leader (or any node hosting the snapshot).
service SnapshotService {
  // Stream a fresh Pebble checkpoint as a tar archive.
  // The leader creates the checkpoint on demand when called.
  rpc FetchSnapshot(FetchSnapshotRequest) returns (stream FetchSnapshotResponse);
}

message FetchSnapshotRequest {
  // Calling node identity (for logging/quotas).
  string node_id = 1;
}

message FetchSnapshotResponse {
  // True for the first chunk (carries metadata).
  bool header = 1;

  // Chunk offset in the total stream
  uint64 chunk_offset = 2;

  bytes data = 3;

  // True if last chunk
  bool eof = 4;

  // Set on the EOF chunk: integrity verification.
  string content_sha256 = 5;
  uint64 content_size   = 6;
}
