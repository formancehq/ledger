syntax = "proto3";

package ledger;

option go_package = "github.com/formancehq/ledger-v3-poc/internal/ledgerpb";

// LedgerService provides ledger operations
service LedgerService {
  // CreateLedger creates a new ledger
  rpc CreateLedger(CreateLedgerCommand) returns (LedgerInfo);
  // DeleteLedger deletes a ledger
  rpc DeleteLedger(DeleteLedgerCommand) returns (DeleteLedgerResponse);
  // GetAllLedgersInfo returns all ledgers info in the cluster
  rpc GetAllLedgersInfo(GetAllLedgersRequest) returns (GetAllLedgersResponse);
  // GetLedgerInfo returns a ledger info by its name
  rpc GetLedgerInfo(GetLedgerByNameRequest) returns (LedgerInfo);
  // CreateTransaction creates a new transaction
  rpc CreateTransaction(CreateTransactionRequest) returns (Log);
  // RevertTransaction reverts a transaction
  rpc RevertTransaction(RevertTransactionRequest) returns (Log);
  // SaveAccountMetadata saves metadata for an account
  rpc SaveAccountMetadata(SaveAccountMetadataRequest) returns (Log);
  // SaveTransactionMetadata saves metadata for a transaction
  rpc SaveTransactionMetadata(SaveTransactionMetadataRequest) returns (Log);
  // DeleteAccountMetadata deletes metadata for an account
  rpc DeleteAccountMetadata(DeleteAccountMetadataRequest) returns (Log);
  // DeleteTransactionMetadata deletes metadata for a transaction
  rpc DeleteTransactionMetadata(DeleteTransactionMetadataRequest) returns (Log);
  // StreamLogs streams logs from a ledger, optionally starting from a log ID
  rpc StreamLogs(StreamLogsRequest) returns (stream StreamLogsResponse);
}

message Timestamp {
  uint64 data = 1;
}

// Metadata represents account or transaction metadata as a map of string key-value pairs
message Metadata {
  map<string, string> entries = 1;
}

// Posting represents a single posting in a transaction
message Posting {
  string source = 1;
  string destination = 2;
  BigInt amount = 3;
  string asset = 4;
}

// Transaction represents a transaction
message Transaction {
  repeated Posting postings = 1;
  map<string, string> metadata = 2;
  Timestamp timestamp = 3;
  string reference = 4;
  uint64 id = 5;
  bool reverted = 6;
  Timestamp inserted_at = 7;
  Timestamp updated_at = 8;
  Timestamp reverted_at = 9;
}

// TransactionData represents transaction data without ID and timestamps
message TransactionData {
  repeated Posting postings = 1;
  map<string, string> metadata = 2;
  Timestamp timestamp = 3;
  string reference = 4;
}

// Transactions represents a collection of transactions
message Transactions {
  repeated TransactionData transactions = 1;
}

// Volumes represents input and output volumes
message Volumes {
  string input = 1;   // big.Int as string
  string output = 2;  // big.Int as string
}

// VolumesWithBalance represents volumes with balance
message VolumesWithBalance {
  string input = 1;    // big.Int as string
  string output = 2;   // big.Int as string
  string balance = 3;  // big.Int as string
}

// VolumesByAssets represents volumes grouped by asset
message VolumesByAssets {
  map<string, Volumes> volumes = 1;
}

// PostCommitVolumes represents volumes after commit, grouped by account and asset
message PostCommitVolumes {
  map<string, VolumesByAssets> volumes_by_account = 1;
}

// VolumesWithBalanceByAssetByAccount represents volumes with balance grouped by asset and account
message VolumesWithBalanceByAssetByAccount {
  string account = 1;
  string asset = 2;
  VolumesWithBalance volumes_with_balance = 3;
}

// AggregatedVolumes represents aggregated volumes
message AggregatedVolumes {
  VolumesByAssets aggregated = 1;
}

// Account represents an account in the ledger
message Account {
  string address = 1;
  map<string, string> metadata = 2;
  Timestamp first_usage = 3;
  Timestamp insertion_date = 4;
  Timestamp updated_at = 5;
}

// AccountsVolumes represents volumes for a specific account and asset
message AccountsVolumes {
  string account = 1;
  string asset = 2;
  string input = 3;   // big.Int as string
  string output = 4;  // big.Int as string
}

message BigInt {
  bytes data = 1;
}

message Script {
  string plain = 1;
  map<string, string> vars = 2;
}

message Parameters {
  string ledger = 2;
  string idempotency_key = 3;
}

message CreateTransactionRequestPayload {
  map<string, Metadata> account_metadata = 2;
  map<string, string> metadata = 4;
  Timestamp timestamp = 3;
  string reference = 5;
  repeated Posting postings = 6;
  Script script = 9;
}

message CreateTransactionRequest {
  CreateTransactionRequestPayload payload = 1;
  Parameters parameters = 2;
}

message SaveAccountMetadataRequestPayload {
  string address = 9;
  map<string, string> metadata = 3;
}

message SaveAccountMetadataRequest {
  SaveAccountMetadataRequestPayload payload = 1;
  Parameters parameters = 2;
}

message RevertTransactionRequestPayload {
  uint64 transaction_id = 2;
  bool force = 3;
  bool at_effective_date = 4;
  map<string, string> metadata = 5;
}

message RevertTransactionRequest {
  RevertTransactionRequestPayload payload = 1;
  Parameters parameters = 3;
}

message SaveTransactionMetadataRequestPayload {
  uint64 transaction_id = 2;
  map<string, string> metadata = 3;
}

message SaveTransactionMetadataRequest {
  SaveTransactionMetadataRequestPayload payload = 1;
  Parameters parameters = 2;
}

message DeleteAccountMetadataRequestPayload {
  string address = 2;
  string key = 3;
}

message DeleteAccountMetadataRequest {
  DeleteAccountMetadataRequestPayload payload = 1;
  Parameters parameters = 2;
}

message DeleteTransactionMetadataRequestPayload {
  uint64 transaction_id = 2;
  string key = 3;
}

message DeleteTransactionMetadataRequest {
  DeleteTransactionMetadataRequestPayload payload = 1;
  Parameters parameters = 2;
}

message StreamLogsRequest {
  string ledger = 1;
  uint64 from_id = 2; // Optional: start streaming from this log ID (inclusive). If 0, streams from the beginning
  uint64 to_id = 3;   // Optional: stop streaming at this log ID (inclusive). If 0, streams until the end
}

message StreamLogsResponse {
  Log log = 1;
}

message Log {
  LogPayload data = 1;
  Timestamp date = 2;
  Idempotency idempotency = 3;
  uint64 id = 4;
  string ledger = 5;
}

message LogPayload {
  oneof payload {
    CreatedTransaction created_transaction = 1;
    RevertedTransaction reverted_transaction = 2;
    SavedMetadata saved_metadata = 3;
    DeletedMetadata deleted_metadata = 4;
  }
}

message CreatedTransaction {
  Transaction transaction = 1;
  map<string, Metadata> account_metadata = 2;
}

message RevertedTransaction {
  uint64 reverted_transaction_id = 1;
  Transaction revert_transaction = 2;
}

message TargetAccount {
  string addr = 1;
}

message TargetTransaction {
  uint64 id = 1;
}

message Target {
  oneof target {
    TargetAccount account = 1;
    TargetTransaction transaction = 2;
  }
}

message SavedMetadata {
  Target target = 1;
  map<string, string> metadata = 2;
}

message DeletedMetadata {
  Target target = 1;
  string key = 2;                           // Metadata key to delete
}

// IdempotencyEntry represents an idempotency key entry stored in Pebble
message IdempotencyEntry {
  bytes hash = 1;                          // Idempotency hash
  uint64 log_id = 2;                        // Log ID
}

message Idempotency {
  string key = 1;
  bytes hash = 2;
}

// TransactionResume represents a simplified transaction for memento purposes
// Excludes postCommitVolumes and postCommitEffectiveVolumes fields
message TransactionResume {
  repeated Posting postings = 1;
  map<string, string> metadata = 2;
  Timestamp timestamp = 3;
  string reference = 4;
  uint64 id = 5;                            // Optional, 0 means nil
  bool reverted = 6;
}

// CreatedTransactionMemento represents the memento structure for CreatedTransaction
message CreatedTransactionMemento {
  TransactionResume transaction = 1;
  map<string, Metadata> account_metadata = 2;
}

// RevertedTransactionMemento represents the memento structure for RevertedTransaction
message RevertedTransactionMemento {
  uint64 reverted_transaction_id = 1;      // Optional, 0 means nil
  TransactionResume revert_transaction = 2;
}

// LedgerInfo represents information about a ledger
message LedgerInfo {
  string name = 1;                          // Ledger name/ID
  map<string, string> metadata = 2;         // Optional metadata
  Timestamp created_at = 3;                 // Creation timestamp
}

message LedgerState {
  LedgerInfo ledger_info = 1;
  uint64 next_log_id = 2;
  uint64 next_transaction_id = 3;
}

message AppendTransactionCommand {
  map<string, Metadata> account_metadata = 2;
  map<string, string> metadata = 3;
  Timestamp timestamp = 4;
  string reference = 5;
  repeated Posting postings = 6;
}

message SaveMetadataCommand {
  Target target = 2;
  map<string, string> metadata = 3;
}

message DeleteMetadataCommand {
  Target target = 2;
  string key = 3;
}

message RevertTransactionCommand {
  uint64 transaction_id = 2;
  Transaction revert_transaction = 3;
}

message CommandInput {
  oneof command {
    AppendTransactionCommand append_transaction = 2;
    SaveMetadataCommand save_metadata = 3;
    DeleteMetadataCommand delete_metadata = 4;
    RevertTransactionCommand revert_transaction = 5;
  }
}

message CreateLogCommand {
  Idempotency idempotency = 1;
  CommandInput input = 2;
  string ledger = 3;
}

message CreateLedgerCommand {
  string name = 1;
  map<string, string> metadata = 2;
}

message DeleteLedgerCommand {
  string name = 1;
}

message DeleteLedgerResponse {}

message GetAllLedgersRequest {
  // Empty - no parameters needed
}

message GetAllLedgersResponse {
  map<string, LedgerInfo> ledgers = 1;
}

message GetLedgerByNameRequest {
  string name = 1;
}

message State {
  map<string, LedgerState> ledgers = 1;
}

// CommandProto represents a command to be executed in the FSM (protobuf serialization format)
message Command {
  uint64 id = 1;                    // Random command ID
  CommandType type = 2;                  // Command type (e.g., "create_bucket", "delete_bucket", "create_ledger", "insert_log")
  bytes data = 3;                   // Protobuf-encoded command data
  ledger.Timestamp date = 4; // Creation date in UTC
}

enum CommandType {
  CreateLedger = 0;
  DeleteLedger = 1;
  CreateLog = 2;
}
