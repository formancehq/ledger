kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: ledgerbackupruns.ledger.formance.com
spec:
  group: ledger.formance.com
  names:
    kind: LedgerBackupRun
    listKind: LedgerBackupRunList
    plural: ledgerbackupruns
    shortNames:
    - lbkr
    singular: ledgerbackuprun
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.backupRef
      name: Backup
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.startTime
      name: Started
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          LedgerBackupRun represents a single backup execution triggered either by a LedgerBackup schedule
          or manually (e.g. via `kubectl ledger backup trigger`).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: LedgerBackupRunSpec defines the desired state of a LedgerBackupRun.
            properties:
              backupRef:
                description: |-
                  BackupRef is the name of the parent LedgerBackup in the same namespace.
                  Destination and serviceRef are inherited from the parent.
                type: string
              type:
                default: Full
                description: Type is the backup type. Defaults to Full.
                enum:
                - Full
                - Incremental
                type: string
            required:
            - backupRef
            type: object
          status:
            description: LedgerBackupRunStatus defines the observed state of a LedgerBackupRun.
            properties:
              completionTime:
                description: CompletionTime is when the run reached a terminal phase
                  (Succeeded or Failed).
                format: date-time
                type: string
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              full:
                description: Full holds the result of a Full backup run. Set only
                  when spec.type is Full and the run succeeded.
                properties:
                  durationMs:
                    description: DurationMs is the duration of the last full backup
                      in milliseconds.
                    format: int64
                    type: integer
                  filesDeleted:
                    description: FilesDeleted is the number of stale files deleted
                      in the last full backup.
                    format: int32
                    type: integer
                  filesUploaded:
                    description: FilesUploaded is the number of files uploaded in
                      the last full backup.
                    format: int32
                    type: integer
                  lastAppliedIndex:
                    description: LastAppliedIndex is the last Raft applied index in
                      the backup.
                    format: int64
                    type: integer
                  lastAuditSequence:
                    description: LastAuditSequence is the last audit sequence included
                      in the backup.
                    format: int64
                    type: integer
                  lastLogSequence:
                    description: LastLogSequence is the last log sequence included
                      in the backup.
                    format: int64
                    type: integer
                  time:
                    description: Time is when the last full backup completed.
                    format: date-time
                    type: string
                  totalFiles:
                    description: TotalFiles is the total number of files in the backup
                      after the last run.
                    format: int32
                    type: integer
                type: object
              incremental:
                description: Incremental holds the result of an Incremental backup
                  run. Set only when spec.type is Incremental and the run succeeded.
                properties:
                  auditEntriesExported:
                    description: AuditEntriesExported is the number of audit entries
                      exported.
                    format: int64
                    type: integer
                  durationMs:
                    description: DurationMs is the duration of the last incremental
                      backup in milliseconds.
                    format: int64
                    type: integer
                  lastAuditSequence:
                    description: LastAuditSequence is the last audit sequence in the
                      incremental backup.
                    format: int64
                    type: integer
                  lastLogSequence:
                    description: LastLogSequence is the last log sequence in the incremental
                      backup.
                    format: int64
                    type: integer
                  logEntriesExported:
                    description: LogEntriesExported is the number of log entries exported.
                    format: int64
                    type: integer
                  segmentsUploaded:
                    description: SegmentsUploaded is the number of segments uploaded.
                    format: int32
                    type: integer
                  time:
                    description: Time is when the last incremental backup completed.
                    format: date-time
                    type: string
                type: object
              message:
                description: Message contains human-readable status information (typically
                  an error message).
                type: string
              phase:
                description: Phase is the current lifecycle phase.
                enum:
                - Pending
                - Running
                - Succeeded
                - Failed
                type: string
              startTime:
                description: StartTime is when the run transitioned to Running.
                format: date-time
                type: string
