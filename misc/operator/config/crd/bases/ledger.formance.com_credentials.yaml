---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: credentials.ledger.formance.com
spec:
  group: ledger.formance.com
  names:
    kind: Credentials
    listKind: CredentialsList
    plural: credentials
    singular: credentials
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.keyID
      name: KeyID
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Credentials is a cluster-scoped resource that describes an credentials with
          Ed25519 authentication keys. The operator generates the keypair, stores the seed
          in a Secret, and injects the public key into matching Cluster clusters.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CredentialsSpec defines the desired state of a Credentials.
            properties:
              additionalNamespaces:
                description: |-
                  AdditionalNamespaces is an optional list of extra namespaces where the
                  credentials's Secret must also be created, in addition to the namespaces of
                  the Clusters matched by Selector.
                items:
                  type: string
                type: array
              god:
                description: |-
                  God enables god mode for this credentials. God-mode credentials receive all scopes
                  regardless of the Scopes field and can bypass scope checks entirely.
                type: boolean
              scopes:
                description: Scopes is the list of authorization scopes this credentials
                  is allowed (e.g. "read", "write").
                items:
                  type: string
                type: array
              selector:
                description: Selector selects which Cluster resources this credentials
                  applies to.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            required:
            - selector
            type: object
          status:
            description: CredentialsStatus defines the observed state of a Credentials.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              distributedSecretRefs:
                description: |-
                  DistributedSecretRefs lists every namespace where the credentials's Secret has
                  been written. All replicas carry identical data; consumers can read any
                  entry — typically the first.
                items:
                  description: SecretReference identifies a namespaced Secret.
                  properties:
                    name:
                      description: Name of the Secret.
                      type: string
                    namespace:
                      description: Namespace of the Secret.
                      type: string
                  required:
                  - name
                  - namespace
                  type: object
                type: array
              keyID:
                description: KeyID is the SHA-256 fingerprint prefix (16 hex chars)
                  of the public key.
                type: string
              matchedClusters:
                description: MatchedClusters lists the Cluster resources matched by
                  the selector.
                items:
                  description: MatchedCluster identifies a namespaced Cluster matched
                    by the credentials selector.
                  properties:
                    name:
                      description: Name of the Cluster.
                      type: string
                    namespace:
                      description: Namespace of the Cluster.
                      type: string
                  required:
                  - name
                  - namespace
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the generation last observed by
                  the controller.
                format: int64
                type: integer
              phase:
                description: 'Phase of the Credentials: Pending, Ready, Error.'
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
