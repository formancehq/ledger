apiVersion: ledger.formance.com/v1alpha1
kind: LedgerService
metadata:
  name: my-ledger
spec:
  replicas: 3
  image:
    repository: ghcr.io/formancehq/ledger-v3-poc
    tag: latest
  config:
    clusterID: default
    pebble:
      memTableSize: 268435456
      cacheSize: 1073741824
  persistence:
    wal:
      size: 5Gi
    data:
      size: 10Gi
  resources:
    requests:
      cpu: "4000m"
      memory: "2048Mi"
    limits:
      cpu: "4000m"
      memory: "2048Mi"
