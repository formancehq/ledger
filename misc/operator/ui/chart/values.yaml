image:
  repository: ghcr.io/formancehq/ledger-operator-ui
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

port: 3001

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  labels: {}
  hosts: []
  tls: []
  # DNSEndpoint for ExternalDNS (created only when ingress is enabled).
  dnsEndpoint:
    enabled: false
    annotations: {}
    endpoints: []
    # Example:
    #   endpoints:
    #     - dnsName: operator-ui.example.com
    #       recordType: CNAME
    #       targets:
    #         - my-lb.elb.amazonaws.com
    #       recordTTL: 300

# ── Authentication (optional) ─────────────────────────────────────────────────
# Enable OIDC authentication to restrict access to the operator UI.
# When disabled (the default), the UI is accessible without login.
#
# To enable, set auth.enabled=true and configure an OIDC provider
# (e.g. Google, Keycloak, Dex, Auth0...).
#
# Quick start with Google:
#   1. Create an OAuth client at https://console.cloud.google.com/apis/credentials
#   2. Set authorized redirect URI to: https://<your-host>/api/auth/callback
#   3. Fill in the values below
#
# For production, use existingSecret to avoid storing credentials in values.
auth:
  # Set to true to require login
  enabled: false

  # OIDC provider URL (e.g. "https://accounts.google.com")
  # The backend will auto-discover endpoints via .well-known/openid-configuration
  issuerUrl: ""

  # OAuth client credentials — get these from your OIDC provider
  clientId: ""
  clientSecret: ""

  # Random string (min 32 chars) used to sign session cookies.
  # Generate one with: openssl rand -hex 32
  sessionSecret: ""

  # Where the OIDC provider redirects after login.
  # Leave empty to auto-detect from the service port (http://localhost:<port>/api/auth/callback)
  redirectUri: ""

  # OAuth scopes to request — "openid" is required, "profile email" gives us name/email
  scopes: "openid profile email"

  # Where to redirect after logout
  postLogoutRedirectUri: "/"

  # Use an existing Kubernetes Secret instead of putting credentials in values.
  # The Secret must contain two keys: "client-secret" and "session-secret".
  #
  # Example:
  #   kubectl create secret generic operator-ui-auth \
  #     --from-literal=client-secret=YOUR_CLIENT_SECRET \
  #     --from-literal=session-secret=$(openssl rand -hex 32)
  existingSecret: ""

  # Map user emails to roles. Roles: "admin" (full access), "guest" (limited).
  # Use "*" as a catch-all for unmatched emails.
  # When empty or no match, users default to "guest" (secure by default).
  roleMapping: {}
  # Example:
  #   roleMapping:
  #     "admin@company.com": "admin"
  #     "*": "guest"

nameOverride: ""
fullnameOverride: ""
