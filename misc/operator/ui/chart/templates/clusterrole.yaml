apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ledger-operator-ui.fullname" . }}
  labels:
    {{- include "ledger-operator-ui.labels" . | nindent 4 }}
rules:
# LedgerService CRDs - full CRUD
- apiGroups: ["ledger.formance.com"]
  resources: ["ledgerservices"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# LedgerDefaults CRDs - full CRUD
- apiGroups: ["ledger.formance.com"]
  resources: ["ledgerdefaults"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Pods - list
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
# PVCs, Services - read only
- apiGroups: [""]
  resources: ["persistentvolumeclaims", "services"]
  verbs: ["get", "list", "watch"]
# Events - read for debugging
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]
# Namespaces - list for namespace selector
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["list"]
