apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ledger-operator-ui.fullname" . }}
  labels:
    {{- include "ledger-operator-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ledger-operator-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ledger-operator-ui.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ledger-operator-ui.serviceAccountName" . }}
      containers:
      - name: ui
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.port }}
          protocol: TCP
        env:
        - name: PORT
          value: "{{ .Values.port }}"
        - name: NODE_ENV
          value: "production"
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      securityContext:
        runAsNonRoot: true
