apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ledger-operator-ui.fullname" . }}
  labels:
    {{- include "ledger-operator-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ledger-operator-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ledger-operator-ui.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ledger-operator-ui.serviceAccountName" . }}
      containers:
      - name: ui
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.port }}
          protocol: TCP
        env:
        - name: PORT
          value: "{{ .Values.port }}"
        - name: NODE_ENV
          value: "production"
        {{- /* Auth env vars — only injected when auth.enabled is true */}}
        {{- if .Values.auth.enabled }}
        - name: AUTH_ENABLED
          value: "true"
        - name: AUTH_ISSUER_URL
          value: {{ .Values.auth.issuerUrl | quote }}
        - name: AUTH_CLIENT_ID
          value: {{ .Values.auth.clientId | quote }}
        {{- if .Values.auth.existingSecret }}
        - name: AUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.auth.existingSecret }}
              key: client-secret
        - name: AUTH_SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.auth.existingSecret }}
              key: session-secret
        {{- else }}
        - name: AUTH_CLIENT_SECRET
          value: {{ .Values.auth.clientSecret | quote }}
        - name: AUTH_SESSION_SECRET
          value: {{ .Values.auth.sessionSecret | quote }}
        {{- end }}
        {{- if .Values.auth.redirectUri }}
        - name: AUTH_REDIRECT_URI
          value: {{ .Values.auth.redirectUri | quote }}
        {{- end }}
        {{- if .Values.auth.scopes }}
        - name: AUTH_SCOPES
          value: {{ .Values.auth.scopes | quote }}
        {{- end }}
        {{- if .Values.auth.postLogoutRedirectUri }}
        - name: AUTH_POST_LOGOUT_REDIRECT_URI
          value: {{ .Values.auth.postLogoutRedirectUri | quote }}
        {{- end }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      securityContext:
        runAsNonRoot: true
