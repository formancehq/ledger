---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: ledgerbackups.ledger.formance.com
spec:
  group: ledger.formance.com
  names:
    kind: LedgerBackup
    listKind: LedgerBackupList
    plural: ledgerbackups
    shortNames:
    - lbk
    singular: ledgerbackup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.serviceRef
      name: Service
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.lastFullBackup.time
      name: Last Full
      type: date
    - jsonPath: .status.lastIncrementalBackup.time
      name: Last Incremental
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: LedgerBackup manages scheduled backups of a LedgerService to
          S3 via ledgerctl.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: LedgerBackupSpec defines the desired state of a LedgerBackup.
            properties:
              destination:
                description: Destination defines where backups are stored.
                properties:
                  bucketId:
                    description: |-
                      BucketID is the namespace prefix for backup files.
                      Defaults to the cluster-id if not set.
                    type: string
                  driver:
                    default: s3
                    description: 'Driver is the backup storage driver: "s3".'
                    enum:
                    - s3
                    type: string
                  s3:
                    description: S3 configuration (required when driver is "s3").
                    properties:
                      bucket:
                        description: Bucket is the S3 bucket name.
                        type: string
                      endpoint:
                        description: Endpoint is a custom S3 endpoint (for MinIO).
                        type: string
                      region:
                        description: Region is the AWS region.
                        type: string
                    type: object
                  s3AccessKeyId:
                    description: |-
                      S3AccessKeyID is a static AWS access key ID for S3 authentication.
                      If not set, the default AWS credential chain is used (env vars, IRSA, etc.).
                    type: string
                  s3SecretAccessKey:
                    description: |-
                      S3SecretAccessKey is a static AWS secret access key for S3 authentication.
                      If not set, the default AWS credential chain is used.
                    type: string
                required:
                - driver
                type: object
              failedRunsHistoryLimit:
                default: 1
                description: |-
                  FailedRunsHistoryLimit is the maximum number of failed LedgerBackupRun
                  resources to keep per type (full/incremental). Older runs are garbage-collected.
                  Defaults to 1.
                format: int32
                type: integer
              schedule:
                description: |-
                  Schedule defines cron schedules for full and incremental backups.
                  Both entries are optional; a LedgerBackup without any schedule is valid
                  and acts as a backup configuration template for manual LedgerBackupRun resources.
                properties:
                  full:
                    description: Full is the cron expression for full backups (e.g.
                      "0 2 * * 0" for weekly Sunday 2am).
                    type: string
                  incremental:
                    description: Incremental is the cron expression for incremental
                      backups (e.g. "0 * * * *" for hourly).
                    type: string
                type: object
              serviceRef:
                description: ServiceRef is the name of the LedgerService in the same
                  namespace.
                type: string
              successfulRunsHistoryLimit:
                default: 3
                description: |-
                  SuccessfulRunsHistoryLimit is the maximum number of successful LedgerBackupRun
                  resources to keep per type (full/incremental). Older runs are garbage-collected.
                  Defaults to 3.
                format: int32
                type: integer
              timeout:
                default: 1h
                description: |-
                  Timeout caps how long the `ledgerctl store backup` /
                  `ledgerctl store incremental-backup` RPC may run before the client
                  aborts. The operator forwards it as `--timeout` to the Job's
                  ledgerctl invocation; tune it for the size of the ledger and the
                  throughput of the destination bucket. Defaults to 1h, which is
                  enough for tens of GB on S3 while still bounding stuck runs.
                type: string
            required:
            - destination
            - serviceRef
            type: object
          status:
            description: LedgerBackupStatus defines the observed state of a LedgerBackup.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastFullBackup:
                description: LastFullBackup holds the result of the last full backup.
                properties:
                  durationMs:
                    description: DurationMs is the duration of the last full backup
                      in milliseconds.
                    format: int64
                    type: integer
                  filesDeleted:
                    description: |-
                      FilesDeleted is the number of stale files deleted in the last full backup
                      (the diff between the previous manifest and the new checkpoint).
                    format: int32
                    type: integer
                  filesUploaded:
                    description: FilesUploaded is the number of files uploaded in
                      the last full backup.
                    format: int32
                    type: integer
                  lastAppliedIndex:
                    description: LastAppliedIndex is the last Raft applied index in
                      the backup.
                    format: int64
                    type: integer
                  lastAuditSequence:
                    description: LastAuditSequence is the last audit sequence included
                      in the backup.
                    format: int64
                    type: integer
                  lastLogSequence:
                    description: LastLogSequence is the last log sequence included
                      in the backup.
                    format: int64
                    type: integer
                  orphansDeleted:
                    description: |-
                      OrphansDeleted is the number of orphan files pruned from storage in the
                      last full backup. Orphans are leftovers from previous failed runs that
                      crashed before writing a manifest.
                    format: int32
                    type: integer
                  time:
                    description: Time is when the last full backup completed.
                    format: date-time
                    type: string
                  totalFiles:
                    description: TotalFiles is the total number of files in the backup
                      after the last run.
                    format: int32
                    type: integer
                type: object
              lastIncrementalBackup:
                description: LastIncrementalBackup holds the result of the last incremental
                  backup.
                properties:
                  auditEntriesExported:
                    description: AuditEntriesExported is the number of audit entries
                      exported.
                    format: int64
                    type: integer
                  durationMs:
                    description: DurationMs is the duration of the last incremental
                      backup in milliseconds.
                    format: int64
                    type: integer
                  lastAuditSequence:
                    description: LastAuditSequence is the last audit sequence in the
                      incremental backup.
                    format: int64
                    type: integer
                  lastLogSequence:
                    description: LastLogSequence is the last log sequence in the incremental
                      backup.
                    format: int64
                    type: integer
                  logEntriesExported:
                    description: LogEntriesExported is the number of log entries exported.
                    format: int64
                    type: integer
                  orphansDeleted:
                    description: |-
                      OrphansDeleted is the number of orphan export segments pruned from
                      storage in the last incremental backup.
                    format: int32
                    type: integer
                  segmentsUploaded:
                    description: SegmentsUploaded is the number of segments uploaded.
                    format: int32
                    type: integer
                  time:
                    description: Time is when the last incremental backup completed.
                    format: date-time
                    type: string
                type: object
              message:
                description: Message contains human-readable status information.
                type: string
              nextFullBackupTime:
                description: NextFullBackupTime is the next scheduled time for a full
                  backup.
                format: date-time
                type: string
              nextIncrementalBackupTime:
                description: NextIncrementalBackupTime is the next scheduled time
                  for an incremental backup.
                format: date-time
                type: string
              phase:
                description: Phase is the current lifecycle phase.
                enum:
                - Pending
                - Ready
                - Running
                - Failed
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
