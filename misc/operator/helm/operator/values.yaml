ledger-operator-crds:
  create: true

image:
  repository: ghcr.io/formancehq/ledger-operator
  tag: latest
  pullPolicy: IfNotPresent

ledgerImage:
  registry: ghcr.io
  name: formancehq/ledger
  tag: latest

replicaCount: 1

leaderElection: true
watchNamespace: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

serviceAccount:
  create: true
  annotations: {}
  name: ""

nodeSelector: {}
tolerations: []

nameOverride: ""
fullnameOverride: ""

# -- Volume deletion protection (cluster-admin consent layer). Enabled by default:
# installs the cluster-scoped ValidatingAdmissionPolicy that rejects DELETE of
# ledger PVCs/PVs unless they carry the allow-deletion annotation. This only
# arms the policy — a ledger is protected once it also opts in per-CR via
# spec.persistence.deletionProtection (also on by default; the operator then stamps
# the `ledger.formance.com/deletion-protection: enabled` label the policy selects on).
# Set enabled=false to opt the whole cluster out of the policy.
# Requires Kubernetes >= 1.30 (ValidatingAdmissionPolicy GA). On an older cluster the
# chart auto-skips the policy (the install still succeeds and prints a NOTES warning)
# rather than failing on the unknown kind; deletionProtection CRs then report
# DeletionProtectionInactive at runtime. The operator ServiceAccount (scale-down deletes)
# and the kube-controller-manager garbage collector (retentionPolicy
# whenScaled/whenDeleted=Delete) are exempt, so both deletion paths keep working.
# allowDeletionAnnotation must be a valid Kubernetes annotation key (render fails
# otherwise). The installed policy is a cluster-wide singleton: enable it on at most
# one operator release per cluster. A second release with pvcProtection.enabled=true
# renders the same fixed-name cluster-scoped objects and fails to install (Helm
# ownership conflict) by design — in a multi-release cluster, set enabled=false on all
# but one release. See the operator README "Volume deletion protection".
pvcProtection:
  enabled: true
  allowDeletionAnnotation: formance.com/allow-deletion
  # Extra ServiceAccount usernames to exempt from the deletion-protection policies,
  # beyond this release's operator SA and the kube-controller-manager GC. Entries must
  # be full SA usernames (system:serviceaccount:<namespace>:<name>); a malformed entry
  # fails the render. Use this on the release that owns the cluster-wide singleton to
  # exempt (a) other operator releases' SAs that manage protected ledgers, and (b)
  # managed workload/GitOps controllers (ArgoCD, Flux, Velero) that legitimately delete
  # protected volumes during a teardown.
  additionalExemptServiceAccounts: []
