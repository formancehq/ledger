apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ledger-operator.fullname" . }}-pre-delete
  labels:
    {{- include "ledger-operator.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ledger-operator.fullname" . }}-pre-delete
  labels:
    {{- include "ledger-operator.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed
rules:
- apiGroups: ["ledger.formance.com"]
  resources: ["ledgerclusteragents"]
  verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ledger-operator.fullname" . }}-pre-delete
  labels:
    {{- include "ledger-operator.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed
subjects:
- kind: ServiceAccount
  name: {{ include "ledger-operator.fullname" . }}-pre-delete
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ledger-operator.fullname" . }}-pre-delete
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ledger-operator.fullname" . }}-pre-delete
  labels:
    {{- include "ledger-operator.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "ledger-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ledger-operator.fullname" . }}-pre-delete
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
      containers:
      - name: strip-finalizers
        image: docker.io/bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        command:
        - /bin/sh
        - -ec
        - |
          # Delete all LedgerClusterAgents while the operator is still
          # running so it can process finalizers (clean up cross-namespace
          # Secrets) before Helm tears down the Deployment.
          kubectl delete ledgerclusteragents.ledger.formance.com --all \
            --wait --timeout=60s 2>/dev/null || true
          echo "done"
