apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: credentials
spec:
  timeouts:
    assert: 5m
  steps:
    # 1. Deploy Cluster with labels that the agent will match.
    - name: Deploy Cluster
      try:
        - apply:
            file: cluster.yaml
        - assert:
            resource:
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: ledger-agent-svc
              status:
                readyReplicas: 1

    # 2. Verify no auth-keys ConfigMap exists yet (no agent).
    - name: Verify no auth-keys ConfigMap
      try:
        - script:
            content: |
              if kubectl get configmap ledger-agent-svc-auth-keys -n $NAMESPACE 2>/dev/null; then
                echo "FAIL: auth-keys ConfigMap should not exist yet"
                exit 1
              fi
              echo "OK: no auth-keys ConfigMap"
            timeout: 10s

    # 3. Create Credentials matching the Cluster.
    - name: Create Credentials
      try:
        - apply:
            file: credentials.yaml
        - assert:
            resource:
              apiVersion: ledger.formance.com/v1alpha1
              kind: Credentials
              metadata:
                name: e2e-agent
              status:
                phase: Ready

    # 4. Verify the agent has a keyID and secretRef.
    - name: Verify agent status
      try:
        - script:
            content: |
              KEY_ID=$(kubectl get credentials e2e-agent -o jsonpath='{.status.keyID}')
              SECRET_NAME=$(kubectl get credentials e2e-agent -o jsonpath='{.status.secretRef.name}')
              SECRET_NS=$(kubectl get credentials e2e-agent -o jsonpath='{.status.secretRef.namespace}')
              echo "KeyID: $KEY_ID"
              echo "Secret: $SECRET_NS/$SECRET_NAME"
              [ -n "$KEY_ID" ] || { echo "FAIL: keyID is empty"; exit 1; }
              [ -n "$SECRET_NAME" ] || { echo "FAIL: secretRef.name is empty"; exit 1; }

              # Verify the secret exists and contains expected keys.
              kubectl get secret "$SECRET_NAME" -n "$SECRET_NS" -o jsonpath='{.data}' | grep -q seed.hex || { echo "FAIL: secret missing seed.hex"; exit 1; }
              kubectl get secret "$SECRET_NAME" -n "$SECRET_NS" -o jsonpath='{.data}' | grep -q pubkey.hex || { echo "FAIL: secret missing pubkey.hex"; exit 1; }
              kubectl get secret "$SECRET_NAME" -n "$SECRET_NS" -o jsonpath='{.data}' | grep -q key-id || { echo "FAIL: secret missing key-id"; exit 1; }
              echo "OK: agent secret is valid"
            timeout: 30s

    # 5. Wait for auth-keys ConfigMap to appear (Cluster reconciler picks up agent).
    - name: Verify auth-keys ConfigMap
      try:
        - script:
            content: |
              for i in $(seq 1 30); do
                if kubectl get configmap ledger-agent-svc-auth-keys -n $NAMESPACE 2>/dev/null; then
                  echo "OK: auth-keys ConfigMap found"

                  # Verify auth-keys.json content.
                  AUTH_JSON=$(kubectl get configmap ledger-agent-svc-auth-keys -n $NAMESPACE -o jsonpath='{.data.auth-keys\.json}')
                  echo "$AUTH_JSON"

                  KEY_COUNT=$(echo "$AUTH_JSON" | grep -c '"keyId"')
                  [ "$KEY_COUNT" -eq 1 ] || { echo "FAIL: expected 1 key, got $KEY_COUNT"; exit 1; }

                  # Verify scopes are present.
                  echo "$AUTH_JSON" | grep -q 'ledger:read' || { echo "FAIL: missing ledger:read scope"; exit 1; }
                  echo "$AUTH_JSON" | grep -q 'ledger:write' || { echo "FAIL: missing ledger:write scope"; exit 1; }

                  # Verify public key file exists in ConfigMap.
                  PUBKEY_FILE=$(kubectl get configmap ledger-agent-svc-auth-keys -n $NAMESPACE -o jsonpath='{.data.agent-e2e-agent-pubkey\.hex}')
                  [ -n "$PUBKEY_FILE" ] || { echo "FAIL: pubkey file missing from ConfigMap"; exit 1; }
                  echo "OK: auth-keys ConfigMap is valid"
                  exit 0
                fi
                echo "Attempt $i: waiting for auth-keys ConfigMap..."
                sleep 5
              done
              echo "FAIL: auth-keys ConfigMap not created"
              exit 1
            timeout: 180s

    # 6. Verify the StatefulSet mounts the auth-keys volume.
    - name: Verify auth-keys volume mount
      try:
        - script:
            content: |
              # Check the StatefulSet has the auth-keys volume.
              VOLUMES=$(kubectl get statefulset ledger-agent-svc -n $NAMESPACE -o jsonpath='{.spec.template.spec.volumes[*].name}')
              echo "Volumes: $VOLUMES"
              echo "$VOLUMES" | grep -q 'auth-keys' || { echo "FAIL: auth-keys volume not found"; exit 1; }

              # Check auth-keys-hash annotation is set on pod template.
              HASH=$(kubectl get statefulset ledger-agent-svc -n $NAMESPACE -o jsonpath='{.spec.template.metadata.annotations.ledger\.formance\.com/auth-keys-hash}')
              echo "Auth keys hash: $HASH"
              [ -n "$HASH" ] || { echo "FAIL: auth-keys-hash annotation not set"; exit 1; }

              echo "OK: auth-keys volume is mounted"
            timeout: 30s

    # 7. Verify the agent lists the matched Cluster.
    - name: Verify agent matched services
      try:
        - script:
            content: |
              MATCHED=$(kubectl get credentials e2e-agent -o jsonpath='{.status.matchedServices[*].name}')
              echo "Matched services: $MATCHED"
              echo "$MATCHED" | grep -q 'agent-svc' || { echo "FAIL: agent-svc not in matchedServices"; exit 1; }
              echo "OK: agent matches Cluster"
            timeout: 30s

    # 8. Cleanup: delete the cluster-scoped agent (not auto-cleaned by namespace deletion).
    - name: Cleanup Credentials
      try:
        - script:
            content: |
              kubectl delete credentials e2e-agent --ignore-not-found
            timeout: 30s
