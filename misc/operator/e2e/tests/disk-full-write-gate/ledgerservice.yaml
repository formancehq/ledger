apiVersion: ledger.formance.com/v1alpha1
kind: LedgerService
metadata:
  name: disk-gate
spec:
  replicas: 1
  image:
    repository: ledger-v3-poc
    tag: e2e
    pullPolicy: Never
  persistence:
    data:
      hostPath:
        path: /mnt/tiny-data
  health:
    interval: 2s
    walThreshold: "0.8"
    dataThreshold: "0.8"
    walResumeThreshold: "0.75"
    dataResumeThreshold: "0.75"
