apiVersion: ledger.formance.com/v1alpha1
kind: LedgerService
metadata:
  name: protect-vol
spec:
  replicas: 1
  image:
    repository: ledger
    tag: e2e
    pullPolicy: Never
  persistence:
    # Opt this ledger into the cluster-scoped deletion-protection policy
    # (installed via Helm pvcProtection.enabled=true in e2e-cluster-up).
    deletionProtection: true
