apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: manual-backup-run
spec:
  timeouts:
    assert: 5m
  steps:
    - name: Create S3 bucket
      try:
        - script:
            content: |
              kubectl run mc-manual --rm -i --restart=Never \
                --image=minio/mc --image-pull-policy=IfNotPresent \
                --env=MC_HOST_minio=http://minioadmin:minioadmin@minio.minio.svc.cluster.local:9000 \
                -- mb --ignore-existing minio/e2e-manual-backup
            timeout: 60s

    - name: Deploy Cluster
      try:
        - apply:
            file: cluster.yaml
        - assert:
            resource:
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: ledger-bk-manual-svc
              status:
                readyReplicas: 1

    - name: Provision data
      try:
        - script:
            content: |
              kubectl exec ledger-bk-manual-svc-0 -n $NAMESPACE -c ledger -- \
                /bin/sh -c './ledgerctl provision run marketplace --scale 0.5 --server 127.0.0.1:8888 --insecure --auth-token "$CLUSTER_SECRET"'
            timeout: 120s

    - name: Create Backup (no schedule) and verify it reaches Ready
      try:
        - apply:
            file: backup.yaml
        - assert:
            file: assert-backup-ready.yaml

    - name: Trigger a manual full BackupRun and assert it succeeds
      try:
        - apply:
            file: backuprun.yaml
        - assert:
            file: assert-run-succeeded.yaml

    - name: Verify Backup status summary is populated from the Run
      try:
        - assert:
            file: assert-backup-summary.yaml
