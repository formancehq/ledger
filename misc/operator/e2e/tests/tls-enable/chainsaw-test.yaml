apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tls-enable
spec:
  timeouts:
    assert: 10m
  steps:
    # 1. Start the cluster without TLS.
    - name: Deploy plaintext LedgerService
      try:
        - apply:
            file: ledgerservice.yaml
        - assert:
            resource:
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: ledger-tls-en
              status:
                readyReplicas: 3

    # 2. Sanity check: cluster-secret must NOT exist while TLS is disabled.
    - name: Assert cluster-secret absent before TLS
      try:
        - script:
            content: |
              if kubectl get secret ledger-tls-en-cluster-secret -n $NAMESPACE >/dev/null 2>&1; then
                echo "FAIL: cluster-secret should not exist when TLS is disabled"
                exit 1
              fi
              echo "OK: no cluster-secret while TLS is disabled"
            timeout: 15s

    # 3. Provision data so we can verify it survives the migration.
    - name: Provision data
      try:
        - script:
            content: |
              kubectl exec ledger-tls-en-0 -n $NAMESPACE -c ledger -- \
                /bin/sh -c './ledgerctl provision run marketplace --scale 0.5 --server 127.0.0.1:8888 --insecure'
            timeout: 120s

    # 4. Generate certs and create the Secret the CR will reference.
    - name: Generate TLS Secret
      try:
        - script:
            content: |
              set -e
              WORKDIR=$(mktemp -d)
              cd "$WORKDIR"

              openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:P-256 \
                -nodes -keyout ca.key -out ca.crt -days 1 -subj "/CN=tls-en-ca"

              cat > csr.cnf <<EOF
              [req]
              distinguished_name=req
              [SAN]
              subjectAltName=DNS:localhost,DNS:ledger-tls-en-headless,DNS:*.ledger-tls-en-headless.${NAMESPACE}.svc.cluster.local,IP:127.0.0.1
              EOF

              openssl req -newkey ec -pkeyopt ec_paramgen_curve:P-256 \
                -nodes -keyout tls.key -out tls.csr -subj "/CN=tls-en"

              openssl x509 -req -in tls.csr -CA ca.crt -CAkey ca.key \
                -CAcreateserial -out tls.crt -days 1 \
                -extfile csr.cnf -extensions SAN

              kubectl create secret generic tls-en-certs \
                --namespace "$NAMESPACE" \
                --from-file=tls.crt=tls.crt \
                --from-file=tls.key=tls.key \
                --from-file=ca.crt=ca.crt
            timeout: 60s

    # 5. Toggle TLS on.
    - name: Enable TLS
      try:
        - apply:
            file: ledgerservice-tls-enabled.yaml

    # 6. Observe the migration walking through the "optional" phase. The
    #    operator must drive TLS_MODE through optional before landing on
    #    required.
    - name: Observe optional phase
      try:
        - script:
            content: |
              SAW_OPTIONAL=0
              for i in $(seq 1 60); do
                MODE=$(kubectl get statefulset ledger-tls-en -n $NAMESPACE \
                  -o jsonpath='{.spec.template.spec.containers[0].env[?(@.name=="TLS_MODE")].value}' 2>/dev/null)
                PHASE=$(kubectl get ledgerservice tls-en -n $NAMESPACE \
                  -o jsonpath='{.status.tlsMigrationPhase}' 2>/dev/null)
                echo "tick $i: TLS_MODE=$MODE migrationPhase=$PHASE"
                if [ "$MODE" = "optional" ] || [ "$PHASE" = "transitioning-to-required" ]; then
                  SAW_OPTIONAL=1
                fi
                if [ "$MODE" = "required" ] && [ "$PHASE" = "required" ]; then
                  break
                fi
                sleep 5
              done
              [ "$SAW_OPTIONAL" = "1" ] || { echo "FAIL: migration never went through optional"; exit 1; }
            timeout: 8m

    # 7. Final state: tlsMigrationPhase=required + cluster-secret present.
    - name: Assert final required phase
      try:
        - assert:
            resource:
              apiVersion: ledger.formance.com/v1alpha1
              kind: LedgerService
              metadata:
                name: tls-en
              status:
                tlsMigrationPhase: required
                readyReplicas: 3

    - name: Assert cluster-secret present after TLS
      try:
        - script:
            content: |
              kubectl get secret ledger-tls-en-cluster-secret -n $NAMESPACE >/dev/null
              echo "OK: cluster-secret created during TLS migration"
            timeout: 15s

    # 8. Data survived.
    - name: Verify data integrity
      try:
        - script:
            content: |
              kubectl exec ledger-tls-en-0 -n $NAMESPACE -c ledger -- \
                /bin/sh -c './ledgerctl ledgers list --server 127.0.0.1:8888 --insecure --auth-token "$CLUSTER_SECRET"'
            timeout: 30s
