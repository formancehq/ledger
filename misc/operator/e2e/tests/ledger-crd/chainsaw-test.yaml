apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ledger-crd
spec:
  timeouts:
    assert: 5m
  steps:
    - name: Deploy Cluster
      try:
        - apply:
            file: cluster.yaml
        - assert:
            resource:
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: ledger-crd-cluster
              status:
                readyReplicas: 1

    - name: Create Ledger via CRD
      try:
        - apply:
            file: ledger.yaml
        - assert:
            resource:
              apiVersion: ledger.formance.com/v1alpha1
              kind: Ledger
              metadata:
                name: test-ledger
              status:
                phase: Ready

    - name: Verify ledger exists in the cluster
      try:
        - script:
            content: |
              kubectl exec ledger-crd-cluster-0 -n $NAMESPACE -c ledger -- \
                /bin/sh -c './ledgerctl ledgers list --server 127.0.0.1:8888 --insecure --auth-token "$CLUSTER_SECRET"' \
                | grep my-ledger
            timeout: 30s

    - name: Verify declared indexes were created
      try:
        - assert:
            resource:
              apiVersion: ledger.formance.com/v1alpha1
              kind: Ledger
              metadata:
                name: test-ledger
              status:
                (conditions[?type == 'IndexesSynced'])[0].status: "True"
        - script:
            content: |
              OUTPUT=$(kubectl exec ledger-crd-cluster-0 -n $NAMESPACE -c ledger -- \
                /bin/sh -c './ledgerctl indexes list --ledger my-ledger --json --server 127.0.0.1:8888 --insecure --auth-token "$CLUSTER_SECRET"')
              echo "$OUTPUT"
              # Builtins + account asset + metadata field must all be present.
              echo "$OUTPUT" | grep -q TX_BUILTIN_INDEX_REFERENCE || { echo "FAIL: reference index missing"; exit 1; }
              echo "$OUTPUT" | grep -q TX_BUILTIN_INDEX_ADDRESS   || { echo "FAIL: address index missing"; exit 1; }
              echo "$OUTPUT" | grep -q ACCT_BUILTIN_INDEX_ASSET   || { echo "FAIL: account asset index missing"; exit 1; }
              echo "$OUTPUT" | grep -q '"category"'               || { echo "FAIL: metadata category index missing"; exit 1; }
              echo "OK: declared indexes present"
            timeout: 60s

    - name: Reconcile index changes (drop address, add timestamp)
      try:
        - apply:
            file: ledger-reindexed.yaml
        - assert:
            resource:
              apiVersion: ledger.formance.com/v1alpha1
              kind: Ledger
              metadata:
                name: test-ledger
              status:
                (conditions[?type == 'IndexesSynced'])[0].status: "True"
        - script:
            content: |
              OUTPUT=$(kubectl exec ledger-crd-cluster-0 -n $NAMESPACE -c ledger -- \
                /bin/sh -c './ledgerctl indexes list --ledger my-ledger --json --server 127.0.0.1:8888 --insecure --auth-token "$CLUSTER_SECRET"')
              echo "$OUTPUT"
              echo "$OUTPUT" | grep -q TX_BUILTIN_INDEX_TIMESTAMP  || { echo "FAIL: timestamp index not created"; exit 1; }
              echo "$OUTPUT" | grep -q TX_BUILTIN_INDEX_REFERENCE  || { echo "FAIL: reference index lost"; exit 1; }
              if echo "$OUTPUT" | grep -q TX_BUILTIN_INDEX_ADDRESS; then
                echo "FAIL: address index should have been dropped"
                exit 1
              fi
              echo "OK: index reconcile converged (address dropped, timestamp added)"
            timeout: 60s

    - name: Delete Ledger CRD
      try:
        - script:
            content: |
              kubectl delete ledger test-ledger -n $NAMESPACE --wait=true --timeout=30s
            timeout: 60s

    - name: Verify ledger is removed
      try:
        - script:
            content: |
              OUTPUT=$(kubectl exec ledger-crd-cluster-0 -n $NAMESPACE -c ledger -- \
                /bin/sh -c './ledgerctl ledgers list --server 127.0.0.1:8888 --insecure --auth-token "$CLUSTER_SECRET"')
              if echo "$OUTPUT" | grep -q my-ledger; then
                echo "FAIL: ledger my-ledger still exists after deletion"
                exit 1
              fi
              echo "OK: ledger my-ledger deleted successfully"
            timeout: 30s
