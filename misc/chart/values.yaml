# Default values for ledger-v3-poc
# This is a YAML-formatted file.

# Image configuration
image:
  repository: ghcr.io/formancehq/ledger-v3-poc
  tag: "latest"
  pullPolicy: IfNotPresent

# Image pull secrets (for private registries)
imagePullSecrets: []
# Example:
# imagePullSecrets:
#   - name: regcred

# Replica count (number of Raft nodes)
replicaCount: 3

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod security context
podSecurityContext:
  fsGroup: 1000

# Container security context
securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# Application configuration
config:
  # Raft/gRPC configuration (Raft transport uses gRPC, so same port)
  bindAddr: "0.0.0.0:8888"  # Port for both Raft and gRPC
  httpPort: 9000
  walDir: "/data/raft"
  dataDir: "/data/app"
  
  # Storage type: sqlite-mattn, sqlite-modern, or pebble
  storageType: "sqlite-mattn"
  
  # Raft configuration
  raft:
    snapshotThreshold: 15000   # Number of logs before triggering a snapshot
    compactionMargin: 7500
    snapshotInterval: "30s"   # Minimum interval between snapshots
    electionTick: 10          # Election timeout in ticks (default: 10)
    heartbeatTick: 1          # Heartbeat interval in ticks (default: 1)
    maxSizePerMsg: 2097152    # Maximum size per message in bytes (default: 1MB)
    maxInflightMsgs: 512      # Maximum number of in-flight messages (default: 256)
    tickInterval: 100ms       # Interval between Raft ticks (default: 100ms)
    proposeQueueCapacity: 512 # Capacity of the propose queue (default: 100)
    # Transport queue configuration
    transport:
      receptionQueues: [10, 2048, 2048]  # Reception queue capacities per priority (default: [10, 512, 512])
      sendQueues: [10, 1024, 1024]       # Send queue capacities per priority (default: [10, 512, 512])

  # Debug logging
  debug: false
  
  # Monitoring configuration (uses core chart helpers)
  # Values can be set at config.monitoring.* or global.monitoring.*
  # Global values take precedence if config values are not set
  monitoring:
    # Service name for monitoring
    serviceName: "ledger-v3-poc"
    # Traces configuration
    traces:
      enabled: true
      exporter: "otlp"
      endpoint: ""
      port: ""
      insecure: "false"
      mode: "grpc"
      batch: "false"
      # Error-aware sampling configuration
      # When enabled, all error traces are exported, but successful traces are sampled
      sampling:
        enabled: false       # Enable error-aware trace sampling
        successRatio: 0.1    # Sampling ratio for successful traces (0.0-1.0)
    # Metrics configuration
    metrics:
      enabled: false
      exporter: "otlp"
      endpoint: ""
      port: ""
      insecure: "false"
      mode: "grpc"
      # OpenTelemetry metrics runtime configuration
      keepInMemory: true
      exporterPushInterval: "15s"
      runtime: true
      runtimeMinimumReadMemStatsInterval: "15s"
    # Logs configuration
    logs:
      enabled: true
      level: "info"
      exporter: "otlp"
      endpoint: ""
      port: ""
      insecure: "false"
      mode: "grpc"
      #format: "json"
    # Additional resource attributes
    attributes: ""
    # Pyroscope continuous profiling configuration
    pyroscope:
      enabled: false
      serverAddress: "http://pyroscope:4040"
      applicationName: ""  # Defaults to monitoring.serviceName if not set
      authToken: ""
      tenantId: ""
      basicAuthUser: ""
      basicAuthPassword: ""
      uploadRate: "15s"
      tags: ""  # Format: key=value,key2=value2
      profileTypes: "cpu,alloc_objects,alloc_space,inuse_objects,inuse_space,goroutines,mutex_count,mutex_duration,block_count,block_duration"
      mutexProfileFraction: 5
      blockProfileRate: 5
      disableGCRuns: false

# Service configuration
service:
  type: ClusterIP
  httpPort: 9000
  grpcPort: 8888  # Same port as bindAddr (Raft transport uses gRPC)
  annotations: {}

# Headless service for Raft peer discovery
headlessService:
  enabled: true
  annotations: {}

# Ingress configuration
ingress:
  enabled: false
  className: ""  # Ingress class name (e.g., "nginx", "traefik")
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: ledger-v3-poc.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: ledger-v3-poc-tls
    #   hosts:
    #     - ledger-v3-poc.local
  # Per-pod ingress configuration (for accessing individual pods from outside the cluster)
  # By default, reuses the host from ingress.hosts[0] and creates pod-{index}.{baseHost}
  # Example: if ingress.hosts[0].host = "ledger.example.com", creates:
  #   - pod-0.ledger.example.com
  #   - pod-1.ledger.example.com
  #   - pod-2.ledger.example.com
  perPod:
    enabled: false
    annotations: {}

# Persistence configuration
persistence:
  # WAL persistence (Raft logs)
  wal:
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 5Gi
  # Data persistence (application storage)
  data:
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi
  persistentVolumeClaimRetentionPolicy:
    whenScaled: Retain
    whenDeleted: Retain

# Resource limits and requests
resources:
  limits:
    cpu: 4000m
    memory: 2048Mi
  requests:
    cpu: 4000m
    memory: 2048Mi

# Health check configuration
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  grpc:
    port: 8888
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Pod annotations
podAnnotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# Pod anti-affinity configuration
# Used to spread pods across different nodes for high availability
podAntiAffinity:
  # Enable pod anti-affinity to prefer scheduling pods on different nodes
  enabled: true
  # Type: "soft" (preferredDuringSchedulingIgnoredDuringExecution) or "hard" (requiredDuringSchedulingIgnoredDuringExecution)
  # "soft" allows scheduling on same node if necessary, "hard" requires different nodes
  type: "soft"
  # Weight for soft anti-affinity (1-100, higher = stronger preference)
  weight: 100
  # Topology key for anti-affinity (kubernetes.io/hostname = spread across nodes)
  topologyKey: "kubernetes.io/hostname"

# Pod disruption budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Service monitor for Prometheus (if using Prometheus Operator)
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  relabelings: []
  metricRelabelings: []

# Global monitoring configuration (optional, can override config.monitoring)
# Uncomment to use global values:
# global:
#   monitoring:
#     traces:
#       enabled: true
#       endpoint: "localhost"
#       exporter: "otlp"
#       insecure: "true"
#       mode: "grpc"
#       port: 4317
#     logs:
#       enabled: true
#       level: "info"
#       format: "json"
#     metrics:
#       enabled: true
#       exporter: "otlp"
#       insecure: "true"
#       mode: "grpc"
#       port: 4317

# Additional values
nameOverride: ""
fullnameOverride: ""

