# Default values for ledger-v3-poc
# This is a YAML-formatted file.

# Image configuration
image:
  repository: ghcr.io/formancehq/ledger-v3-poc
  tag: "latest"
  pullPolicy: IfNotPresent

# Image pull secrets (for private registries)
imagePullSecrets: []
# Example:
# imagePullSecrets:
#   - name: regcred

# Replica count (number of Raft nodes)
replicaCount: 3

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod security context
podSecurityContext:
  fsGroup: 1000

# Container security context
securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# Application configuration
config:
  # Cluster ID for inter-node communication validation
  # All nodes in a cluster must share the same cluster ID
  clusterID: "default"
  # Raft transport configuration (internal inter-node communication)
  bindAddr: "0.0.0.0:7777"  # Raft transport port
  # gRPC service port (external client-facing API)
  grpcPort: 8888
  httpPort: 9000
  walDir: "/data/raft"
  dataDir: "/data/app"
  
  # Pebble storage configuration
  pebble:
    # Memtable size in bytes (default: 256MB = 268435456)
    # Larger values absorb more writes before flush, reducing SST files and compactions
    memTableSize: 268435456
    # Number of memtables before writes are stopped (default: 6)
    # Higher values reduce write stalls at the cost of increased memory usage
    memTableStopWritesThreshold: 6
    # L0 file count to trigger L0->L1 compaction (default: 64)
    # Lower values prevent runaway L0 growth but increase compaction frequency
    l0CompactionThreshold: 64
    # L0 file count before writes are stopped (default: 256)
    # Higher values allow more L0 files before stalling, but increase read amplification
    l0StopWritesThreshold: 256
    # Maximum size of L1 in bytes (default: 2GB = 2147483648)
    # Larger values are better for larger datasets
    lBaseMaxBytes: 2147483648
    # Block cache size in bytes (default: 1GB = 1073741824)
    # Larger caches improve read performance at the cost of memory
    cacheSize: 1073741824
    # Target SST file size in bytes (default: 256MB = 268435456)
    # Larger files mean fewer files and fewer compactions
    targetFileSize: 268435456
    # Bytes written before sync during flush/compaction (default: 1MB = 1048576)
    bytesPerSync: 1048576
    # WAL bytes written before sync (default: 1MB = 1048576)
    walBytesPerSync: 1048576
    # Maximum concurrent compactions (default: 2)
    # Higher values can speed up compaction but may saturate IO
    maxConcurrentCompactions: 2
    # Minimum interval between WAL syncs (default: 0, immediate sync)
    # Non-zero values improve write throughput but risk data loss on crash
    # Example: "100ms" for batched syncs
    walMinSyncInterval: "0"
    # Disable WAL entirely (default: false)
    # WARNING: Risks data loss on crash. Only use for testing or ephemeral data
    disableWAL: false
  
  # Cache configuration
  cache:
    # Number of Raft log entries before rotating cache generations (default: 1000)
    # Smaller values mean more frequent rotations (more preload reads from store, less memory)
    # Larger values mean less frequent rotations (fewer preload reads, more memory usage)
    rotationThreshold: 1000

  # Raft configuration
  raft:
    snapshotThreshold: 15000   # Number of logs before triggering a snapshot
    compactionMargin: 7500
    snapshotInterval: "30s"   # Minimum interval between snapshots
    electionTick: 10          # Election timeout in ticks (default: 10)
    heartbeatTick: 1          # Heartbeat interval in ticks (default: 1)
    maxSizePerMsg: 2097152    # Maximum size per message in bytes (default: 1MB)
    maxInflightMsgs: 512      # Maximum number of in-flight messages (default: 256)
    tickInterval: 100ms       # Interval between Raft ticks (default: 100ms)
    proposeQueueCapacity: 512 # Capacity of the propose queue (default: 100)
    learnerPromotionThreshold: 100 # Max log entry lag before auto-promoting a learner to voter (0 = disable)
    # Transport queue configuration
    transport:
      receptionQueues: [10, 2048, 2048]  # Reception queue capacities per priority (default: [10, 512, 512])
      sendQueues: [10, 1024, 1024]       # Send queue capacities per priority (default: [10, 512, 512])

  # Health check configuration (disk usage and clock skew thresholds)
  health:
    # Interval between health checks (default: 30s)
    interval: "30s"
    # WAL volume usage threshold (0.0-1.0, default: 0.8 = 80%)
    walThreshold: 0.8
    # Data volume usage threshold (0.0-1.0, default: 0.8 = 80%)
    dataThreshold: 0.8
    # Maximum allowed clock skew between nodes (default: 500ms, "0" to disable)
    clockSkewThreshold: "500ms"

  # Audit log configuration
  audit:
    enabled: true

  # Admission metrics (histograms/counters in the admission hot path).
  admissionMetrics: true

  # Cold storage configuration for period archival
  coldStorage:
    # Storage driver: "filesystem" (default, dev/test) or "s3" (production)
    driver: "filesystem"
    # Base path for filesystem driver (default: <data-dir>/cold-storage)
    path: ""
    # Shared namespace prefix for archives (default: cluster-id)
    bucketId: ""
    # S3-specific configuration (required when driver=s3)
    s3:
      bucket: ""        # S3 bucket name
      region: ""        # AWS region (e.g., eu-west-1)
      endpoint: ""      # Custom S3 endpoint (for MinIO)

  # TLS configuration for gRPC connections (both servers and inter-node communication)
  tls:
    # Enable TLS for gRPC servers
    enabled: false
    # Kubernetes secret containing TLS certificate and key
    # The secret must contain tls.crt and tls.key (standard kubernetes.io/tls secret)
    secretName: ""
    # Path to CA certificate file inside the secret (optional, for mTLS client verification)
    # If the secret also contains a ca.crt key, set this to enable CA verification
    caSecretKey: ""

  # Restore mode: start in restore mode (no Raft, only RestoreService gRPC)
  # When enabled, the server accepts backup uploads and does not join/bootstrap a cluster
  restore: false

  # Debug logging
  debug: false
  
  # Monitoring configuration (uses core chart helpers)
  # Values can be set at config.monitoring.* or global.monitoring.*
  # Global values take precedence if config values are not set
  monitoring:
    # Service name for monitoring
    serviceName: "ledger-v3-poc"
    # Traces configuration
    traces:
      enabled: true
      exporter: "otlp"
      endpoint: ""
      port: ""
      insecure: "false"
      mode: "grpc"
      batch: "false"
      # Error-aware sampling configuration
      # When enabled, all error traces are exported, but successful traces are sampled
      sampling:
        enabled: false       # Enable error-aware trace sampling
        successRatio: 0.1    # Sampling ratio for successful traces (0.0-1.0)
    # Metrics configuration
    metrics:
      enabled: false
      exporter: "otlp"
      endpoint: ""
      port: ""
      insecure: "false"
      mode: "grpc"
      # OpenTelemetry metrics runtime configuration
      keepInMemory: true
      exporterPushInterval: "15s"
      runtime: true
      runtimeMinimumReadMemStatsInterval: "15s"
    # Logs configuration
    logs:
      enabled: true
      level: "info"
      exporter: "otlp"
      endpoint: ""
      port: ""
      insecure: "false"
      mode: "grpc"
      #format: "json"
    # Additional resource attributes
    attributes: ""
    # Pyroscope continuous profiling configuration
    pyroscope:
      enabled: false
      serverAddress: "http://pyroscope:4040"
      applicationName: ""  # Defaults to monitoring.serviceName if not set
      authToken: ""
      tenantId: ""
      basicAuthUser: ""
      basicAuthPassword: ""
      uploadRate: "15s"
      tags: ""  # Format: key=value,key2=value2
      profileTypes: "cpu,alloc_objects,alloc_space,inuse_objects,inuse_space,goroutines,mutex_count,mutex_duration,block_count,block_duration"
      mutexProfileFraction: 5
      blockProfileRate: 5
      disableGCRuns: false

# Service configuration
service:
  type: ClusterIP
  httpPort: 9000
  grpcPort: 8888  # External service API port
  raftPort: 7777  # Internal Raft transport port
  annotations: {}

# Headless service for Raft peer discovery
headlessService:
  enabled: true
  annotations: {}

# Ingress configuration (HTTP)
ingress:
  enabled: false
  className: ""  # Ingress class name (e.g., "nginx", "traefik")
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: ledger-v3-poc.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: ledger-v3-poc-tls
    #   hosts:
    #     - ledger-v3-poc.local

# gRPC Ingress configuration
# Note: gRPC requires HTTP/2 support. For nginx ingress, backend-protocol annotation is auto-added.
# For Traefik, an IngressRoute CRD is used instead of standard Ingress for better gRPC support.
ingressGrpc:
  enabled: false
  className: ""  # Ingress class name (e.g., "nginx", "traefik")
  annotations: {}
    # For nginx (auto-added when className is "nginx"):
    # nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
  hosts:
    - host: grpc.ledger-v3-poc.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: ledger-v3-poc-grpc-tls
    #   hosts:
    #     - grpc.ledger-v3-poc.local
  # AWS TargetGroupBinding configuration (requires AWS Load Balancer Controller)
  targetGroupBinding:
    enabled: false
    # ARN of the target group to bind to
    targetGroupARN: ""
    # Target type: "instance" or "ip" (default: ip)
    targetType: ip
    # Optional networking configuration
    # networking:
    #   ingress:
    #     - from:
    #         - securityGroup:
    #             groupID: sg-xxxxxxxxx
    #       ports:
    #         - protocol: TCP
    #           port: 8888

# Persistence configuration
persistence:
  # WAL persistence (Raft logs)
  wal:
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 5Gi
  # Data persistence (application storage)
  data:
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi
  persistentVolumeClaimRetentionPolicy:
    whenScaled: Retain
    whenDeleted: Retain

# Resource limits and requests
resources:
  limits:
    cpu: 4000m
    memory: 2048Mi
  requests:
    cpu: 4000m
    memory: 2048Mi

# Health check configuration
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  grpc:
    port: 8888
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Pod annotations
podAnnotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# Pod anti-affinity configuration
# Used to spread pods across different nodes for high availability
podAntiAffinity:
  # Enable pod anti-affinity to prefer scheduling pods on different nodes
  enabled: true
  # Type: "soft" (preferredDuringSchedulingIgnoredDuringExecution) or "hard" (requiredDuringSchedulingIgnoredDuringExecution)
  # "soft" allows scheduling on same node if necessary, "hard" requires different nodes
  type: "soft"
  # Weight for soft anti-affinity (1-100, higher = stronger preference)
  weight: 100
  # Topology key for anti-affinity (kubernetes.io/hostname = spread across nodes)
  topologyKey: "kubernetes.io/hostname"

# Pod disruption budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Service monitor for Prometheus (if using Prometheus Operator)
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  relabelings: []
  metricRelabelings: []

# Global monitoring configuration (optional, can override config.monitoring)
# Uncomment to use global values:
# global:
#   monitoring:
#     traces:
#       enabled: true
#       endpoint: "localhost"
#       exporter: "otlp"
#       insecure: "true"
#       mode: "grpc"
#       port: 4317
#     logs:
#       enabled: true
#       level: "info"
#       format: "json"
#     metrics:
#       enabled: true
#       exporter: "otlp"
#       insecure: "true"
#       mode: "grpc"
#       port: 4317

# Additional values
nameOverride: ""
fullnameOverride: ""

