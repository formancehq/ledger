apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ledger-v3-poc.fullname" . }}
  labels:
    {{- include "ledger-v3-poc.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "ledger-v3-poc.headlessServiceName" . }}
  replicas: {{ .Values.replicaCount }}
  persistentVolumeClaimRetentionPolicy:
    {{ toYaml .Values.persistence.persistentVolumeClaimRetentionPolicy | nindent 4}}
  selector:
    matchLabels:
      {{- include "ledger-v3-poc.selectorLabels" . | nindent 6 }}
  podManagementPolicy: "Parallel"
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ledger-v3-poc.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ledger-v3-poc.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        {{- if eq .Values.image.tag "latest" }}
        imagePullPolicy: Always
        {{- else }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- end }}
        ports:
        - name: http
          containerPort: {{ .Values.config.httpPort }}
          protocol: TCP
        - name: grpc
          containerPort: {{ .Values.config.grpcPort }}
          protocol: TCP
        - name: raft
          containerPort: {{ (split ":" .Values.config.bindAddr)._1 | atoi }}
          protocol: TCP
        env:
        - name: POD_INDEX
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: BIND_ADDR
          value: {{ .Values.config.bindAddr | quote }}
        - name: GRPC_PORT
          value: {{ .Values.config.grpcPort | quote }}
        - name: HTTP_PORT
          value: {{ .Values.config.httpPort | quote }}
        - name: WAL_DIR
          value: {{ .Values.config.walDir | quote }}
        - name: DATA_DIR
          value: {{ .Values.config.dataDir | quote }}
        {{- if .Values.config.clusterID }}
        - name: CLUSTER_ID
          value: {{ .Values.config.clusterID | quote }}
        {{- end }}
        {{- if .Values.config.raft.snapshotThreshold }}
        - name: SNAPSHOT_THRESHOLD
          value: {{ .Values.config.raft.snapshotThreshold | quote }}
        {{- end }}
        {{- if .Values.config.raft.snapshotInterval }}
        - name: SNAPSHOT_INTERVAL
          value: {{ .Values.config.raft.snapshotInterval | quote }}
        {{- end }}
        {{- if .Values.config.raft.electionTick }}
        - name: RAFT_ELECTION_TICK
          value: {{ .Values.config.raft.electionTick | quote }}
        {{- end }}
        {{- if .Values.config.raft.heartbeatTick }}
        - name: RAFT_HEARTBEAT_TICK
          value: {{ .Values.config.raft.heartbeatTick | quote }}
        {{- end }}
        {{- if .Values.config.raft.maxSizePerMsg }}
        - name: RAFT_MAX_SIZE_PER_MSG
          value: {{ include "stringOrNumber" .Values.config.raft.maxSizePerMsg | quote }}
        {{- end }}
        {{- if .Values.config.raft.maxInflightMsgs }}
        - name: RAFT_MAX_INFLIGHT_MSGS
          value: {{ .Values.config.raft.maxInflightMsgs | quote }}
        {{- end }}
        {{- if .Values.config.raft.tickInterval }}
        - name: RAFT_TICK_INTERVAL
          value: {{ .Values.config.raft.tickInterval | quote }}
        {{- end }}
        {{- if .Values.config.raft.proposeQueueCapacity }}
        - name: RAFT_PROPOSE_QUEUE_CAPACITY
          value: {{ .Values.config.raft.proposeQueueCapacity | quote }}
        {{- end }}
        {{- if .Values.config.raft.transport.receptionQueues }}
        - name: RAFT_TRANSPORT_RECEPTION_QUEUES
          value: {{ join "," .Values.config.raft.transport.receptionQueues | quote }}
        {{- end }}
        {{- if .Values.config.raft.transport.sendQueues }}
        - name: RAFT_TRANSPORT_SEND_QUEUES
          value: {{ join "," .Values.config.raft.transport.sendQueues | quote }}
        {{- end }}
        - name: RAFT_COMPACTION_MARGIN
          value: {{ .Values.config.raft.compactionMargin | quote }}
        - name: DEBUG
          value: {{ .Values.config.debug | quote }}
        {{- if hasKey .Values.config "audit" }}
        - name: AUDIT_ENABLED
          value: {{ .Values.config.audit.enabled | default true | toString | quote }}
        {{- end }}
        # Health check configuration
        {{- if .Values.config.health }}
        {{- if .Values.config.health.interval }}
        - name: HEALTH_CHECK_INTERVAL
          value: {{ .Values.config.health.interval | quote }}
        {{- end }}
        {{- if .Values.config.health.walThreshold }}
        - name: HEALTH_WAL_THRESHOLD
          value: {{ .Values.config.health.walThreshold | toString | quote }}
        {{- end }}
        {{- if .Values.config.health.dataThreshold }}
        - name: HEALTH_DATA_THRESHOLD
          value: {{ .Values.config.health.dataThreshold | toString | quote }}
        {{- end }}
        {{- if .Values.config.health.clockSkewThreshold }}
        - name: HEALTH_CLOCK_SKEW_THRESHOLD
          value: {{ .Values.config.health.clockSkewThreshold | quote }}
        {{- end }}
        {{- end }}
        # Pebble configuration
        {{- if .Values.config.pebble }}
        {{- if .Values.config.pebble.memTableSize }}
        - name: PEBBLE_MEMTABLE_SIZE
          value: {{ include "stringOrNumber" .Values.config.pebble.memTableSize | quote }}
        {{- end }}
        {{- if .Values.config.pebble.memTableStopWritesThreshold }}
        - name: PEBBLE_MEMTABLE_STOP_WRITES_THRESHOLD
          value: {{ include "stringOrNumber" .Values.config.pebble.memTableStopWritesThreshold | quote }}
        {{- end }}
        {{- if .Values.config.pebble.l0CompactionThreshold }}
        - name: PEBBLE_L0_COMPACTION_THRESHOLD
          value: {{ include "stringOrNumber" .Values.config.pebble.l0CompactionThreshold | quote }}
        {{- end }}
        {{- if .Values.config.pebble.l0StopWritesThreshold }}
        - name: PEBBLE_L0_STOP_WRITES_THRESHOLD
          value: {{ include "stringOrNumber" .Values.config.pebble.l0StopWritesThreshold | quote }}
        {{- end }}
        {{- if .Values.config.pebble.lBaseMaxBytes }}
        - name: PEBBLE_LBASE_MAX_BYTES
          value: {{ include "stringOrNumber" .Values.config.pebble.lBaseMaxBytes | quote }}
        {{- end }}
        {{- if .Values.config.pebble.cacheSize }}
        - name: PEBBLE_CACHE_SIZE
          value: {{ include "stringOrNumber" .Values.config.pebble.cacheSize | quote }}
        {{- end }}
        {{- if .Values.config.pebble.targetFileSize }}
        - name: PEBBLE_TARGET_FILE_SIZE
          value: {{ include "stringOrNumber" .Values.config.pebble.targetFileSize | quote }}
        {{- end }}
        {{- if .Values.config.pebble.bytesPerSync }}
        - name: PEBBLE_BYTES_PER_SYNC
          value: {{ include "stringOrNumber" .Values.config.pebble.bytesPerSync | quote }}
        {{- end }}
        {{- if .Values.config.pebble.walBytesPerSync }}
        - name: PEBBLE_WAL_BYTES_PER_SYNC
          value: {{ include "stringOrNumber" .Values.config.pebble.walBytesPerSync | quote }}
        {{- end }}
        {{- if .Values.config.pebble.maxConcurrentCompactions }}
        - name: PEBBLE_MAX_CONCURRENT_COMPACTIONS
          value: {{ include "stringOrNumber" .Values.config.pebble.maxConcurrentCompactions | quote }}
        {{- end }}
        {{- if .Values.config.pebble.walMinSyncInterval }}
        - name: PEBBLE_WAL_MIN_SYNC_INTERVAL
          value: {{ .Values.config.pebble.walMinSyncInterval | quote }}
        {{- end }}
        {{- if .Values.config.pebble.disableWAL }}
        - name: PEBBLE_DISABLE_WAL
          value: {{ .Values.config.pebble.disableWAL | quote }}
        {{- end }}
        {{- end }}
        # OpenTelemetry metrics configuration
        - name: OTEL_METRICS_KEEP_IN_MEMORY
          value: {{ .Values.config.monitoring.metrics.keepInMemory | default true | toString | quote }}
        - name: OTEL_METRICS_EXPORTER_PUSH_INTERVAL
          value: {{ .Values.config.monitoring.metrics.exporterPushInterval | default "1s" | quote }}
        - name: OTEL_METRICS_RUNTIME
          value: {{ .Values.config.monitoring.metrics.runtime | default true | toString | quote }}
        - name: OTEL_METRICS_RUNTIME_MINIMUM_READ_MEM_STATS_INTERVAL
          value: {{ .Values.config.monitoring.metrics.runtimeMinimumReadMemStatsInterval | default "1s" | quote }}
        - name: OTEL_LOGS_EXPORTER
          value: {{ .Values.config.monitoring.logs.exporter | default "" | quote }}
        - name: OTEL_LOGS_EXPORTER_OTLP_ENDPOINT
          value: "{{ .Values.config.monitoring.logs.endpoint }}:{{ .Values.config.monitoring.logs.port }}"
        - name: OTEL_LOGS_EXPORTER_OTLP_INSECURE
          value: {{ .Values.config.monitoring.logs.insecure | default false | toString | quote }}
        - name: OTEL_LOGS_EXPORTER_OTLP_MODE
          value: {{ .Values.config.monitoring.logs.mode | default "" | quote }}
        {{- include "core.monitoring" . | nindent 8 }}
        # Pyroscope continuous profiling configuration
        {{- if .Values.config.monitoring.pyroscope.enabled }}
        - name: PYROSCOPE_ENABLED
          value: "true"
        - name: PYROSCOPE_SERVER_ADDRESS
          value: {{ .Values.config.monitoring.pyroscope.serverAddress | quote }}
        {{- if .Values.config.monitoring.pyroscope.applicationName }}
        - name: PYROSCOPE_APPLICATION_NAME
          value: {{ .Values.config.monitoring.pyroscope.applicationName | quote }}
        {{- else if .Values.config.monitoring.serviceName }}
        - name: PYROSCOPE_APPLICATION_NAME
          value: {{ .Values.config.monitoring.serviceName | quote }}
        {{- end }}
        {{- if .Values.config.monitoring.pyroscope.authToken }}
        - name: PYROSCOPE_AUTH_TOKEN
          value: {{ .Values.config.monitoring.pyroscope.authToken | quote }}
        {{- end }}
        {{- if .Values.config.monitoring.pyroscope.tenantId }}
        - name: PYROSCOPE_TENANT_ID
          value: {{ .Values.config.monitoring.pyroscope.tenantId | quote }}
        {{- end }}
        {{- if .Values.config.monitoring.pyroscope.basicAuthUser }}
        - name: PYROSCOPE_BASIC_AUTH_USER
          value: {{ .Values.config.monitoring.pyroscope.basicAuthUser | quote }}
        {{- end }}
        {{- if .Values.config.monitoring.pyroscope.basicAuthPassword }}
        - name: PYROSCOPE_BASIC_AUTH_PASSWORD
          value: {{ .Values.config.monitoring.pyroscope.basicAuthPassword | quote }}
        {{- end }}
        {{- if .Values.config.monitoring.pyroscope.uploadRate }}
        - name: PYROSCOPE_UPLOAD_RATE
          value: {{ .Values.config.monitoring.pyroscope.uploadRate | quote }}
        {{- end }}
        {{- if .Values.config.monitoring.pyroscope.tags }}
        - name: PYROSCOPE_TAGS
          value: {{ .Values.config.monitoring.pyroscope.tags | quote }}
        {{- end }}
        {{- if .Values.config.monitoring.pyroscope.profileTypes }}
        - name: PYROSCOPE_PROFILE_TYPES
          value: {{ .Values.config.monitoring.pyroscope.profileTypes | quote }}
        {{- end }}
        {{- if .Values.config.monitoring.pyroscope.mutexProfileFraction }}
        - name: PYROSCOPE_MUTEX_PROFILE_FRACTION
          value: {{ .Values.config.monitoring.pyroscope.mutexProfileFraction | quote }}
        {{- end }}
        {{- if .Values.config.monitoring.pyroscope.blockProfileRate }}
        - name: PYROSCOPE_BLOCK_PROFILE_RATE
          value: {{ .Values.config.monitoring.pyroscope.blockProfileRate | quote }}
        {{- end }}
        {{- if .Values.config.monitoring.pyroscope.disableGCRuns }}
        - name: PYROSCOPE_DISABLE_GC_RUNS
          value: {{ .Values.config.monitoring.pyroscope.disableGCRuns | toString | quote }}
        {{- end }}
        {{- end }}
        # Trace sampling configuration
        {{- if .Values.config.monitoring.traces.sampling.enabled }}
        - name: TRACE_SAMPLING_ENABLED
          value: "true"
        - name: TRACE_SAMPLING_SUCCESS_RATIO
          value: {{ .Values.config.monitoring.traces.sampling.successRatio | default 0.1 | toString | quote }}
        {{- end }}
        command:
        - /bin/sh
        - -c
        - |
          # Calculate node ID from pod index (pod index 0 -> node ID 1, etc.)
          NODE_ID=$((POD_INDEX + 1))

          # Extract Raft transport port from BIND_ADDR (format: 0.0.0.0:7777)
          RAFT_PORT=$(echo $BIND_ADDR | cut -d: -f2)

          # Generate ADVERTISE_ADDR from pod name (uses Raft transport port)
          ADVERTISE_ADDR="${POD_NAME}.{{ include "ledger-v3-poc.headlessServiceName" . }}.${POD_NAMESPACE}.svc.cluster.local:${RAFT_PORT}"

          # Bootstrap/Join: pod-0 bootstraps, others join pod-0
          if [ "$POD_INDEX" = "0" ]; then
            CLUSTER_FLAG="--bootstrap"
          else
            BOOTSTRAP_HOST="{{ include "ledger-v3-poc.fullname" . }}-0.{{ include "ledger-v3-poc.headlessServiceName" . }}.${POD_NAMESPACE}.svc.cluster.local"
            CLUSTER_FLAG="--join ${BOOTSTRAP_HOST}:${GRPC_PORT}"
          fi

          OTEL_RESOURCE_ATTRIBUTES="service.node_id=$NODE_ID"

          # Execute the application
          exec ./ledger-v3-poc run \
            --node-id $NODE_ID \
            --advertise-addr "$ADVERTISE_ADDR" \
            {{- if .Values.config.raft.learnerPromotionThreshold }}
            --learner-promotion-threshold {{ .Values.config.raft.learnerPromotionThreshold }} \
            {{- end }}
            $CLUSTER_FLAG
        volumeMounts:
        - name: wal
          mountPath: {{ .Values.config.walDir }}
        - name: data
          mountPath: {{ .Values.config.dataDir }}
        {{- with .Values.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.affinity .Values.podAntiAffinity.enabled }}
      affinity:
        {{- with .Values.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.podAntiAffinity.enabled }}
        podAntiAffinity:
          {{- if eq .Values.podAntiAffinity.type "hard" }}
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "ledger-v3-poc.selectorLabels" . | nindent 18 }}
              topologyKey: {{ .Values.podAntiAffinity.topologyKey | default "kubernetes.io/hostname" }}
          {{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: {{ .Values.podAntiAffinity.weight | default 100 }}
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "ledger-v3-poc.selectorLabels" . | nindent 20 }}
                topologyKey: {{ .Values.podAntiAffinity.topologyKey | default "kubernetes.io/hostname" }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
  - metadata:
      name: wal
    spec:
      accessModes:
        - {{ .Values.persistence.wal.accessMode }}
      storageClassName: {{ .Values.persistence.wal.storageClass }}
      resources:
        requests:
          storage: {{ .Values.persistence.wal.size }}
  - metadata:
      name: data
    spec:
      accessModes:
        - {{ .Values.persistence.data.accessMode }}
      storageClassName: {{ .Values.persistence.data.storageClass }}
      resources:
        requests:
          storage: {{ .Values.persistence.data.size }}
